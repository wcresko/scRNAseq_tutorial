<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" width="920" height="440">
  <defs>
    <style>
      .t { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #2c3e50; }
      .box { rx: 8; stroke-width: 2; }
    </style>
  </defs>

  <!-- Title -->
  <text x="460" y="28" class="t" font-size="18" text-anchor="middle" font-weight="bold">t-SNE vs UMAP: Shared Philosophy, Different Mathematics</text>

  <!-- ===== SHARED CORE (top center) ===== -->
  <rect x="210" y="42" width="500" height="55" fill="#e8f6f3" stroke="#1abc9c" class="box"/>
  <text x="460" y="65" class="t" font-size="13" text-anchor="middle" font-weight="bold" fill="#16a085">Shared Principle</text>
  <text x="460" y="84" class="t" font-size="12" text-anchor="middle">Model neighborhood structure in high-D &#x2192; reproduce it in low-D &#x2192; minimize mismatch</text>

  <!-- ===== t-SNE Column ===== -->
  <rect x="15" y="115" width="430" height="310" fill="#fdf2f2" stroke="#e74c3c" class="box"/>
  <text x="230" y="140" class="t" font-size="16" text-anchor="middle" font-weight="bold" fill="#c0392b">t-SNE</text>

  <!-- Foundation -->
  <rect x="30" y="150" width="400" height="38" fill="#fce8e8" stroke="#e74c3c" stroke-width="1" rx="5"/>
  <text x="230" y="167" class="t" font-size="11" text-anchor="middle" font-weight="bold" fill="#c0392b">Foundation: Information Theory</text>
  <text x="230" y="182" class="t" font-size="10" text-anchor="middle">Minimizes KL divergence between probability distributions</text>

  <!-- High-D -->
  <text x="40" y="210" class="t" font-size="11" font-weight="bold">High-D similarities:</text>
  <text x="40" y="226" class="t" font-size="11">&#x2022; Gaussian kernel centered on each point</text>
  <text x="40" y="242" class="t" font-size="11">&#x2022; &#x03C3;&#x1D62; adaptive (set by perplexity)</text>
  <text x="40" y="258" class="t" font-size="11">&#x2022; Symmetrized: p&#x1D62;&#x2C7C; = (p&#x2C7C;|&#x1D62; + p&#x1D62;|&#x2C7C;) / 2n</text>

  <!-- Low-D -->
  <text x="40" y="284" class="t" font-size="11" font-weight="bold">Low-D similarities:</text>
  <text x="40" y="300" class="t" font-size="11">&#x2022; Student's t-distribution (df = 1)</text>
  <text x="40" y="316" class="t" font-size="11">&#x2022; Heavy tails prevent crowding</text>

  <!-- Optimization -->
  <text x="40" y="342" class="t" font-size="11" font-weight="bold">Optimization:</text>
  <text x="40" y="358" class="t" font-size="11">&#x2022; Gradient descent (all pairs)</text>
  <text x="40" y="374" class="t" font-size="11">&#x2022; O(n&#x00B2;) without approximation</text>
  <text x="40" y="390" class="t" font-size="11">&#x2022; Barnes-Hut: O(n log n)</text>

  <!-- Asymmetry note -->
  <rect x="30" y="400" width="400" height="20" fill="#fce8e8" rx="3"/>
  <text x="230" y="414" class="t" font-size="10" text-anchor="middle" fill="#c0392b">KL divergence is asymmetric: prioritizes preserving local structure</text>

  <!-- ===== UMAP Column ===== -->
  <rect x="475" y="115" width="430" height="310" fill="#eaf2f8" stroke="#2980b9" class="box"/>
  <text x="690" y="140" class="t" font-size="16" text-anchor="middle" font-weight="bold" fill="#2980b9">UMAP</text>

  <!-- Foundation -->
  <rect x="490" y="150" width="400" height="38" fill="#dbeaf7" stroke="#2980b9" stroke-width="1" rx="5"/>
  <text x="690" y="167" class="t" font-size="11" text-anchor="middle" font-weight="bold" fill="#2980b9">Foundation: Algebraic Topology</text>
  <text x="690" y="182" class="t" font-size="10" text-anchor="middle">Minimizes cross-entropy between fuzzy simplicial sets</text>

  <!-- High-D -->
  <text x="500" y="210" class="t" font-size="11" font-weight="bold">High-D similarities:</text>
  <text x="500" y="226" class="t" font-size="11">&#x2022; k-nearest neighbor graph</text>
  <text x="500" y="242" class="t" font-size="11">&#x2022; Local distance normalization</text>
  <text x="500" y="258" class="t" font-size="11">&#x2022; Fuzzy union: w = a + b &#x2212; a&#x00B7;b</text>

  <!-- Low-D -->
  <text x="500" y="284" class="t" font-size="11" font-weight="bold">Low-D similarities:</text>
  <text x="500" y="300" class="t" font-size="11">&#x2022; Smooth function: 1/(1 + a&#x00B7;d&#x00B2;&#x1D47;)</text>
  <text x="500" y="316" class="t" font-size="11">&#x2022; a, b fit to desired min_dist</text>

  <!-- Optimization -->
  <text x="500" y="342" class="t" font-size="11" font-weight="bold">Optimization:</text>
  <text x="500" y="358" class="t" font-size="11">&#x2022; Stochastic gradient descent</text>
  <text x="500" y="374" class="t" font-size="11">&#x2022; Negative sampling (like word2vec)</text>
  <text x="500" y="390" class="t" font-size="11">&#x2022; O(n) per epoch &#x2192; much faster</text>

  <!-- Symmetry note -->
  <rect x="490" y="400" width="400" height="20" fill="#dbeaf7" rx="3"/>
  <text x="690" y="414" class="t" font-size="10" text-anchor="middle" fill="#2980b9">Cross-entropy is symmetric: better global structure preservation</text>
</svg>
