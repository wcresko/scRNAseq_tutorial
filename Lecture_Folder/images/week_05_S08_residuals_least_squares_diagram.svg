<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="serif">
  <!-- Axes -->
  <line x1="80" y1="570" x2="750" y2="570" stroke="black" stroke-width="2"/>
  <line x1="80" y1="570" x2="80" y2="30" stroke="black" stroke-width="2"/>
  <text x="740" y="600" font-size="28" font-style="italic">X</text>
  <text x="40" y="45" font-size="28" font-style="italic">Y</text>

  <!-- Regression line -->
  <line x1="100" y1="520" x2="720" y2="120" stroke="black" stroke-width="3"/>
  <text x="620" y="100" font-size="20">least squares</text>
  <text x="620" y="125" font-size="20">regression line</text>

  <!-- y-bar horizontal dashed line -->
  <line x1="80" y1="340" x2="450" y2="340" stroke="black" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="30" y="348" font-size="24"><tspan font-style="italic" text-decoration="overline">y</tspan></text>

  <!-- x-bar vertical dashed line -->
  <line x1="370" y1="570" x2="370" y2="340" stroke="black" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="350" y="600" font-size="24"><tspan font-style="italic" text-decoration="overline">x</tspan></text>

  <!-- Data points -->
  <circle cx="200" cy="440" r="8" fill="black"/>
  <circle cx="300" cy="280" r="8" fill="black"/>
  <circle cx="500" cy="310" r="8" fill="black"/>
  <circle cx="350" cy="380" r="8" fill="black"/>

  <!-- Point yi with xi -->
  <circle cx="520" cy="180" r="8" fill="black"/>

  <!-- xi vertical line -->
  <line x1="520" y1="570" x2="520" y2="180" stroke="black" stroke-width="1.5"/>
  <text x="505" y="600" font-size="24" font-style="italic">x<tspan font-size="16" dy="4">i</tspan></text>

  <!-- yi label -->
  <text x="540" y="188" font-size="24" font-style="italic">y<tspan font-size="16" dy="4">i</tspan></text>

  <!-- y-hat_i on regression line -->
  <!-- Regression line: from (100,520) to (720,120), slope = (120-520)/(720-100) = -400/620 -->
  <!-- At x=520: y = 520 + (-400/620)*(520-100) = 520 - 258.06 = 261.9 -->
  <circle cx="520" cy="262" r="5" fill="white" stroke="black" stroke-width="2"/>
  <text x="540" y="270" font-size="24" font-style="italic"><tspan>y</tspan><tspan font-size="16" dy="-8">^</tspan><tspan font-size="16" dy="12">i</tspan></text>
  <text x="560" y="290" font-size="18">predicted Y-value for <tspan font-style="italic">x<tspan font-size="14" dy="3">i</tspan></tspan></text>

  <!-- Residual bracket -->
  <line x1="510" y1="185" x2="510" y2="258" stroke="black" stroke-width="2"/>
  <line x1="505" y1="185" x2="515" y2="185" stroke="black" stroke-width="2"/>
  <line x1="505" y1="258" x2="515" y2="258" stroke="black" stroke-width="2"/>

  <!-- Residual label -->
  <text x="300" y="195" font-size="22" font-style="italic">y<tspan font-size="15" dy="4">i</tspan><tspan dy="-4"> </tspan><tspan font-style="normal">-</tspan> <tspan font-style="italic">y</tspan><tspan font-size="12" dy="-10">^</tspan><tspan font-size="15" dy="14">i</tspan><tspan dy="-4" font-style="normal"> = residual</tspan></text>
</svg>
