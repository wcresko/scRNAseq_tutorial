<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="750" height="350" fill="white"/>

  <!-- Command text at top -->
  <text x="80" y="80" font-size="30" font-family="'Courier New', monospace">
    <tspan fill="#333" font-weight="bold">$</tspan>
    <tspan fill="#c0392b"> wc -l *.pdb</tspan>
    <tspan fill="#333"> &gt; </tspan>
    <tspan fill="#3498db">lengths</tspan>
  </text>

  <!-- Command block (red/orange chevron) -->
  <polygon points="60,150 280,150 300,195 280,240 60,240" fill="#e74c3c" rx="5"/>
  <text x="170" y="202" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="white">wc -l *.pdb</text>

  <!-- OUT label -->
  <text x="320" y="202" text-anchor="middle" font-size="14" font-weight="bold" fill="#888">OUT</text>

  <!-- Arrow -->
  <polygon points="340,185 370,195 340,205" fill="#888"/>

  <!-- Output in File box (blue) -->
  <rect x="390" y="140" width="260" height="110" rx="8" fill="#3498db"/>
  <!-- File icon -->
  <g transform="translate(455, 155)">
    <rect x="0" y="0" width="55" height="55" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <path d="M35,0 L55,20" fill="none" stroke="white" stroke-width="2"/>
    <path d="M35,0 L35,20 L55,20" fill="none" stroke="white" stroke-width="2"/>
  </g>
  <!-- File name -->
  <text x="520" y="222" text-anchor="middle" font-size="18" font-family="'Courier New', monospace" fill="white">lengths</text>
  <!-- Label -->
  <text x="520" y="242" text-anchor="middle" font-size="17" font-weight="bold" fill="white">Output in File</text>
</svg>