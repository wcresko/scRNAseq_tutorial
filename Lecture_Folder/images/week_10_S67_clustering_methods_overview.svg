<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <style>
      .box { stroke-width: 2; rx: 8; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; fill: white; text-anchor: middle; font-weight: bold; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333; text-anchor: middle; }
      .method-box { stroke-width: 1.5; rx: 6; }
      .method-name { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #2c3e50; text-anchor: middle; font-weight: bold; }
      .method-desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
      .arrow { fill: none; stroke: #7f8c8d; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Overview of Clustering Methods</text>
  
  <!-- Top-level: Clustering -->
  <rect x="340" y="42" width="220" height="38" fill="#2c3e50" class="box"/>
  <text x="450" y="66" class="title">Clustering Methods</text>
  
  <!-- Arrows down -->
  <line x1="370" y1="80" x2="170" y2="115" class="arrow"/>
  <line x1="450" y1="80" x2="450" y2="115" class="arrow"/>
  <line x1="530" y1="80" x2="730" y2="115" class="arrow"/>
  
  <!-- Category 1: Partitioning -->
  <rect x="70" y="115" width="200" height="35" fill="#3498db" class="box"/>
  <text x="170" y="137" class="title" font-size="14">Partitioning</text>
  
  <!-- Category 2: Hierarchical -->
  <rect x="350" y="115" width="200" height="35" fill="#27ae60" class="box"/>
  <text x="450" y="137" class="title" font-size="14">Hierarchical</text>
  
  <!-- Category 3: Density / Instance-based -->
  <rect x="630" y="115" width="200" height="35" fill="#8e44ad" class="box"/>
  <text x="730" y="137" class="title" font-size="14">Instance-Based</text>
  
  <!-- Partitioning methods -->
  <line x1="170" y1="150" x2="120" y2="175" class="arrow"/>
  <line x1="170" y1="150" x2="220" y2="175" class="arrow"/>
  
  <rect x="40" y="175" width="160" height="65" fill="#ebf5fb" stroke="#3498db" class="method-box"/>
  <text x="120" y="195" class="method-name">K-Means</text>
  <text x="120" y="210" class="method-desc">Assign to nearest centroid</text>
  <text x="120" y="223" class="method-desc">Requires k in advance</text>
  <text x="120" y="236" class="method-desc">Spherical clusters</text>
  
  <rect x="145" y="250" width="160" height="65" fill="#ebf5fb" stroke="#3498db" class="method-box"/>
  <text x="225" y="270" class="method-name">K-Medoids (PAM)</text>
  <text x="225" y="285" class="method-desc">Uses actual data points</text>
  <text x="225" y="298" class="method-desc">More robust to outliers</text>
  <text x="225" y="311" class="method-desc">Works with any distance</text>
  
  <!-- Hierarchical methods -->
  <line x1="450" y1="150" x2="400" y2="175" class="arrow"/>
  <line x1="450" y1="150" x2="500" y2="175" class="arrow"/>
  
  <rect x="320" y="175" width="160" height="65" fill="#e8f8e8" stroke="#27ae60" class="method-box"/>
  <text x="400" y="195" class="method-name">Agglomerative</text>
  <text x="400" y="210" class="method-desc">Bottom-up merging</text>
  <text x="400" y="223" class="method-desc">Produces dendrogram</text>
  <text x="400" y="236" class="method-desc">Ward, complete, average</text>
  
  <rect x="425" y="250" width="160" height="65" fill="#e8f8e8" stroke="#27ae60" class="method-box"/>
  <text x="505" y="270" class="method-name">Divisive</text>
  <text x="505" y="285" class="method-desc">Top-down splitting</text>
  <text x="505" y="298" class="method-desc">DIANA algorithm</text>
  <text x="505" y="311" class="method-desc">Less commonly used</text>
  
  <!-- Instance-based methods -->
  <line x1="730" y1="150" x2="680" y2="175" class="arrow"/>
  <line x1="730" y1="150" x2="780" y2="175" class="arrow"/>
  
  <rect x="600" y="175" width="160" height="65" fill="#f4ecf7" stroke="#8e44ad" class="method-box"/>
  <text x="680" y="195" class="method-name">KNN</text>
  <text x="680" y="210" class="method-desc">Classify by nearest</text>
  <text x="680" y="223" class="method-desc">neighbors' majority vote</text>
  <text x="680" y="236" class="method-desc">Supervised method</text>
  
  <rect x="705" y="250" width="160" height="65" fill="#f4ecf7" stroke="#8e44ad" class="method-box"/>
  <text x="785" y="270" class="method-name">DBSCAN</text>
  <text x="785" y="285" class="method-desc">Density-based discovery</text>
  <text x="785" y="298" class="method-desc">Finds arbitrary shapes</text>
  <text x="785" y="311" class="method-desc">Detects outliers</text>
  
  <!-- Footer note -->
  <rect x="130" y="340" width="640" height="48" fill="#f9f9f9" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="450" y="358" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle" font-weight="bold">This week we cover: K-Means, Hierarchical (Agglomerative), and KNN</text>
  <text x="450" y="376" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">K-Means and Hierarchical are unsupervised; KNN is supervised (uses known labels to classify new observations)</text>
</svg>
