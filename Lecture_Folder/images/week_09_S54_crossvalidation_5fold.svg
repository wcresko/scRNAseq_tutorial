<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Estimate accuracy of entire procedure with CV</text>

  <!-- Fold 1: Test at bottom -->
  <rect x="60" y="55" width="80" height="210" rx="3" fill="#4472C4"/>
  <text x="100" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train</text>
  <rect x="60" y="270" width="80" height="55" rx="3" fill="#C0504D"/>
  <text x="100" y="303" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Test</text>
  <text x="100" y="345" text-anchor="middle" font-size="12" fill="#555">Fold 1</text>

  <!-- Fold 2: Test in lower-middle -->
  <rect x="180" y="55" width="80" height="145" rx="3" fill="#4472C4"/>
  <text x="220" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train</text>
  <rect x="180" y="205" width="80" height="55" rx="3" fill="#C0504D"/>
  <text x="220" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Test</text>
  <rect x="180" y="265" width="80" height="60" rx="3" fill="#4472C4"/>
  <text x="220" y="345" text-anchor="middle" font-size="12" fill="#555">Fold 2</text>

  <!-- Fold 3: Test in middle -->
  <rect x="300" y="55" width="80" height="80" rx="3" fill="#4472C4"/>
  <text x="340" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train</text>
  <rect x="300" y="140" width="80" height="55" rx="3" fill="#C0504D"/>
  <text x="340" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Test</text>
  <rect x="300" y="200" width="80" height="125" rx="3" fill="#4472C4"/>
  <text x="340" y="345" text-anchor="middle" font-size="12" fill="#555">Fold 3</text>

  <!-- Fold 4: Test in upper-middle -->
  <rect x="420" y="55" width="80" height="20" rx="3" fill="#4472C4"/>
  <rect x="420" y="80" width="80" height="55" rx="3" fill="#C0504D"/>
  <text x="460" y="113" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Test</text>
  <rect x="420" y="140" width="80" height="185" rx="3" fill="#4472C4"/>
  <text x="460" y="240" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train</text>
  <text x="460" y="345" text-anchor="middle" font-size="12" fill="#555">Fold 4</text>

  <!-- Fold 5: Test at top -->
  <rect x="540" y="55" width="80" height="55" rx="3" fill="#C0504D"/>
  <text x="580" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Test</text>
  <rect x="540" y="115" width="80" height="210" rx="3" fill="#4472C4"/>
  <text x="580" y="230" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train</text>
  <text x="580" y="345" text-anchor="middle" font-size="12" fill="#555">Fold 5</text>

  <!-- Footer -->
  <text x="350" y="375" text-anchor="middle" font-size="10" fill="#999">SVG recreation of 5-fold cross-validation diagram</text>
</svg>
