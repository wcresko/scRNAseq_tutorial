<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, sans-serif">
  <rect width="900" height="480" fill="#fafafa" rx="10"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a5c2a">Understanding the ROC Curve</text>
  
  <!-- Left panel: Threshold concept -->
  <rect x="20" y="50" width="420" height="200" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">How Thresholds Create the Curve</text>
  
  <!-- Two overlapping distributions -->
  <!-- Negative class -->
  <ellipse cx="160" cy="160" rx="70" ry="50" fill="#4393c3" fill-opacity="0.3" stroke="#4393c3" stroke-width="1.5"/>
  <text x="130" y="165" font-size="11" fill="#1565c0" font-weight="bold">No Failure</text>
  
  <!-- Positive class -->
  <ellipse cx="280" cy="160" rx="70" ry="50" fill="#d6604d" fill-opacity="0.3" stroke="#d6604d" stroke-width="1.5"/>
  <text x="300" y="165" font-size="11" fill="#c62828" font-weight="bold">Failure</text>
  
  <!-- Threshold line -->
  <line x1="220" y1="100" x2="220" y2="220" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="220" y="238" text-anchor="middle" font-size="10" fill="#333">Threshold = 0.5</text>
  
  <!-- Arrows -->
  <text x="160" y="95" text-anchor="middle" font-size="9" fill="#4393c3">Predict: No Fail</text>
  <text x="310" y="95" text-anchor="middle" font-size="9" fill="#c62828">Predict: Fail</text>
  
  <!-- Right panel: ROC curve -->
  <rect x="460" y="50" width="420" height="200" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="670" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">The ROC Curve</text>
  
  <!-- Axes -->
  <line x1="510" y1="230" x2="840" y2="230" stroke="#333" stroke-width="1.5"/>
  <line x1="510" y1="230" x2="510" y2="90" stroke="#333" stroke-width="1.5"/>
  <text x="675" y="248" text-anchor="middle" font-size="10" fill="#555">False Positive Rate (1 - Specificity)</text>
  <text x="490" y="160" text-anchor="middle" font-size="10" fill="#555" transform="rotate(-90, 490, 160)">True Positive Rate (Sensitivity)</text>
  
  <!-- Diagonal (random) -->
  <line x1="510" y1="230" x2="840" y2="90" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="720" y="195" font-size="9" fill="#999">Random (AUC=0.5)</text>
  
  <!-- Good ROC curve -->
  <path d="M510,230 Q515,110 560,100 Q620,92 700,92 L840,90" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="580" y="130" font-size="10" fill="#2e7d32" font-weight="bold">Good model</text>
  
  <!-- Shaded AUC -->
  <path d="M510,230 Q515,110 560,100 Q620,92 700,92 L840,90 L840,230 Z" fill="#2e7d32" fill-opacity="0.1"/>
  <text x="700" y="180" font-size="12" fill="#2e7d32" font-weight="bold">AUC</text>
  
  <!-- Bottom: AUC interpretation -->
  <rect x="20" y="270" width="860" height="190" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="298" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Interpreting AUC Values</text>
  
  <!-- AUC scale bar -->
  <defs>
    <linearGradient id="aucGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d32f2f"/>
      <stop offset="30%" stop-color="#ff9800"/>
      <stop offset="50%" stop-color="#fdd835"/>
      <stop offset="70%" stop-color="#66bb6a"/>
      <stop offset="90%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <rect x="60" y="315" width="780" height="25" rx="12" fill="url(#aucGrad)"/>
  
  <!-- Scale markers -->
  <text x="60" y="360" text-anchor="middle" font-size="11" fill="#333">0.5</text>
  <text x="216" y="360" text-anchor="middle" font-size="11" fill="#333">0.6</text>
  <text x="372" y="360" text-anchor="middle" font-size="11" fill="#333">0.7</text>
  <text x="528" y="360" text-anchor="middle" font-size="11" fill="#333">0.8</text>
  <text x="684" y="360" text-anchor="middle" font-size="11" fill="#333">0.9</text>
  <text x="840" y="360" text-anchor="middle" font-size="11" fill="#333">1.0</text>
  
  <!-- Labels -->
  <text x="138" y="380" text-anchor="middle" font-size="10" fill="#d32f2f" font-weight="bold">No better</text>
  <text x="138" y="393" text-anchor="middle" font-size="10" fill="#d32f2f">than random</text>
  
  <text x="294" y="380" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Poor</text>
  <text x="294" y="393" text-anchor="middle" font-size="10" fill="#e65100">discrimination</text>
  
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="#f9a825" font-weight="bold">Acceptable</text>
  
  <text x="606" y="380" text-anchor="middle" font-size="10" fill="#388e3c" font-weight="bold">Good</text>
  <text x="606" y="393" text-anchor="middle" font-size="10" fill="#388e3c">discrimination</text>
  
  <text x="762" y="380" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Excellent</text>
  <text x="762" y="393" text-anchor="middle" font-size="10" fill="#1b5e20">discrimination</text>
  
  <!-- Key insight -->
  <rect x="60" y="410" width="780" height="35" rx="6" fill="#e8f5e9"/>
  <text x="450" y="432" text-anchor="middle" font-size="12" fill="#2e7d32">AUC = probability that a randomly chosen positive case is ranked higher than a randomly chosen negative case</text>
</svg>
