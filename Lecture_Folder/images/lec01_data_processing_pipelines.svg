<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .colHdr { font-size: 15px; font-weight: 700; text-anchor: middle; }
    .fastq { font-size: 12px; fill: #222; text-anchor: middle; }
    .step { font-size: 11px; fill: #222; text-anchor: middle; }
    .tool { font-size: 13px; font-weight: 700; text-anchor: middle; }
    .mat { font-size: 12px; font-weight: 700; fill: #222; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; }
  </style>

  <text class="title" x="570" y="28">Primary data processing — three common paths to a count matrix</text>

  <!-- ===== Column 1: 10x Chromium ===== -->
  <g transform="translate(40,60)">
    <text class="colHdr" x="160" y="0" fill="#1b7837">10x Chromium</text>
    <!-- FASTQ boxes -->
    <g>
      <rect x="30"  y="20" width="75" height="40" rx="4" fill="#d9f0d3" stroke="#1b7837"/>
      <text class="fastq" x="67" y="45">I1.fastq.gz</text>
      <rect x="115" y="20" width="75" height="40" rx="4" fill="#d9f0d3" stroke="#1b7837"/>
      <text class="fastq" x="152" y="45">R1.fastq.gz</text>
      <rect x="200" y="20" width="75" height="40" rx="4" fill="#d9f0d3" stroke="#1b7837"/>
      <text class="fastq" x="237" y="45">R2.fastq.gz</text>
    </g>
    <!-- arrows down -->
    <path class="arrow" d="M 67 60 L 67 85" marker-end="url(#ahp)"/>
    <path class="arrow" d="M 152 60 L 152 85" marker-end="url(#ahp)"/>
    <path class="arrow" d="M 237 60 L 237 85" marker-end="url(#ahp)"/>
    <!-- Tool container -->
    <rect x="20" y="85" width="280" height="340" rx="10" fill="#f6fbf4" stroke="#1b7837" stroke-width="2" stroke-dasharray="5 3"/>
    <text class="tool" x="160" y="108" fill="#1b7837">Cell Ranger count</text>
    <!-- steps -->
    <g>
      <rect x="40" y="120" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="140">Extract barcode + UMI + read</text>
      <rect x="40" y="165" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="185">Correct cell barcodes (1 mismatch)</text>
      <rect x="40" y="210" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="230">Align reads with STAR</text>
      <rect x="40" y="255" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="275">Tag reads with genes / transcripts</text>
      <rect x="40" y="300" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="320">Correct UMIs &amp; count per gene × cell</text>
      <rect x="40" y="345" width="240" height="32" rx="4" fill="#fff" stroke="#1b7837"/>
      <text class="step" x="160" y="365">Call cell-associated barcodes</text>
      <path class="arrow" d="M 160 152 L 160 165" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 197 L 160 210" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 242 L 160 255" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 287 L 160 300" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 332 L 160 345" marker-end="url(#ahp)"/>
    </g>
    <path class="arrow" d="M 160 425 L 160 460" marker-end="url(#ahp)"/>
    <rect x="90" y="460" width="140" height="50" rx="6" fill="#b8e0b0" stroke="#1b7837"/>
    <text class="mat" x="160" y="482">cell × gene</text>
    <text class="mat" x="160" y="498">count matrix</text>
  </g>

  <!-- ===== Column 2: Drop-seq / inDrops ===== -->
  <g transform="translate(420,60)">
    <text class="colHdr" x="160" y="0" fill="#6a51a3">Drop-seq &amp; inDrops</text>
    <g>
      <rect x="75"  y="20" width="75" height="40" rx="4" fill="#dcd5ed" stroke="#6a51a3"/>
      <text class="fastq" x="112" y="45">R1.fastq.gz</text>
      <rect x="165" y="20" width="75" height="40" rx="4" fill="#dcd5ed" stroke="#6a51a3"/>
      <text class="fastq" x="202" y="45">R2.fastq.gz</text>
    </g>
    <path class="arrow" d="M 112 60 L 112 85" marker-end="url(#ahp)"/>
    <path class="arrow" d="M 202 60 L 202 85" marker-end="url(#ahp)"/>
    <rect x="20" y="85" width="280" height="340" rx="10" fill="#f7f5fb" stroke="#6a51a3" stroke-width="2" stroke-dasharray="5 3"/>
    <text class="tool" x="160" y="108" fill="#6a51a3">dropEst pipeline</text>
    <g>
      <rect x="40" y="120" width="240" height="32" rx="4" fill="#fff" stroke="#6a51a3"/>
      <text class="step" x="160" y="140">droptag — tag reads with BC+UMI</text>
      <rect x="40" y="165" width="240" height="32" rx="4" fill="#fff" stroke="#6a51a3"/>
      <text class="step" x="160" y="185">Extract barcode + UMI + read</text>
      <rect x="40" y="210" width="240" height="32" rx="4" fill="#fff" stroke="#6a51a3"/>
      <text class="step" x="160" y="230">Align reads with STAR</text>
      <rect x="40" y="255" width="240" height="32" rx="4" fill="#fff" stroke="#6a51a3"/>
      <text class="step" x="160" y="275">BAM → dropEst (cell × gene counts)</text>
      <rect x="40" y="300" width="240" height="32" rx="4" fill="#fff" stroke="#6a51a3"/>
      <text class="step" x="160" y="320">dropReport — QC summary</text>
      <path class="arrow" d="M 160 152 L 160 165" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 197 L 160 210" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 242 L 160 255" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 287 L 160 300" marker-end="url(#ahp)"/>
    </g>
    <path class="arrow" d="M 160 425 L 160 460" marker-end="url(#ahp)"/>
    <rect x="90" y="460" width="140" height="50" rx="6" fill="#c6b8df" stroke="#6a51a3"/>
    <text class="mat" x="160" y="482">cell × gene</text>
    <text class="mat" x="160" y="498">count matrix</text>
  </g>

  <!-- ===== Column 3: Bulk / SMART-based ===== -->
  <g transform="translate(800,60)">
    <text class="colHdr" x="160" y="0" fill="#2166ac">Bulk / SMART-based</text>
    <g>
      <rect x="75"  y="20" width="75" height="40" rx="4" fill="#d1e4ef" stroke="#2166ac"/>
      <text class="fastq" x="112" y="45">R1.fastq.gz</text>
      <rect x="165" y="20" width="75" height="40" rx="4" fill="#d1e4ef" stroke="#2166ac"/>
      <text class="fastq" x="202" y="45">R2.fastq.gz</text>
    </g>
    <path class="arrow" d="M 112 60 L 112 85" marker-end="url(#ahp)"/>
    <path class="arrow" d="M 202 60 L 202 85" marker-end="url(#ahp)"/>
    <rect x="20" y="85" width="280" height="340" rx="10" fill="#f3f8fc" stroke="#2166ac" stroke-width="2" stroke-dasharray="5 3"/>
    <text class="tool" x="160" y="108" fill="#2166ac">STAR + RSEM pipeline</text>
    <g>
      <rect x="40" y="120" width="240" height="32" rx="4" fill="#fff" stroke="#2166ac"/>
      <text class="step" x="160" y="140">fastp — read QC &amp; trimming</text>
      <rect x="40" y="165" width="240" height="32" rx="4" fill="#fff" stroke="#2166ac"/>
      <text class="step" x="160" y="185">HISAT2 alignment (optional)</text>
      <rect x="40" y="210" width="240" height="32" rx="4" fill="#fff" stroke="#2166ac"/>
      <text class="step" x="160" y="230">RSeQC — strand / coverage QC</text>
      <rect x="40" y="255" width="240" height="32" rx="4" fill="#fff" stroke="#2166ac"/>
      <text class="step" x="160" y="275">STAR alignment to genome</text>
      <rect x="40" y="300" width="240" height="32" rx="4" fill="#fff" stroke="#2166ac"/>
      <text class="step" x="160" y="320">RSEM quantification</text>
      <path class="arrow" d="M 160 152 L 160 165" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 197 L 160 210" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 242 L 160 255" marker-end="url(#ahp)"/>
      <path class="arrow" d="M 160 287 L 160 300" marker-end="url(#ahp)"/>
    </g>
    <path class="arrow" d="M 160 425 L 160 460" marker-end="url(#ahp)"/>
    <g>
      <rect x="30" y="460" width="125" height="50" rx="6" fill="#9ecae1" stroke="#2166ac"/>
      <text class="mat" x="92"  y="482">gene-level</text>
      <text class="mat" x="92"  y="498">count matrix</text>
      <rect x="165" y="460" width="125" height="50" rx="6" fill="#9ecae1" stroke="#2166ac"/>
      <text class="mat" x="227" y="482">transcript-level</text>
      <text class="mat" x="227" y="498">count matrix</text>
    </g>
  </g>

  <!-- Caption -->
  <text class="step" x="570" y="595" text-anchor="middle" fill="#555">
    Different technologies require different pipelines, but all converge on a counts matrix that downstream tools (Seurat / scanpy) can read.
  </text>

  <defs>
    <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
