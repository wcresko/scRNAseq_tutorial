<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="30" font-weight="bold" fill="#222">Special files -- '<tspan font-style="italic">dot dot</tspan>'</text>

  <!-- Defs: folder with two red dots -->
  <defs>
    <g id="folder-dd">
      <rect x="0" y="8" width="80" height="50" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <rect x="0" y="0" width="30" height="14" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <path d="M30,0 L38,8 L80,8" fill="none" stroke="#a09888" stroke-width="1.5"/>
      <!-- Two red dots representing .. -->
      <circle cx="33" cy="52" r="5" fill="#e74c3c"/>
      <circle cx="50" cy="52" r="5" fill="#e74c3c"/>
    </g>
  </defs>

  <!-- Level 0: Root / -->
  <use href="#folder-dd" x="360" y="65"/>
  <text x="400" y="102" text-anchor="middle" font-size="18" font-family="'Courier New', monospace" font-weight="bold" fill="#333">/</text>

  <!-- Lines from root to level 1 -->
  <line x1="400" y1="123" x2="400" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="145" x2="700" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="145" x2="100" y2="190" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="145" x2="280" y2="190" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="145" x2="460" y2="190" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="145" x2="620" y2="190" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 1 -->
  <use href="#folder-dd" x="60" y="190"/>
  <text x="100" y="230" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">root</text>

  <use href="#folder-dd" x="240" y="190"/>
  <text x="280" y="230" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">home</text>

  <use href="#folder-dd" x="420" y="190"/>
  <text x="460" y="230" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">usr</text>

  <use href="#folder-dd" x="580" y="190"/>
  <text x="620" y="230" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="225" font-size="24" fill="#666">...</text>

  <!-- Lines to level 2 -->
  <line x1="280" y1="248" x2="280" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="270" x2="620" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="270" x2="100" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="270" x2="280" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="248" x2="460" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="270" x2="460" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="270" x2="620" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 2 -->
  <use href="#folder-dd" x="60" y="315"/>
  <text x="100" y="355" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">cresko</text>

  <use href="#folder-dd" x="240" y="315"/>
  <text x="280" y="355" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">catchen</text>

  <use href="#folder-dd" x="420" y="315"/>
  <text x="460" y="355" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">lib</text>

  <use href="#folder-dd" x="580" y="315"/>
  <text x="620" y="355" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="350" font-size="24" fill="#666">...</text>

  <!-- Lines to level 3 -->
  <line x1="280" y1="373" x2="280" y2="395" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="395" x2="460" y2="395" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="395" x2="280" y2="440" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="395" x2="460" y2="440" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 3 -->
  <use href="#folder-dd" x="240" y="440"/>
  <text x="280" y="480" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">working</text>

  <use href="#folder-dd" x="420" y="440"/>
  <text x="460" y="480" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">research</text>

  <text x="560" y="475" font-size="24" fill="#666">...</text>

  <!-- Explanation -->
  <text x="400" y="555" text-anchor="middle" font-size="20" fill="#555">Every directory also contains '<tspan font-weight="bold" fill="#e74c3c">..</tspan>' (dot dot) that refers to its parent</text>
</svg>