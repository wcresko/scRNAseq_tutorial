<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720">
  <defs>
    <style>
      .title { font: bold 22px 'Helvetica Neue', Arial, sans-serif; fill: #1a1a1a; }
      .decision { font: bold 14px 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .method { font: bold 13px 'Helvetica Neue', Arial, sans-serif; fill: #1a1a1a; }
      .detail { font: 11px 'Helvetica Neue', Arial, sans-serif; fill: #555555; }
      .label { font: bold 12px 'Helvetica Neue', Arial, sans-serif; fill: #2d6a4f; }
      .arrow-label { font: italic 11px 'Helvetica Neue', Arial, sans-serif; fill: #666666; }
      .r-code { font: bold 11px 'Courier New', monospace; fill: #8b5cf6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888888"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" class="title">Choosing the Right Statistical Model</text>

  <!-- ============================================ -->
  <!-- TOP: Start diamond — Response Variable Type -->
  <!-- ============================================ -->
  <polygon points="550,55 750,105 550,155 350,105" fill="#2d6a4f" stroke="#1b4332" stroke-width="1.5" filter="url(#shadow)" rx="4"/>
  <text x="550" y="101" text-anchor="middle" class="decision">What is your</text>
  <text x="550" y="117" text-anchor="middle" class="decision">response variable?</text>

  <!-- ============================================ -->
  <!-- BRANCH LEFT: Continuous -->
  <!-- ============================================ -->
  <!-- Arrow down-left -->
  <line x1="430" y1="130" x2="230" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="310" y="160" text-anchor="middle" class="arrow-label">Continuous</text>

  <!-- Second decision: grouped data? -->
  <polygon points="230,200 380,240 230,280 80,240" fill="#52796f" stroke="#2d6a4f" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="230" y="236" text-anchor="middle" class="decision">Grouped/</text>
  <text x="230" y="251" text-anchor="middle" class="decision">repeated?</text>

  <!-- No → lm -->
  <line x1="120" y1="260" x2="70" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="75" y="290" text-anchor="middle" class="arrow-label">No</text>

  <rect x="10" y="315" width="125" height="62" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="72" y="337" text-anchor="middle" class="method">Linear Model</text>
  <text x="72" y="355" text-anchor="middle" class="r-code">lm()</text>
  <text x="72" y="370" text-anchor="middle" class="detail">ANOVA, regression</text>

  <!-- Yes → lmer -->
  <line x1="230" y1="280" x2="230" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="250" y="298" class="arrow-label">Yes</text>

  <rect x="155" y="315" width="150" height="62" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="337" text-anchor="middle" class="method">Linear Mixed Model</text>
  <text x="230" y="355" text-anchor="middle" class="r-code">lmer()</text>
  <text x="230" y="370" text-anchor="middle" class="detail">lme4 + lmerTest</text>

  <!-- Non-linear? branch from continuous -->
  <line x1="340" y1="260" x2="390" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="385" y="290" text-anchor="middle" class="arrow-label">Non-linear?</text>

  <rect x="335" y="315" width="125" height="62" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="397" y="337" text-anchor="middle" class="method">Splines / GAM</text>
  <text x="397" y="355" text-anchor="middle" class="r-code">gam()</text>
  <text x="397" y="370" text-anchor="middle" class="detail">mgcv, splines</text>

  <!-- ============================================ -->
  <!-- BRANCH MIDDLE: Binary -->
  <!-- ============================================ -->
  <line x1="550" y1="155" x2="550" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="570" y="178" class="arrow-label">Binary (0/1)</text>

  <rect x="485" y="200" width="130" height="62" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="222" text-anchor="middle" class="method">Logistic</text>
  <text x="550" y="240" text-anchor="middle" class="method">Regression</text>
  <text x="550" y="255" text-anchor="middle" class="r-code">glm(family=binomial)</text>

  <!-- ============================================ -->
  <!-- BRANCH MIDDLE-RIGHT: Count -->
  <!-- ============================================ -->
  <line x1="670" y1="130" x2="770" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="740" y="160" text-anchor="middle" class="arrow-label">Count data</text>

  <!-- Overdispersed? -->
  <polygon points="770,200 900,235 770,270 640,235" fill="#52796f" stroke="#2d6a4f" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="770" y="232" text-anchor="middle" class="decision">Overdispersed?</text>
  <text x="770" y="247" text-anchor="middle" class="decision">(Var > Mean)</text>

  <!-- No → Poisson -->
  <line x1="690" y1="255" x2="640" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="648" y="286" text-anchor="middle" class="arrow-label">No</text>

  <rect x="570" y="315" width="140" height="62" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="337" text-anchor="middle" class="method">Poisson</text>
  <text x="640" y="355" text-anchor="middle" class="r-code">glm(family=poisson)</text>
  <text x="640" y="370" text-anchor="middle" class="detail">Var ≈ Mean</text>

  <!-- Yes → Negative Binomial -->
  <line x1="850" y1="255" x2="890" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="888" y="286" text-anchor="middle" class="arrow-label">Yes</text>

  <rect x="815" y="315" width="150" height="62" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="337" text-anchor="middle" class="method">Negative Binomial</text>
  <text x="890" y="355" text-anchor="middle" class="r-code">MASS::glm.nb()</text>
  <text x="890" y="370" text-anchor="middle" class="detail">Var >> Mean</text>

  <!-- ============================================ -->
  <!-- BRANCH FAR RIGHT: Time-to-event -->
  <!-- ============================================ -->
  <line x1="720" y1="110" x2="990" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="880" y="145" text-anchor="middle" class="arrow-label">Time-to-event</text>

  <rect x="935" y="200" width="140" height="62" rx="8" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1005" y="222" text-anchor="middle" class="method">Survival Analysis</text>
  <text x="1005" y="240" text-anchor="middle" class="r-code">survfit(), coxph()</text>
  <text x="1005" y="257" text-anchor="middle" class="detail">survival package</text>

  <!-- ============================================ -->
  <!-- BOTTOM SECTION: Additional considerations -->
  <!-- ============================================ -->
  <line x1="550" y1="400" x2="550" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Additional considerations box -->
  <rect x="100" y="440" width="900" height="260" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="550" y="470" text-anchor="middle" class="title" style="font-size:16px">Additional Considerations</text>

  <!-- High dimensionality -->
  <rect x="130" y="490" width="250" height="80" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.3"/>
  <text x="255" y="513" text-anchor="middle" class="method">Many Predictors (p &gt; 20)?</text>
  <text x="255" y="533" text-anchor="middle" class="r-code">glmnet()</text>
  <text x="255" y="550" text-anchor="middle" class="detail">Ridge, Lasso, Elastic Net</text>
  <text x="255" y="563" text-anchor="middle" class="detail">Prevents overfitting &amp; selects features</text>

  <!-- Bayesian -->
  <rect x="425" y="490" width="250" height="80" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.3"/>
  <text x="550" y="513" text-anchor="middle" class="method">Want Full Posteriors?</text>
  <text x="550" y="533" text-anchor="middle" class="r-code">brms::brm()</text>
  <text x="550" y="550" text-anchor="middle" class="detail">Bayesian estimation via Stan</text>
  <text x="550" y="563" text-anchor="middle" class="detail">Credible intervals, prior information</text>

  <!-- Grouped GLM -->
  <rect x="720" y="490" width="250" height="80" rx="8" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.3"/>
  <text x="845" y="513" text-anchor="middle" class="method">Grouped Non-Normal?</text>
  <text x="845" y="533" text-anchor="middle" class="r-code">glmer() / glmmTMB()</text>
  <text x="845" y="550" text-anchor="middle" class="detail">Generalized linear mixed models</text>
  <text x="845" y="563" text-anchor="middle" class="detail">Random effects + GLM family</text>

  <!-- Key at bottom -->
  <rect x="200" y="590" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#81c784"/>
  <text x="220" y="602" class="detail" style="font-size:11px">Continuous response</text>
  <rect x="370" y="590" width="14" height="14" rx="3" fill="#e3f2fd" stroke="#64b5f6"/>
  <text x="390" y="602" class="detail" style="font-size:11px">Discrete response</text>
  <rect x="530" y="590" width="14" height="14" rx="3" fill="#fce4ec" stroke="#ef9a9a"/>
  <text x="550" y="602" class="detail" style="font-size:11px">Time-to-event</text>
  <rect x="680" y="590" width="14" height="14" rx="3" fill="#fff3e0" stroke="#ffcc80"/>
  <text x="700" y="602" class="detail" style="font-size:11px">Extensions</text>

  <!-- Week coverage labels -->
  <rect x="130" y="630" width="250" height="50" rx="6" fill="#ffffff" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="255" y="652" text-anchor="middle" class="detail" style="font-size:11px; fill:#2d6a4f; font-weight:bold">Weeks 6–8</text>
  <text x="255" y="668" text-anchor="middle" class="detail" style="font-size:10px">ANOVA → Regression → LMM →</text>
  <text x="255" y="681" text-anchor="middle" class="detail" style="font-size:10px">GLM → Regularization → Survival</text>

  <rect x="425" y="630" width="250" height="50" rx="6" fill="#ffffff" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="550" y="652" text-anchor="middle" class="detail" style="font-size:11px; fill:#2d6a4f; font-weight:bold">Week 9</text>
  <text x="550" y="668" text-anchor="middle" class="detail" style="font-size:10px">Bayesian Foundations → brms</text>

  <rect x="720" y="630" width="250" height="50" rx="6" fill="#ffffff" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="845" y="652" text-anchor="middle" class="detail" style="font-size:11px; fill:#2d6a4f; font-weight:bold">Week 10</text>
  <text x="845" y="668" text-anchor="middle" class="detail" style="font-size:10px">Multivariate Stats → PCA →</text>
  <text x="845" y="681" text-anchor="middle" class="detail" style="font-size:10px">Clustering → Machine Learning</text>

</svg>
