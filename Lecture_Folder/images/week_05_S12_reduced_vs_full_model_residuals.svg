<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="sans-serif">
  <!-- Left panel: Reduced Model -->
  <g transform="translate(30,20)">
    <!-- Title -->
    <text x="200" y="30" font-size="20" font-weight="bold" text-anchor="middle">Reduced Model</text>

    <!-- Axes -->
    <line x1="60" y1="400" x2="380" y2="400" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="400" x2="60" y2="50" stroke="black" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="15" y="200" font-size="14" transform="rotate(-90,15,200)" text-anchor="middle">Captures</text>
    <text x="50" y="395" font-size="12" text-anchor="end">1.5</text>
    <text x="50" y="335" font-size="12" text-anchor="end">2.0</text>
    <text x="50" y="275" font-size="12" text-anchor="end">2.5</text>
    <text x="50" y="215" font-size="12" text-anchor="end">3.0</text>
    <text x="50" y="155" font-size="12" text-anchor="end">3.5</text>
    <text x="50" y="95" font-size="12" text-anchor="end">4.0</text>
    <!-- Tick marks -->
    <line x1="55" y1="395" x2="65" y2="395" stroke="black" stroke-width="1"/>
    <line x1="55" y1="335" x2="65" y2="335" stroke="black" stroke-width="1"/>
    <line x1="55" y1="275" x2="65" y2="275" stroke="black" stroke-width="1"/>
    <line x1="55" y1="215" x2="65" y2="215" stroke="black" stroke-width="1"/>
    <line x1="55" y1="155" x2="65" y2="155" stroke="black" stroke-width="1"/>
    <line x1="55" y1="95" x2="65" y2="95" stroke="black" stroke-width="1"/>

    <!-- X axis labels -->
    <text x="220" y="440" font-size="14" text-anchor="middle">Predator body mass (kg)</text>
    <text x="90" y="420" font-size="12" text-anchor="middle">0.2</text>
    <text x="140" y="420" font-size="12" text-anchor="middle">0.4</text>
    <text x="195" y="420" font-size="12" text-anchor="middle">0.6</text>
    <text x="250" y="420" font-size="12" text-anchor="middle">0.8</text>
    <text x="300" y="420" font-size="12" text-anchor="middle">1.0</text>
    <text x="345" y="420" font-size="12" text-anchor="middle">1.2</text>

    <!-- Horizontal mean line -->
    <line x1="65" y1="260" x2="375" y2="260" stroke="black" stroke-width="2"/>

    <!-- Data points with residual lines (red dots) -->
    <circle cx="85" cy="80" r="5" fill="#e74c3c"/>
    <line x1="85" y1="80" x2="85" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="95" cy="100" r="5" fill="#e74c3c"/>
    <line x1="95" y1="100" x2="95" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="100" cy="210" r="5" fill="#e74c3c"/>
    <line x1="100" y1="210" x2="100" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="110" cy="250" r="5" fill="#e74c3c"/>
    <line x1="110" y1="250" x2="110" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="140" cy="300" r="5" fill="#e74c3c"/>
    <line x1="140" y1="300" x2="140" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="195" cy="190" r="5" fill="#e74c3c"/>
    <line x1="195" y1="190" x2="195" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="250" cy="240" r="5" fill="#e74c3c"/>
    <line x1="250" y1="240" x2="250" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="300" cy="280" r="5" fill="#e74c3c"/>
    <line x1="300" y1="280" x2="300" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="310" cy="340" r="5" fill="#e74c3c"/>
    <line x1="310" y1="340" x2="310" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="345" cy="290" r="5" fill="#e74c3c"/>
    <line x1="345" y1="290" x2="345" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="355" cy="310" r="5" fill="#e74c3c"/>
    <line x1="355" y1="310" x2="355" y2="260" stroke="black" stroke-width="1"/>
  </g>

  <!-- Right panel: Full Model -->
  <g transform="translate(470,20)">
    <text x="200" y="30" font-size="20" font-weight="bold" text-anchor="middle">Full Model</text>

    <!-- Axes -->
    <line x1="60" y1="400" x2="380" y2="400" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="400" x2="60" y2="50" stroke="black" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="50" y="395" font-size="12" text-anchor="end">1.5</text>
    <text x="50" y="335" font-size="12" text-anchor="end">2.0</text>
    <text x="50" y="275" font-size="12" text-anchor="end">2.5</text>
    <text x="50" y="215" font-size="12" text-anchor="end">3.0</text>
    <text x="50" y="155" font-size="12" text-anchor="end">3.5</text>
    <text x="50" y="95" font-size="12" text-anchor="end">4.0</text>
    <line x1="55" y1="395" x2="65" y2="395" stroke="black" stroke-width="1"/>
    <line x1="55" y1="335" x2="65" y2="335" stroke="black" stroke-width="1"/>
    <line x1="55" y1="275" x2="65" y2="275" stroke="black" stroke-width="1"/>
    <line x1="55" y1="215" x2="65" y2="215" stroke="black" stroke-width="1"/>
    <line x1="55" y1="155" x2="65" y2="155" stroke="black" stroke-width="1"/>
    <line x1="55" y1="95" x2="65" y2="95" stroke="black" stroke-width="1"/>

    <!-- X axis labels -->
    <text x="220" y="440" font-size="14" text-anchor="middle">Predator body mass (kg)</text>
    <text x="90" y="420" font-size="12" text-anchor="middle">0.2</text>
    <text x="140" y="420" font-size="12" text-anchor="middle">0.4</text>
    <text x="195" y="420" font-size="12" text-anchor="middle">0.6</text>
    <text x="250" y="420" font-size="12" text-anchor="middle">0.8</text>
    <text x="300" y="420" font-size="12" text-anchor="middle">1.0</text>
    <text x="345" y="420" font-size="12" text-anchor="middle">1.2</text>

    <!-- Regression line (negative slope) -->
    <line x1="65" y1="170" x2="375" y2="330" stroke="black" stroke-width="3"/>

    <!-- Data points with residual lines -->
    <circle cx="85" cy="80" r="5" fill="#e74c3c"/>
    <line x1="85" y1="80" x2="85" y2="175" stroke="black" stroke-width="1"/>
    <circle cx="95" cy="100" r="5" fill="#e74c3c"/>
    <line x1="95" y1="100" x2="95" y2="178" stroke="black" stroke-width="1"/>
    <circle cx="100" cy="210" r="5" fill="#e74c3c"/>
    <line x1="100" y1="210" x2="100" y2="180" stroke="black" stroke-width="1"/>
    <circle cx="110" cy="250" r="5" fill="#e74c3c"/>
    <line x1="110" y1="250" x2="110" y2="183" stroke="black" stroke-width="1"/>
    <circle cx="140" cy="300" r="5" fill="#e74c3c"/>
    <line x1="140" y1="300" x2="140" y2="200" stroke="black" stroke-width="1"/>
    <circle cx="195" cy="190" r="5" fill="#e74c3c"/>
    <line x1="195" y1="190" x2="195" y2="230" stroke="black" stroke-width="1"/>
    <circle cx="250" cy="240" r="5" fill="#e74c3c"/>
    <line x1="250" y1="240" x2="250" y2="260" stroke="black" stroke-width="1"/>
    <circle cx="300" cy="280" r="5" fill="#e74c3c"/>
    <line x1="300" y1="280" x2="300" y2="290" stroke="black" stroke-width="1"/>
    <circle cx="310" cy="340" r="5" fill="#e74c3c"/>
    <line x1="310" y1="340" x2="310" y2="295" stroke="black" stroke-width="1"/>
    <circle cx="345" cy="290" r="5" fill="#e74c3c"/>
    <line x1="345" y1="290" x2="345" y2="315" stroke="black" stroke-width="1"/>
    <circle cx="355" cy="310" r="5" fill="#e74c3c"/>
    <line x1="355" y1="310" x2="355" y2="320" stroke="black" stroke-width="1"/>
  </g>
</svg>
