<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 260" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="275" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Implant Degradation Experimental Design</text>

  <!-- Experiment -->
  <rect x="175" y="45" width="200" height="45" rx="8" fill="#2d6a4f" stroke="#1a4731" stroke-width="2"/>
  <text x="275" y="65" text-anchor="middle" font-weight="bold" fill="#fff" font-size="14">Experiment</text>
  <text x="275" y="81" text-anchor="middle" fill="#ccc" font-size="11">Implant Degradation</text>

  <!-- Lines down -->
  <line x1="200" y1="90" x2="100" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="275" y1="90" x2="275" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="90" x2="450" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PLGA -->
  <rect x="30" y="130" width="140" height="45" rx="8" fill="#52796f" stroke="#3a5a50" stroke-width="2"/>
  <text x="100" y="150" text-anchor="middle" font-weight="bold" fill="#fff">PLGA</text>
  <text x="100" y="167" text-anchor="middle" fill="#ccc" font-size="11">(5 specimens)</text>

  <!-- PLA-PEG -->
  <rect x="205" y="130" width="140" height="45" rx="8" fill="#52796f" stroke="#3a5a50" stroke-width="2"/>
  <text x="275" y="150" text-anchor="middle" font-weight="bold" fill="#fff">PLA-PEG</text>
  <text x="275" y="167" text-anchor="middle" fill="#ccc" font-size="11">(5 specimens)</text>

  <!-- PCL -->
  <rect x="380" y="130" width="140" height="45" rx="8" fill="#52796f" stroke="#3a5a50" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" font-weight="bold" fill="#fff">PCL</text>
  <text x="450" y="167" text-anchor="middle" fill="#ccc" font-size="11">(5 specimens)</text>

  <!-- Time points -->
  <line x1="100" y1="175" x2="100" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="275" y1="175" x2="275" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="175" x2="450" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="25" y="210" width="150" height="35" rx="6" fill="#e8f5e9" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="232" text-anchor="middle" font-size="12" fill="#000">Week 0, 4, 8, 12</text>

  <rect x="200" y="210" width="150" height="35" rx="6" fill="#e8f5e9" stroke="#333" stroke-width="1.5"/>
  <text x="275" y="232" text-anchor="middle" font-size="12" fill="#000">Week 0, 4, 8, 12</text>

  <rect x="375" y="210" width="150" height="35" rx="6" fill="#e8f5e9" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="232" text-anchor="middle" font-size="12" fill="#000">Week 0, 4, 8, 12</text>
</svg>
