<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 380" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #222; text-anchor: middle; }
    .lbl   { font-size: 12px; fill: #222; }
    .ax    { font-size: 12px; fill: #222; text-anchor: middle; }
    .emph  { font-size: 14px; font-weight: 700; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Left: doublet droplet -->
  <g transform="translate(30,60)">
    <ellipse cx="80" cy="130" rx="70" ry="110" fill="#d5e5f5" stroke="#b9ccdf"/>
    <circle cx="80" cy="80" r="30" fill="#3c6daa"/>
    <path d="M60,72 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <path d="M60,85 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="80" cy="180" r="30" fill="#3c6daa"/>
    <path d="M60,172 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <path d="M60,185 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="128" cy="130" r="10" fill="#1b3a6b"/>
    <line x1="10"  y1="55"  x2="55"  y2="80"  stroke="#333"/>
    <text class="lbl" x="-5" y="50">Cell 1</text>
    <line x1="140" y1="80"  x2="120" y2="120" stroke="#333"/>
    <text class="lbl" x="125" y="80">Barcode bead</text>
    <line x1="10"  y1="200" x2="55"  y2="180" stroke="#333"/>
    <text class="lbl" x="-5" y="210">Cell 2</text>
    <text class="emph" x="80" y="275">Doublet</text>
  </g>

  <!-- Panel 1: simulate doublets UMAP -->
  <g transform="translate(230,40)">
    <text class="title" x="150" y="0">Simulate doublets from original data</text>
    <line x1="10" y1="280" x2="10" y2="40" stroke="#222" marker-end="url(#a)"/>
    <line x1="10" y1="280" x2="280" y2="280" stroke="#222" marker-end="url(#a)"/>
    <text class="ax" x="150" y="305">UMAP1</text>
    <text class="ax" x="-30" y="160" transform="rotate(-90 -30 160)">UMAP2</text>

    <!-- black cluster -->
    <g fill="#111"><circle cx="60" cy="80" r="4"/><circle cx="75" cy="70" r="4"/><circle cx="70" cy="95" r="4"/><circle cx="85" cy="85" r="4"/><circle cx="95" cy="100" r="4"/><circle cx="105" cy="75" r="4"/></g>
    <g fill="#555"><circle cx="100" cy="115" r="4"/><circle cx="115" cy="130" r="4"/><circle cx="130" cy="100" r="4"/><circle cx="125" cy="115" r="4"/></g>
    <!-- blue cluster -->
    <g fill="#2c7fb8"><circle cx="50" cy="185" r="4"/><circle cx="65" cy="200" r="4"/><circle cx="75" cy="175" r="4"/><circle cx="85" cy="195" r="4"/><circle cx="60" cy="215" r="4"/><circle cx="90" cy="220" r="4"/><circle cx="100" cy="205" r="4"/></g>
    <!-- red dashed sample -->
    <circle cx="65" cy="195" r="22" fill="none" stroke="#c0392b" stroke-dasharray="3,3"/>

    <!-- light blue cluster -->
    <g fill="#aec6df"><circle cx="200" cy="175" r="4"/><circle cx="210" cy="190" r="4"/><circle cx="225" cy="180" r="4"/><circle cx="215" cy="215" r="4"/><circle cx="230" cy="200" r="4"/></g>
    <circle cx="215" cy="190" r="22" fill="none" stroke="#c0392b" stroke-dasharray="3,3"/>
  </g>

  <!-- Legend / formula -->
  <g transform="translate(555,80)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#c0392b" stroke-dasharray="3,3"/>
    <text class="lbl" x="20" y="5">= Random sample</text>
    <text class="lbl" x="-10" y="50">[ <tspan fill="#aec6df" font-weight="700">●</tspan> + <tspan fill="#2c7fb8" font-weight="700">●</tspan>] / 2  =  <tspan fill="#c0392b" font-weight="700">●</tspan></text>
    <circle cx="0" cy="90" r="10" fill="#c0392b"/>
    <text class="lbl" x="20" y="95">= Artificial doublet</text>
  </g>

  <!-- Panel 2: dim reduction -->
  <g transform="translate(730,40)">
    <text class="title" x="140" y="0">Dimensionality reduction</text>
    <line x1="10" y1="280" x2="10" y2="40" stroke="#222" marker-end="url(#a)"/>
    <line x1="10" y1="280" x2="280" y2="280" stroke="#222" marker-end="url(#a)"/>
    <text class="ax" x="150" y="305">UMAP1</text>
    <text class="ax" x="-30" y="160" transform="rotate(-90 -30 160)">UMAP2</text>

    <g fill="#111"><circle cx="60" cy="80" r="4"/><circle cx="75" cy="70" r="4"/><circle cx="70" cy="95" r="4"/><circle cx="85" cy="85" r="4"/><circle cx="95" cy="100" r="4"/></g>
    <g fill="#c0392b"><circle cx="100" cy="115" r="4"/><circle cx="115" cy="130" r="4"/><circle cx="130" cy="100" r="4"/><circle cx="125" cy="115" r="4"/><circle cx="140" cy="120" r="4"/><circle cx="150" cy="95" r="4"/><circle cx="110" cy="85" r="4"/></g>
    <g fill="#2c7fb8"><circle cx="50" cy="185" r="4"/><circle cx="65" cy="200" r="4"/><circle cx="75" cy="175" r="4"/><circle cx="85" cy="195" r="4"/><circle cx="60" cy="215" r="4"/><circle cx="90" cy="220" r="4"/></g>
    <g fill="#aec6df"><circle cx="200" cy="175" r="4"/><circle cx="210" cy="190" r="4"/><circle cx="225" cy="180" r="4"/><circle cx="215" cy="215" r="4"/><circle cx="230" cy="200" r="4"/></g>
    <g fill="#c0392b"><circle cx="200" cy="195" r="4"/><circle cx="215" cy="205" r="4"/></g>
  </g>

  <!-- Panel 3: identify doublets -->
  <g transform="translate(1020,40)">
    <text class="title" x="130" y="0">Identify doublets</text>
    <line x1="10" y1="280" x2="10" y2="40" stroke="#222" marker-end="url(#a)"/>
    <line x1="10" y1="280" x2="260" y2="280" stroke="#222" marker-end="url(#a)"/>
    <text class="ax" x="140" y="305">UMAP1</text>
    <text class="ax" x="-30" y="160" transform="rotate(-90 -30 160)">UMAP2</text>

    <!-- Red shaded highlight -->
    <ellipse cx="125" cy="110" rx="60" ry="45" fill="#c0392b" opacity="0.25"/>

    <g fill="#111"><circle cx="60" cy="80" r="4"/><circle cx="75" cy="70" r="4"/><circle cx="70" cy="95" r="4"/></g>
    <g fill="#c0392b"><circle cx="100" cy="115" r="4"/><circle cx="115" cy="100" r="4"/><circle cx="130" cy="110" r="4"/><circle cx="125" cy="125" r="4"/><circle cx="140" cy="105" r="4"/></g>
    <g fill="#555"><circle cx="115" cy="90" r="4"/><circle cx="130" cy="95" r="4"/></g>
    <g fill="#2c7fb8"><circle cx="50" cy="200" r="4"/><circle cx="65" cy="215" r="4"/><circle cx="75" cy="190" r="4"/><circle cx="85" cy="210" r="4"/></g>
    <g fill="#aec6df"><circle cx="180" cy="190" r="4"/><circle cx="195" cy="205" r="4"/><circle cx="210" cy="195" r="4"/><circle cx="200" cy="225" r="4"/></g>
    <g fill="#c0392b"><circle cx="190" cy="210" r="4"/></g>
  </g>
</svg>
