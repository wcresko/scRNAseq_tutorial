<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Background gradient arc -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ebf5fb"/>
      <stop offset="100%" stop-color="#fef9e7"/>
    </linearGradient>
    <linearGradient id="confettiGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#skyGrad)" rx="12"/>
  
  <!-- Decorative confetti/sparks -->
  <circle cx="120" cy="60" r="4" fill="#e74c3c" opacity="0.6"/>
  <circle cx="250" cy="40" r="3" fill="#3498db" opacity="0.5"/>
  <circle cx="380" cy="55" r="5" fill="#f39c12" opacity="0.6"/>
  <circle cx="520" cy="35" r="3" fill="#27ae60" opacity="0.5"/>
  <circle cx="650" cy="50" r="4" fill="#9b59b6" opacity="0.6"/>
  <circle cx="780" cy="45" r="3" fill="#e74c3c" opacity="0.5"/>
  <rect x="180" y="70" width="8" height="3" fill="#f39c12" opacity="0.5" transform="rotate(30,184,71)"/>
  <rect x="450" y="50" width="8" height="3" fill="#27ae60" opacity="0.5" transform="rotate(-20,454,51)"/>
  <rect x="700" y="65" width="8" height="3" fill="#3498db" opacity="0.5" transform="rotate(45,704,66)"/>
  <rect x="320" y="80" width="6" height="3" fill="#9b59b6" opacity="0.4" transform="rotate(-35,323,81)"/>
  <rect x="600" y="75" width="7" height="3" fill="#e74c3c" opacity="0.4" transform="rotate(15,603,76)"/>
  
  <!-- Title banner -->
  <text x="450" y="110" text-anchor="middle" font-size="26" font-weight="bold" fill="#2c3e50">Congratulations, Bioengineering Statisticians!</text>
  
  <!-- Floating tool badges around the students -->
  <!-- Left side badges -->
  <rect x="40" y="160" width="85" height="28" rx="14" fill="#3498db" opacity="0.85"/>
  <text x="82" y="179" text-anchor="middle" font-size="10" fill="white" font-weight="bold">R + ggplot2</text>
  
  <rect x="30" y="210" width="75" height="28" rx="14" fill="#e74c3c" opacity="0.85"/>
  <text x="67" y="229" text-anchor="middle" font-size="10" fill="white" font-weight="bold">t-tests</text>
  
  <rect x="45" y="260" width="90" height="28" rx="14" fill="#27ae60" opacity="0.85"/>
  <text x="90" y="279" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Regression</text>
  
  <rect x="25" y="310" width="80" height="28" rx="14" fill="#9b59b6" opacity="0.85"/>
  <text x="65" y="329" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ANOVA</text>
  
  <rect x="40" y="360" width="105" height="28" rx="14" fill="#f39c12" opacity="0.85"/>
  <text x="92" y="379" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Mixed Models</text>
  
  <!-- Right side badges -->
  <rect x="775" y="160" width="95" height="28" rx="14" fill="#e67e22" opacity="0.85"/>
  <text x="822" y="179" text-anchor="middle" font-size="10" fill="white" font-weight="bold">PCA + UMAP</text>
  
  <rect x="785" y="210" width="80" height="28" rx="14" fill="#1abc9c" opacity="0.85"/>
  <text x="825" y="229" text-anchor="middle" font-size="10" fill="white" font-weight="bold">GLMs</text>
  
  <rect x="770" y="260" width="105" height="28" rx="14" fill="#2c3e50" opacity="0.85"/>
  <text x="822" y="279" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Clustering</text>
  
  <rect x="780" y="310" width="95" height="28" rx="14" fill="#c0392b" opacity="0.85"/>
  <text x="827" y="329" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Survival</text>
  
  <rect x="775" y="360" width="100" height="28" rx="14" fill="#8e44ad" opacity="0.85"/>
  <text x="825" y="379" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Bayesian</text>
  
  <!-- Five graduate students - simplified but warm -->
  <!-- Student 1 (leftmost) -->
  <g transform="translate(220,175)">
    <!-- Body -->
    <rect x="-18" y="80" width="36" height="100" rx="8" fill="#3498db" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="60" r="28" fill="#f5cba7"/>
    <!-- Eyes -->
    <circle cx="-8" cy="55" r="3" fill="#2c3e50"/>
    <circle cx="8" cy="55" r="3" fill="#2c3e50"/>
    <!-- Smile -->
    <path d="M-10,68 Q0,80 10,68" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <!-- Grad cap -->
    <rect x="-22" y="30" width="44" height="6" rx="1" fill="#2c3e50"/>
    <rect x="-6" y="20" width="12" height="12" rx="1" fill="#2c3e50"/>
    <line x1="18" y1="33" x2="28" y2="50" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="28" cy="52" r="3" fill="#f39c12"/>
    <!-- Raised arm -->
    <line x1="18" y1="100" x2="45" y2="70" stroke="#f5cba7" stroke-width="8" stroke-linecap="round"/>
    <circle cx="45" cy="68" r="6" fill="#f5cba7"/>
  </g>
  
  <!-- Student 2 -->
  <g transform="translate(330,165)">
    <rect x="-18" y="80" width="36" height="100" rx="8" fill="#e74c3c" opacity="0.9"/>
    <circle cx="0" cy="60" r="28" fill="#d2b48c"/>
    <circle cx="-8" cy="55" r="3" fill="#2c3e50"/>
    <circle cx="8" cy="55" r="3" fill="#2c3e50"/>
    <path d="M-10,68 Q0,80 10,68" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <rect x="-22" y="30" width="44" height="6" rx="1" fill="#2c3e50"/>
    <rect x="-6" y="20" width="12" height="12" rx="1" fill="#2c3e50"/>
    <line x1="18" y1="33" x2="28" y2="50" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="28" cy="52" r="3" fill="#f39c12"/>
    <!-- Both arms up -->
    <line x1="-18" y1="100" x2="-40" y2="60" stroke="#d2b48c" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-40" cy="58" r="6" fill="#d2b48c"/>
    <line x1="18" y1="100" x2="40" y2="60" stroke="#d2b48c" stroke-width="8" stroke-linecap="round"/>
    <circle cx="40" cy="58" r="6" fill="#d2b48c"/>
  </g>
  
  <!-- Student 3 (center, slightly taller) -->
  <g transform="translate(450,155)">
    <rect x="-20" y="80" width="40" height="110" rx="8" fill="#27ae60" opacity="0.9"/>
    <circle cx="0" cy="58" r="30" fill="#fddcb5"/>
    <circle cx="-9" cy="53" r="3.5" fill="#2c3e50"/>
    <circle cx="9" cy="53" r="3.5" fill="#2c3e50"/>
    <path d="M-12,67 Q0,82 12,67" stroke="#2c3e50" stroke-width="2.5" fill="none"/>
    <rect x="-24" y="26" width="48" height="7" rx="1" fill="#2c3e50"/>
    <rect x="-7" y="16" width="14" height="12" rx="1" fill="#2c3e50"/>
    <line x1="20" y1="29" x2="32" y2="48" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="32" cy="50" r="3" fill="#f39c12"/>
    <!-- Arms up in V -->
    <line x1="-20" y1="100" x2="-50" y2="50" stroke="#fddcb5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-50" cy="48" r="6" fill="#fddcb5"/>
    <line x1="20" y1="100" x2="50" y2="50" stroke="#fddcb5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="50" cy="48" r="6" fill="#fddcb5"/>
  </g>
  
  <!-- Student 4 -->
  <g transform="translate(570,165)">
    <rect x="-18" y="80" width="36" height="100" rx="8" fill="#9b59b6" opacity="0.9"/>
    <circle cx="0" cy="60" r="28" fill="#e8c5a0"/>
    <circle cx="-8" cy="55" r="3" fill="#2c3e50"/>
    <circle cx="8" cy="55" r="3" fill="#2c3e50"/>
    <path d="M-10,68 Q0,80 10,68" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <rect x="-22" y="30" width="44" height="6" rx="1" fill="#2c3e50"/>
    <rect x="-6" y="20" width="12" height="12" rx="1" fill="#2c3e50"/>
    <line x1="18" y1="33" x2="28" y2="50" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="28" cy="52" r="3" fill="#f39c12"/>
    <line x1="18" y1="100" x2="42" y2="65" stroke="#e8c5a0" stroke-width="8" stroke-linecap="round"/>
    <circle cx="42" cy="63" r="6" fill="#e8c5a0"/>
  </g>
  
  <!-- Student 5 (rightmost) -->
  <g transform="translate(680,175)">
    <rect x="-18" y="80" width="36" height="100" rx="8" fill="#f39c12" opacity="0.9"/>
    <circle cx="0" cy="60" r="28" fill="#c8a27e"/>
    <circle cx="-8" cy="55" r="3" fill="#2c3e50"/>
    <circle cx="8" cy="55" r="3" fill="#2c3e50"/>
    <path d="M-10,68 Q0,80 10,68" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <rect x="-22" y="30" width="44" height="6" rx="1" fill="#2c3e50"/>
    <rect x="-6" y="20" width="12" height="12" rx="1" fill="#2c3e50"/>
    <line x1="-18" y1="33" x2="-28" y2="50" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="-28" cy="52" r="3" fill="#f39c12"/>
    <line x1="-18" y1="100" x2="-42" y2="65" stroke="#c8a27e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-42" cy="63" r="6" fill="#c8a27e"/>
    <line x1="18" y1="100" x2="42" y2="65" stroke="#c8a27e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="42" cy="63" r="6" fill="#c8a27e"/>
  </g>
  
  <!-- Bottom message -->
  <rect x="200" y="430" width="500" height="45" rx="22" fill="#2c3e50" opacity="0.9"/>
  <text x="450" y="458" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Now go analyze your own data!</text>
  
  <!-- Small Quarto/R logo references -->
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#7f8c8d">R &#x2022; ggplot2 &#x2022; Quarto &#x2022; Reproducible Science &#x2022; Knight Campus 2026</text>
</svg>
