<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="900" height="350" fill="white"/>

  <!-- Command text at top -->
  <text x="50" y="75" font-size="26" font-family="'Courier New', monospace">
    <tspan fill="#333" font-weight="bold">$</tspan>
    <tspan fill="#c0392b"> wc -l *.pdb</tspan>
    <tspan fill="#333"> | </tspan>
    <tspan fill="#e67e22">sort -n</tspan>
    <tspan fill="#333"> | </tspan>
    <tspan fill="#8e44ad">head -n 1</tspan>
  </text>

  <!-- Command 1: wc -l *.pdb (red chevron) -->
  <polygon points="30,150 175,150 195,190 175,230 30,230" fill="#e74c3c"/>
  <text x="108" y="197" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">wc -l *.pdb</text>

  <!-- OUT label -->
  <text x="210" y="197" font-size="11" font-weight="bold" fill="#888">OUT</text>

  <!-- IN label -->
  <text x="240" y="197" font-size="11" font-weight="bold" fill="#888">IN</text>

  <!-- Command 2: sort -n (orange chevron) -->
  <polygon points="260,150 380,150 400,190 380,230 260,230 280,190" fill="#e67e22"/>
  <text x="330" y="197" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">sort -n</text>

  <!-- OUT label -->
  <text x="415" y="197" font-size="11" font-weight="bold" fill="#888">OUT</text>

  <!-- IN label -->
  <text x="445" y="197" font-size="11" font-weight="bold" fill="#888">IN</text>

  <!-- Command 3: head -n 1 (purple chevron) -->
  <polygon points="465,150 600,150 620,190 600,230 465,230 485,190" fill="#8e44ad"/>
  <text x="540" y="197" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">head -n 1</text>

  <!-- OUT label -->
  <text x="635" y="197" font-size="11" font-weight="bold" fill="#888">OUT</text>

  <!-- Arrow to output -->
  <polygon points="655,182 675,190 655,198" fill="#888"/>

  <!-- Output in Shell box (dark) -->
  <rect x="690" y="150" width="170" height="80" rx="8" fill="#2c3e50"/>
  <rect x="720" y="162" width="50" height="30" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <text x="745" y="184" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" fill="white">$</text>
  <text x="775" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Output in Shell</text>
</svg>