<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="Times New Roman, serif">
  <!-- s_{y1-y2} = -->
  <text x="30" y="120" font-size="36" font-style="italic">s</text>
  <!-- Subscript bar-y1 - bar-y2 -->
  <text x="50" y="140" font-size="18" font-style="italic">y&#x0305;</text>
  <text x="64" y="145" font-size="13">1</text>
  <text x="73" y="140" font-size="18"> &#x2212; </text>
  <text x="95" y="140" font-size="18" font-style="italic">y&#x0305;</text>
  <text x="109" y="145" font-size="13">2</text>

  <text x="130" y="120" font-size="36"> = </text>

  <!-- Square root symbol -->
  <!-- Radical sign -->
  <line x1="185" y1="120" x2="195" y2="130" stroke="black" stroke-width="2"/>
  <line x1="195" y1="130" x2="205" y2="30" stroke="black" stroke-width="2.5"/>
  <line x1="205" y1="30" x2="750" y2="30" stroke="black" stroke-width="2"/>

  <!-- Fraction: numerator -->
  <text x="230" y="75" font-size="26">(</text>
  <text x="245" y="75" font-size="26" font-style="italic">n</text>
  <text x="263" y="80" font-size="16">1</text>
  <text x="278" y="75" font-size="26"> &#x2212; 1)</text>
  <text x="348" y="75" font-size="26" font-style="italic">s</text>
  <text x="365" y="80" font-size="16">1</text>
  <text x="374" y="60" font-size="18">2</text>

  <text x="395" y="75" font-size="26"> + (</text>
  <text x="438" y="75" font-size="26" font-style="italic">n</text>
  <text x="456" y="80" font-size="16">2</text>
  <text x="471" y="75" font-size="26"> &#x2212; 1)</text>
  <text x="541" y="75" font-size="26" font-style="italic">s</text>
  <text x="558" y="80" font-size="16">2</text>
  <text x="567" y="60" font-size="18">2</text>

  <!-- Fraction line -->
  <line x1="220" y1="88" x2="590" y2="88" stroke="black" stroke-width="2"/>

  <!-- Fraction: denominator -->
  <text x="310" y="118" font-size="26" font-style="italic">n</text>
  <text x="328" y="123" font-size="16">1</text>
  <text x="345" y="118" font-size="26"> + </text>
  <text x="380" y="118" font-size="26" font-style="italic">n</text>
  <text x="398" y="123" font-size="16">2</text>
  <text x="415" y="118" font-size="26"> &#x2212; 2</text>

  <!-- Multiplied by the second fraction -->
  <text x="610" y="90" font-size="36">(</text>

  <!-- 1/n1 -->
  <text x="635" y="75" font-size="26">1</text>
  <line x1="625" y1="83" x2="665" y2="83" stroke="black" stroke-width="2"/>
  <text x="632" y="112" font-size="26" font-style="italic">n</text>
  <text x="650" y="117" font-size="16">1</text>

  <text x="668" y="90" font-size="26"> + </text>

  <!-- 1/n2 -->
  <text x="705" y="75" font-size="26">1</text>
  <line x1="695" y1="83" x2="735" y2="83" stroke="black" stroke-width="2"/>
  <text x="702" y="112" font-size="26" font-style="italic">n</text>
  <text x="720" y="117" font-size="16">2</text>

  <text x="738" y="90" font-size="36">)</text>
</svg>