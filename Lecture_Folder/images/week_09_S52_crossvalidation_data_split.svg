<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Data Splitting</text>

  <!-- Data bar (tall blue rectangle) -->
  <rect x="180" y="60" width="80" height="280" rx="4" fill="#4472C4" stroke="#3060a8" stroke-width="1.5"/>
  <text x="220" y="210" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Data</text>

  <!-- Independent Set bar (shorter orange rectangle) -->
  <rect x="340" y="120" width="80" height="170" rx="4" fill="#ED7D31" stroke="#d06820" stroke-width="1.5"/>
  <text x="380" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Independent</text>
  <text x="380" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Set</text>

  <!-- Labels -->
  <text x="220" y="365" text-anchor="middle" font-size="13" fill="#555">All Available Data</text>
  <text x="380" y="315" text-anchor="middle" font-size="13" fill="#555">Held-out Test Set</text>

  <!-- Footer -->
  <text x="300" y="390" text-anchor="middle" font-size="10" fill="#999">SVG recreation of cross-validation data split diagram</text>
</svg>
