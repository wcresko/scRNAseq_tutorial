<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="serif">
  <!-- Axes -->
  <line x1="80" y1="530" x2="650" y2="530" stroke="black" stroke-width="2"/>
  <line x1="80" y1="530" x2="80" y2="30" stroke="black" stroke-width="2"/>
  <text x="650" y="560" font-size="24" font-style="italic">X</text>
  <text x="50" y="45" font-size="24" font-style="italic">Y</text>

  <!-- Data points (open circles, roughly linear) -->
  <circle cx="130" cy="480" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="160" cy="460" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="190" cy="430" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="220" cy="400" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="260" cy="370" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="330" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="320" cy="340" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="360" cy="290" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="480" cy="160" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="520" cy="130" r="6" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Outlier point 2 (gray, high leverage, upper left) -->
  <circle cx="200" cy="200" r="10" fill="#999" stroke="black" stroke-width="1.5"/>
  <text x="175" y="175" font-size="22" font-weight="bold">2</text>

  <!-- Outlier point 3 (dark, low influence, lower right) -->
  <circle cx="470" cy="420" r="10" fill="#333" stroke="black" stroke-width="1.5"/>
  <text x="490" y="430" font-size="22" font-weight="bold">3</text>

  <!-- Line 1 - solid (fit without outliers) -->
  <line x1="100" y1="510" x2="580" y2="80" stroke="black" stroke-width="2.5"/>
  <text x="495" y="108" font-size="22">1</text>

  <!-- Line 2 - dash-dot (fit pulled by outlier 2) -->
  <line x1="100" y1="460" x2="580" y2="100" stroke="black" stroke-width="2" stroke-dasharray="15,5,3,5"/>
  <text x="540" y="130" font-size="22">2</text>

  <!-- Line 3 - dashed (fit pulled by outlier 3) -->
  <line x1="100" y1="500" x2="580" y2="200" stroke="black" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="560" y="220" font-size="22">3</text>
</svg>
