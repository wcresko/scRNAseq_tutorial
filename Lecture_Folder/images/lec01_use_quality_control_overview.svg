<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .lbl  { font-size: 13px; fill: #222; }
    .big  { font-size: 22px; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="bigA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- LEFT (messy) -->
  <g transform="translate(20,20)">
    <!-- Cell + bead + droplet (top-left) -->
    <g transform="translate(120,90)">
      <ellipse cx="0" cy="0" rx="55" ry="55" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-5" r="22" fill="#3c6daa"/>
      <path d="M-15,-11 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,-1 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="25" cy="18" r="7" fill="#1b3a6b"/>
      <!-- labels -->
      <line x1="-60" y1="-40" x2="-20" y2="-10" stroke="#333"/>
      <text class="lbl" x="-130" y="-42">Droplet</text>
      <line x1="-60" y1="20" x2="15" y2="20" stroke="#333"/>
      <text class="lbl" x="-130" y="10">Barcode bead</text>
      <line x1="20" y1="-40" x2="3" y2="-15" stroke="#333"/>
      <text class="lbl" x="10" y="-45">Cell</text>
    </g>

    <!-- Dying cell (top-right) -->
    <g transform="translate(440,80)">
      <ellipse cx="0" cy="0" rx="60" ry="55" fill="#d5e5f5" stroke="#b9ccdf"/>
      <!-- star-ish blob for dying -->
      <path d="M-20,-25 l15,0 l5,-10 l5,10 l10,-5 l-3,10 l13,5 l-8,8 l5,12 l-10,-3 l-5,12 l-6,-10 l-12,5 l2,-12 l-12,-5 l10,-5 l-8,-10 z" fill="#3c6daa" stroke="#2c4e76"/>
      <path d="M-15,-5 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="-5" cy="30" r="7" fill="#1b3a6b"/>
      <line x1="50" y1="-35" x2="20" y2="-15" stroke="#333"/>
      <text class="lbl" x="45" y="-45">Dying</text>
      <text class="lbl" x="45" y="-30">cell</text>
    </g>

    <!-- Ambient mRNA -->
    <g transform="translate(120,260)">
      <ellipse cx="0" cy="0" rx="55" ry="60" fill="#d5e5f5" stroke="#b9ccdf"/>
      <path d="M-30,-35 q5,-6 10,0 t10,0" fill="none" stroke="#777" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="22" fill="#3c6daa"/>
      <path d="M-15,-6 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="25" cy="20" r="7" fill="#1b3a6b"/>
      <line x1="-60" y1="-30" x2="-15" y2="-30" stroke="#333"/>
      <text class="lbl" x="-130" y="-34">Ambient mRNA</text>
    </g>

    <!-- Empty droplet -->
    <g transform="translate(400,260)">
      <ellipse cx="0" cy="0" rx="60" ry="55" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="20" cy="10" r="7" fill="#1b3a6b"/>
      <line x1="-60" y1="-30" x2="-10" y2="-10" stroke="#333"/>
      <text class="lbl" x="-125" y="-34">Empty</text>
      <text class="lbl" x="-125" y="-20">droplet</text>
    </g>

    <!-- Doublet -->
    <g transform="translate(290,440)">
      <ellipse cx="0" cy="0" rx="55" ry="80" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-30" r="22" fill="#3c6daa"/>
      <path d="M-12,-36 q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="0" cy="30" r="22" fill="#3c6daa"/>
      <path d="M-12,24 q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="25" cy="10" r="7" fill="#1b3a6b"/>
      <line x1="-20" y1="90" x2="-5" y2="70" stroke="#333"/>
      <text class="lbl" x="-40" y="105">Doublet</text>
    </g>

    <!-- Small scattered droplets (decoration) -->
    <g opacity="0.6">
      <ellipse cx="210" cy="190" rx="22" ry="20" fill="#e8eef6" stroke="#c9d5e3"/>
      <path d="M200,182 q4,-4 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <ellipse cx="280" cy="140" rx="18" ry="17" fill="#e8eef6" stroke="#c9d5e3"/>
      <ellipse cx="340" cy="220" rx="22" ry="20" fill="#e8eef6" stroke="#c9d5e3"/>
      <path d="M330,210 q4,-4 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <ellipse cx="260" cy="380" rx="22" ry="20" fill="#e8eef6" stroke="#c9d5e3"/>
      <path d="M252,372 q4,-4 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <ellipse cx="430" cy="400" rx="24" ry="22" fill="#e8eef6" stroke="#c9d5e3"/>
      <path d="M420,390 q4,-4 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <ellipse cx="130" cy="440" rx="22" ry="20" fill="#e8eef6" stroke="#c9d5e3"/>
      <ellipse cx="500" cy="300" rx="18" ry="17" fill="#e8eef6" stroke="#c9d5e3"/>
      <ellipse cx="170" cy="360" rx="20" ry="18" fill="#e8eef6" stroke="#c9d5e3"/>
    </g>
  </g>

  <!-- Arrow + label -->
  <g transform="translate(700,270)">
    <text class="big" x="80" y="-20">Quality Control</text>
    <line x1="0" y1="0" x2="160" y2="0" stroke="#222" stroke-width="4" marker-end="url(#bigA)"/>
  </g>

  <!-- RIGHT (cleaned) -->
  <g transform="translate(900,40)">
    <!-- A spread of clean, good droplets -->
    <g transform="translate(50,80)">
      <ellipse cx="0" cy="0" rx="55" ry="55" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-5" r="20" fill="#3c6daa"/>
      <path d="M-13,-10 q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2"/>
      <path d="M-13,0  q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2"/>
      <circle cx="22" cy="20" r="6" fill="#1b3a6b"/>
    </g>
    <g transform="translate(220,60)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-5" r="14" fill="#3c6daa"/>
      <path d="M-10,-8 q3,-4 6,0 t6,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="15" cy="14" r="4" fill="#1b3a6b"/>
    </g>
    <g transform="translate(360,70)">
      <ellipse cx="0" cy="0" rx="28" ry="26" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-3" r="11" fill="#3c6daa"/>
      <path d="M-8,-6 q2,-3 5,0 t5,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="12" cy="11" r="3" fill="#1b3a6b"/>
    </g>
    <g transform="translate(160,180)">
      <ellipse cx="0" cy="0" rx="30" ry="28" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-3" r="12" fill="#3c6daa"/>
      <path d="M-8,-6 q3,-4 6,0 t6,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="13" cy="12" r="4" fill="#1b3a6b"/>
    </g>
    <g transform="translate(270,180)">
      <ellipse cx="0" cy="0" rx="24" ry="22" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-2" r="9" fill="#3c6daa"/>
      <path d="M-7,-5 q2,-3 4,0 t4,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="10" cy="9" r="3" fill="#1b3a6b"/>
    </g>
    <g transform="translate(390,210)">
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-3" r="11" fill="#3c6daa"/>
      <path d="M-8,-6 q2,-3 5,0 t5,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="12" cy="11" r="4" fill="#1b3a6b"/>
    </g>
    <g transform="translate(90,340)">
      <ellipse cx="0" cy="0" rx="55" ry="55" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="-5" cy="-5" r="22" fill="#3c6daa"/>
      <path d="M-16,-12 q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-16,0 q4,-5 8,0 t8,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="22" cy="18" r="8" fill="#1b3a6b"/>
    </g>
    <g transform="translate(270,380)">
      <ellipse cx="0" cy="0" rx="35" ry="33" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-3" r="14" fill="#3c6daa"/>
      <path d="M-10,-8 q3,-4 6,0 t6,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="5" fill="#1b3a6b"/>
    </g>
    <g transform="translate(400,400)">
      <ellipse cx="0" cy="0" rx="20" ry="18" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-2" r="7" fill="#3c6daa"/>
      <path d="M-6,-4 q2,-3 4,0 t4,0" fill="none" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="9" cy="8" r="3" fill="#1b3a6b"/>
    </g>
  </g>
</svg>
