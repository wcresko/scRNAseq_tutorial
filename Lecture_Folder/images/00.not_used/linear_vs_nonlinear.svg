<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-size: 13px; fill: #555; }
      .label { font-size: 12px; fill: #333; }
      .small { font-size: 10px; fill: #666; }
    </style>
  </defs>
  
  <!-- Background panels -->
  <rect x="20" y="20" width="410" height="360" rx="12" fill="#f0f4f8" stroke="#bdc3c7" stroke-width="1.5"/>
  <rect x="470" y="20" width="410" height="360" rx="12" fill="#fdf2f0" stroke="#bdc3c7" stroke-width="1.5"/>
  
  <!-- Left panel: Linear (PCA) -->
  <text x="225" y="52" class="title" text-anchor="middle">Linear (PCA)</text>
  
  <!-- Original 2D data cloud -->
  <text x="130" y="82" class="subtitle" text-anchor="middle">Original Data</text>
  <ellipse cx="130" cy="170" rx="80" ry="45" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" transform="rotate(-30,130,170)"/>
  <!-- Data points -->
  <circle cx="95" cy="185" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="110" cy="170" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="125" cy="155" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="140" cy="160" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="135" cy="180" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="150" cy="150" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="115" cy="195" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="160" cy="165" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="100" cy="175" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="145" cy="175" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="120" cy="160" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="130" cy="145" r="3" fill="#3498db" opacity="0.7"/>
  
  <!-- PC1 arrow -->
  <line x1="80" y1="200" x2="180" y2="140" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="185" y="135" class="small" fill="#e74c3c" font-weight="bold">PC1</text>
  <!-- PC2 arrow -->
  <line x1="100" y1="145" x2="140" y2="200" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="145" y="210" class="small" fill="#27ae60" font-weight="bold">PC2</text>
  
  <!-- Arrow to projected -->
  <path d="M 210 170 L 260 170" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>
  <text x="235" y="162" class="small" text-anchor="middle">project</text>
  
  <!-- Projected 1D -->
  <text x="340" y="82" class="subtitle" text-anchor="middle">PC Space</text>
  <line x1="280" y1="170" x2="400" y2="170" stroke="#999" stroke-width="1"/>
  <text x="405" y="175" class="small">PC1</text>
  <line x1="340" y1="120" x2="340" y2="220" stroke="#999" stroke-width="1"/>
  <text x="345" y="115" class="small">PC2</text>
  <!-- Projected points spread along PC1 -->
  <circle cx="290" cy="175" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="305" cy="168" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="315" cy="172" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="325" cy="165" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="338" cy="170" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="350" cy="168" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="360" cy="173" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="370" cy="162" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="380" cy="167" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="300" cy="180" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="345" cy="175" r="3" fill="#3498db" opacity="0.7"/>
  <circle cx="365" cy="160" r="3" fill="#3498db" opacity="0.7"/>
  
  <!-- Key properties -->
  <text x="225" y="270" class="label" text-anchor="middle" font-weight="bold">Key Properties</text>
  <text x="225" y="292" class="small" text-anchor="middle">✓ Axes ordered by variance explained</text>
  <text x="225" y="308" class="small" text-anchor="middle">✓ Distances are meaningful</text>
  <text x="225" y="324" class="small" text-anchor="middle">✓ Loadings are interpretable</text>
  <text x="225" y="340" class="small" text-anchor="middle">✓ Deterministic (reproducible)</text>
  <text x="225" y="356" class="small" text-anchor="middle">✗ Cannot capture non-linear patterns</text>
  
  <!-- Right panel: Non-linear (t-SNE / UMAP) -->
  <text x="675" y="52" class="title" text-anchor="middle">Non-linear (t-SNE / UMAP)</text>
  
  <!-- Original data: Swiss roll concept - three clusters in non-linear arrangement -->
  <text x="570" y="82" class="subtitle" text-anchor="middle">Original Data (high-D)</text>
  <!-- Cluster 1 - curved -->
  <circle cx="530" cy="130" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="540" cy="140" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="535" cy="150" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="545" cy="145" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="550" cy="155" r="3" fill="#e74c3c" opacity="0.7"/>
  <!-- Cluster 2 - curved middle -->
  <circle cx="570" cy="165" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="580" cy="170" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="575" cy="180" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="585" cy="175" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="565" cy="175" r="3" fill="#27ae60" opacity="0.7"/>
  <!-- Cluster 3 -->
  <circle cx="555" cy="200" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="545" cy="195" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="560" cy="210" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="540" cy="205" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="550" cy="190" r="3" fill="#9b59b6" opacity="0.7"/>
  
  <!-- Curved manifold line -->
  <path d="M 525 125 Q 560 160, 590 170 Q 570 190, 535 215" stroke="#bbb" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  
  <!-- Arrow to embedding -->
  <path d="M 610 170 L 660 170" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>
  <text x="635" y="162" class="small" text-anchor="middle">embed</text>
  
  <!-- 2D Embedding with separated clusters -->
  <text x="780" y="82" class="subtitle" text-anchor="middle">2D Embedding</text>
  <!-- Cluster 1 -->
  <circle cx="720" cy="130" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="730" cy="125" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="725" cy="140" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="715" cy="135" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="735" cy="135" r="3" fill="#e74c3c" opacity="0.7"/>
  <!-- Cluster 2 -->
  <circle cx="790" cy="155" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="800" cy="160" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="795" cy="148" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="785" cy="162" r="3" fill="#27ae60" opacity="0.7"/>
  <circle cx="805" cy="152" r="3" fill="#27ae60" opacity="0.7"/>
  <!-- Cluster 3 -->
  <circle cx="755" cy="200" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="760" cy="210" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="750" cy="195" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="765" cy="205" r="3" fill="#9b59b6" opacity="0.7"/>
  <circle cx="745" cy="205" r="3" fill="#9b59b6" opacity="0.7"/>
  
  <!-- Key properties -->
  <text x="675" y="270" class="label" text-anchor="middle" font-weight="bold">Key Properties</text>
  <text x="675" y="292" class="small" text-anchor="middle">✓ Captures complex, curved patterns</text>
  <text x="675" y="308" class="small" text-anchor="middle">✓ Preserves local neighborhoods</text>
  <text x="675" y="324" class="small" text-anchor="middle">✗ Distances between clusters not meaningful</text>
  <text x="675" y="340" class="small" text-anchor="middle">✗ Stochastic (set random seed!)</text>
  <text x="675" y="356" class="small" text-anchor="middle">✗ Sensitive to hyperparameters</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#888"/>
    </marker>
  </defs>
</svg>