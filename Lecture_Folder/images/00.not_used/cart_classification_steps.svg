<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="step1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="step2bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="step3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="step4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="step5bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">CART Classification: Step-by-Step</text>

  <!-- Step 1 -->
  <rect x="20" y="50" width="170" height="220" rx="10" fill="url(#step1bg)" stroke="#4caf50" stroke-width="1.5"/>
  <text x="105" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Step 1</text>
  <text x="105" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Start at Root</text>
  <rect x="40" y="108" width="130" height="40" rx="8" fill="#fff" stroke="#4caf50" stroke-width="1"/>
  <text x="105" y="125" text-anchor="middle" font-size="10" fill="#333">All 200 samples</text>
  <text x="105" y="138" text-anchor="middle" font-size="9" fill="#777">Mixed classes</text>
  <text x="105" y="168" text-anchor="middle" font-size="10" fill="#555">All observations</text>
  <text x="105" y="182" text-anchor="middle" font-size="10" fill="#555">in a single node.</text>
  <text x="105" y="200" text-anchor="middle" font-size="10" fill="#555">Calculate baseline</text>
  <text x="105" y="214" text-anchor="middle" font-size="10" fill="#555">Gini impurity.</text>
  <text x="105" y="240" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">G = 1 − Σpₖ²</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="160" x2="205" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="210" y="50" width="170" height="220" rx="10" fill="url(#step2bg)" stroke="#1976d2" stroke-width="1.5"/>
  <text x="295" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Step 2</text>
  <text x="295" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Evaluate All Splits</text>
  <text x="295" y="118" text-anchor="middle" font-size="10" fill="#555">For each feature &amp;</text>
  <text x="295" y="132" text-anchor="middle" font-size="10" fill="#555">each threshold value:</text>
  <text x="295" y="155" text-anchor="middle" font-size="10" fill="#333">• porosity ≥ 55%?</text>
  <text x="295" y="170" text-anchor="middle" font-size="10" fill="#333">• stiffness ≥ 40 kPa?</text>
  <text x="295" y="185" text-anchor="middle" font-size="10" fill="#333">• coating = RGD?</text>
  <text x="295" y="200" text-anchor="middle" font-size="10" fill="#333">• roughness ≥ 2.0?</text>
  <text x="295" y="225" text-anchor="middle" font-size="10" fill="#555">Compute Gini for</text>
  <text x="295" y="239" text-anchor="middle" font-size="10" fill="#555">each candidate split</text>

  <!-- Arrow 2→3 -->
  <line x1="380" y1="160" x2="395" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <rect x="400" y="50" width="170" height="220" rx="10" fill="url(#step3bg)" stroke="#f57c00" stroke-width="1.5"/>
  <text x="485" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Step 3</text>
  <text x="485" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Choose Best Split</text>
  <text x="485" y="118" text-anchor="middle" font-size="10" fill="#555">Select the split with</text>
  <text x="485" y="132" text-anchor="middle" font-size="10" fill="#555">maximum impurity</text>
  <text x="485" y="146" text-anchor="middle" font-size="10" fill="#555">reduction (info gain):</text>
  <text x="485" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">ΔG = G_parent</text>
  <text x="485" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">− weighted G_children</text>
  <text x="485" y="220" text-anchor="middle" font-size="10" fill="#555">e.g., "coating = RGD"</text>
  <text x="485" y="234" text-anchor="middle" font-size="10" fill="#555">gives biggest gain</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="160" x2="585" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <rect x="590" y="50" width="150" height="220" rx="10" fill="url(#step4bg)" stroke="#c62828" stroke-width="1.5"/>
  <text x="665" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Step 4</text>
  <text x="665" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Split &amp; Recurse</text>
  <!-- mini tree -->
  <rect x="625" y="110" width="80" height="25" rx="5" fill="#fff" stroke="#c62828" stroke-width="1"/>
  <text x="665" y="127" text-anchor="middle" font-size="9" fill="#333">coating=RGD?</text>
  <line x1="645" y1="135" x2="625" y2="155" stroke="#666" stroke-width="1"/>
  <line x1="685" y1="135" x2="705" y2="155" stroke="#666" stroke-width="1"/>
  <rect x="600" y="155" width="50" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="625" y="170" text-anchor="middle" font-size="8" fill="#333">Yes→</text>
  <rect x="680" y="155" width="50" height="22" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="705" y="170" text-anchor="middle" font-size="8" fill="#333">No→</text>
  <text x="665" y="200" text-anchor="middle" font-size="10" fill="#555">Repeat steps 2–3</text>
  <text x="665" y="214" text-anchor="middle" font-size="10" fill="#555">for each child</text>
  <text x="665" y="228" text-anchor="middle" font-size="10" fill="#555">node recursively</text>

  <!-- Arrow 4→5 -->
  <line x1="740" y1="160" x2="755" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <rect x="760" y="50" width="130" height="220" rx="10" fill="url(#step5bg)" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="825" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Step 5</text>
  <text x="825" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">Stop &amp; Predict</text>
  <text x="825" y="118" text-anchor="middle" font-size="10" fill="#555">Stop when:</text>
  <text x="825" y="136" text-anchor="middle" font-size="9" fill="#333">• Node is pure</text>
  <text x="825" y="150" text-anchor="middle" font-size="9" fill="#333">• Max depth hit</text>
  <text x="825" y="164" text-anchor="middle" font-size="9" fill="#333">• Min samples</text>
  <text x="825" y="178" text-anchor="middle" font-size="9" fill="#333">• No info gain</text>
  <text x="825" y="206" text-anchor="middle" font-size="10" fill="#555">Assign class =</text>
  <text x="825" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#6a1b9a">majority vote</text>
  <text x="825" y="240" text-anchor="middle" font-size="10" fill="#555">in leaf node</text>

  <!-- Bottom: Example tree -->
  <rect x="20" y="295" width="870" height="310" rx="10" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="455" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Example: Biomaterial Biocompatibility Tree</text>

  <!-- Root -->
  <rect x="355" y="335" width="190" height="35" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="450" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">coating = RGD?</text>

  <!-- Level 1 branches -->
  <line x1="400" y1="370" x2="260" y2="405" stroke="#666" stroke-width="1.5"/>
  <line x1="500" y1="370" x2="640" y2="405" stroke="#666" stroke-width="1.5"/>
  <text x="310" y="385" font-size="10" fill="#4caf50" font-weight="bold">Yes</text>
  <text x="560" y="385" font-size="10" fill="#c62828" font-weight="bold">No</text>

  <!-- Left child (Yes → check stiffness) -->
  <rect x="165" y="405" width="190" height="35" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="260" y="427" text-anchor="middle" font-size="11" fill="#333">stiffness ≥ 35 kPa?</text>

  <!-- Right child (No → check porosity) -->
  <rect x="545" y="405" width="190" height="35" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="640" y="427" text-anchor="middle" font-size="11" fill="#333">porosity ≥ 45%?</text>

  <!-- Left-Left leaf -->
  <line x1="220" y1="440" x2="130" y2="475" stroke="#666" stroke-width="1.2"/>
  <line x1="300" y1="440" x2="385" y2="475" stroke="#666" stroke-width="1.2"/>
  <text x="160" y="465" font-size="9" fill="#4caf50">Yes</text>
  <text x="345" y="465" font-size="9" fill="#c62828">No</text>

  <rect x="55" y="478" width="150" height="50" rx="8" fill="#27ae60" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="130" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Biocompatible</text>
  <text x="130" y="516" text-anchor="middle" font-size="10" fill="#e8f5e9">n=62, 89% pure</text>

  <rect x="310" y="478" width="150" height="50" rx="8" fill="#f39c12" stroke="#e65100" stroke-width="1.5"/>
  <text x="385" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Biocompatible</text>
  <text x="385" y="516" text-anchor="middle" font-size="10" fill="#fff3e0">n=18, 67% pure</text>

  <!-- Right-Right branches -->
  <line x1="600" y1="440" x2="530" y2="475" stroke="#666" stroke-width="1.2"/>
  <line x1="680" y1="440" x2="755" y2="475" stroke="#666" stroke-width="1.2"/>
  <text x="550" y="465" font-size="9" fill="#4caf50">Yes</text>
  <text x="720" y="465" font-size="9" fill="#c62828">No</text>

  <rect x="455" y="478" width="150" height="50" rx="8" fill="#f39c12" stroke="#e65100" stroke-width="1.5"/>
  <text x="530" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Incompatible</text>
  <text x="530" y="516" text-anchor="middle" font-size="10" fill="#fff3e0">n=45, 62% pure</text>

  <rect x="680" y="478" width="150" height="50" rx="8" fill="#e74c3c" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="755" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Incompatible</text>
  <text x="755" y="516" text-anchor="middle" font-size="10" fill="#ffcdd2">n=75, 91% pure</text>

  <!-- Legend -->
  <text x="55" y="570" font-size="10" fill="#555">Gini at root: 0.49 → After split: weighted average of children's Gini → Lower = better separation</text>
  <text x="55" y="588" font-size="10" fill="#555">Each split is greedy: chooses the single best feature + threshold to maximize purity improvement</text>
</svg>
