<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .param { font-size: 13px; font-weight: bold; }
      .val { font-size: 11px; font-weight: bold; fill: #555; }
      .desc { font-size: 10px; fill: #666; }
      .small { font-size: 9px; fill: #888; }
    </style>
  </defs>
  
  <text x="450" y="25" class="title" text-anchor="middle">Hyperparameter Effects on Embeddings</text>
  
  <!-- t-SNE Perplexity Row -->
  <rect x="15" y="40" width="870" height="145" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1"/>
  <text x="30" y="60" class="param" fill="#e67e22">t-SNE: Perplexity</text>
  <text x="30" y="75" class="desc">Controls effective number of neighbors each point considers</text>
  
  <!-- Perplexity = 5 -->
  <rect x="30" y="88" width="160" height="85" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="110" y="105" class="val" text-anchor="middle">perplexity = 5</text>
  <!-- Many tiny clusters -->
  <circle cx="60" cy="135" r="2.5" fill="#e74c3c"/><circle cx="65" cy="138" r="2.5" fill="#e74c3c"/>
  <circle cx="90" cy="125" r="2.5" fill="#27ae60"/><circle cx="95" cy="128" r="2.5" fill="#27ae60"/>
  <circle cx="120" cy="145" r="2.5" fill="#3498db"/><circle cx="125" cy="148" r="2.5" fill="#3498db"/>
  <circle cx="75" cy="155" r="2.5" fill="#9b59b6"/><circle cx="80" cy="158" r="2.5" fill="#9b59b6"/>
  <circle cx="140" cy="128" r="2.5" fill="#f39c12"/><circle cx="145" cy="131" r="2.5" fill="#f39c12"/>
  <circle cx="105" cy="155" r="2.5" fill="#1abc9c"/><circle cx="110" cy="158" r="2.5" fill="#1abc9c"/>
  <circle cx="155" cy="150" r="2.5" fill="#e74c3c"/><circle cx="160" cy="153" r="2.5" fill="#e74c3c"/>
  <text x="110" y="172" class="small" text-anchor="middle">Very local → fragmented</text>
  
  <!-- Perplexity = 30 -->
  <rect x="210" y="88" width="160" height="85" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="290" y="105" class="val" text-anchor="middle" fill="#e67e22">perplexity = 30 ★</text>
  <!-- Well-separated clusters -->
  <circle cx="240" cy="130" r="3" fill="#e74c3c"/><circle cx="245" cy="135" r="3" fill="#e74c3c"/>
  <circle cx="248" cy="128" r="3" fill="#e74c3c"/><circle cx="238" cy="138" r="3" fill="#e74c3c"/>
  <circle cx="300" cy="145" r="3" fill="#27ae60"/><circle cx="305" cy="150" r="3" fill="#27ae60"/>
  <circle cx="295" cy="148" r="3" fill="#27ae60"/><circle cx="308" cy="142" r="3" fill="#27ae60"/>
  <circle cx="330" cy="125" r="3" fill="#3498db"/><circle cx="335" cy="130" r="3" fill="#3498db"/>
  <circle cx="340" cy="122" r="3" fill="#3498db"/><circle cx="325" cy="128" r="3" fill="#3498db"/>
  <text x="290" y="172" class="small" text-anchor="middle">Balanced → typical choice</text>
  
  <!-- Perplexity = 100 -->
  <rect x="390" y="88" width="160" height="85" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="470" y="105" class="val" text-anchor="middle">perplexity = 100</text>
  <!-- Merged blobs -->
  <circle cx="430" cy="138" r="3" fill="#e74c3c"/><circle cx="440" cy="135" r="3" fill="#27ae60"/>
  <circle cx="445" cy="142" r="3" fill="#e74c3c"/><circle cx="450" cy="138" r="3" fill="#27ae60"/>
  <circle cx="460" cy="135" r="3" fill="#3498db"/><circle cx="470" cy="140" r="3" fill="#3498db"/>
  <circle cx="480" cy="138" r="3" fill="#e74c3c"/><circle cx="490" cy="135" r="3" fill="#27ae60"/>
  <circle cx="500" cy="142" r="3" fill="#3498db"/><circle cx="510" cy="138" r="3" fill="#e74c3c"/>
  <circle cx="435" cy="148" r="3" fill="#3498db"/><circle cx="495" cy="145" r="3" fill="#27ae60"/>
  <text x="470" y="172" class="small" text-anchor="middle">Too global → merged clusters</text>
  
  <!-- Scale arrow -->
  <line x1="580" y1="135" x2="865" y2="135" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <text x="620" y="125" class="desc" fill="#e67e22">More local</text>
  <text x="830" y="125" class="desc" fill="#e67e22">More global</text>
  <text x="722" y="155" class="desc" text-anchor="middle">Low perplexity → High perplexity</text>
  <text x="722" y="170" class="desc" text-anchor="middle">Fine detail → Broad patterns</text>
  
  <!-- UMAP Row -->
  <rect x="15" y="195" width="870" height="155" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="30" y="215" class="param" fill="#2980b9">UMAP: n_neighbors &amp; min_dist</text>
  <text x="30" y="230" class="desc">n_neighbors: local vs global balance; min_dist: cluster tightness</text>
  
  <!-- n_neighbors = 5, min_dist = 0.0 -->
  <rect x="30" y="242" width="160" height="95" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="110" y="258" class="val" text-anchor="middle">n=5, dist=0.0</text>
  <!-- Very tight tiny clusters -->
  <circle cx="55" cy="285" r="2" fill="#e74c3c"/><circle cx="58" cy="287" r="2" fill="#e74c3c"/><circle cx="56" cy="290" r="2" fill="#e74c3c"/>
  <circle cx="85" cy="278" r="2" fill="#27ae60"/><circle cx="88" cy="280" r="2" fill="#27ae60"/><circle cx="86" cy="283" r="2" fill="#27ae60"/>
  <circle cx="120" cy="295" r="2" fill="#3498db"/><circle cx="123" cy="297" r="2" fill="#3498db"/><circle cx="121" cy="300" r="2" fill="#3498db"/>
  <circle cx="150" cy="275" r="2" fill="#9b59b6"/><circle cx="153" cy="277" r="2" fill="#9b59b6"/><circle cx="151" cy="280" r="2" fill="#9b59b6"/>
  <text x="110" y="325" class="small" text-anchor="middle">Very tight, fragmented</text>
  
  <!-- n_neighbors = 15, min_dist = 0.1 -->
  <rect x="210" y="242" width="160" height="95" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1.5"/>
  <text x="290" y="258" class="val" text-anchor="middle" fill="#2980b9">n=15, dist=0.1 ★</text>
  <!-- Good clusters -->
  <circle cx="240" cy="280" r="3" fill="#e74c3c"/><circle cx="245" cy="285" r="3" fill="#e74c3c"/>
  <circle cx="248" cy="278" r="3" fill="#e74c3c"/><circle cx="238" cy="283" r="3" fill="#e74c3c"/>
  <circle cx="300" cy="295" r="3" fill="#27ae60"/><circle cx="305" cy="300" r="3" fill="#27ae60"/>
  <circle cx="295" cy="298" r="3" fill="#27ae60"/><circle cx="308" cy="292" r="3" fill="#27ae60"/>
  <circle cx="338" cy="275" r="3" fill="#3498db"/><circle cx="343" cy="280" r="3" fill="#3498db"/>
  <circle cx="348" cy="272" r="3" fill="#3498db"/><circle cx="333" cy="278" r="3" fill="#3498db"/>
  <text x="290" y="325" class="small" text-anchor="middle">Balanced → typical choice</text>
  
  <!-- n_neighbors = 50, min_dist = 0.5 -->
  <rect x="390" y="242" width="160" height="95" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="470" y="258" class="val" text-anchor="middle">n=50, dist=0.5</text>
  <!-- Spread out, less defined -->
  <circle cx="420" cy="285" r="3" fill="#e74c3c"/><circle cx="430" cy="280" r="3" fill="#e74c3c"/>
  <circle cx="440" cy="290" r="3" fill="#27ae60"/><circle cx="450" cy="285" r="3" fill="#27ae60"/>
  <circle cx="460" cy="278" r="3" fill="#3498db"/><circle cx="470" cy="288" r="3" fill="#3498db"/>
  <circle cx="480" cy="283" r="3" fill="#e74c3c"/><circle cx="490" cy="290" r="3" fill="#27ae60"/>
  <circle cx="500" cy="280" r="3" fill="#3498db"/><circle cx="510" cy="285" r="3" fill="#9b59b6"/>
  <circle cx="435" cy="298" r="3" fill="#9b59b6"/><circle cx="495" cy="295" r="3" fill="#e74c3c"/>
  <text x="470" y="325" class="small" text-anchor="middle">Spread out, more global</text>
  
  <!-- Scale annotations -->
  <rect x="580" y="242" width="290" height="95" rx="6" fill="#f8f9fa" stroke="#ddd"/>
  <text x="725" y="262" class="val" text-anchor="middle" fill="#2980b9">Tuning Guide</text>
  <text x="725" y="282" class="desc" text-anchor="middle">↑ n_neighbors → more global structure</text>
  <text x="725" y="298" class="desc" text-anchor="middle">↑ min_dist → more spread out clusters</text>
  <text x="725" y="318" class="desc" text-anchor="middle" font-style="italic">Always try multiple settings!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>