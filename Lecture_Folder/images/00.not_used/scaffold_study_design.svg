<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880">
  <defs>
    <!-- Arrowhead for nesting lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b35900"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a5c2e" text-anchor="middle">Scaffold Degradation Study — Experimental Design</text>
  <text x="600" y="62" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" fill="#666" font-style="italic" text-anchor="middle">Showing random effect hierarchy (nested and crossed) and fixed effect factorial structure</text>

  <!-- ============================================================ -->
  <!-- LEVEL 1: LABS (Random) -->
  <!-- ============================================================ -->

  <!-- Level label -->
  <text x="42" y="130" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#7b2d8e" transform="rotate(-90, 42, 130)">RANDOM</text>

  <!-- Lab boxes -->
  <rect x="120" y="100" width="200" height="44" rx="6" fill="#7b2d8e"/>
  <text x="220" y="122" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Lab 1</text>

  <rect x="355" y="100" width="200" height="44" rx="6" fill="#7b2d8e"/>
  <text x="455" y="122" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Lab 2</text>

  <rect x="590" y="100" width="200" height="44" rx="6" fill="#7b2d8e"/>
  <text x="690" y="122" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Lab 3</text>

  <rect x="825" y="100" width="200" height="44" rx="6" fill="#7b2d8e"/>
  <text x="925" y="122" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Lab 4</text>

  <!-- Type annotation -->
  <text x="1080" y="122" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#7b2d8e" font-weight="bold">4 levels</text>

  <!-- ============================================================ -->
  <!-- NESTING LINES: Lab → Technician -->
  <!-- ============================================================ -->

  <!-- Lab 1 → 2 techs -->
  <line x1="185" y1="144" x2="155" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="255" y1="144" x2="285" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lab 2 → 3 techs -->
  <line x1="400" y1="144" x2="371" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="455" y1="144" x2="457" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="144" x2="543" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lab 3 → 2 techs -->
  <line x1="655" y1="144" x2="625" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="725" y1="144" x2="755" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lab 4 → 3 techs -->
  <line x1="870" y1="144" x2="841" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="925" y1="144" x2="927" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="980" y1="144" x2="1013" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nesting annotation -->
  <text x="80" y="195" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#555" font-weight="bold" text-anchor="middle">NESTED</text>
  <text x="80" y="208" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">(1|lab:tech)</text>

  <!-- ============================================================ -->
  <!-- LEVEL 2: TECHNICIANS (Random, nested in Lab) -->
  <!-- ============================================================ -->

  <text x="42" y="272" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d5b" transform="rotate(-90, 42, 272)">RANDOM</text>

  <!-- Lab 1 techs -->
  <rect x="100" y="232" width="110" height="36" rx="5" fill="#2e7d5b"/>
  <text x="155" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 1A</text>

  <rect x="230" y="232" width="110" height="36" rx="5" fill="#2e7d5b"/>
  <text x="285" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 1B</text>

  <!-- Lab 2 techs -->
  <rect x="330" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="371" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 2A</text>

  <rect x="416" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="457" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 2B</text>

  <rect x="502" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="543" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 2C</text>

  <!-- Lab 3 techs -->
  <rect x="570" y="232" width="110" height="36" rx="5" fill="#2e7d5b"/>
  <text x="625" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 3A</text>

  <rect x="700" y="232" width="110" height="36" rx="5" fill="#2e7d5b"/>
  <text x="755" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 3B</text>

  <!-- Lab 4 techs -->
  <rect x="800" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="841" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 4A</text>

  <rect x="886" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="927" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 4B</text>

  <rect x="972" y="232" width="82" height="36" rx="5" fill="#2e7d5b"/>
  <text x="1013" y="250" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Tech 4C</text>

  <!-- Type annotation -->
  <text x="1105" y="245" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2e7d5b" font-weight="bold">10 levels</text>
  <text x="1105" y="260" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#888">(2–3 / lab)</text>

  <!-- ============================================================ -->
  <!-- CROSSED: BATCHES (Random, crossed with Lab) -->
  <!-- ============================================================ -->

  <!-- Batch row background to highlight crossing -->
  <rect x="90" y="330" width="1010" height="70" rx="8" fill="#fff3e0" stroke="#e6a352" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="42" y="370" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#b35900" transform="rotate(-90, 42, 370)">RANDOM</text>

  <!-- Batch boxes -->
  <rect x="110" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="175" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 1</text>

  <rect x="260" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="325" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 2</text>

  <rect x="410" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="475" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 3</text>

  <rect x="560" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="625" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 4</text>

  <rect x="710" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="775" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 5</text>

  <rect x="860" y="345" width="130" height="40" rx="5" fill="#d4820a"/>
  <text x="925" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Batch 6</text>

  <!-- Type annotation -->
  <text x="1105" y="360" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#b35900" font-weight="bold">6 levels</text>
  <text x="1105" y="375" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#888">(crossed)</text>

  <!-- Crossed annotation -->
  <text x="595" y="418" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#b35900" font-weight="bold" text-anchor="middle">CROSSED with Labs — every batch tested in every lab → (1|batch) + (1|lab)</text>

  <!-- ============================================================ -->
  <!-- LEVEL 3: FIXED EFFECTS — Treatment × Temperature -->
  <!-- ============================================================ -->

  <!-- Divider -->
  <line x1="90" y1="455" x2="1100" y2="455" stroke="#ccc" stroke-width="1"/>
  <text x="595" y="475" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#555" font-weight="bold" text-anchor="middle">Within each Technician × Batch combination, the fixed-effect factorial structure:</text>

  <text x="42" y="555" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2660a4" transform="rotate(-90, 42, 555)">FIXED</text>

  <!-- Treatment header row -->
  <text x="330" y="510" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2660a4" text-anchor="middle">A — Collagen</text>
  <text x="600" y="510" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2660a4" text-anchor="middle">B — Fibronectin</text>
  <text x="870" y="510" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2660a4" text-anchor="middle">C — Uncoated</text>

  <!-- Temperature row labels -->
  <text x="130" y="555" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#4393c3" text-anchor="middle">37°C</text>
  <text x="130" y="615" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#d6604d" text-anchor="middle">42°C</text>

  <!-- Treatment A × 37C -->
  <rect x="210" y="530" width="240" height="40" rx="5" fill="#4393c3"/>
  <text x="330" y="550" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Treatment A × 42C -->
  <rect x="210" y="590" width="240" height="40" rx="5" fill="#d6604d"/>
  <text x="330" y="610" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Treatment B × 37C -->
  <rect x="480" y="530" width="240" height="40" rx="5" fill="#4393c3"/>
  <text x="600" y="550" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Treatment B × 42C -->
  <rect x="480" y="590" width="240" height="40" rx="5" fill="#d6604d"/>
  <text x="600" y="610" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Treatment C × 37C -->
  <rect x="750" y="530" width="240" height="40" rx="5" fill="#4393c3"/>
  <text x="870" y="550" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Treatment C × 42C -->
  <rect x="750" y="590" width="240" height="40" rx="5" fill="#d6604d"/>
  <text x="870" y="610" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">n = 3 scaffolds</text>

  <!-- Fixed effects annotation -->
  <text x="1080" y="555" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2660a4" font-weight="bold">3 × 2 = 6</text>
  <text x="1080" y="570" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#888">cells</text>

  <!-- ============================================================ -->
  <!-- RESPONSE VARIABLE -->
  <!-- ============================================================ -->

  <line x1="90" y1="655" x2="1100" y2="655" stroke="#ccc" stroke-width="1"/>

  <rect x="350" y="670" width="500" height="44" rx="6" fill="#333"/>
  <text x="600" y="692" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Response: degradation (% mass loss over 28 days)</text>

  <text x="600" y="735" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">Total observations: 10 technicians × 6 batches × 3 treatments × 2 temperatures × 3 replicates = 1,080</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->

  <rect x="90" y="765" width="1010" height="100" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="790" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5c2e">Legend</text>

  <!-- Random: Lab -->
  <rect x="110" y="805" width="20" height="14" rx="3" fill="#7b2d8e"/>
  <text x="140" y="816" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333">Random — Lab</text>

  <!-- Random: Technician -->
  <rect x="280" y="805" width="20" height="14" rx="3" fill="#2e7d5b"/>
  <text x="310" y="816" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333">Random — Technician (nested in Lab)</text>

  <!-- Random: Batch -->
  <rect x="560" y="805" width="20" height="14" rx="3" fill="#d4820a"/>
  <text x="590" y="816" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333">Random — Batch (crossed with Lab)</text>

  <!-- Fixed: 37C -->
  <rect x="110" y="835" width="20" height="14" rx="3" fill="#4393c3"/>
  <text x="140" y="846" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333">Fixed — 37°C</text>

  <!-- Fixed: 42C -->
  <rect x="280" y="835" width="20" height="14" rx="3" fill="#d6604d"/>
  <text x="310" y="846" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333">Fixed — 42°C</text>

  <!-- Model formula -->
  <text x="560" y="846" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#333" font-style="italic">Full model: degradation ~ treatment * temperature + (1|batch) + (1|lab) + (1|lab:technician)</text>

</svg>
