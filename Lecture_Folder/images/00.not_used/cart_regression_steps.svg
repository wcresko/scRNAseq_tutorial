<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">CART Regression: Step-by-Step</text>

  <!-- Step 1 -->
  <rect x="20" y="50" width="165" height="200" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="102" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Step 1: Root</text>
  <rect x="38" y="90" width="130" height="35" rx="6" fill="#fff" stroke="#4caf50" stroke-width="1"/>
  <text x="103" y="108" text-anchor="middle" font-size="10" fill="#333">All 150 scaffolds</text>
  <text x="103" y="120" text-anchor="middle" font-size="9" fill="#777">ȳ = 4.2 (mean growth)</text>
  <text x="102" y="150" text-anchor="middle" font-size="10" fill="#555">Prediction = mean</text>
  <text x="102" y="164" text-anchor="middle" font-size="10" fill="#555">of all responses</text>
  <text x="102" y="186" text-anchor="middle" font-size="10" fill="#555">Calculate total</text>
  <text x="102" y="200" text-anchor="middle" font-size="10" fill="#555">RSS in this node</text>
  <text x="102" y="225" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">RSS = Σ(yᵢ − ȳ)²</text>

  <line x1="185" y1="150" x2="200" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="205" y="50" width="165" height="200" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="287" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Step 2: Search</text>
  <text x="287" y="100" text-anchor="middle" font-size="10" fill="#555">For every feature</text>
  <text x="287" y="114" text-anchor="middle" font-size="10" fill="#555">and every cutpoint s:</text>
  <text x="287" y="138" text-anchor="middle" font-size="10" fill="#333">Split into:</text>
  <text x="287" y="155" text-anchor="middle" font-size="10" fill="#1976d2">R₁ = {X | Xⱼ &lt; s}</text>
  <text x="287" y="170" text-anchor="middle" font-size="10" fill="#c62828">R₂ = {X | Xⱼ ≥ s}</text>
  <text x="287" y="196" text-anchor="middle" font-size="10" fill="#555">Minimize combined</text>
  <text x="287" y="210" text-anchor="middle" font-size="10" fill="#555">RSS of both regions</text>
  <text x="287" y="232" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">Σ(yᵢ−ȳ_R₁)² + Σ(yᵢ−ȳ_R₂)²</text>

  <line x1="370" y1="150" x2="385" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="390" y="50" width="165" height="200" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="472" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Step 3: Best Split</text>
  <text x="472" y="100" text-anchor="middle" font-size="10" fill="#555">Example best split:</text>
  <rect x="408" y="110" width="128" height="30" rx="6" fill="#fff" stroke="#f57c00" stroke-width="1.2"/>
  <text x="472" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">porosity ≥ 55%</text>
  <text x="472" y="160" text-anchor="middle" font-size="10" fill="#555">Left: ȳ = 3.1</text>
  <text x="472" y="174" text-anchor="middle" font-size="10" fill="#555">Right: ȳ = 5.8</text>
  <text x="472" y="200" text-anchor="middle" font-size="10" fill="#555">RSS drops from</text>
  <text x="472" y="214" text-anchor="middle" font-size="10" fill="#555">85.3 → 42.1</text>
  <text x="472" y="236" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">ΔRSS = 43.2</text>

  <line x1="555" y1="150" x2="570" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="575" y="50" width="155" height="200" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="652" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Step 4: Recurse</text>
  <text x="652" y="100" text-anchor="middle" font-size="10" fill="#555">Repeat steps 2-3</text>
  <text x="652" y="114" text-anchor="middle" font-size="10" fill="#555">in each child node</text>
  <!-- mini tree -->
  <rect x="612" y="128" width="80" height="22" rx="5" fill="#fff" stroke="#c62828" stroke-width="1"/>
  <text x="652" y="143" text-anchor="middle" font-size="9" fill="#333">porosity≥55?</text>
  <line x1="632" y1="150" x2="612" y2="168" stroke="#666" stroke-width="1"/>
  <line x1="672" y1="150" x2="692" y2="168" stroke="#666" stroke-width="1"/>
  <rect x="590" y="168" width="45" height="18" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="0.8"/>
  <text x="612" y="181" text-anchor="middle" font-size="8" fill="#333">fiber?</text>
  <rect x="670" y="168" width="45" height="18" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="0.8"/>
  <text x="692" y="181" text-anchor="middle" font-size="8" fill="#333">xlink?</text>
  <text x="652" y="210" text-anchor="middle" font-size="10" fill="#555">Until stopping</text>
  <text x="652" y="224" text-anchor="middle" font-size="10" fill="#555">criteria met</text>

  <line x1="730" y1="150" x2="745" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="750" y="50" width="140" height="200" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="820" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Step 5: Predict</text>
  <text x="820" y="100" text-anchor="middle" font-size="10" fill="#555">Each leaf predicts</text>
  <text x="820" y="114" text-anchor="middle" font-size="10" fill="#555">the mean of its</text>
  <text x="820" y="128" text-anchor="middle" font-size="10" fill="#555">training samples:</text>
  <rect x="770" y="140" width="100" height="22" rx="5" fill="#27ae60" stroke="#1b5e20" stroke-width="1"/>
  <text x="820" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">ŷ = 6.2</text>
  <rect x="770" y="168" width="100" height="22" rx="5" fill="#f39c12" stroke="#e65100" stroke-width="1"/>
  <text x="820" y="183" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">ŷ = 4.1</text>
  <rect x="770" y="196" width="100" height="22" rx="5" fill="#e74c3c" stroke="#b71c1c" stroke-width="1"/>
  <text x="820" y="211" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">ŷ = 2.3</text>
  <text x="820" y="238" text-anchor="middle" font-size="10" fill="#6a1b9a">Step-function output</text>

  <!-- Bottom: Key difference from classification -->
  <rect x="20" y="280" width="870" height="285" rx="10" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="455" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Key Difference: Regression vs. Classification Trees</text>

  <!-- Left: Classification -->
  <rect x="40" y="325" width="400" height="220" rx="8" fill="#fff" stroke="#1976d2" stroke-width="1"/>
  <text x="240" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Classification Tree</text>
  <text x="240" y="374" text-anchor="middle" font-size="11" fill="#555">Splitting criterion: Gini impurity or entropy</text>
  <text x="240" y="394" text-anchor="middle" font-size="11" fill="#555">Leaf prediction: majority class vote</text>
  <text x="240" y="414" text-anchor="middle" font-size="11" fill="#555">Output: discrete class labels</text>
  <text x="240" y="438" text-anchor="middle" font-size="11" font-style="italic" fill="#1976d2">G = 1 − Σpₖ²</text>
  <text x="240" y="460" text-anchor="middle" font-size="11" fill="#555">e.g., "biocompatible" or "incompatible"</text>
  <!-- mini visual -->
  <rect x="150" y="475" width="80" height="24" rx="4" fill="#27ae60" stroke="#1b5e20" stroke-width="1"/>
  <text x="190" y="491" text-anchor="middle" font-size="9" fill="#fff">Class A (72%)</text>
  <rect x="240" y="475" width="80" height="24" rx="4" fill="#e74c3c" stroke="#b71c1c" stroke-width="1"/>
  <text x="280" y="491" text-anchor="middle" font-size="9" fill="#fff">Class B (28%)</text>
  <text x="240" y="525" text-anchor="middle" font-size="10" fill="#888">→ Predict: Class A</text>

  <!-- Right: Regression -->
  <rect x="470" y="325" width="400" height="220" rx="8" fill="#fff" stroke="#f57c00" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Regression Tree</text>
  <text x="670" y="374" text-anchor="middle" font-size="11" fill="#555">Splitting criterion: RSS (residual sum of squares)</text>
  <text x="670" y="394" text-anchor="middle" font-size="11" fill="#555">Leaf prediction: mean of observations</text>
  <text x="670" y="414" text-anchor="middle" font-size="11" fill="#555">Output: continuous numeric value</text>
  <text x="670" y="438" text-anchor="middle" font-size="11" font-style="italic" fill="#e65100">RSS = Σ(yᵢ − ȳ)²</text>
  <text x="670" y="460" text-anchor="middle" font-size="11" fill="#555">e.g., cell growth index = 5.8</text>
  <!-- mini visual -->
  <rect x="570" y="475" width="200" height="24" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="670" y="491" text-anchor="middle" font-size="9" fill="#333">values: 5.2, 6.1, 5.8, 6.3, 5.5</text>
  <text x="670" y="525" text-anchor="middle" font-size="10" fill="#888">→ Predict: ȳ = 5.78</text>
</svg>
