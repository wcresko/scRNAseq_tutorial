<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .method-title { font-size: 14px; font-weight: bold; }
      .step-num { font-size: 12px; font-weight: bold; fill: #fff; }
      .step-text { font-size: 10px; fill: #333; }
      .label { font-size: 11px; fill: #333; }
      .small { font-size: 10px; fill: #555; }
      .param { font-size: 10px; fill: #e67e22; font-weight: bold; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M 0 0 L 7 2.5 L 0 5 Z" fill="#95a5a6"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" class="title" text-anchor="middle">t-SNE vs UMAP: Algorithm Comparison</text>
  
  <!-- ===== t-SNE Column ===== -->
  <rect x="20" y="42" width="420" height="370" rx="10" fill="#fef9f0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="230" y="65" class="method-title" fill="#e67e22" text-anchor="middle">t-SNE</text>
  <text x="230" y="80" class="small" text-anchor="middle" fill="#e67e22">t-Distributed Stochastic Neighbor Embedding</text>
  
  <!-- Step 1 -->
  <circle cx="50" cy="110" r="12" fill="#e67e22"/>
  <text x="50" y="114" class="step-num" text-anchor="middle">1</text>
  <text x="70" y="107" class="step-text" font-weight="bold">Compute pairwise similarities (high-D)</text>
  <text x="70" y="121" class="step-text">Using Gaussian kernel; controlled by</text>
  <text x="70" y="133" class="param">perplexity</text>
  <text x="120" y="133" class="step-text">(effective # neighbors, typ. 5–50)</text>
  
  <!-- Step 2 -->
  <circle cx="50" cy="165" r="12" fill="#e67e22"/>
  <text x="50" y="169" class="step-num" text-anchor="middle">2</text>
  <text x="70" y="162" class="step-text" font-weight="bold">Initialize random 2D positions</text>
  <text x="70" y="176" class="step-text">Random embedding as starting point</text>
  
  <!-- Step 3 -->
  <circle cx="50" cy="210" r="12" fill="#e67e22"/>
  <text x="50" y="214" class="step-num" text-anchor="middle">3</text>
  <text x="70" y="207" class="step-text" font-weight="bold">Compute similarities in 2D</text>
  <text x="70" y="221" class="step-text">Using heavy-tailed</text>
  <text x="155" y="221" class="step-text" font-weight="bold" fill="#e67e22">Student's t-distribution</text>
  <text x="70" y="233" class="step-text">(prevents crowding problem)</text>
  
  <!-- Step 4 -->
  <circle cx="50" cy="265" r="12" fill="#e67e22"/>
  <text x="50" y="269" class="step-num" text-anchor="middle">4</text>
  <text x="70" y="260" class="step-text" font-weight="bold">Minimize KL divergence</text>
  <text x="70" y="274" class="step-text">Gradient descent to match high-D</text>
  <text x="70" y="286" class="step-text">and low-D similarity distributions</text>
  
  <!-- t-SNE properties box -->
  <rect x="40" y="310" width="380" height="85" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="330" class="label" text-anchor="middle" font-weight="bold" fill="#e67e22">Characteristics</text>
  <text x="230" y="348" class="small" text-anchor="middle">• Focuses on local structure preservation</text>
  <text x="230" y="363" class="small" text-anchor="middle">• O(n²) complexity — slow for large datasets</text>
  <text x="230" y="378" class="small" text-anchor="middle">• KL divergence penalizes distant pairs less → global distortion</text>
  <text x="230" y="393" class="small" text-anchor="middle">• Different perplexity → very different plots</text>
  
  <!-- ===== UMAP Column ===== -->
  <rect x="460" y="42" width="420" height="370" rx="10" fill="#f0f4f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="65" class="method-title" fill="#2980b9" text-anchor="middle">UMAP</text>
  <text x="670" y="80" class="small" text-anchor="middle" fill="#2980b9">Uniform Manifold Approximation and Projection</text>
  
  <!-- Step 1 -->
  <circle cx="490" cy="110" r="12" fill="#2980b9"/>
  <text x="490" y="114" class="step-num" text-anchor="middle">1</text>
  <text x="510" y="107" class="step-text" font-weight="bold">Build k-nearest-neighbor graph</text>
  <text x="510" y="121" class="step-text">Weighted edges; controlled by</text>
  <text x="510" y="133" class="param" fill="#2980b9">n_neighbors</text>
  <text x="583" y="133" class="step-text">(typ. 5–50)</text>
  
  <!-- Step 2 -->
  <circle cx="490" cy="165" r="12" fill="#2980b9"/>
  <text x="490" y="169" class="step-num" text-anchor="middle">2</text>
  <text x="510" y="162" class="step-text" font-weight="bold">Construct fuzzy simplicial complex</text>
  <text x="510" y="176" class="step-text">Topological representation of high-D data</text>
  
  <!-- Step 3 -->
  <circle cx="490" cy="210" r="12" fill="#2980b9"/>
  <text x="490" y="214" class="step-num" text-anchor="middle">3</text>
  <text x="510" y="207" class="step-text" font-weight="bold">Initialize low-D layout</text>
  <text x="510" y="221" class="step-text">Spectral embedding (not random!)</text>
  <text x="510" y="233" class="step-text">→ more consistent starting point</text>
  
  <!-- Step 4 -->
  <circle cx="490" cy="265" r="12" fill="#2980b9"/>
  <text x="490" y="269" class="step-num" text-anchor="middle">4</text>
  <text x="510" y="260" class="step-text" font-weight="bold">Optimize with cross-entropy</text>
  <text x="510" y="274" class="step-text">SGD to match topological structure;</text>
  <text x="510" y="286" class="param" fill="#2980b9">min_dist</text>
  <text x="560" y="286" class="step-text">controls cluster tightness (0.0–1.0)</text>
  
  <!-- UMAP properties box -->
  <rect x="480" y="310" width="380" height="85" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="330" class="label" text-anchor="middle" font-weight="bold" fill="#2980b9">Characteristics</text>
  <text x="670" y="348" class="small" text-anchor="middle">• Preserves both local AND some global structure</text>
  <text x="670" y="363" class="small" text-anchor="middle">• Much faster — scales to millions of points</text>
  <text x="670" y="378" class="small" text-anchor="middle">• Cross-entropy retains more global topology</text>
  <text x="670" y="393" class="small" text-anchor="middle">• Spectral init → more reproducible across runs</text>
</svg>