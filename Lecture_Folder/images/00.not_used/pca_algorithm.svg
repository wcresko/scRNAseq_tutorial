<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .step-title { font-size: 13px; font-weight: bold; fill: #fff; }
      .label { font-size: 11px; fill: #333; }
      .small { font-size: 10px; fill: #555; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" class="title" text-anchor="middle">PCA Algorithm: Step by Step</text>
  
  <!-- Step 1: Raw Data -->
  <rect x="20" y="50" width="160" height="45" rx="8" fill="#3498db"/>
  <text x="100" y="77" class="step-title" text-anchor="middle">1. Center &amp; Scale</text>
  <!-- Data matrix -->
  <rect x="35" y="110" width="130" height="90" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="100" y="130" class="small" text-anchor="middle">Gene₁  Gene₂  ...  Geneₙ</text>
  <line x1="40" y1="136" x2="160" y2="136" stroke="#bbb" stroke-width="0.5"/>
  <text x="50" y="152" class="small">Cell₁</text>
  <text x="100" y="152" class="small" text-anchor="middle">x̄ = 0, σ = 1</text>
  <text x="50" y="168" class="small">Cell₂</text>
  <text x="100" y="168" class="small" text-anchor="middle">for each gene</text>
  <text x="50" y="184" class="small">⋮</text>
  <text x="100" y="195" class="small" text-anchor="middle" fill="#3498db">n × p matrix</text>
  
  <!-- Arrow 1→2 -->
  <line x1="180" y1="150" x2="210" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Covariance -->
  <rect x="215" y="50" width="160" height="45" rx="8" fill="#2ecc71"/>
  <text x="295" y="77" class="step-title" text-anchor="middle">2. Covariance Matrix</text>
  <!-- Covariance matrix -->
  <rect x="230" y="110" width="130" height="90" rx="4" fill="#eafaf1" stroke="#2ecc71" stroke-width="1"/>
  <text x="295" y="130" class="small" text-anchor="middle">Σ = XᵀX / (n-1)</text>
  <line x1="235" y1="136" x2="355" y2="136" stroke="#bbb" stroke-width="0.5"/>
  <text x="295" y="155" class="small" text-anchor="middle">Measures pairwise</text>
  <text x="295" y="170" class="small" text-anchor="middle">relationships between</text>
  <text x="295" y="185" class="small" text-anchor="middle">all genes</text>
  <text x="295" y="195" class="small" text-anchor="middle" fill="#2ecc71">p × p matrix</text>
  
  <!-- Arrow 2→3 -->
  <line x1="375" y1="150" x2="405" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Eigen decomposition -->
  <rect x="410" y="50" width="160" height="45" rx="8" fill="#e67e22"/>
  <text x="490" y="77" class="step-title" text-anchor="middle">3. Eigendecomposition</text>
  <!-- Eigenvectors -->
  <rect x="425" y="110" width="130" height="90" rx="4" fill="#fef5e7" stroke="#e67e22" stroke-width="1"/>
  <text x="490" y="130" class="small" text-anchor="middle">Σv = λv</text>
  <line x1="430" y1="136" x2="550" y2="136" stroke="#bbb" stroke-width="0.5"/>
  <text x="490" y="155" class="small" text-anchor="middle">Eigenvectors (v)</text>
  <text x="490" y="168" class="small" text-anchor="middle">= PC directions</text>
  <text x="490" y="183" class="small" text-anchor="middle">Eigenvalues (λ)</text>
  <text x="490" y="196" class="small" text-anchor="middle" fill="#e67e22">= variance explained</text>
  
  <!-- Arrow 3→4 -->
  <line x1="570" y1="150" x2="600" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Project -->
  <rect x="605" y="50" width="160" height="45" rx="8" fill="#9b59b6"/>
  <text x="685" y="77" class="step-title" text-anchor="middle">4. Project Data</text>
  <!-- Projected data -->
  <rect x="620" y="110" width="130" height="90" rx="4" fill="#f5eef8" stroke="#9b59b6" stroke-width="1"/>
  <text x="685" y="130" class="small" text-anchor="middle">Z = X × V</text>
  <line x1="625" y1="136" x2="745" y2="136" stroke="#bbb" stroke-width="0.5"/>
  <text x="685" y="155" class="small" text-anchor="middle">PC1 explains most</text>
  <text x="685" y="168" class="small" text-anchor="middle">variance, PC2 next, ...</text>
  <text x="685" y="183" class="small" text-anchor="middle">Keep top k PCs</text>
  <text x="685" y="196" class="small" text-anchor="middle" fill="#9b59b6">n × k matrix</text>
  
  <!-- Bottom: scree plot concept -->
  <rect x="100" y="230" width="700" height="135" rx="8" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="255" class="label" text-anchor="middle" font-weight="bold">Choosing the number of PCs: Scree Plot</text>
  
  <!-- Mini scree plot -->
  <line x1="180" y1="350" x2="510" y2="350" stroke="#999" stroke-width="1"/>
  <line x1="180" y1="270" x2="180" y2="350" stroke="#999" stroke-width="1"/>
  <text x="345" y="365" class="small" text-anchor="middle">Principal Component</text>
  <text x="165" y="310" class="small" text-anchor="middle" transform="rotate(-90,165,310)">% Variance</text>
  
  <!-- Bars -->
  <rect x="200" y="278" width="30" height="72" rx="2" fill="#3498db" opacity="0.8"/>
  <rect x="240" y="300" width="30" height="50" rx="2" fill="#3498db" opacity="0.7"/>
  <rect x="280" y="318" width="30" height="32" rx="2" fill="#3498db" opacity="0.6"/>
  <rect x="320" y="330" width="30" height="20" rx="2" fill="#bdc3c7" opacity="0.6"/>
  <rect x="360" y="337" width="30" height="13" rx="2" fill="#bdc3c7" opacity="0.5"/>
  <rect x="400" y="341" width="30" height="9" rx="2" fill="#bdc3c7" opacity="0.4"/>
  <rect x="440" y="343" width="30" height="7" rx="2" fill="#bdc3c7" opacity="0.3"/>
  <rect x="480" y="345" width="30" height="5" rx="2" fill="#bdc3c7" opacity="0.3"/>
  
  <!-- Labels under bars -->
  <text x="215" y="360" class="small" text-anchor="middle">1</text>
  <text x="255" y="360" class="small" text-anchor="middle">2</text>
  <text x="295" y="360" class="small" text-anchor="middle">3</text>
  <text x="335" y="360" class="small" text-anchor="middle">4</text>
  <text x="375" y="360" class="small" text-anchor="middle">5</text>
  <text x="415" y="360" class="small" text-anchor="middle">6</text>
  <text x="455" y="360" class="small" text-anchor="middle">7</text>
  <text x="495" y="360" class="small" text-anchor="middle">8</text>
  
  <!-- "Elbow" annotation -->
  <path d="M 310 270 Q 310 310, 305 318" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <text x="310" y="268" class="small" fill="#e74c3c" text-anchor="middle">← "elbow"</text>
  
  <!-- Keep/discard annotation -->
  <line x1="315" y1="275" x2="315" y2="355" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="255" y="290" class="small" fill="#27ae60" text-anchor="middle" font-weight="bold">Keep</text>
  <text x="420" y="290" class="small" fill="#e74c3c" text-anchor="middle" font-weight="bold">Discard</text>
  
  <!-- Right side annotation -->
  <rect x="550" y="265" width="230" height="85" rx="6" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="665" y="285" class="label" text-anchor="middle" font-weight="bold" fill="#3498db">Loadings</text>
  <text x="665" y="303" class="small" text-anchor="middle">Each PC is a weighted</text>
  <text x="665" y="318" class="small" text-anchor="middle">combination of original genes.</text>
  <text x="665" y="336" class="small" text-anchor="middle">High loading = gene drives</text>
  <text x="665" y="348" class="small" text-anchor="middle" font-style="italic">that component's variation</text>
</svg>