<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .box-title { font-size: 12px; font-weight: bold; fill: #fff; }
      .dim { font-size: 11px; fill: #e74c3c; font-weight: bold; }
      .label { font-size: 11px; fill: #333; }
      .small { font-size: 10px; fill: #555; }
    </style>
    <marker id="pipeArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" class="title" text-anchor="middle">Standard Pipeline: PCA → UMAP for scRNA-seq</text>
  
  <!-- Step 1: Raw Data -->
  <rect x="20" y="55" width="140" height="80" rx="10" fill="#e74c3c"/>
  <text x="90" y="80" class="box-title" text-anchor="middle">Raw Expression</text>
  <text x="90" y="97" class="box-title" text-anchor="middle">Matrix</text>
  <text x="90" y="120" font-size="10" fill="#fdd" text-anchor="middle">50,000 cells × 20,000 genes</text>
  
  <!-- Arrow -->
  <line x1="165" y1="95" x2="200" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#pipeArrow)"/>
  <text x="183" y="85" class="small" text-anchor="middle">filter</text>
  
  <!-- Step 2: Filtered -->
  <rect x="205" y="55" width="140" height="80" rx="10" fill="#e67e22"/>
  <text x="275" y="80" class="box-title" text-anchor="middle">Normalize &amp;</text>
  <text x="275" y="97" class="box-title" text-anchor="middle">Select HVGs</text>
  <text x="275" y="120" font-size="10" fill="#fdebd0" text-anchor="middle">50,000 × 2,000–5,000</text>
  
  <!-- Arrow -->
  <line x1="350" y1="95" x2="385" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#pipeArrow)"/>
  <text x="368" y="85" class="small" text-anchor="middle">PCA</text>
  
  <!-- Step 3: PCA -->
  <rect x="390" y="55" width="140" height="80" rx="10" fill="#3498db"/>
  <text x="460" y="80" class="box-title" text-anchor="middle">PCA</text>
  <text x="460" y="97" class="box-title" text-anchor="middle">Dimensionality Reduction</text>
  <text x="460" y="120" font-size="10" fill="#d6eaf8" text-anchor="middle">50,000 × 30–50 PCs</text>
  
  <!-- Arrow -->
  <line x1="535" y1="95" x2="570" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#pipeArrow)"/>
  <text x="553" y="85" class="small" text-anchor="middle">UMAP</text>
  
  <!-- Step 4: UMAP -->
  <rect x="575" y="55" width="140" height="80" rx="10" fill="#27ae60"/>
  <text x="645" y="80" class="box-title" text-anchor="middle">UMAP</text>
  <text x="645" y="97" class="box-title" text-anchor="middle">Visualization</text>
  <text x="645" y="120" font-size="10" fill="#d5f5e3" text-anchor="middle">50,000 × 2 dimensions</text>
  
  <!-- Arrow -->
  <line x1="720" y1="95" x2="755" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#pipeArrow)"/>
  
  <!-- Step 5: Plot -->
  <rect x="760" y="55" width="120" height="80" rx="10" fill="#9b59b6"/>
  <text x="820" y="80" class="box-title" text-anchor="middle">Scatter Plot</text>
  <text x="820" y="97" class="box-title" text-anchor="middle">+ Clustering</text>
  <text x="820" y="120" font-size="10" fill="#ebdef0" text-anchor="middle">Identify cell types</text>
  
  <!-- Dimension reduction annotation -->
  <text x="90" y="155" class="dim" text-anchor="middle">20,000 features</text>
  <path d="M 90 160 L 90 175 L 460 175 L 460 160" stroke="#e74c3c" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <text x="275" y="190" class="dim" text-anchor="middle">→ 30–50 PCs</text>
  <path d="M 460 195 L 460 210 L 645 210 L 645 195" stroke="#e74c3c" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <text x="553" y="225" class="dim" text-anchor="middle">→ 2 dimensions</text>
  
  <!-- Why this pipeline? -->
  <rect x="50" y="245" width="800" height="65" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="450" y="268" class="label" text-anchor="middle" font-weight="bold">Why PCA before UMAP?</text>
  <text x="200" y="288" class="small" text-anchor="middle">🔇 Reduces noise from</text>
  <text x="200" y="300" class="small" text-anchor="middle">uninformative genes</text>
  <text x="450" y="288" class="small" text-anchor="middle">⚡ Speeds up UMAP</text>
  <text x="450" y="300" class="small" text-anchor="middle">(fewer pairwise distances)</text>
  <text x="700" y="288" class="small" text-anchor="middle">📐 Suppresses noise without</text>
  <text x="700" y="300" class="small" text-anchor="middle">distorting major patterns</text>
</svg>