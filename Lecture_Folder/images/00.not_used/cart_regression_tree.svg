<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="900" height="380" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Scaffold Cell Growth: Fitted Regression Tree</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#666">150 scaffolds · 3 features: porosity, fiber diameter, crosslink density · cp = 0.02</text>

  <!-- Root -->
  <rect x="330" y="58" width="240" height="44" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="450" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">crosslink_density ≥ 0.55?</text>
  <text x="450" y="93" text-anchor="middle" font-size="10" fill="#1976d2">RSS reduction: 98.3 → 42.1  (best split)</text>

  <!-- Branch lines level 1 -->
  <line x1="390" y1="102" x2="240" y2="148" stroke="#666" stroke-width="1.5"/>
  <line x1="510" y1="102" x2="660" y2="148" stroke="#666" stroke-width="1.5"/>
  <text x="286" y="125" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Yes (n=68)</text>
  <text x="614" y="125" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">No (n=82)</text>

  <!-- Level 2 left -->
  <rect x="138" y="150" width="204" height="42" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="240" y="168" text-anchor="middle" font-size="12" fill="#2e7d32">porosity ≥ 57%?</text>
  <text x="240" y="185" text-anchor="middle" font-size="10" fill="#4caf50">n = 68 · ȳ = 5.71</text>

  <!-- Level 2 right -->
  <rect x="558" y="150" width="204" height="42" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="660" y="168" text-anchor="middle" font-size="12" fill="#e65100">fiber_diameter ≥ 520?</text>
  <text x="660" y="185" text-anchor="middle" font-size="10" fill="#f57c00">n = 82 · ȳ = 2.91</text>

  <!-- Branches level 3 left -->
  <line x1="195" y1="192" x2="135" y2="244" stroke="#666" stroke-width="1.2"/>
  <line x1="285" y1="192" x2="355" y2="244" stroke="#666" stroke-width="1.2"/>
  <text x="148" y="218" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>
  <text x="342" y="218" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">No</text>

  <!-- Branches level 3 right -->
  <line x1="615" y1="192" x2="545" y2="244" stroke="#666" stroke-width="1.2"/>
  <line x1="705" y1="192" x2="780" y2="244" stroke="#666" stroke-width="1.2"/>
  <text x="558" y="218" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>
  <text x="767" y="218" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">No</text>

  <!-- Leaf nodes -->
  <!-- Leaf 1: high crosslink + high porosity -->
  <rect x="55" y="247" width="155" height="64" rx="8" fill="#1a7a4a" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="133" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ŷ = 6.4</text>
  <text x="133" y="282" text-anchor="middle" font-size="10" fill="#e8f5e9">n = 38 scaffolds</text>
  <text x="133" y="298" text-anchor="middle" font-size="9" fill="#c8e6c9">High crosslink</text>
  <text x="133" y="311" text-anchor="middle" font-size="9" fill="#c8e6c9">+ high porosity</text>

  <!-- Leaf 2: high crosslink + low porosity -->
  <rect x="278" y="247" width="155" height="64" rx="8" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="356" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ŷ = 5.1</text>
  <text x="356" y="282" text-anchor="middle" font-size="10" fill="#e8f5e9">n = 30 scaffolds</text>
  <text x="356" y="298" text-anchor="middle" font-size="9" fill="#c8e6c9">High crosslink</text>
  <text x="356" y="311" text-anchor="middle" font-size="9" fill="#c8e6c9">+ low porosity</text>

  <!-- Leaf 3: low crosslink + thick fiber -->
  <rect x="468" y="247" width="155" height="64" rx="8" fill="#f57c00" stroke="#e65100" stroke-width="1.5"/>
  <text x="546" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ŷ = 3.4</text>
  <text x="546" y="282" text-anchor="middle" font-size="10" fill="#fff3e0">n = 44 scaffolds</text>
  <text x="546" y="298" text-anchor="middle" font-size="9" fill="#ffe0b2">Low crosslink</text>
  <text x="546" y="311" text-anchor="middle" font-size="9" fill="#ffe0b2">+ thick fiber</text>

  <!-- Leaf 4: low crosslink + thin fiber -->
  <rect x="698" y="247" width="155" height="64" rx="8" fill="#e74c3c" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="776" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ŷ = 2.2</text>
  <text x="776" y="282" text-anchor="middle" font-size="10" fill="#ffcdd2">n = 38 scaffolds</text>
  <text x="776" y="298" text-anchor="middle" font-size="9" fill="#ffcdd2">Low crosslink</text>
  <text x="776" y="311" text-anchor="middle" font-size="9" fill="#ffcdd2">+ thin fiber</text>

  <!-- Step-function annotation -->
  <rect x="55" y="326" width="798" height="46" rx="5" fill="#fff8e1" stroke="#f39c12" stroke-width="1"/>
  <text x="454" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#a04000">⚠ Regression trees produce step-function (piecewise constant) predictions</text>
  <text x="454" y="362" text-anchor="middle" font-size="10" fill="#555">Each leaf region gets the same prediction = mean(y) in that region · R² ≈ 0.71 (training set)</text>
</svg>
