<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <style>
      .matrix-box { stroke: #2c3e50; stroke-width: 2; rx: 6; }
      .label-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; fill: #2c3e50; text-anchor: middle; }
      .dim-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; text-anchor: middle; }
      .math-text { font-family: 'Times New Roman', serif; font-size: 16px; fill: #2c3e50; text-anchor: middle; font-style: italic; }
      .equals { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 28px; fill: #2c3e50; text-anchor: middle; font-weight: bold; }
      .times { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; fill: #7f8c8d; text-anchor: middle; }
      .desc-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="450" y="25" class="label-text" font-size="18" font-weight="bold">Singular Value Decomposition (SVD): X = U &#x2022; &#x3A3; &#x2022; V&#x1D40;</text>
  
  <!-- X matrix (n x p) -->
  <rect x="30" y="60" width="120" height="180" fill="#e8f4fd" class="matrix-box"/>
  <text x="90" y="155" class="math-text" font-size="22" font-weight="bold">X</text>
  <text x="90" y="260" class="label-text">Data</text>
  <text x="90" y="278" class="dim-text">(n &#x00D7; p)</text>
  <!-- dimension labels -->
  <text x="90" y="55" class="dim-text">p variables</text>
  <text x="18" y="155" class="dim-text" transform="rotate(-90,18,155)">n samples</text>
  
  <!-- = -->
  <text x="175" y="160" class="equals">=</text>
  
  <!-- U matrix (n x n) -->
  <rect x="205" y="60" width="120" height="180" fill="#e8f8e8" class="matrix-box"/>
  <text x="265" y="155" class="math-text" font-size="22" font-weight="bold">U</text>
  <text x="265" y="260" class="label-text">Left singular</text>
  <text x="265" y="275" class="label-text">vectors</text>
  <text x="265" y="293" class="dim-text">(n &#x00D7; n)</text>
  <text x="265" y="308" class="desc-text">Sample scores</text>
  
  <!-- × -->
  <text x="348" y="160" class="times">&#x00D7;</text>
  
  <!-- Sigma matrix (n x p) - diagonal -->
  <rect x="375" y="100" width="130" height="100" fill="#fff8e1" class="matrix-box"/>
  <!-- Diagonal elements -->
  <line x1="385" y1="110" x2="420" y2="145" stroke="#e67e22" stroke-width="3"/>
  <line x1="415" y1="110" x2="450" y2="145" stroke="#e67e22" stroke-width="2.5" opacity="0.7"/>
  <line x1="445" y1="115" x2="475" y2="145" stroke="#e67e22" stroke-width="2" opacity="0.5"/>
  <line x1="470" y1="120" x2="495" y2="145" stroke="#e67e22" stroke-width="1.5" opacity="0.3"/>
  <text x="440" y="170" class="math-text" font-size="22" font-weight="bold">&#x3A3;</text>
  <text x="440" y="260" class="label-text">Singular</text>
  <text x="440" y="275" class="label-text">values</text>
  <text x="440" y="293" class="dim-text">(n &#x00D7; p)</text>
  <text x="440" y="308" class="desc-text">Variance per PC</text>
  
  <!-- × -->
  <text x="528" y="160" class="times">&#x00D7;</text>
  
  <!-- V^T matrix (p x p) -->
  <rect x="555" y="85" width="140" height="140" fill="#fde8e8" class="matrix-box"/>
  <text x="625" y="160" class="math-text" font-size="22" font-weight="bold">V&#x1D40;</text>
  <text x="625" y="260" class="label-text">Right singular</text>
  <text x="625" y="275" class="label-text">vectors</text>
  <text x="625" y="293" class="dim-text">(p &#x00D7; p)</text>
  <text x="625" y="308" class="desc-text">Variable loadings</text>
  
  <!-- Arrows showing key relationships -->
  <!-- Arrow from Sigma to annotation -->
  <rect x="720" y="65" width="165" height="85" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="802" y="85" class="desc-text" font-size="11" fill="#2c3e50" font-weight="bold">Key relationships:</text>
  <text x="802" y="102" class="desc-text" font-size="10">&#x3C3;&#x2071;&#x00B2; / (n-1) = eigenvalue &#x3BB;&#x2071;</text>
  <text x="802" y="117" class="desc-text" font-size="10">&#x3BB;&#x2071; / &#x3A3;&#x3BB; = variance explained</text>
  <text x="802" y="132" class="desc-text" font-size="10">PC scores = U &#x2022; &#x3A3;</text>
  <text x="802" y="147" class="desc-text" font-size="10">PC loadings = columns of V</text>
</svg>
