<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-size: 13px; font-weight: bold; }
      .label { font-size: 11px; fill: #333; }
      .small { font-size: 10px; fill: #555; }
      .warn { font-size: 11px; fill: #e74c3c; font-weight: bold; }
      .ok { font-size: 11px; fill: #27ae60; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" class="title" text-anchor="middle">Interpreting Plots: What Do Distances Mean?</text>
  
  <!-- PCA Panel -->
  <rect x="20" y="45" width="270" height="320" rx="10" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="155" y="70" class="subtitle" fill="#3498db" text-anchor="middle">PCA</text>
  
  <!-- PCA scatter with meaningful distances -->
  <text x="155" y="88" class="small" text-anchor="middle">PC1 (45% variance) →</text>
  <text x="38" y="195" class="small" transform="rotate(-90,38,195)">PC2 (20%)</text>
  <line x1="55" y1="100" x2="265" y2="100" stroke="#ccc" stroke-width="0.5"/>
  <line x1="55" y1="280" x2="265" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="55" y1="100" x2="55" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="265" y1="100" x2="265" y2="280" stroke="#ccc" stroke-width="0.5"/>
  
  <!-- Cluster A (left) -->
  <circle cx="90" cy="170" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="100" cy="180" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="85" cy="185" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="95" cy="195" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="105" cy="175" r="4" fill="#e74c3c" opacity="0.7"/>
  <text x="95" y="210" class="small" text-anchor="middle" fill="#e74c3c" font-weight="bold">A</text>
  
  <!-- Cluster B (middle) -->
  <circle cx="160" cy="165" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="170" cy="175" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="155" cy="180" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="165" cy="190" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="175" cy="170" r="4" fill="#27ae60" opacity="0.7"/>
  <text x="165" y="205" class="small" text-anchor="middle" fill="#27ae60" font-weight="bold">B</text>
  
  <!-- Cluster C (right) -->
  <circle cx="230" cy="140" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="240" cy="150" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="225" cy="155" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="235" cy="145" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="245" cy="155" r="4" fill="#3498db" opacity="0.7"/>
  <text x="235" y="170" class="small" text-anchor="middle" fill="#3498db" font-weight="bold">C</text>
  
  <!-- Distance arrows (meaningful) -->
  <line x1="105" y1="175" x2="155" y2="172" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="175" y1="168" x2="225" y2="148" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  
  <text x="155" y="300" class="ok" text-anchor="middle">✓ Distances are meaningful</text>
  <text x="155" y="315" class="small" text-anchor="middle">A→B closer than A→C</text>
  <text x="155" y="330" class="small" text-anchor="middle">along PC1 = real difference</text>
  <text x="155" y="348" class="ok" text-anchor="middle">✓ Loadings explain why</text>
  
  <!-- t-SNE Panel -->
  <rect x="315" y="45" width="270" height="320" rx="10" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="450" y="70" class="subtitle" fill="#e67e22" text-anchor="middle">t-SNE</text>
  
  <text x="450" y="88" class="small" text-anchor="middle">t-SNE 1 →</text>
  <text x="333" y="195" class="small" transform="rotate(-90,333,195)">t-SNE 2</text>
  <line x1="350" y1="100" x2="560" y2="100" stroke="#ccc" stroke-width="0.5"/>
  <line x1="350" y1="280" x2="560" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="350" y1="100" x2="350" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="560" y1="100" x2="560" y2="280" stroke="#ccc" stroke-width="0.5"/>
  
  <!-- Cluster A (tight, small) -->
  <circle cx="390" cy="150" r="3.5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="395" cy="155" r="3.5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="388" cy="158" r="3.5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="393" cy="162" r="3.5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="398" cy="148" r="3.5" fill="#e74c3c" opacity="0.7"/>
  <text x="392" y="178" class="small" text-anchor="middle" fill="#e74c3c" font-weight="bold">A</text>
  
  <!-- Cluster B (far away, bigger) -->
  <circle cx="520" cy="230" r="5" fill="#27ae60" opacity="0.7"/>
  <circle cx="530" cy="240" r="5" fill="#27ae60" opacity="0.7"/>
  <circle cx="515" cy="245" r="5" fill="#27ae60" opacity="0.7"/>
  <circle cx="525" cy="250" r="5" fill="#27ae60" opacity="0.7"/>
  <circle cx="535" cy="235" r="5" fill="#27ae60" opacity="0.7"/>
  <text x="525" y="268" class="small" text-anchor="middle" fill="#27ae60" font-weight="bold">B</text>
  
  <!-- Cluster C (middle) -->
  <circle cx="430" cy="120" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="440" cy="128" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="425" cy="130" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="435" cy="135" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="445" cy="122" r="4" fill="#3498db" opacity="0.7"/>
  <text x="435" y="150" class="small" text-anchor="middle" fill="#3498db" font-weight="bold">C</text>
  
  <!-- Warning annotations -->
  <text x="450" y="295" class="warn" text-anchor="middle">✗ Distances NOT meaningful</text>
  <text x="450" y="310" class="small" text-anchor="middle">Cluster sizes are artifacts</text>
  <text x="450" y="325" class="small" text-anchor="middle">Gaps don't mean real separation</text>
  <text x="450" y="345" class="warn" text-anchor="middle">✗ Very perplexity-dependent</text>
  
  <!-- UMAP Panel -->
  <rect x="610" y="45" width="270" height="320" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="745" y="70" class="subtitle" fill="#27ae60" text-anchor="middle">UMAP</text>
  
  <text x="745" y="88" class="small" text-anchor="middle">UMAP 1 →</text>
  <text x="628" y="195" class="small" transform="rotate(-90,628,195)">UMAP 2</text>
  <line x1="645" y1="100" x2="855" y2="100" stroke="#ccc" stroke-width="0.5"/>
  <line x1="645" y1="280" x2="855" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="645" y1="100" x2="645" y2="280" stroke="#ccc" stroke-width="0.5"/>
  <line x1="855" y1="100" x2="855" y2="280" stroke="#ccc" stroke-width="0.5"/>
  
  <!-- Cluster A -->
  <circle cx="690" cy="165" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="698" cy="172" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="685" cy="175" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="693" cy="180" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="700" cy="160" r="4" fill="#e74c3c" opacity="0.7"/>
  <text x="693" y="197" class="small" text-anchor="middle" fill="#e74c3c" font-weight="bold">A</text>
  
  <!-- Cluster B (nearby = potentially meaningful) -->
  <circle cx="740" cy="190" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="748" cy="198" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="735" cy="200" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="743" cy="205" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="750" cy="192" r="4" fill="#27ae60" opacity="0.7"/>
  <text x="743" y="222" class="small" text-anchor="middle" fill="#27ae60" font-weight="bold">B</text>
  
  <!-- Cluster C (farther) -->
  <circle cx="810" cy="130" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="820" cy="138" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="805" cy="140" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="815" cy="145" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="825" cy="132" r="4" fill="#3498db" opacity="0.7"/>
  <text x="815" y="160" class="small" text-anchor="middle" fill="#3498db" font-weight="bold">C</text>
  
  <!-- UMAP annotations -->
  <text x="745" y="250" class="small" text-anchor="middle" fill="#e67e22">~ Relative positions</text>
  <text x="745" y="265" class="small" text-anchor="middle" fill="#e67e22">potentially meaningful</text>
  <text x="745" y="300" class="ok" text-anchor="middle">~ Better global structure</text>
  <text x="745" y="315" class="small" text-anchor="middle">than t-SNE, but still</text>
  <text x="745" y="330" class="warn" text-anchor="middle">✗ not directly interpretable</text>
  <text x="745" y="348" class="small" text-anchor="middle">like PCA distances</text>
</svg>