<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="380" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Biomaterial Screening: Fitted Classification Tree</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#666">200 scaffolds · 4 features · Gini impurity splitting · cp = 0.02</text>

  <!-- Root node -->
  <rect x="330" y="60" width="240" height="44" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="450" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">coating = RGD?</text>
  <text x="450" y="96" text-anchor="middle" font-size="10" fill="#1976d2">Gini = 0.499 → 0.310  (ΔGini = 0.189)</text>

  <!-- Level 1 branches -->
  <line x1="385" y1="104" x2="255" y2="152" stroke="#666" stroke-width="1.5"/>
  <line x1="515" y1="104" x2="645" y2="152" stroke="#666" stroke-width="1.5"/>
  <text x="295" y="130" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Yes</text>
  <text x="605" y="130" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">No</text>

  <!-- Left child: stiffness -->
  <rect x="155" y="154" width="200" height="42" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="255" y="172" text-anchor="middle" font-size="12" fill="#2e7d32">stiffness ≥ 35 kPa?</text>
  <text x="255" y="188" text-anchor="middle" font-size="10" fill="#4caf50">n = 80 · Gini = 0.31</text>

  <!-- Right child: porosity -->
  <rect x="545" y="154" width="200" height="42" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="645" y="172" text-anchor="middle" font-size="12" fill="#e65100">porosity ≥ 45%?</text>
  <text x="645" y="188" text-anchor="middle" font-size="10" fill="#f57c00">n = 120 · Gini = 0.41</text>

  <!-- Left-Left -->
  <line x1="210" y1="196" x2="140" y2="248" stroke="#666" stroke-width="1.2"/>
  <line x1="300" y1="196" x2="370" y2="248" stroke="#666" stroke-width="1.2"/>
  <text x="158" y="222" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>
  <text x="352" y="222" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">No</text>

  <!-- Left-Right -->
  <line x1="600" y1="196" x2="530" y2="248" stroke="#666" stroke-width="1.2"/>
  <line x1="690" y1="196" x2="760" y2="248" stroke="#666" stroke-width="1.2"/>
  <text x="550" y="222" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>
  <text x="740" y="222" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">No</text>

  <!-- Leaf 1: RGD + stiff -->
  <rect x="55" y="250" width="170" height="58" rx="8" fill="#27ae60" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="140" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">✓ Biocompatible</text>
  <text x="140" y="290" text-anchor="middle" font-size="10" fill="#e8f5e9">n = 62   Gini = 0.09</text>
  <text x="140" y="305" text-anchor="middle" font-size="10" fill="#e8f5e9">89% biocompatible</text>

  <!-- Leaf 2: RGD + not stiff -->
  <rect x="290" y="250" width="170" height="58" rx="8" fill="#f39c12" stroke="#e65100" stroke-width="1.5"/>
  <text x="375" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">✓ Biocompatible</text>
  <text x="375" y="290" text-anchor="middle" font-size="10" fill="#fff3e0">n = 18   Gini = 0.29</text>
  <text x="375" y="305" text-anchor="middle" font-size="10" fill="#fff3e0">67% biocompatible</text>

  <!-- Leaf 3: No RGD + high porosity -->
  <rect x="440" y="250" width="170" height="58" rx="8" fill="#e67e22" stroke="#e65100" stroke-width="1.5"/>
  <text x="525" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">✗ Incompatible</text>
  <text x="525" y="290" text-anchor="middle" font-size="10" fill="#fff3e0">n = 45   Gini = 0.34</text>
  <text x="525" y="305" text-anchor="middle" font-size="10" fill="#fff3e0">62% incompatible</text>

  <!-- Leaf 4: No RGD + low porosity -->
  <rect x="675" y="250" width="170" height="58" rx="8" fill="#e74c3c" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="760" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">✗ Incompatible</text>
  <text x="760" y="290" text-anchor="middle" font-size="10" fill="#ffcdd2">n = 75   Gini = 0.08</text>
  <text x="760" y="305" text-anchor="middle" font-size="10" fill="#ffcdd2">91% incompatible</text>

  <!-- Bottom annotation -->
  <text x="450" y="338" text-anchor="middle" font-size="10" fill="#555">Variable importance: coating (RGD) > stiffness > porosity > roughness</text>
  <text x="450" y="355" text-anchor="middle" font-size="10" fill="#555">Training accuracy ≈ 87% · OOB accuracy (single tree) ≈ 79%</text>
  <text x="450" y="372" text-anchor="middle" font-size="9" fill="#999">Each split is greedy: chooses the single best feature + threshold at that node</text>
</svg>
