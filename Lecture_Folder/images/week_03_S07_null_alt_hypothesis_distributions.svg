<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <clipPath id="panelA">
      <rect x="30" y="30" width="400" height="340"/>
    </clipPath>
    <clipPath id="panelB">
      <rect x="470" y="30" width="400" height="340"/>
    </clipPath>
  </defs>

  <!-- Panel (a) - Well separated distributions -->
  <g>
    <!-- Axes -->
    <line x1="60" y1="340" x2="420" y2="340" stroke="black" stroke-width="2"/>
    <line x1="60" y1="340" x2="60" y2="40" stroke="black" stroke-width="2"/>
    <text x="240" y="385" text-anchor="middle" font-size="22" font-weight="bold">Values</text>
    <text x="35" y="35" font-size="22" font-weight="bold">(a)</text>

    <!-- Pink/orchid distribution (left, narrower, taller) - null -->
    <path d="M 80,340 C 80,340 100,338 120,330 C 140,310 150,250 160,180 C 170,110 175,75 185,60 C 195,75 200,110 210,180 C 220,250 230,310 250,330 C 270,338 290,340 290,340"
          fill="none" stroke="#DA70D6" stroke-width="3" clip-path="url(#panelA)"/>

    <!-- Blue distribution (right, slightly wider) - alternative -->
    <path d="M 200,340 C 200,340 220,339 240,335 C 260,325 275,290 290,230 C 305,170 310,130 320,110 C 330,130 335,170 350,230 C 365,290 380,325 400,335 C 415,339 420,340 420,340"
          fill="none" stroke="#4682B4" stroke-width="3" clip-path="url(#panelA)"/>
  </g>

  <!-- Panel (b) - Overlapping distributions -->
  <g>
    <!-- Axes -->
    <line x1="500" y1="340" x2="860" y2="340" stroke="black" stroke-width="2"/>
    <line x1="500" y1="340" x2="500" y2="40" stroke="black" stroke-width="2"/>
    <text x="680" y="385" text-anchor="middle" font-size="22" font-weight="bold">Values</text>
    <text x="475" y="35" font-size="22" font-weight="bold">(b)</text>

    <!-- Pink/orchid distribution (wider, shorter, slightly left) -->
    <path d="M 510,340 C 510,340 530,338 560,330 C 590,315 610,280 630,230 C 650,180 660,145 670,125 C 680,145 690,180 710,230 C 730,280 750,315 780,330 C 810,338 830,340 830,340"
          fill="none" stroke="#DA70D6" stroke-width="3" clip-path="url(#panelB)"/>

    <!-- Blue distribution (slightly taller, slightly right) -->
    <path d="M 540,340 C 540,340 560,339 580,333 C 610,320 630,280 650,225 C 670,170 680,130 700,105 C 720,130 730,170 750,225 C 770,280 790,320 820,333 C 840,339 860,340 860,340"
          fill="none" stroke="#4682B4" stroke-width="3" clip-path="url(#panelB)"/>
  </g>
</svg>