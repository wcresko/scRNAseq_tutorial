<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #333; }
    .axis-label { font-size: 14px; font-style: italic; }
    .param-label { font-size: 14px; }
  </style>

  <!-- Top distribution: mu=40, sigma=1 (tall and narrow) -->
  <g transform="translate(0, 0)">
    <text x="30" y="20" class="axis-label">f(x)</text>
    <!-- Axis -->
    <line x1="50" y1="170" x2="450" y2="170" stroke="#333" stroke-width="1.5"/>
    <line x1="50" y1="170" x2="50" y2="15" stroke="#333" stroke-width="1.5"/>
    <text x="450" y="188" text-anchor="end" class="axis-label">x</text>

    <!-- Bell curve - narrow, tall -->
    <path d="M 50,170
             Q 100,170 150,168
             Q 180,165 200,155
             Q 220,135 235,100
             Q 245,65 250,35
             Q 255,65 265,100
             Q 280,135 300,155
             Q 320,165 350,168
             Q 400,170 450,170"
      fill="#ddd" fill-opacity="0.4" stroke="#222" stroke-width="2"/>

    <!-- Sigma arrow -->
    <line x1="250" y1="80" x2="265" y2="100" stroke="#333" stroke-width="1"/>
    <text x="285" y="85" class="param-label">Standard deviation</text>
    <text x="285" y="102" class="param-label">is &#963; = 1</text>

    <!-- Mean label -->
    <text x="250" y="195" text-anchor="middle" class="param-label">Mean is &#956; = 40</text>
  </g>

  <!-- Middle distribution: mu=10, sigma=5 (wider, shorter) -->
  <g transform="translate(0, 210)">
    <text x="30" y="20" class="axis-label">f(x)</text>
    <line x1="50" y1="170" x2="450" y2="170" stroke="#333" stroke-width="1.5"/>
    <line x1="50" y1="170" x2="50" y2="15" stroke="#333" stroke-width="1.5"/>
    <text x="450" y="188" text-anchor="end" class="axis-label">x</text>

    <!-- Bell curve - wider -->
    <path d="M 50,170
             Q 80,168 110,162
             Q 140,150 170,125
             Q 195,95 210,70
             Q 220,55 225,50
             Q 230,55 240,70
             Q 255,95 280,125
             Q 310,150 340,162
             Q 370,168 400,170
             L 450,170"
      fill="#ddd" fill-opacity="0.4" stroke="#222" stroke-width="2"/>

    <!-- Sigma arrow -->
    <line x1="225" y1="80" x2="280" y2="80" stroke="#333" stroke-width="1"/>
    <polygon points="225,77 225,83 219,80" fill="#333"/>
    <polygon points="278,77 278,83 284,80" fill="#333"/>
    <text x="290" y="73" class="param-label">&#963; = 5</text>

    <!-- Mean label -->
    <text x="225" y="195" text-anchor="middle" class="param-label">&#956; = 10</text>
  </g>

  <!-- Bottom distribution: mu=50, sigma=3 (tall and narrow, shifted right) -->
  <g transform="translate(0, 420)">
    <text x="30" y="20" class="axis-label">f(x)</text>
    <line x1="50" y1="170" x2="450" y2="170" stroke="#333" stroke-width="1.5"/>
    <line x1="50" y1="170" x2="50" y2="15" stroke="#333" stroke-width="1.5"/>
    <text x="450" y="188" text-anchor="end" class="axis-label">x</text>

    <!-- Bell curve - narrow, shifted right -->
    <path d="M 50,170
             Q 150,170 230,168
             Q 270,164 300,148
             Q 320,130 335,100
             Q 345,70 350,45
             Q 355,70 365,100
             Q 380,130 400,148
             Q 420,160 440,166
             L 450,170"
      fill="#ddd" fill-opacity="0.4" stroke="#222" stroke-width="2"/>

    <!-- Sigma arrow -->
    <line x1="350" y1="95" x2="375" y2="115" stroke="#333" stroke-width="1"/>
    <polygon points="350,92 350,98 344,95" fill="#333"/>
    <polygon points="373,112 373,118 379,115" fill="#333"/>
    <text x="385" y="108" class="param-label">&#963; = 3</text>

    <!-- Mean label -->
    <text x="350" y="195" text-anchor="middle" class="param-label">&#956; = 50</text>
  </g>
</svg>