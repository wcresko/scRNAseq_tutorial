<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowEmbed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">t-SNE Optimization: Finding the Best Low-D Embedding via Gradient Descent</text>
  
  <!-- Step 1: Random initialization -->
  <rect x="15" y="42" width="870" height="105" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="80" y="64" font-size="13" font-weight="bold" fill="#e74c3c">Step 1:</text>
  <text x="135" y="64" font-size="13" fill="#2c3e50">Initialize points randomly on a 1D number line</text>
  
  <!-- Number line -->
  <line x1="100" y1="105" x2="850" y2="105" stroke="#95a5a6" stroke-width="1.5"/>
  <!-- Tick marks -->
  <line x1="100" y1="100" x2="100" y2="110" stroke="#95a5a6" stroke-width="1"/>
  <line x1="250" y1="100" x2="250" y2="110" stroke="#95a5a6" stroke-width="1"/>
  <line x1="475" y1="100" x2="475" y2="110" stroke="#95a5a6" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="110" stroke="#95a5a6" stroke-width="1"/>
  <line x1="850" y1="100" x2="850" y2="110" stroke="#95a5a6" stroke-width="1"/>
  
  <!-- Random scattered points on number line -->
  <circle cx="150" cy="105" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="230" cy="105" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="310" cy="105" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="370" cy="105" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="430" cy="105" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="490" cy="105" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="540" cy="105" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="600" cy="105" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="660" cy="105" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="720" cy="105" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="770" cy="105" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="820" cy="105" r="8" fill="#3498db" opacity="0.8"/>
  
  <text x="480" y="135" text-anchor="middle" font-size="10" fill="#7f8c8d">q(j|i) probabilities do NOT match p(j|i) &#x2192; KL divergence is HIGH</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="148" x2="450" y2="168" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowEmbed)"/>
  <text x="510" y="162" font-size="10" fill="#f39c12" font-weight="bold">Gradient descent iteration</text>
  
  <!-- Step 2: Partially optimized -->
  <rect x="15" y="172" width="870" height="105" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="80" y="194" font-size="13" font-weight="bold" fill="#f39c12">Step 2:</text>
  <text x="135" y="194" font-size="13" fill="#2c3e50">Move points to reduce KL divergence (partial convergence)</text>
  
  <!-- Number line -->
  <line x1="100" y1="235" x2="850" y2="235" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="100" y1="230" x2="100" y2="240" stroke="#95a5a6" stroke-width="1"/>
  <line x1="250" y1="230" x2="250" y2="240" stroke="#95a5a6" stroke-width="1"/>
  <line x1="475" y1="230" x2="475" y2="240" stroke="#95a5a6" stroke-width="1"/>
  <line x1="700" y1="230" x2="700" y2="240" stroke="#95a5a6" stroke-width="1"/>
  <line x1="850" y1="230" x2="850" y2="240" stroke="#95a5a6" stroke-width="1"/>
  
  <!-- Points starting to cluster but not perfect -->
  <!-- Blue group starting to form around ~220 -->
  <circle cx="200" cy="235" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="240" cy="235" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="270" cy="235" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="310" cy="235" r="8" fill="#3498db" opacity="0.8"/>
  
  <!-- Red group forming around ~500 -->
  <circle cx="460" cy="235" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="500" cy="235" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="540" cy="235" r="8" fill="#e74c3c" opacity="0.8"/>
  <circle cx="580" cy="235" r="8" fill="#e74c3c" opacity="0.8"/>
  
  <!-- Green group forming around ~740 -->
  <circle cx="690" cy="235" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="730" cy="235" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="760" cy="235" r="8" fill="#27ae60" opacity="0.8"/>
  <circle cx="800" cy="235" r="8" fill="#27ae60" opacity="0.8"/>
  
  <!-- Movement arrows -->
  <text x="165" y="225" font-size="9" fill="#3498db">&#x2190;</text>
  <text x="325" y="225" font-size="9" fill="#3498db">&#x2192;</text>
  <text x="435" y="225" font-size="9" fill="#e74c3c">&#x2190;</text>
  <text x="810" y="225" font-size="9" fill="#27ae60">&#x2192;</text>
  
  <text x="480" y="265" text-anchor="middle" font-size="10" fill="#7f8c8d">Same-group points attract; different-group points repel &#x2192; KL divergence DECREASING</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="278" x2="450" y2="298" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowEmbed)"/>
  <text x="520" y="292" font-size="10" fill="#27ae60" font-weight="bold">Continue iterating...</text>
  
  <!-- Step 3: Converged -->
  <rect x="15" y="302" width="870" height="105" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="80" y="324" font-size="13" font-weight="bold" fill="#27ae60">Step 3:</text>
  <text x="135" y="324" font-size="13" fill="#2c3e50">Converged! Low-D neighborhood structure matches high-D</text>
  
  <!-- Number line -->
  <line x1="100" y1="365" x2="850" y2="365" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="100" y1="360" x2="100" y2="370" stroke="#95a5a6" stroke-width="1"/>
  <line x1="250" y1="360" x2="250" y2="370" stroke="#95a5a6" stroke-width="1"/>
  <line x1="475" y1="360" x2="475" y2="370" stroke="#95a5a6" stroke-width="1"/>
  <line x1="700" y1="360" x2="700" y2="370" stroke="#95a5a6" stroke-width="1"/>
  <line x1="850" y1="360" x2="850" y2="370" stroke="#95a5a6" stroke-width="1"/>
  
  <!-- Tight clusters -->
  <!-- Blue cluster -->
  <circle cx="175" cy="365" r="8" fill="#3498db" opacity="0.9"/>
  <circle cx="195" cy="365" r="8" fill="#3498db" opacity="0.9"/>
  <circle cx="215" cy="365" r="8" fill="#3498db" opacity="0.9"/>
  <circle cx="235" cy="365" r="8" fill="#3498db" opacity="0.9"/>
  <text x="205" y="390" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">Group A</text>
  
  <!-- Red cluster -->
  <circle cx="445" cy="365" r="8" fill="#e74c3c" opacity="0.9"/>
  <circle cx="465" cy="365" r="8" fill="#e74c3c" opacity="0.9"/>
  <circle cx="485" cy="365" r="8" fill="#e74c3c" opacity="0.9"/>
  <circle cx="505" cy="365" r="8" fill="#e74c3c" opacity="0.9"/>
  <text x="475" y="390" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Group B</text>
  
  <!-- Green cluster -->
  <circle cx="715" cy="365" r="8" fill="#27ae60" opacity="0.9"/>
  <circle cx="735" cy="365" r="8" fill="#27ae60" opacity="0.9"/>
  <circle cx="755" cy="365" r="8" fill="#27ae60" opacity="0.9"/>
  <circle cx="775" cy="365" r="8" fill="#27ae60" opacity="0.9"/>
  <text x="745" y="390" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Group C</text>
  
  <text x="480" y="405" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">q(j|i) &#x2248; p(j|i) &#x2192; KL divergence MINIMIZED &#x2713;</text>
</svg>
