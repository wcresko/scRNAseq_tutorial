<svg viewBox="0 0 950 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">UMAP Cross-Entropy Optimization</text>
  
  <!-- Panel A: High-D fuzzy graph -->
  <rect x="15" y="42" width="295" height="460" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="162" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">High-D: Fuzzy Graph Weights</text>
  <text x="162" y="82" text-anchor="middle" font-size="10" fill="#7f8c8d">w&#x1D62;&#x2C7C; = membership strength</text>
  
  <!-- High-D points with weighted edges -->
  <!-- Group A (blue) -->
  <circle cx="90" cy="140" r="8" fill="#3498db" opacity="0.85"/>
  <circle cx="120" cy="120" r="8" fill="#3498db" opacity="0.85"/>
  <circle cx="105" cy="165" r="8" fill="#3498db" opacity="0.85"/>
  <circle cx="135" cy="150" r="8" fill="#3498db" opacity="0.85"/>
  <text x="60" y="115" font-size="9" fill="#3498db" font-weight="bold">Group A</text>
  
  <!-- Strong edges within group A (thick) -->
  <line x1="90" y1="140" x2="120" y2="120" stroke="#3498db" stroke-width="3" opacity="0.6"/>
  <line x1="90" y1="140" x2="105" y2="165" stroke="#3498db" stroke-width="2.5" opacity="0.6"/>
  <line x1="120" y1="120" x2="135" y2="150" stroke="#3498db" stroke-width="2.8" opacity="0.6"/>
  <line x1="105" y1="165" x2="135" y2="150" stroke="#3498db" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Group B (red) -->
  <circle cx="215" cy="130" r="8" fill="#e74c3c" opacity="0.85"/>
  <circle cx="245" cy="115" r="8" fill="#e74c3c" opacity="0.85"/>
  <circle cx="230" cy="155" r="8" fill="#e74c3c" opacity="0.85"/>
  <circle cx="255" cy="145" r="8" fill="#e74c3c" opacity="0.85"/>
  <text x="250" y="105" font-size="9" fill="#e74c3c" font-weight="bold">Group B</text>
  
  <!-- Strong edges within group B -->
  <line x1="215" y1="130" x2="245" y2="115" stroke="#e74c3c" stroke-width="3" opacity="0.6"/>
  <line x1="215" y1="130" x2="230" y2="155" stroke="#e74c3c" stroke-width="2.5" opacity="0.6"/>
  <line x1="245" y1="115" x2="255" y2="145" stroke="#e74c3c" stroke-width="2.8" opacity="0.6"/>
  <line x1="230" y1="155" x2="255" y2="145" stroke="#e74c3c" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Group C (green) -->
  <circle cx="155" cy="270" r="8" fill="#27ae60" opacity="0.85"/>
  <circle cx="175" cy="250" r="8" fill="#27ae60" opacity="0.85"/>
  <circle cx="160" cy="295" r="8" fill="#27ae60" opacity="0.85"/>
  <circle cx="190" cy="280" r="8" fill="#27ae60" opacity="0.85"/>
  <text x="120" y="310" font-size="9" fill="#27ae60" font-weight="bold">Group C</text>
  
  <!-- Strong edges within group C -->
  <line x1="155" y1="270" x2="175" y2="250" stroke="#27ae60" stroke-width="3" opacity="0.6"/>
  <line x1="155" y1="270" x2="160" y2="295" stroke="#27ae60" stroke-width="2.5" opacity="0.6"/>
  <line x1="175" y1="250" x2="190" y2="280" stroke="#27ae60" stroke-width="2.8" opacity="0.6"/>
  <line x1="160" y1="295" x2="190" y2="280" stroke="#27ae60" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Weak inter-group edges (thin, gray) -->
  <line x1="135" y1="150" x2="215" y2="130" stroke="#bdc3c7" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="105" y1="165" x2="155" y2="270" stroke="#bdc3c7" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="230" y1="155" x2="175" y2="250" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
  
  <!-- Weight annotations -->
  <text x="100" y="195" font-size="9" fill="#3498db">w = 0.95</text>
  <text x="170" y="180" font-size="9" fill="#bdc3c7">w = 0.12</text>
  
  <!-- Edge weight key -->
  <rect x="30" y="335" width="260" height="60" rx="4" fill="white" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="160" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Edge Weight = Membership Strength</text>
  <line x1="45" y1="367" x2="85" y2="367" stroke="#2c3e50" stroke-width="3.5"/>
  <text x="95" y="371" font-size="9" fill="#555">Strong (w &#x2248; 1.0)</text>
  <line x1="170" y1="367" x2="210" y2="367" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="220" y="371" font-size="9" fill="#555">Weak (w &#x2248; 0)</text>
  
  <!-- Cross-entropy formula box -->
  <rect x="25" y="405" width="275" height="85" rx="6" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="162" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Cross-Entropy Loss</text>
  <text x="162" y="448" text-anchor="middle" font-size="12" fill="#2c3e50" font-style="italic">CE = -&#x2211; [ w&#x1D62;&#x2C7C; log(v&#x1D62;&#x2C7C;)</text>
  <text x="162" y="468" text-anchor="middle" font-size="12" fill="#2c3e50" font-style="italic">   + (1 - w&#x1D62;&#x2C7C;) log(1 - v&#x1D62;&#x2C7C;) ]</text>
  <text x="162" y="484" text-anchor="middle" font-size="9" fill="#7f8c8d">w = high-D weight, v = low-D weight</text>
  
  <!-- Arrow 1 -->
  <line x1="315" y1="200" x2="340" y2="200" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowCE)"/>
  <defs>
    <marker id="arrowCE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Panel B: Low-D embedding (initial random) -->
  <rect x="345" y="42" width="275" height="220" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="482" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Low-D: Initial (Random)</text>
  
  <!-- Scattered random points -->
  <circle cx="380" cy="130" r="7" fill="#3498db" opacity="0.7"/>
  <circle cx="500" cy="90" r="7" fill="#3498db" opacity="0.7"/>
  <circle cx="430" cy="200" r="7" fill="#3498db" opacity="0.7"/>
  <circle cx="570" cy="160" r="7" fill="#3498db" opacity="0.7"/>
  
  <circle cx="410" cy="100" r="7" fill="#e74c3c" opacity="0.7"/>
  <circle cx="550" cy="210" r="7" fill="#e74c3c" opacity="0.7"/>
  <circle cx="470" cy="140" r="7" fill="#e74c3c" opacity="0.7"/>
  <circle cx="390" cy="190" r="7" fill="#e74c3c" opacity="0.7"/>
  
  <circle cx="520" cy="120" r="7" fill="#27ae60" opacity="0.7"/>
  <circle cx="450" cy="180" r="7" fill="#27ae60" opacity="0.7"/>
  <circle cx="560" cy="100" r="7" fill="#27ae60" opacity="0.7"/>
  <circle cx="490" cy="220" r="7" fill="#27ae60" opacity="0.7"/>
  
  <!-- CE mismatch indicator -->
  <rect x="370" y="235" width="230" height="18" rx="3" fill="#e74c3c" opacity="0.15"/>
  <text x="485" y="248" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">CE = 4.82 (high mismatch)</text>
  
  <!-- Downward arrow with SGD label -->
  <line x1="482" y1="265" x2="482" y2="295" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowCE)"/>
  <text x="530" y="285" font-size="10" fill="#f39c12" font-weight="bold">SGD</text>
  
  <!-- Panel C: Low-D embedding (optimized) -->
  <rect x="345" y="300" width="275" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="482" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Low-D: Optimized</text>
  
  <!-- Clustered optimized points -->
  <!-- Group A clustered -->
  <circle cx="390" cy="380" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="405" cy="365" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="395" cy="400" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="415" cy="390" r="7" fill="#3498db" opacity="0.85"/>
  
  <!-- Group B clustered -->
  <circle cx="515" cy="370" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="530" cy="355" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="520" cy="395" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="540" cy="380" r="7" fill="#e74c3c" opacity="0.85"/>
  
  <!-- Group C clustered -->
  <circle cx="455" cy="445" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="470" cy="430" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="460" cy="465" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="480" cy="455" r="7" fill="#27ae60" opacity="0.85"/>
  
  <!-- CE match indicator -->
  <rect x="370" y="480" width="230" height="18" rx="3" fill="#27ae60" opacity="0.15"/>
  <text x="485" y="493" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">CE = 0.31 (structure matched)</text>
  
  <!-- Panel D: How CE works -->
  <rect x="640" y="42" width="295" height="460" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="787" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">How Cross-Entropy Drives SGD</text>
  
  <!-- Attract case -->
  <rect x="655" y="85" width="265" height="115" rx="5" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="787" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">Attraction: Connected Pairs</text>
  <text x="787" y="125" text-anchor="middle" font-size="10" fill="#555">If w&#x1D62;&#x2C7C; &#x2248; 1 (high-D neighbors)</text>
  <text x="787" y="145" text-anchor="middle" font-size="10" fill="#555">but v&#x1D62;&#x2C7C; &#x2248; 0 (far apart in low-D)</text>
  <!-- Attraction arrows -->
  <circle cx="720" cy="175" r="6" fill="#3498db"/>
  <circle cx="830" cy="175" r="6" fill="#3498db"/>
  <line x1="728" y1="175" x2="770" y2="175" stroke="#3498db" stroke-width="2" marker-end="url(#arrowCE)"/>
  <line x1="822" y1="175" x2="780" y2="175" stroke="#3498db" stroke-width="2" marker-end="url(#arrowCE)"/>
  <text x="775" y="190" text-anchor="middle" font-size="9" fill="#3498db" font-weight="bold">Pull together</text>
  
  <!-- Repel case -->
  <rect x="655" y="215" width="265" height="115" rx="5" fill="white" stroke="#e74c3c" stroke-width="1"/>
  <text x="787" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">Repulsion: Disconnected Pairs</text>
  <text x="787" y="255" text-anchor="middle" font-size="10" fill="#555">If w&#x1D62;&#x2C7C; &#x2248; 0 (not high-D neighbors)</text>
  <text x="787" y="275" text-anchor="middle" font-size="10" fill="#555">but v&#x1D62;&#x2C7C; &#x2248; 1 (close in low-D)</text>
  <!-- Repulsion arrows -->
  <circle cx="755" cy="305" r="6" fill="#e74c3c"/>
  <circle cx="795" cy="305" r="6" fill="#27ae60"/>
  <line x1="749" y1="305" x2="720" y2="305" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowCE)"/>
  <line x1="801" y1="305" x2="830" y2="305" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowCE)"/>
  <text x="775" y="320" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">Push apart</text>
  
  <!-- Key difference box -->
  <rect x="655" y="345" width="265" height="145" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="787" y="368" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">Key: Symmetric Loss</text>
  <text x="787" y="392" text-anchor="middle" font-size="10" fill="#555">Unlike t-SNE's KL divergence,</text>
  <text x="787" y="410" text-anchor="middle" font-size="10" fill="#555">cross-entropy penalizes both:</text>
  <text x="787" y="432" text-anchor="middle" font-size="10" fill="#3498db">&#x2713; Neighbors placed far apart</text>
  <text x="787" y="450" text-anchor="middle" font-size="10" fill="#e74c3c">&#x2713; Non-neighbors placed close</text>
  <text x="787" y="475" text-anchor="middle" font-size="10" fill="#555" font-style="italic">&#x2192; Better global structure</text>
</svg>
