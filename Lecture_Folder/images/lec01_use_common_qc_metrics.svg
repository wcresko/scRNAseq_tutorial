<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 32px; font-weight: 400; fill: #222; text-anchor: middle; }
    .lbl { font-size: 20px; fill: #222; text-anchor: middle; }
    .sub { font-size: 16px; fill: #1abc9c; text-anchor: middle; }
  </style>

  <text class="title" x="500" y="70">Common QC metrics</text>

  <!-- Panel 1: Low # genes -->
  <g transform="translate(80,180)">
    <circle cx="100" cy="0" r="80" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- sparse DNA helices -->
    <g fill="none" stroke="#1abc9c" stroke-width="2">
      <path d="M70,-30 q5,-10 12,0 q-5,10 -12,0 z"/>
      <path d="M110,-45 q5,-10 12,0 q-5,10 -12,0 z"/>
      <path d="M95,15 q5,-10 12,0 q-5,10 -12,0 z"/>
    </g>
    <text class="lbl" x="100" y="140">Low # genes /</text>
    <text class="lbl" x="100" y="164">total molecules</text>
    <text class="sub" x="100" y="210">Dying / low quality cells</text>
  </g>

  <!-- Panel 2: Very high # genes -->
  <g transform="translate(380,180)">
    <circle cx="100" cy="0" r="80" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- dense mixed helices: magenta + teal -->
    <g fill="none" stroke-width="2">
      <path d="M55,-35 q5,-10 12,0 q-5,10 -12,0 z" stroke="#1abc9c"/>
      <path d="M80,-20 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M105,-35 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M130,-20 q5,-10 12,0 q-5,10 -12,0 z" stroke="#1abc9c"/>
      <path d="M65,0 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M90,15 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M115,0 q5,-10 12,0 q-5,10 -12,0 z" stroke="#1abc9c"/>
      <path d="M140,15 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M75,35 q5,-10 12,0 q-5,10 -12,0 z" stroke="#1abc9c"/>
      <path d="M105,45 q5,-10 12,0 q-5,10 -12,0 z" stroke="#e91e63"/>
      <path d="M130,40 q5,-10 12,0 q-5,10 -12,0 z" stroke="#1abc9c"/>
    </g>
    <text class="lbl" x="100" y="140">Very high # genes</text>
    <text class="lbl" x="100" y="164">/ total molecules</text>
    <text class="sub" x="100" y="210">Doublets / multiplets</text>
  </g>

  <!-- Panel 3: High mt % -->
  <g transform="translate(680,180)">
    <!-- mitochondrion outline (stylised) -->
    <path d="M30,-20 q50,-60 140,0 q20,30 0,60 q-50,40 -140,0 q-20,-30 0,-60 z"
          fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- cristae -->
    <path d="M45,-5 q20,-25 40,0 M90,-15 q20,-25 40,5 M130,10 q20,-25 40,0 M55,20 q25,-15 45,5"
          fill="none" stroke="#000" stroke-width="1.6"/>
    <text class="lbl" x="100" y="140">High %</text>
    <text class="lbl" x="100" y="164">mitochondrial genes</text>
    <text class="sub" x="100" y="210">Dying / low quality cells</text>
  </g>
</svg>
