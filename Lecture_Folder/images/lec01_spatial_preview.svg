<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .yes { font-size: 12px; font-weight: 700; fill: #1b9e77; text-anchor: middle; }
    .no  { font-size: 12px; font-weight: 700; fill: #d73027; text-anchor: middle; }
  </style>

  <text class="title" x="500" y="28">Where scRNA-seq sits — and what spatial adds</text>

  <!-- Panel 1: Bulk -->
  <g transform="translate(40,65)">
    <text class="panel" x="130" y="0">Bulk RNA-seq</text>
    <rect x="0" y="15" width="260" height="200" fill="#fafafa" stroke="#ccc"/>
    <!-- tissue -->
    <ellipse cx="130" cy="105" rx="80" ry="55" fill="#f6e8c3" stroke="#a6611a"/>
    <g>
      <circle cx="90"  cy="85"  r="5" fill="#2c7fb8"/>
      <circle cx="125" cy="80"  r="5" fill="#e66101"/>
      <circle cx="160" cy="95"  r="5" fill="#1b9e77"/>
      <circle cx="100" cy="115" r="5" fill="#e66101"/>
      <circle cx="140" cy="125" r="5" fill="#756bb1"/>
      <circle cx="170" cy="115" r="5" fill="#2c7fb8"/>
    </g>
    <!-- one bar profile -->
    <g transform="translate(50,175)">
      <line x1="0" y1="20" x2="160" y2="20" stroke="#888"/>
      <rect x="5"   y="5"  width="15" height="15" fill="#888"/>
      <rect x="30"  y="0"  width="15" height="20" fill="#888"/>
      <rect x="55"  y="8"  width="15" height="12" fill="#888"/>
      <rect x="80"  y="4"  width="15" height="16" fill="#888"/>
      <rect x="105" y="10" width="15" height="10" fill="#888"/>
      <rect x="130" y="6"  width="15" height="14" fill="#888"/>
    </g>
    <text class="yes" x="65"  y="240">heterogeneity?</text>
    <text class="no"  x="190" y="240">hidden</text>
    <text class="yes" x="65"  y="260">spatial context?</text>
    <text class="no"  x="190" y="260">lost</text>
  </g>

  <!-- Panel 2: scRNA-seq -->
  <g transform="translate(340,65)">
    <text class="panel" x="130" y="0">scRNA-seq (dissociated)</text>
    <rect x="0" y="15" width="260" height="200" fill="#fafafa" stroke="#ccc"/>
    <!-- dissociated dots -->
    <g>
      <circle cx="50"  cy="60"  r="6" fill="#2c7fb8"/>
      <circle cx="90"  cy="80"  r="6" fill="#e66101"/>
      <circle cx="130" cy="55"  r="6" fill="#1b9e77"/>
      <circle cx="170" cy="85"  r="6" fill="#756bb1"/>
      <circle cx="210" cy="65"  r="6" fill="#2c7fb8"/>
      <circle cx="60"  cy="110" r="6" fill="#e66101"/>
      <circle cx="100" cy="130" r="6" fill="#1b9e77"/>
      <circle cx="150" cy="115" r="6" fill="#2c7fb8"/>
      <circle cx="195" cy="135" r="6" fill="#756bb1"/>
      <circle cx="75"  cy="160" r="6" fill="#1b9e77"/>
      <circle cx="160" cy="165" r="6" fill="#e66101"/>
      <circle cx="215" cy="170" r="6" fill="#2c7fb8"/>
    </g>
    <text class="yes" x="65"  y="240">heterogeneity?</text>
    <text class="yes" x="190" y="240">revealed</text>
    <text class="yes" x="65"  y="260">spatial context?</text>
    <text class="no"  x="190" y="260">lost (dissociation)</text>
  </g>

  <!-- Panel 3: Spatial -->
  <g transform="translate(640,65)">
    <text class="panel" x="160" y="0">Spatial transcriptomics</text>
    <rect x="0" y="15" width="320" height="200" fill="#fafafa" stroke="#ccc"/>
    <!-- tissue section with spots -->
    <ellipse cx="160" cy="110" rx="120" ry="70" fill="#f6e8c3" stroke="#a6611a"/>
    <!-- colored cells at specific positions -->
    <g>
      <circle cx="90"  cy="75"  r="6" fill="#2c7fb8"/>
      <circle cx="125" cy="65"  r="6" fill="#2c7fb8"/>
      <circle cx="155" cy="70"  r="6" fill="#2c7fb8"/>
      <circle cx="100" cy="100" r="6" fill="#e66101"/>
      <circle cx="130" cy="105" r="6" fill="#e66101"/>
      <circle cx="165" cy="100" r="6" fill="#e66101"/>
      <circle cx="195" cy="95"  r="6" fill="#e66101"/>
      <circle cx="115" cy="135" r="6" fill="#1b9e77"/>
      <circle cx="145" cy="140" r="6" fill="#1b9e77"/>
      <circle cx="180" cy="135" r="6" fill="#1b9e77"/>
      <circle cx="215" cy="125" r="6" fill="#756bb1"/>
      <circle cx="235" cy="105" r="6" fill="#756bb1"/>
      <circle cx="225" cy="80"  r="6" fill="#756bb1"/>
    </g>
    <!-- grid overlay representing spots -->
    <g stroke="#2c7fb8" stroke-width="0.7" stroke-dasharray="2 2" fill="none" opacity="0.45">
      <line x1="60"  y1="55"  x2="260" y2="55"/>
      <line x1="60"  y1="85"  x2="260" y2="85"/>
      <line x1="60"  y1="115" x2="260" y2="115"/>
      <line x1="60"  y1="145" x2="260" y2="145"/>
      <line x1="85"  y1="45"  x2="85"  y2="165"/>
      <line x1="135" y1="45"  x2="135" y2="165"/>
      <line x1="185" y1="45"  x2="185" y2="165"/>
      <line x1="235" y1="45"  x2="235" y2="165"/>
    </g>
    <text class="yes" x="85"  y="240">heterogeneity?</text>
    <text class="yes" x="230" y="240">revealed</text>
    <text class="yes" x="85"  y="260">spatial context?</text>
    <text class="yes" x="230" y="260">preserved</text>
  </g>

  <!-- Bottom: technologies -->
  <g transform="translate(40,345)">
    <rect x="0" y="0" width="920" height="75" rx="10" fill="#eef3fa" stroke="#2c7fb8"/>
    <text class="panel" x="460" y="22">Spatial platforms (growing fast)</text>
    <text class="lbl" x="100" y="48" font-weight="700">Spot-based</text>
    <text class="lbl" x="210" y="48">Visium, Visium HD (55 µm → 2 µm spots)</text>
    <text class="lbl" x="420" y="48" font-weight="700">Subcellular array</text>
    <text class="lbl" x="570" y="48">Stereo-seq, Slide-seqV2, Curio Seeker</text>
    <text class="lbl" x="760" y="48" font-weight="700">Imaging (FISH/ISS)</text>
    <text class="lbl" x="860" y="48">MERFISH, Xenium, CosMx</text>
    <text class="lbl" x="460" y="65">trade-off: resolution × throughput × panel size (targeted vs whole transcriptome)</text>
  </g>
</svg>
