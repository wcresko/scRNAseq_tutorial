<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #222; }
  </style>

  <!-- Bell curve path -->
  <path d="M 50,400
           Q 80,398 110,396
           Q 140,392 170,385
           Q 200,370 230,345
           Q 260,310 290,265
           Q 310,230 330,195
           Q 350,160 370,130
           Q 385,108 400,100
           Q 415,108 430,130
           Q 450,160 470,195
           Q 490,230 510,265
           Q 540,310 570,345
           Q 600,370 630,385
           Q 660,392 690,396
           Q 720,398 750,400"
    fill="none" stroke="#222" stroke-width="3"/>

  <!-- Axis line -->
  <line x1="50" y1="400" x2="750" y2="400" stroke="#222" stroke-width="2"/>

  <!-- MEAN label -->
  <text x="400" y="435" text-anchor="middle" font-size="18" font-weight="bold">MEAN</text>

  <!-- Vertical center line -->
  <line x1="400" y1="100" x2="400" y2="400" stroke="#222" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Standard deviation tick marks -->
  <line x1="290" y1="395" x2="290" y2="405" stroke="#222" stroke-width="1.5"/>
  <line x1="510" y1="395" x2="510" y2="405" stroke="#222" stroke-width="1.5"/>
  <line x1="180" y1="395" x2="180" y2="405" stroke="#222" stroke-width="1.5"/>
  <line x1="620" y1="395" x2="620" y2="405" stroke="#222" stroke-width="1.5"/>
  <line x1="100" y1="395" x2="100" y2="405" stroke="#222" stroke-width="1.5"/>
  <line x1="700" y1="395" x2="700" y2="405" stroke="#222" stroke-width="1.5"/>

  <!-- 68% bracket and label -->
  <line x1="290" y1="280" x2="510" y2="280" stroke="#222" stroke-width="1.5"/>
  <line x1="290" y1="275" x2="290" y2="285" stroke="#222" stroke-width="1.5"/>
  <line x1="510" y1="275" x2="510" y2="285" stroke="#222" stroke-width="1.5"/>
  <!-- Double-headed arrow for 68% -->
  <text x="400" y="270" text-anchor="middle" font-size="24" font-weight="bold">68%</text>

  <!-- "One Standard Deviation" labels -->
  <text x="345" y="310" text-anchor="middle" font-size="13">One Standard</text>
  <text x="345" y="326" text-anchor="middle" font-size="13">Deviation</text>
  <line x1="290" y1="300" x2="400" y2="300" stroke="#222" stroke-width="1"/>
  <polygon points="292,297 292,303 286,300" fill="#222"/>
  <polygon points="398,297 398,303 404,300" fill="#222"/>

  <text x="455" y="310" text-anchor="middle" font-size="13">One Standard</text>
  <text x="455" y="326" text-anchor="middle" font-size="13">Deviation</text>
  <line x1="400" y1="300" x2="510" y2="300" stroke="#222" stroke-width="1"/>
  <polygon points="402,297 402,303 396,300" fill="#222"/>
  <polygon points="508,297 508,303 514,300" fill="#222"/>

  <!-- 95% bracket -->
  <path d="M 180,200 L 180,190 L 620,190 L 620,200" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="400" y="182" text-anchor="middle" font-size="22" font-weight="bold">95%</text>

  <!-- "Two Standard Deviations" labels -->
  <text x="230" y="365" text-anchor="middle" font-size="13">Two Standard</text>
  <text x="230" y="381" text-anchor="middle" font-size="13">Deviations</text>
  <line x1="180" y1="355" x2="290" y2="355" stroke="#222" stroke-width="1"/>
  <polygon points="182,352 182,358 176,355" fill="#222"/>
  <polygon points="288,352 288,358 294,355" fill="#222"/>

  <text x="570" y="365" text-anchor="middle" font-size="13">Two Standard</text>
  <text x="570" y="381" text-anchor="middle" font-size="13">Deviations</text>
  <line x1="510" y1="355" x2="620" y2="355" stroke="#222" stroke-width="1"/>
  <polygon points="512,352 512,358 506,355" fill="#222"/>
  <polygon points="618,352 618,358 624,355" fill="#222"/>

  <!-- 99.7% bracket -->
  <path d="M 100,100 L 100,88 L 700,88 L 700,100" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" font-size="22" font-weight="bold">99.7%</text>

  <!-- "Three Standard Deviations" labels -->
  <text x="100" y="250" text-anchor="middle" font-size="13">Three</text>
  <text x="100" y="266" text-anchor="middle" font-size="13">Standard</text>
  <text x="100" y="282" text-anchor="middle" font-size="13">Deviations</text>

  <text x="700" y="250" text-anchor="middle" font-size="13">Three</text>
  <text x="700" y="266" text-anchor="middle" font-size="13">Standard</text>
  <text x="700" y="282" text-anchor="middle" font-size="13">Deviations</text>
</svg>