<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Arial, Helvetica, sans-serif">
  <!-- Title text -->
  <text x="30" y="40" font-size="20">Needed to calculate</text>
  <text x="30" y="65" font-size="20" font-style="italic">P</text>
  <text x="45" y="65" font-size="20">-value for test</text>

  <!-- Axes -->
  <line x1="60" y1="360" x2="760" y2="360" stroke="black" stroke-width="2"/>

  <!-- Bell curve (sampling distribution) -->
  <path d="M 70,358 C 90,355 120,348 160,330 C 200,305 240,265 280,215 C 320,160 350,115 380,85 C 400,72 410,68 420,66 C 430,68 440,72 460,85 C 490,115 520,160 560,215 C 600,265 630,305 660,330 C 700,348 730,355 750,358"
        fill="none" stroke="#4682B4" stroke-width="3"/>

  <!-- Shaded p-value region (right tail from observed stat) -->
  <path d="M 580,305 C 600,265 620,245 640,270 C 660,290 680,320 700,340 C 720,350 740,356 750,358 L 750,360 L 580,360 Z"
        fill="#E8967A" fill-opacity="0.7" stroke="none"/>
  <!-- Redraw curve over shaded area -->
  <path d="M 560,315 C 580,295 600,275 620,290 C 640,310 660,330 680,343 C 700,352 730,357 750,358"
        fill="none" stroke="#4682B4" stroke-width="3"/>

  <!-- Vertical line at observed statistic -->
  <line x1="580" y1="305" x2="580" y2="360" stroke="#E8967A" stroke-width="2.5"/>

  <!-- Observed statistic label -->
  <text x="580" y="390" text-anchor="middle" font-size="17">Observed statistic</text>

  <!-- Sampling distribution label -->
  <text x="320" y="220" font-size="16">Sampling</text>
  <text x="320" y="240" font-size="16">distribution</text>
  <text x="320" y="260" font-size="16">when H</text>
  <text x="370" y="264" font-size="12">0</text>
  <text x="380" y="260" font-size="16"> is true</text>

  <!-- P-value label with arrow -->
  <text x="680" y="180" font-size="18" font-style="italic">P</text>
  <text x="693" y="180" font-size="18">-value</text>
  <!-- Arrow from label to shaded region -->
  <line x1="670" y1="190" x2="630" y2="310" stroke="black" stroke-width="2"/>
  <polygon points="630,310 635,297 625,300" fill="black"/>
</svg>