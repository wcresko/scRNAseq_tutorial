<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="serif">
  <!-- Cp formula -->
  <text x="50" y="55" font-size="28" font-style="italic">C<tspan font-size="18" dy="6">p</tspan><tspan dy="-6" font-style="normal"> = </tspan></text>

  <!-- Fraction SS_error / sigma-hat^2 -->
  <text x="160" y="35" font-size="24">SS<tspan font-size="16" dy="4">error</tspan></text>
  <line x1="155" y1="45" x2="290" y2="45" stroke="black" stroke-width="2"/>
  <text x="195" y="72" font-size="24" font-style="italic">&sigma;</text>
  <text x="210" y="60" font-size="16">^</text>
  <text x="215" y="72" font-size="18" dy="-12">2</text>

  <text x="295" y="55" font-size="28"> - </text>
  <text x="330" y="55" font-size="28" font-style="italic">n</text>
  <text x="360" y="55" font-size="28"> + 2</text>
  <text x="410" y="55" font-size="28" font-style="italic">p</text>

  <!-- Definitions -->
  <text x="50" y="130" font-size="20">SS<tspan font-size="14" dy="3">error</tspan><tspan dy="-3" dx="20">error sum of squares for the model with </tspan><tspan font-style="italic">p</tspan> predictors (incl. intercept)</text>

  <text x="50" y="170" font-size="20" font-style="italic">&sigma;<tspan font-size="14" dy="-8">^</tspan><tspan font-size="14" dy="4">2</tspan><tspan dy="4" dx="20" font-style="normal">error mean square of full model (e.g., all predictors).</tspan></text>

  <text x="50" y="210" font-size="20" font-style="italic">n<tspan dx="35" font-style="normal">sample size.</tspan></text>

  <text x="50" y="250" font-size="20" font-style="italic">p<tspan dx="35" font-style="normal">number of predictors (including intercept).</tspan></text>

  <!-- Additional notes -->
  <text x="50" y="310" font-size="20" font-style="italic">C<tspan font-size="14" dy="4">p</tspan><tspan dy="-4" font-style="normal"> estimates mean square prediction error. (Related to AIC.)</tspan></text>

  <text x="50" y="360" font-size="20">2<tspan font-style="italic">p</tspan> : sort of a penalty for including too many predictors.</text>
  <text x="50" y="390" font-size="20">A feature shared with all other model selection criteria.</text>
</svg>
