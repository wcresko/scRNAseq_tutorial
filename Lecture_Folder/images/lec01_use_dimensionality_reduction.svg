<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ax { font-size: 30px; font-weight: 700; fill: #222; }
    .title { font-size: 24px; font-weight: 700; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Left: 3D boxes in x,y,z -->
  <g transform="translate(60,40)">
    <!-- axes -->
    <line x1="0" y1="380" x2="0" y2="40" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <line x1="0" y1="380" x2="360" y2="380" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <line x1="0" y1="380" x2="120" y2="260" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="ax" x="-40" y="50">z</text>
    <text class="ax" x="355" y="405">x</text>
    <text class="ax" x="105" y="250">y</text>

    <!-- Blue 3D box (back-left) top highlighted -->
    <g>
      <!-- dotted cube edges -->
      <g stroke="#555" stroke-dasharray="3,3" fill="none">
        <rect x="50"  y="240" width="140" height="90"/>
        <rect x="105" y="180" width="140" height="90"/>
        <line x1="50"  y1="240" x2="105" y2="180"/>
        <line x1="190" y1="240" x2="245" y2="180"/>
        <line x1="50"  y1="330" x2="105" y2="270"/>
        <line x1="190" y1="330" x2="245" y2="270"/>
      </g>
      <polygon points="105,180 245,180 190,240 50,240" fill="#1f4e79" stroke="#0d2a4a"/>
    </g>

    <!-- Red 3D box (front-right) top highlighted -->
    <g>
      <g stroke="#555" stroke-dasharray="3,3" fill="none">
        <rect x="180" y="270" width="120" height="80"/>
        <rect x="225" y="220" width="120" height="80"/>
        <line x1="180" y1="270" x2="225" y2="220"/>
        <line x1="300" y1="270" x2="345" y2="220"/>
        <line x1="180" y1="350" x2="225" y2="300"/>
        <line x1="300" y1="350" x2="345" y2="300"/>
      </g>
      <polygon points="225,220 345,220 300,270 180,270" fill="#c0392b" stroke="#7a2017"/>
    </g>
  </g>

  <!-- Middle arrow + caption -->
  <g transform="translate(510,160)">
    <text class="title" x="80" y="0">Dimensionality</text>
    <text class="title" x="80" y="30">reduction</text>
    <line x1="0" y1="75" x2="160" y2="75" stroke="#222" stroke-width="4" marker-end="url(#a)"/>
  </g>

  <!-- Right pair: 2D projections -->
  <g transform="translate(730,60)">
    <!-- xy projection -->
    <line x1="0" y1="300" x2="0" y2="40" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <line x1="0" y1="300" x2="240" y2="300" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="ax" x="-30" y="160">y</text>
    <text class="ax" x="230" y="330">x</text>
    <rect x="20" y="140" width="100" height="120" fill="#1f4e79" stroke="#0d2a4a"/>
    <rect x="130" y="160" width="80" height="100" fill="#c0392b" stroke="#7a2017"/>
  </g>

  <g transform="translate(1000,60)">
    <line x1="0" y1="300" x2="0" y2="40" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <line x1="0" y1="300" x2="160" y2="300" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="ax" x="-30" y="160">y</text>
    <text class="ax" x="150" y="330">z</text>
    <!-- two thin vertical bars -->
    <rect x="40"  y="140" width="10" height="120" fill="#1f4e79"/>
    <rect x="110" y="155" width="10" height="100" fill="#c0392b"/>
  </g>
</svg>
