<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">K-Fold Cross-Validation</text>

  <!-- Left side: Train/Test split -->
  <!-- Train block -->
  <rect x="80" y="55" width="80" height="230" rx="4" fill="#4472C4" stroke="#3060a8" stroke-width="1.5"/>
  <text x="120" y="170" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Train</text>

  <!-- Test block -->
  <rect x="80" y="290" width="80" height="55" rx="4" fill="#C0504D" stroke="#a0403d" stroke-width="1.5"/>
  <text x="120" y="323" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Test</text>

  <!-- Arrow -->
  <line x1="180" y1="180" x2="240" y2="180" stroke="#333" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Right side: Train 1 + Validate 1 + Test -->
  <!-- Train 1 block -->
  <rect x="260" y="55" width="80" height="180" rx="4" fill="#4472C4" stroke="#3060a8" stroke-width="1.5"/>
  <text x="300" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Train 1</text>

  <!-- Validate 1 block -->
  <rect x="260" y="240" width="80" height="50" rx="4" fill="#7F6FAF" stroke="#6a5a9a" stroke-width="1.5"/>
  <text x="300" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Validate 1</text>

  <!-- Test block (separate, below) -->
  <rect x="260" y="310" width="80" height="55" rx="4" fill="#C0504D" stroke="#a0403d" stroke-width="1.5"/>
  <text x="300" y="343" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Test</text>

  <!-- Explanation text -->
  <text x="430" y="100" font-size="13" fill="#333" font-weight="bold">Step 1:</text>
  <text x="430" y="120" font-size="12" fill="#555">Split data into Train and Test sets</text>

  <text x="430" y="160" font-size="13" fill="#333" font-weight="bold">Step 2:</text>
  <text x="430" y="180" font-size="12" fill="#555">Further split training data into</text>
  <text x="430" y="198" font-size="12" fill="#555">K folds for cross-validation</text>

  <text x="430" y="238" font-size="13" fill="#333" font-weight="bold">Each iteration:</text>
  <text x="430" y="258" font-size="12" fill="#555">One fold is held out for validation</text>
  <text x="430" y="276" font-size="12" fill="#555">Remaining K-1 folds used for training</text>

  <!-- Legend -->
  <rect x="430" y="310" width="18" height="14" rx="2" fill="#4472C4"/>
  <text x="455" y="322" font-size="11" fill="#555">Training data</text>

  <rect x="430" y="332" width="18" height="14" rx="2" fill="#7F6FAF"/>
  <text x="455" y="344" font-size="11" fill="#555">Validation fold</text>

  <rect x="430" y="354" width="18" height="14" rx="2" fill="#C0504D"/>
  <text x="455" y="366" font-size="11" fill="#555">Test set (held out)</text>

  <!-- Footer -->
  <text x="350" y="410" text-anchor="middle" font-size="10" fill="#999">SVG recreation of k-fold cross-validation diagram</text>
</svg>
