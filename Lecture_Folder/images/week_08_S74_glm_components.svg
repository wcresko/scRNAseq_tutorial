<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#fafafa" rx="10"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a5c2a">Three Components of a GLM</text>
  
  <!-- Component 1: Random Component -->
  <rect x="30" y="60" width="260" height="160" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">① Random Component</text>
  <text x="160" y="112" text-anchor="middle" font-size="12" fill="#333">Distribution of Y</text>
  <line x1="50" y1="122" x2="270" y2="122" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="143" font-size="11" fill="#555">• Gaussian (Normal)</text>
  <text x="50" y="161" font-size="11" fill="#555">• Binomial (0/1)</text>
  <text x="50" y="179" font-size="11" fill="#555">• Poisson (counts)</text>
  <text x="50" y="197" font-size="11" fill="#555">• Gamma (positive continuous)</text>
  
  <!-- Component 2: Systematic Component -->
  <rect x="320" y="60" width="260" height="160" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">② Systematic Component</text>
  <text x="450" y="112" text-anchor="middle" font-size="12" fill="#333">Linear Predictor η</text>
  <line x1="340" y1="122" x2="560" y2="122" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="152" text-anchor="middle" font-size="16" fill="#333" font-style="italic">η = β₀ + β₁x₁ + β₂x₂ + ...</text>
  <text x="450" y="180" text-anchor="middle" font-size="11" fill="#555">Same linear combination</text>
  <text x="450" y="198" text-anchor="middle" font-size="11" fill="#555">of predictors for ALL GLMs</text>
  
  <!-- Component 3: Link Function -->
  <rect x="610" y="60" width="260" height="160" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="740" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">③ Link Function</text>
  <text x="740" y="112" text-anchor="middle" font-size="12" fill="#333">Connects η to E(Y)</text>
  <line x1="630" y1="122" x2="850" y2="122" stroke="#ccc" stroke-width="1"/>
  <text x="740" y="148" text-anchor="middle" font-size="13" fill="#333" font-style="italic">g(μ) = η</text>
  <text x="740" y="172" text-anchor="middle" font-size="11" fill="#555">Maps the mean response</text>
  <text x="740" y="190" text-anchor="middle" font-size="11" fill="#555">to the linear predictor scale</text>
  
  <!-- Arrows connecting components -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <line x1="290" y1="140" x2="318" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="140" x2="608" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Link Functions Table -->
  <rect x="30" y="250" width="840" height="250" rx="10" fill="white" stroke="#999" stroke-width="1.5"/>
  <text x="450" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Four Common GLM Families</text>
  
  <!-- Table Header -->
  <rect x="40" y="295" width="820" height="30" rx="5" fill="#e0e0e0"/>
  <text x="130" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Family</text>
  <text x="290" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Link g(μ)</text>
  <text x="460" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Inverse g⁻¹(η)</text>
  <text x="640" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Response Type</text>
  <text x="790" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Variance</text>
  
  <!-- Row 1: Gaussian -->
  <rect x="40" y="330" width="820" height="35" rx="0" fill="#f5f5f5"/>
  <text x="130" y="352" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">Gaussian</text>
  <text x="290" y="352" text-anchor="middle" font-size="12" fill="#333">μ (identity)</text>
  <text x="460" y="352" text-anchor="middle" font-size="12" fill="#333">η</text>
  <text x="640" y="352" text-anchor="middle" font-size="11" fill="#555">Continuous (any)</text>
  <text x="790" y="352" text-anchor="middle" font-size="12" fill="#333">σ²</text>
  
  <!-- Row 2: Binomial -->
  <rect x="40" y="370" width="820" height="35" rx="0" fill="white"/>
  <text x="130" y="392" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">Binomial</text>
  <text x="290" y="392" text-anchor="middle" font-size="12" fill="#333">log(μ/(1-μ)) (logit)</text>
  <text x="460" y="392" text-anchor="middle" font-size="12" fill="#333">1/(1+e⁻ᶯ)</text>
  <text x="640" y="392" text-anchor="middle" font-size="11" fill="#555">Binary (0/1)</text>
  <text x="790" y="392" text-anchor="middle" font-size="12" fill="#333">μ(1-μ)</text>
  
  <!-- Row 3: Poisson -->
  <rect x="40" y="410" width="820" height="35" rx="0" fill="#f5f5f5"/>
  <text x="130" y="432" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">Poisson</text>
  <text x="290" y="432" text-anchor="middle" font-size="12" fill="#333">log(μ)</text>
  <text x="460" y="432" text-anchor="middle" font-size="12" fill="#333">eᶯ</text>
  <text x="640" y="432" text-anchor="middle" font-size="11" fill="#555">Counts (0, 1, 2, ...)</text>
  <text x="790" y="432" text-anchor="middle" font-size="12" fill="#333">μ</text>
  
  <!-- Row 4: Gamma -->
  <rect x="40" y="450" width="820" height="35" rx="0" fill="white"/>
  <text x="130" y="472" text-anchor="middle" font-size="12" fill="#6a1b9a" font-weight="bold">Gamma</text>
  <text x="290" y="472" text-anchor="middle" font-size="12" fill="#333">1/μ (inverse)</text>
  <text x="460" y="472" text-anchor="middle" font-size="12" fill="#333">1/η</text>
  <text x="640" y="472" text-anchor="middle" font-size="11" fill="#555">Positive continuous</text>
  <text x="790" y="472" text-anchor="middle" font-size="12" fill="#333">μ²</text>
</svg>
