<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="serif">
  <!-- F-ratio equation box -->
  <rect x="120" y="30" width="380" height="80" fill="white" stroke="black" stroke-width="2"/>
  <text x="310" y="60" font-size="22" text-anchor="middle">
    <tspan>F-ratio = </tspan>
    <tspan dy="-12">Explained</tspan>
  </text>
  <line x1="275" y1="65" x2="420" y2="65" stroke="black" stroke-width="1.5"/>
  <text x="347" y="82" font-size="18" text-anchor="middle">Unexplained</text>
  <text x="170" y="75" font-size="22">=</text>
  <text x="200" y="55" font-size="18" text-anchor="middle">MS</text>
  <text x="220" y="62" font-size="13">groups</text>
  <line x1="180" y1="65" x2="260" y2="65" stroke="black" stroke-width="1.5"/>
  <text x="200" y="82" font-size="18" text-anchor="middle">MS</text>
  <text x="225" y="89" font-size="13">residual</text>

  <!-- Arrow to "Ratio of standardized sources..." -->
  <line x1="510" y1="70" x2="540" y2="70" stroke="#8B0000" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0000"/>
    </marker>
  </defs>
  <text x="555" y="65" font-size="18" font-weight="bold" fill="#8B0000">Ratio of standardized</text>
  <text x="555" y="88" font-size="18" font-weight="bold" fill="#8B0000">sources of variation</text>

  <!-- F-distribution curve -->
  <g transform="translate(50,130)">
    <!-- F-distribution label -->
    <text x="250" y="50" font-size="18">F-distribution</text>
    <text x="250" y="72" font-size="16">(Distribution of all possible</text>
    <text x="250" y="92" font-size="16">expected F-ratios when the</text>
    <text x="250" y="112" font-size="16">H<tspan font-size="12" dy="3">0</tspan><tspan dy="-3"> is true)</tspan></text>

    <!-- Axes -->
    <line x1="80" y1="380" x2="650" y2="380" stroke="black" stroke-width="2"/>

    <!-- X axis labels -->
    <text x="80" y="410" font-size="20">0</text>
    <text x="190" y="410" font-size="20">1</text>
    <text x="300" y="410" font-size="20">2</text>
    <text x="410" y="410" font-size="20">3</text>
    <text x="520" y="410" font-size="20">4</text>
    <text x="630" y="410" font-size="20">5</text>

    <!-- F-distribution curve (right-skewed) -->
    <path d="M 80,380 C 80,380 90,370 100,250 C 105,190 110,150 120,130 C 130,115 140,120 155,150 C 170,180 190,240 220,290 C 250,330 280,350 320,363 C 360,372 400,376 450,378 C 500,379 550,379.5 650,380" fill="none" stroke="black" stroke-width="3"/>

    <!-- Blue arrow at F=4 -->
    <line x1="520" y1="300" x2="520" y2="378" stroke="#2980b9" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
      </marker>
    </defs>

    <!-- Blue text -->
    <text x="420" y="220" font-size="16" fill="#2980b9" font-weight="bold">If it would be rare to observe</text>
    <text x="420" y="242" font-size="16" fill="#2980b9" font-weight="bold">the level of variation explained</text>
    <text x="420" y="264" font-size="16" fill="#2980b9" font-weight="bold">by our model, relative to the</text>
    <text x="420" y="286" font-size="16" fill="#2980b9" font-weight="bold">null distribution, we reject</text>
    <text x="420" y="308" font-size="16" fill="#2980b9" font-weight="bold">the null hypothesis</text>
  </g>
</svg>
