<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="sans-serif">
  <!-- Left side: Text descriptions -->
  <text x="30" y="40" font-size="24">Model I</text>
  <text x="30" y="70" font-size="20">- Ordinary Least Squares (OLS) <tspan fill="#2980b9" font-weight="bold">[1]</tspan></text>

  <text x="30" y="140" font-size="24">Model II</text>
  <text x="30" y="170" font-size="20">- Major axis (MA) <tspan fill="#27ae60" font-weight="bold">[2]</tspan></text>
  <text x="30" y="200" font-size="20">- Ranged Major Axis (Ranged MA) <tspan fill="#27ae60" font-weight="bold">[2]</tspan></text>
  <text x="30" y="230" font-size="20">- Reduced Major Axis (RMA) <tspan fill="#e74c3c" font-weight="bold">[3]</tspan></text>

  <!-- Right side: Diagram -->
  <g transform="translate(530,20)">
    <!-- Axes -->
    <text x="15" y="20" font-size="20" font-style="italic" font-family="serif">Y</text>
    <line x1="30" y1="350" x2="330" y2="350" stroke="black" stroke-width="2"/>
    <line x1="30" y1="350" x2="30" y2="25" stroke="black" stroke-width="2"/>
    <text x="320" y="375" font-size="20" font-style="italic" font-family="serif">X</text>

    <!-- Regression line -->
    <line x1="50" y1="320" x2="300" y2="50" stroke="black" stroke-width="2"/>

    <!-- Point near top-right -->
    <rect x="240" y="95" width="10" height="10" fill="black"/>

    <!-- OLS: vertical distance [1] -->
    <line x1="245" y1="100" x2="245" y2="160" stroke="#2980b9" stroke-width="2"/>
    <rect x="218" y="148" width="30" height="20" fill="none" stroke="#2980b9" stroke-width="2"/>
    <text x="228" y="163" font-size="14" fill="#2980b9" font-weight="bold">1</text>

    <!-- MA: perpendicular distance [2] -->
    <line x1="245" y1="100" x2="210" y2="135" stroke="#27ae60" stroke-width="2"/>
    <rect x="193" y="173" width="30" height="20" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="203" y="188" font-size="14" fill="#27ae60" font-weight="bold">2</text>

    <!-- RMA: area/triangle [3] -->
    <!-- Show shaded triangle -->
    <polygon points="245,100 245,160 210,135" fill="rgba(200,200,200,0.5)" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="258" y="78" width="30" height="20" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <text x="268" y="93" font-size="14" fill="#e74c3c" font-weight="bold">3</text>
  </g>

  <!-- Caption -->
  <rect x="220" y="470" width="90" height="28" fill="#666" rx="3"/>
  <text x="265" y="490" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Figure 5.12</text>
  <text x="320" y="490" font-size="16"> Distances or areas minimized by OLS (1), MA</text>
  <text x="220" y="515" font-size="16">(2) and RMA (shaded area 3) linear regressions of <tspan font-style="italic" font-family="serif">Y</tspan> on <tspan font-style="italic" font-family="serif">X</tspan>.</text>
</svg>
