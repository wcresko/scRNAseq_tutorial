<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .plotTitle { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .axis { stroke: #888; stroke-width: 1; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .cut { stroke: #d73027; stroke-width: 1.5; stroke-dasharray: 4 3; }
  </style>

  <text class="title" x="450" y="28">Common per-cell QC metrics (violins with filter thresholds)</text>

  <!-- Violin 1: nFeature -->
  <g transform="translate(80,70)">
    <text class="plotTitle" x="110" y="0">nFeature_RNA (genes/cell)</text>
    <line class="axis" x1="0" y1="210" x2="220" y2="210"/>
    <line class="axis" x1="0" y1="20" x2="0"   y2="210"/>
    <!-- violin body -->
    <path d="M 110 30
             C 75 50, 75 80, 90 100
             C 70 120, 70 150, 95 170
             C 85 185, 90 195, 110 200
             C 130 195, 135 185, 125 170
             C 150 150, 150 120, 130 100
             C 145 80, 145 50, 110 30 Z"
          fill="#2c7fb8" opacity="0.75"/>
    <!-- cutoffs -->
    <line class="cut" x1="0" y1="55" x2="220" y2="55"/>
    <text class="lbl" x="195" y="50" fill="#d73027">upper</text>
    <line class="cut" x1="0" y1="185" x2="220" y2="185"/>
    <text class="lbl" x="195" y="180" fill="#d73027">lower</text>
    <text class="lbl" x="110" y="230">low = empty / broken</text>
    <text class="lbl" x="110" y="245">high = doublet-like</text>
  </g>

  <!-- Violin 2: nCount -->
  <g transform="translate(350,70)">
    <text class="plotTitle" x="110" y="0">nCount_RNA (UMIs/cell)</text>
    <line class="axis" x1="0" y1="210" x2="220" y2="210"/>
    <line class="axis" x1="0" y1="20" x2="0"   y2="210"/>
    <path d="M 110 40
             C 80 60, 80 90, 100 110
             C 75 130, 75 160, 100 175
             C 90 190, 95 198, 110 200
             C 125 198, 130 190, 120 175
             C 145 160, 145 130, 120 110
             C 140 90, 140 60, 110 40 Z"
          fill="#1b9e77" opacity="0.75"/>
    <line class="cut" x1="0" y1="60"  x2="220" y2="60"/>
    <line class="cut" x1="0" y1="190" x2="220" y2="190"/>
    <text class="lbl" x="195" y="55" fill="#d73027">upper</text>
    <text class="lbl" x="195" y="185" fill="#d73027">lower</text>
    <text class="lbl" x="110" y="230">correlates with nFeature</text>
    <text class="lbl" x="110" y="245">sequencing depth</text>
  </g>

  <!-- Violin 3: percent mito -->
  <g transform="translate(620,70)">
    <text class="plotTitle" x="110" y="0">percent.mt (%)</text>
    <line class="axis" x1="0" y1="210" x2="220" y2="210"/>
    <line class="axis" x1="0" y1="20" x2="0"   y2="210"/>
    <path d="M 110 170
             C 75 180, 80 195, 95 202
             C 85 207, 90 209, 110 209
             C 130 209, 135 207, 125 202
             C 140 195, 145 180, 110 170 Z
             M 110 100
             C 95 130, 95 160, 108 170
             L 112 170
             C 125 160, 125 130, 110 100 Z"
          fill="#e66101" opacity="0.75"/>
    <line class="cut" x1="0" y1="140" x2="220" y2="140"/>
    <text class="lbl" x="195" y="135" fill="#d73027">upper</text>
    <text class="lbl" x="110" y="230">high % mito =</text>
    <text class="lbl" x="110" y="245">stressed / dying cells</text>
  </g>
</svg>
