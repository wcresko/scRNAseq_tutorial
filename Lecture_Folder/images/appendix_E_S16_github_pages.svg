<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">GitHub Pages Workflow</text>

  <!-- Quarto Documents -->
  <rect x="15" y="50" width="120" height="45" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="75" y="70" text-anchor="middle" font-size="12" fill="#000">Quarto</text>
  <text x="75" y="84" text-anchor="middle" font-size="12" fill="#000">Documents</text>

  <!-- Render -->
  <line x1="135" y1="72" x2="170" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="153" y="63" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Render</text>

  <!-- HTML Files -->
  <rect x="175" y="50" width="105" height="45" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="227" y="77" text-anchor="middle" fill="#000">HTML Files</text>

  <!-- git push -->
  <line x1="280" y1="72" x2="320" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="63" text-anchor="middle" font-size="10" fill="#555" font-style="italic">git push</text>

  <!-- GitHub Repository -->
  <rect x="325" y="50" width="130" height="45" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="390" y="70" text-anchor="middle" font-size="12" fill="#000">GitHub</text>
  <text x="390" y="84" text-anchor="middle" font-size="12" fill="#000">Repository</text>

  <!-- Automatic -->
  <line x1="455" y1="72" x2="500" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="478" y="63" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Auto</text>

  <!-- GitHub Pages Website -->
  <rect x="505" y="50" width="130" height="45" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="570" y="70" text-anchor="middle" font-size="12" fill="#000">GitHub Pages</text>
  <text x="570" y="84" text-anchor="middle" font-size="12" fill="#000">Website</text>

  <!-- URL -->
  <line x1="635" y1="72" x2="665" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="670" y="45" width="120" height="55" rx="8" fill="#c8e6c9" stroke="#333" stroke-width="2"/>
  <text x="730" y="68" text-anchor="middle" font-size="11" fill="#000">yourname</text>
  <text x="730" y="82" text-anchor="middle" font-size="11" fill="#000">.github.io</text>
  <text x="730" y="95" text-anchor="middle" font-size="10" fill="#000">/project</text>
</svg>
