<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Arial, Helvetica, sans-serif">
  <style>
    .model-label { font-size: 16px; font-weight: bold; }
    .method-title { font-size: 15px; font-weight: bold; text-decoration: underline; }
    .method-desc { font-size: 14px; font-weight: bold; fill: #333; }
    .method-example { font-size: 13px; fill: #666; }
    .footnote { font-size: 12px; fill: #555; }
    .blue { fill: #2166ac; }
    .green { fill: #2d6a2e; }
  </style>

  <!-- Model I Box (blue border) -->
  <rect x="100" y="15" width="780" height="95" fill="white" stroke="#2166ac" stroke-width="3" rx="5"/>
  <text x="50" y="65" class="model-label blue">Model I</text>

  <text x="120" y="42" class="method-title">OLS:</text>
  <text x="120" y="62" class="method-desc">When there is no (or very little error) in the x variable</text>
  <text x="120" y="82" class="method-example">e.g. time points, temperature series set by experimenter, etc.</text>

  <!-- Model II Box (green border) -->
  <rect x="100" y="130" width="780" height="280" fill="white" stroke="#2d6a2e" stroke-width="3" rx="5"/>
  <text x="50" y="220" class="model-label green">Model II</text>

  <!-- MA section -->
  <text x="120" y="160" class="method-title" fill="#2d6a2e">Major Axis (MA):</text>
  <text x="120" y="182" class="method-desc">When there is equal error in both y and x (same units or dimensionless)</text>
  <text x="120" y="202" class="method-example">e.g. X and Y are both ratios, and we're interested in estimating the slope</text>

  <!-- Separator -->
  <line x1="120" y1="218" x2="860" y2="218" stroke="#ddd" stroke-width="1"/>

  <!-- Ranged MA section -->
  <text x="120" y="242" class="method-title" fill="#2d6a2e">Ranged Major Axis (ranged MA):</text>
  <text x="120" y="264" class="method-desc">When there is error in both y and x (different units/scales), but no outliers</text>
  <text x="120" y="284" class="method-example">e.g. X and Y are height and length in tens of cm and tenths of grams</text>

  <!-- Separator -->
  <line x1="120" y1="300" x2="860" y2="300" stroke="#ddd" stroke-width="1"/>

  <!-- RMA section -->
  <text x="120" y="324" class="method-title" fill="#2d6a2e">Reduced Major Axis (RMA, or SMA):</text>
  <text x="120" y="346" class="method-desc">When there is error in both y and x (different units/scales), and sig. correlation</text>
  <text x="120" y="366" class="method-example">e.g. X and Y are different scales, robust to outliers</text>

  <!-- Footnotes -->
  <text x="50" y="440" class="footnote">* Table 8.1 (pg. 175) in the Logan text</text>
  <text x="50" y="460" class="footnote">* See Legendre's Model II Regression Guide, 2013 (file: mod2user.pdf in Week 4 material on Canvas)</text>
</svg>