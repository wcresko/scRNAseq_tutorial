<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="400" fill="white"/>

  <!-- Command boxes -->
  <!-- $ (Prompt) -->
  <rect x="160" y="160" width="60" height="65" rx="5" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <text x="190" y="202" text-anchor="middle" font-size="36" font-family="'Courier New', monospace" font-weight="bold" fill="#333">$</text>

  <!-- ls (Command) -->
  <rect x="240" y="160" width="70" height="65" rx="5" fill="none" stroke="#e67e22" stroke-width="3"/>
  <text x="275" y="202" text-anchor="middle" font-size="36" font-family="'Courier New', monospace" font-weight="bold" fill="#333">ls</text>

  <!-- -F (Option) -->
  <rect x="330" y="160" width="70" height="65" rx="5" fill="none" stroke="#27ae60" stroke-width="3"/>
  <text x="365" y="202" text-anchor="middle" font-size="36" font-family="'Courier New', monospace" font-weight="bold" fill="#333">-F</text>

  <!-- / (Argument) -->
  <rect x="420" y="160" width="60" height="65" rx="5" fill="none" stroke="#2980b9" stroke-width="3"/>
  <text x="450" y="202" text-anchor="middle" font-size="36" font-family="'Courier New', monospace" font-weight="bold" fill="#333">/</text>

  <!-- Labels with lines -->
  <!-- PROMPT label -->
  <text x="120" y="80" text-anchor="middle" font-size="28" font-weight="bold" fill="#e74c3c">PROMPT</text>
  <line x1="150" y1="90" x2="185" y2="158" stroke="#e74c3c" stroke-width="2"/>

  <!-- COMMAND label -->
  <text x="275" y="320" text-anchor="middle" font-size="28" font-weight="bold" fill="#e67e22">COMMAND</text>
  <line x1="275" y1="227" x2="275" y2="295" stroke="#e67e22" stroke-width="2"/>

  <!-- OPTION label -->
  <text x="480" y="80" text-anchor="middle" font-size="28" font-weight="bold" fill="#27ae60">OPTION</text>
  <line x1="445" y1="90" x2="375" y2="158" stroke="#27ae60" stroke-width="2"/>

  <!-- ARGUMENT label -->
  <text x="530" y="320" text-anchor="middle" font-size="28" font-weight="bold" fill="#2980b9">ARGUMENT</text>
  <line x1="470" y1="227" x2="510" y2="295" stroke="#2980b9" stroke-width="2"/>
</svg>