<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" font-family="Arial, Helvetica, sans-serif">

  <!-- Top level: Main Factor A -->
  <!-- A1 -->
  <text x="200" y="45" font-size="28" text-anchor="middle" fill="#333">A</text>
  <text x="215" y="52" font-size="16" text-anchor="middle" fill="#333">1</text>

  <!-- Main Factor label -->
  <text x="475" y="40" font-size="22" text-anchor="middle" fill="#8B0000" font-weight="bold">Main Factor "A" (e.g. Treatment)</text>

  <!-- Ai -->
  <text x="750" y="45" font-size="28" text-anchor="middle" fill="#333">A</text>
  <text x="762" y="52" font-size="16" text-anchor="middle" fill="#333" font-style="italic">i</text>

  <!-- Mu labels under A -->
  <text x="200" y="80" font-size="20" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="215" y="84" font-size="14" text-anchor="middle" fill="#333">1</text>
  <text x="222" y="80" font-size="20" text-anchor="middle" fill="#333">)</text>

  <text x="750" y="80" font-size="20" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="766" y="84" font-size="14" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="774" y="80" font-size="20" text-anchor="middle" fill="#333">)</text>

  <!-- Branches from A1 down to B level -->
  <g stroke="#333" stroke-width="2" fill="none">
    <!-- A1 branches -->
    <line x1="200" y1="90" x2="100" y2="190"/>
    <line x1="200" y1="90" x2="200" y2="190"/>
    <line x1="200" y1="90" x2="300" y2="190"/>

    <!-- Ai branches -->
    <line x1="750" y1="90" x2="620" y2="190"/>
    <line x1="750" y1="90" x2="750" y2="190"/>
    <line x1="750" y1="90" x2="880" y2="190"/>
  </g>

  <!-- Nested Factor B label -->
  <text x="475" y="155" font-size="20" text-anchor="middle" fill="#8B0000" font-weight="bold">Nested Factor "B" (e.g. Site)</text>

  <!-- B labels under A1 -->
  <text x="100" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="117" y="222" font-size="14" text-anchor="middle" fill="#333">1(1)</text>

  <text x="200" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="217" y="222" font-size="14" text-anchor="middle" fill="#333">2(1)</text>

  <text x="300" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="318" y="222" font-size="14" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="325" y="222" font-size="14" text-anchor="middle" fill="#333">(1)</text>

  <!-- Mu labels under B (A1 side) -->
  <text x="100" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="118" y="254" font-size="12" text-anchor="middle" fill="#333">1(1)</text>
  <text x="130" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <text x="200" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="218" y="254" font-size="12" text-anchor="middle" fill="#333">2(1)</text>
  <text x="230" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <text x="300" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="320" y="254" font-size="12" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="327" y="254" font-size="12" text-anchor="middle" fill="#333">(1)</text>
  <text x="338" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <!-- B labels under Ai -->
  <text x="620" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="640" y="222" font-size="14" text-anchor="middle" fill="#333">1(</text>
  <text x="650" y="222" font-size="14" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="656" y="222" font-size="14" text-anchor="middle" fill="#333">)</text>

  <text x="750" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="770" y="222" font-size="14" text-anchor="middle" fill="#333">2(</text>
  <text x="780" y="222" font-size="14" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="786" y="222" font-size="14" text-anchor="middle" fill="#333">)</text>

  <text x="880" y="215" font-size="22" text-anchor="middle" fill="#333">B</text>
  <text x="900" y="222" font-size="14" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="906" y="222" font-size="14" text-anchor="middle" fill="#333">(</text>
  <text x="912" y="222" font-size="14" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="918" y="222" font-size="14" text-anchor="middle" fill="#333">)</text>

  <!-- Mu labels under B (Ai side) -->
  <text x="620" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="643" y="254" font-size="12" text-anchor="middle" fill="#333">1(</text>
  <text x="652" y="254" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="658" y="254" font-size="12" text-anchor="middle" fill="#333">)</text>
  <text x="665" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <text x="750" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="773" y="254" font-size="12" text-anchor="middle" fill="#333">2(</text>
  <text x="782" y="254" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="788" y="254" font-size="12" text-anchor="middle" fill="#333">)</text>
  <text x="795" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <text x="880" y="248" font-size="16" text-anchor="middle" fill="#333">(&#956;</text>
  <text x="903" y="254" font-size="12" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="909" y="254" font-size="12" text-anchor="middle" fill="#333">(</text>
  <text x="915" y="254" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="920" y="254" font-size="12" text-anchor="middle" fill="#333">)</text>
  <text x="930" y="248" font-size="16" text-anchor="middle" fill="#333">)</text>

  <!-- Lines from B1(1) down to observations -->
  <g stroke="#333" stroke-width="2" fill="none">
    <line x1="100" y1="260" x2="100" y2="320"/>
  </g>

  <!-- Sub-replicates label -->
  <text x="290" y="310" font-size="18" fill="#8B0000" font-weight="bold">Sub-replicates for each site</text>

  <!-- Arrows from label to observations -->
  <g stroke="#8B0000" stroke-width="2" fill="#8B0000">
    <line x1="270" y1="315" x2="145" y2="345"/>
    <polygon points="145,345 152,338 148,348"/>
    <line x1="270" y1="315" x2="145" y2="370"/>
    <polygon points="145,370 152,363 148,373"/>
    <line x1="270" y1="315" x2="145" y2="395"/>
    <polygon points="145,395 152,388 148,398"/>
  </g>

  <!-- Observation labels y under B1(1) -->
  <text x="100" y="350" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="120" y="356" font-size="12" text-anchor="middle" fill="#333">1(1(1))</text>

  <text x="100" y="380" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="120" y="386" font-size="12" text-anchor="middle" fill="#333">2(1(1))</text>

  <text x="100" y="410" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="122" y="416" font-size="12" text-anchor="middle" fill="#333" font-style="italic">k</text>
  <text x="132" y="416" font-size="12" text-anchor="middle" fill="#333">(1(1))</text>

  <!-- Observation labels under Bj(i) -->
  <g stroke="#333" stroke-width="2" fill="none">
    <line x1="880" y1="260" x2="880" y2="320"/>
  </g>

  <text x="880" y="350" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="905" y="356" font-size="12" text-anchor="middle" fill="#333">1(</text>
  <text x="914" y="356" font-size="12" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="919" y="356" font-size="12" text-anchor="middle" fill="#333">(</text>
  <text x="925" y="356" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="930" y="356" font-size="12" text-anchor="middle" fill="#333">))</text>

  <text x="880" y="380" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="905" y="386" font-size="12" text-anchor="middle" fill="#333">2(</text>
  <text x="914" y="386" font-size="12" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="919" y="386" font-size="12" text-anchor="middle" fill="#333">(</text>
  <text x="925" y="386" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="930" y="386" font-size="12" text-anchor="middle" fill="#333">))</text>

  <text x="880" y="410" font-size="18" text-anchor="middle" fill="#333" font-style="italic">y</text>
  <text x="900" y="416" font-size="12" text-anchor="middle" fill="#333" font-style="italic">k</text>
  <text x="906" y="416" font-size="12" text-anchor="middle" fill="#333">(</text>
  <text x="912" y="416" font-size="12" text-anchor="middle" fill="#333" font-style="italic">j</text>
  <text x="917" y="416" font-size="12" text-anchor="middle" fill="#333">(</text>
  <text x="923" y="416" font-size="12" text-anchor="middle" fill="#333" font-style="italic">i</text>
  <text x="928" y="416" font-size="12" text-anchor="middle" fill="#333">))</text>

  <!-- Bottom box: notation explanation -->
  <rect x="530" y="430" width="400" height="80" rx="5" fill="none" stroke="#cc0000" stroke-width="3"/>

  <text x="545" y="460" font-size="18" fill="#333" font-style="italic">y</text>
  <text x="558" y="466" font-size="13" fill="#333" font-style="italic">k</text>
  <text x="565" y="466" font-size="13" fill="#333">(</text>
  <text x="571" y="466" font-size="13" fill="#333" font-style="italic">j</text>
  <text x="577" y="466" font-size="13" fill="#333">(</text>
  <text x="583" y="466" font-size="13" fill="#333" font-style="italic">i</text>
  <text x="588" y="466" font-size="13" fill="#333">))</text>
  <text x="610" y="460" font-size="18" fill="#333">= </text>
  <text x="635" y="460" font-size="18" fill="#333" font-style="italic">y</text>
  <text x="650" y="466" font-size="13" fill="#333" font-style="italic">ijk</text>

  <text x="545" y="495" font-size="16" fill="#8B0000">observation </text>
  <text x="645" y="495" font-size="16" fill="#8B0000" font-style="italic">k</text>
  <text x="657" y="495" font-size="16" fill="#8B0000"> within Site </text>
  <text x="768" y="495" font-size="16" fill="#8B0000" font-style="italic">j</text>
  <text x="780" y="495" font-size="16" fill="#8B0000"> within Treatment </text>
  <text x="915" y="495" font-size="16" fill="#8B0000" font-style="italic">i</text>
</svg>