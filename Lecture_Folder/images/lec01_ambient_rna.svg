<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .tool { font-size: 11px; fill: #222; text-anchor: middle; }
  </style>

  <text class="title" x="500" y="28">Ambient RNA and empty droplets</text>

  <!-- Panel 1: good droplet -->
  <g transform="translate(60,60)">
    <text class="panel" x="130" y="0">Cell-containing droplet</text>
    <circle cx="130" cy="110" r="90" fill="#dbeaf2" stroke="#2c7fb8" stroke-width="2"/>
    <circle cx="120" cy="105" r="26" fill="#e66101" opacity="0.9"/>
    <text class="lbl" x="120" y="109" fill="#fff" font-weight="700">cell</text>
    <circle cx="155" cy="140" r="16" fill="#444"/>
    <text class="lbl" x="155" y="144" fill="#fff" font-weight="700">bead</text>
    <!-- tiny dots: cell's own RNA -->
    <g fill="#e66101" opacity="0.6">
      <circle cx="80"  cy="80" r="2"/>
      <circle cx="100" cy="70" r="2"/>
      <circle cx="140" cy="70" r="2"/>
      <circle cx="170" cy="90" r="2"/>
      <circle cx="85"  cy="130" r="2"/>
      <circle cx="105" cy="155" r="2"/>
    </g>
    <text class="lbl" x="130" y="220">cell + its mRNA + bead</text>
    <text class="lbl" x="130" y="237">→ real expression profile</text>
  </g>

  <!-- Panel 2: empty droplet with ambient -->
  <g transform="translate(360,60)">
    <text class="panel" x="130" y="0">Empty droplet</text>
    <circle cx="130" cy="110" r="90" fill="#f2e9dc" stroke="#a6611a" stroke-width="2"/>
    <circle cx="135" cy="130" r="16" fill="#444"/>
    <text class="lbl" x="135" y="134" fill="#fff" font-weight="700">bead</text>
    <!-- ambient soup: mixed-color tiny dots -->
    <g opacity="0.6">
      <circle cx="80"  cy="75" r="2" fill="#2c7fb8"/>
      <circle cx="100" cy="95" r="2" fill="#1b9e77"/>
      <circle cx="120" cy="70" r="2" fill="#e66101"/>
      <circle cx="155" cy="80" r="2" fill="#756bb1"/>
      <circle cx="180" cy="100" r="2" fill="#2c7fb8"/>
      <circle cx="90"  cy="150" r="2" fill="#1b9e77"/>
      <circle cx="75"  cy="120" r="2" fill="#e66101"/>
      <circle cx="170" cy="150" r="2" fill="#756bb1"/>
      <circle cx="120" cy="170" r="2" fill="#1b9e77"/>
      <circle cx="175" cy="125" r="2" fill="#2c7fb8"/>
    </g>
    <text class="lbl" x="130" y="220">no cell — only free-floating</text>
    <text class="lbl" x="130" y="237">RNA from lysed cells</text>
  </g>

  <!-- Panel 3: cell + ambient -->
  <g transform="translate(660,60)">
    <text class="panel" x="130" y="0">Cell + ambient contamination</text>
    <circle cx="130" cy="110" r="90" fill="#dbeaf2" stroke="#2c7fb8" stroke-width="2"/>
    <circle cx="120" cy="105" r="26" fill="#e66101" opacity="0.9"/>
    <text class="lbl" x="120" y="109" fill="#fff" font-weight="700">cell</text>
    <circle cx="155" cy="140" r="16" fill="#444"/>
    <!-- cell's RNA -->
    <g fill="#e66101" opacity="0.6">
      <circle cx="100" cy="70" r="2"/>
      <circle cx="140" cy="70" r="2"/>
      <circle cx="85"  cy="130" r="2"/>
    </g>
    <!-- ambient contamination -->
    <g opacity="0.6">
      <circle cx="80"  cy="95"  r="2" fill="#2c7fb8"/>
      <circle cx="175" cy="100" r="2" fill="#1b9e77"/>
      <circle cx="180" cy="75"  r="2" fill="#756bb1"/>
      <circle cx="100" cy="155" r="2" fill="#2c7fb8"/>
      <circle cx="165" cy="160" r="2" fill="#756bb1"/>
      <circle cx="75"  cy="155" r="2" fill="#1b9e77"/>
    </g>
    <text class="lbl" x="130" y="220">real cell, but signal includes</text>
    <text class="lbl" x="130" y="237">ambient RNA from other cells</text>
  </g>

  <!-- Tools row -->
  <g transform="translate(60,300)">
    <rect x="0" y="0" width="880" height="60" rx="10" fill="#fff7d6" stroke="#d9b41a"/>
    <text class="panel" x="440" y="22">Tools that detect / correct this</text>
    <text class="tool" x="150" y="45" font-weight="700">EmptyDrops</text>
    <text class="tool" x="250" y="45">(identify true cells vs empty)</text>
    <text class="tool" x="450" y="45" font-weight="700">SoupX · DecontX</text>
    <text class="tool" x="590" y="45">(estimate &amp; subtract ambient)</text>
    <text class="tool" x="750" y="45" font-weight="700">CellBender</text>
    <text class="tool" x="840" y="45">(deep-learning denoise)</text>
  </g>
</svg>
