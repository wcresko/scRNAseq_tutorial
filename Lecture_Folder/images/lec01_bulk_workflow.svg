<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #222; text-anchor: middle; }
    .stage { font-size: 14px; font-weight: 600; fill: #fff; text-anchor: middle; }
    .tool  { font-size: 11px; fill: #333; text-anchor: middle; }
    .lane  { font-size: 13px; font-weight: 600; fill: #555; text-anchor: start; }
  </style>

  <text class="title" x="550" y="32">Bulk RNA-seq Analysis Workflow</text>

  <!-- Lane labels -->
  <text class="lane" x="20"  y="90">Wet lab</text>
  <text class="lane" x="20"  y="230">Preprocessing</text>
  <text class="lane" x="20"  y="370">Statistical analysis</text>

  <!-- Row 1: Wet lab -->
  <g>
    <rect x="140" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="220" y="95">Tissue / RNA extraction</text>
  </g>
  <g>
    <rect x="340" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="420" y="88">Library prep</text>
    <text class="stage" x="420" y="105" font-size="11" font-weight="400">(polyA or rRNA-depleted)</text>
  </g>
  <g>
    <rect x="540" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="620" y="88">Sequencing</text>
    <text class="stage" x="620" y="105" font-size="11" font-weight="400">(paired or single end)</text>
  </g>
  <g>
    <rect x="740" y="65" width="200" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="840" y="88">Raw reads (FASTQ)</text>
    <text class="stage" x="840" y="105" font-size="11" font-weight="400">one file pair per sample</text>
  </g>

  <text class="tool" x="420" y="135">TruSeq · Illumina stranded · NEBNext</text>
  <text class="tool" x="620" y="135">NovaSeq · NextSeq · HiSeq</text>

  <!-- Row 2: Preprocessing -->
  <g>
    <rect x="140" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="220" y="230">Read QC &amp; trimming</text>
  </g>
  <g>
    <rect x="340" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="420" y="230">Alignment / quantification</text>
  </g>
  <g>
    <rect x="540" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="620" y="230">Gene-level counts</text>
  </g>
  <g>
    <rect x="740" y="200" width="200" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="840" y="223">Counts matrix</text>
    <text class="stage" x="840" y="240" font-size="11" font-weight="400">(genes × samples)</text>
  </g>

  <text class="tool" x="220" y="268">FastQC · MultiQC · fastp · Trim Galore</text>
  <text class="tool" x="420" y="268">STAR · HISAT2 · Salmon · kallisto</text>
  <text class="tool" x="620" y="268">featureCounts · HTSeq · tximport</text>

  <!-- Row 3: Statistical analysis -->
  <g>
    <rect x="140" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="220" y="358">Normalization +</text>
    <text class="stage" x="220" y="375" font-size="11" font-weight="400">filtering low-expr. genes</text>
  </g>
  <g>
    <rect x="340" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="420" y="358">EDA: PCA,</text>
    <text class="stage" x="420" y="375" font-size="11" font-weight="400">sample clustering</text>
  </g>
  <g>
    <rect x="540" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="620" y="358">Differential expression</text>
    <text class="stage" x="620" y="375" font-size="11" font-weight="400">(DESeq2 / edgeR / limma)</text>
  </g>
  <g>
    <rect x="740" y="335" width="200" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="840" y="358">Enrichment / pathway</text>
    <text class="stage" x="840" y="375" font-size="11" font-weight="400">(GO · KEGG · GSEA)</text>
  </g>

  <text class="tool" x="220" y="403">size factors · CPM · TPM · VST · rlog</text>
  <text class="tool" x="420" y="403">plotPCA · pheatmap · dist()</text>
  <text class="tool" x="620" y="403">Wald / LRT · eBayes · voom</text>
  <text class="tool" x="840" y="403">clusterProfiler · fgsea · enrichR</text>

  <!-- Row-to-row connectors -->
  <path d="M 1020 90 C 1070 90 1070 225 1020 225" stroke="#888" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 1020 225 C 1070 225 1070 360 1020 360" stroke="#888" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
</svg>
