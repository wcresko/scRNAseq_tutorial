<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <rect width="900" height="500" fill="#fafafa" rx="10"/>
  
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5c2a">Non-Linear Fitting Methods: LOESS &amp; Splines</text>
  
  <!-- Table header -->
  <rect x="20" y="50" width="860" height="35" rx="6" fill="#2e7d32"/>
  <text x="100" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Method</text>
  <text x="260" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">How It Works</text>
  <text x="440" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">R Function</text>
  <text x="580" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Tuning</text>
  <text x="730" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Best For</text>
  <text x="850" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">p-values?</text>
  
  <!-- Row 1: LOESS -->
  <rect x="20" y="90" width="860" height="62" fill="#e8f5e9"/>
  <text x="100" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">LOESS</text>
  <text x="100" y="132" text-anchor="middle" font-size="9" fill="#555">(Local Regression)</text>
  <text x="260" y="110" text-anchor="middle" font-size="10" fill="#333">Local weighted polynomial</text>
  <text x="260" y="125" text-anchor="middle" font-size="10" fill="#333">at each point; neighbors</text>
  <text x="260" y="140" text-anchor="middle" font-size="10" fill="#333">weighted by distance</text>
  <text x="440" y="118" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">loess()</text>
  <text x="440" y="135" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">geom_smooth()</text>
  <text x="580" y="118" text-anchor="middle" font-size="10" fill="#333">span (0–1)</text>
  <text x="580" y="135" text-anchor="middle" font-size="9" fill="#555">smaller = wigglier</text>
  <text x="730" y="118" text-anchor="middle" font-size="10" fill="#333">Exploration,</text>
  <text x="730" y="135" text-anchor="middle" font-size="10" fill="#333">visualization</text>
  <text x="850" y="120" text-anchor="middle" font-size="11" fill="#c62828">No</text>
  
  <!-- Row 2: Natural Splines -->
  <rect x="20" y="157" width="860" height="62" fill="white"/>
  <text x="100" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Natural Splines</text>
  <text x="100" y="199" text-anchor="middle" font-size="9" fill="#555">(Regression Splines)</text>
  <text x="260" y="177" text-anchor="middle" font-size="10" fill="#333">Piecewise cubic polynomials</text>
  <text x="260" y="192" text-anchor="middle" font-size="10" fill="#333">joined at knots; linear</text>
  <text x="260" y="207" text-anchor="middle" font-size="10" fill="#333">beyond boundary knots</text>
  <text x="440" y="185" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">lm(y ~ ns(x, df))</text>
  <text x="440" y="202" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">splines::ns()</text>
  <text x="580" y="185" text-anchor="middle" font-size="10" fill="#333">df (knot count)</text>
  <text x="580" y="202" text-anchor="middle" font-size="9" fill="#555">higher = more flexible</text>
  <text x="730" y="185" text-anchor="middle" font-size="10" fill="#333">Regression with</text>
  <text x="730" y="202" text-anchor="middle" font-size="10" fill="#333">controlled flexibility</text>
  <text x="850" y="190" text-anchor="middle" font-size="11" fill="#2e7d32">Yes</text>
  
  <!-- Row 3: Smoothing Splines -->
  <rect x="20" y="224" width="860" height="62" fill="#e3f2fd"/>
  <text x="100" y="249" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Smoothing Splines</text>
  <text x="260" y="244" text-anchor="middle" font-size="10" fill="#333">Knot at every data point;</text>
  <text x="260" y="259" text-anchor="middle" font-size="10" fill="#333">roughness penalty prevents</text>
  <text x="260" y="274" text-anchor="middle" font-size="10" fill="#333">overfitting</text>
  <text x="440" y="255" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">smooth.spline()</text>
  <text x="580" y="249" text-anchor="middle" font-size="10" fill="#333">λ or equiv. df</text>
  <text x="580" y="266" text-anchor="middle" font-size="9" fill="#555">CV selects automatically</text>
  <text x="730" y="249" text-anchor="middle" font-size="10" fill="#333">Adaptive smoothing,</text>
  <text x="730" y="266" text-anchor="middle" font-size="10" fill="#333">no knot placement</text>
  <text x="850" y="255" text-anchor="middle" font-size="11" fill="#e65100">Limited</text>
  
  <!-- Row 4: GAMs -->
  <rect x="20" y="291" width="860" height="62" fill="white"/>
  <text x="100" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">GAMs</text>
  <text x="100" y="333" text-anchor="middle" font-size="9" fill="#555">(Gen. Additive Models)</text>
  <text x="260" y="311" text-anchor="middle" font-size="10" fill="#333">Penalized regression splines</text>
  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#333">with auto-tuned smoothness;</text>
  <text x="260" y="341" text-anchor="middle" font-size="10" fill="#333">additive structure</text>
  <text x="440" y="318" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">mgcv::gam()</text>
  <text x="440" y="335" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">y ~ s(x)</text>
  <text x="580" y="318" text-anchor="middle" font-size="10" fill="#333">Auto (GCV/REML)</text>
  <text x="580" y="335" text-anchor="middle" font-size="9" fill="#555">can set k for max df</text>
  <text x="730" y="318" text-anchor="middle" font-size="10" fill="#333">Formal inference</text>
  <text x="730" y="335" text-anchor="middle" font-size="10" fill="#333">on smooth terms</text>
  <text x="850" y="322" text-anchor="middle" font-size="11" fill="#2e7d32">Yes</text>
  
  <!-- Summary boxes -->
  <rect x="20" y="370" width="420" height="110" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="230" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">When to Use LOESS</text>
  <text x="40" y="418" font-size="11" fill="#333">• Quick visualization of non-linear patterns</text>
  <text x="40" y="436" font-size="11" fill="#333">• Built into ggplot2 via geom_smooth()</text>
  <text x="40" y="454" font-size="11" fill="#333">• Exploratory — not for formal inference</text>
  <text x="40" y="472" font-size="11" fill="#333">• Small-to-moderate datasets (slow for n &gt; 10,000)</text>
  
  <rect x="460" y="370" width="420" height="110" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="670" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">When to Use Splines / GAMs</text>
  <text x="480" y="418" font-size="11" fill="#333">• Formal regression with non-linear terms</text>
  <text x="480" y="436" font-size="11" fill="#333">• Need p-values, CIs, and model comparison</text>
  <text x="480" y="454" font-size="11" fill="#333">• Multiple predictors (additive smooths)</text>
  <text x="480" y="472" font-size="11" fill="#333">• GAMs scale well to large datasets</text>
</svg>
