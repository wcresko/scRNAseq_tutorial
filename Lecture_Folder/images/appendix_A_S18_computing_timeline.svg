<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" font-family="Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Computing Timeline</text>

  <!-- 1960s-70s Mainframes -->
  <rect x="15" y="40" width="110" height="55" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="70" y="62" text-anchor="middle" font-weight="bold" fill="#000">1960s-70s</text>
  <text x="70" y="80" text-anchor="middle" fill="#000">Mainframes</text>
  <line x1="125" y1="67" x2="150" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 1980s-90s PCs -->
  <rect x="155" y="40" width="110" height="55" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="210" y="62" text-anchor="middle" font-weight="bold" fill="#000">1980s-90s</text>
  <text x="210" y="80" text-anchor="middle" fill="#000">Personal PCs</text>
  <line x1="265" y1="67" x2="290" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 1990s-2000s Client-Server -->
  <rect x="295" y="40" width="110" height="55" rx="8" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="350" y="62" text-anchor="middle" font-weight="bold" fill="#000">1990s-2000s</text>
  <text x="350" y="80" text-anchor="middle" fill="#000">Client-Server</text>
  <line x1="405" y1="67" x2="430" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2000s Clusters/Grids -->
  <rect x="435" y="40" width="110" height="55" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="490" y="62" text-anchor="middle" font-weight="bold" fill="#000">2000s</text>
  <text x="490" y="80" text-anchor="middle" fill="#000">Clusters/Grids</text>
  <line x1="545" y1="67" x2="570" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2006+ Cloud -->
  <rect x="575" y="40" width="100" height="55" rx="8" fill="#ffa07a" stroke="#333" stroke-width="2"/>
  <text x="625" y="62" text-anchor="middle" font-weight="bold" fill="#000">2006+</text>
  <text x="625" y="80" text-anchor="middle" fill="#000">Cloud</text>
  <line x1="675" y1="67" x2="700" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2020s Edge/Hybrid -->
  <rect x="705" y="40" width="85" height="55" rx="8" fill="#dda0dd" stroke="#333" stroke-width="2"/>
  <text x="747" y="62" text-anchor="middle" font-weight="bold" fill="#000">2020s</text>
  <text x="747" y="80" text-anchor="middle" fill="#000">Edge/Hybrid</text>
</svg>
