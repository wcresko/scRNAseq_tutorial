<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Operating System Architecture</text>

  <!-- User Applications -->
  <rect x="195" y="40" width="210" height="40" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" fill="#000">User Applications</text>
  <line x1="300" y1="80" x2="300" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- System Calls -->
  <rect x="170" y="110" width="260" height="40" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="#000">System Calls Interface</text>
  <line x1="300" y1="150" x2="300" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Kernel -->
  <rect x="195" y="180" width="210" height="40" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" font-weight="bold" fill="#000">Kernel</text>

  <!-- Kernel sub-functions (branching right) -->
  <line x1="405" y1="195" x2="440" y2="195" stroke="#333" stroke-width="2"/>
  <!-- Process Mgmt -->
  <line x1="440" y1="195" x2="440" y2="175" stroke="#333" stroke-width="1.5"/>
  <line x1="440" y1="175" x2="455" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="160" width="130" height="30" rx="5" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="180" text-anchor="middle" font-size="12" fill="#000">Process Mgmt</text>

  <!-- Memory Mgmt -->
  <line x1="440" y1="195" x2="455" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="195" width="130" height="30" rx="5" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="215" text-anchor="middle" font-size="12" fill="#000">Memory Mgmt</text>

  <!-- File System -->
  <line x1="440" y1="195" x2="440" y2="230" stroke="#333" stroke-width="1.5"/>
  <line x1="440" y1="230" x2="455" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="230" width="130" height="30" rx="5" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="250" text-anchor="middle" font-size="12" fill="#000">File System</text>

  <!-- I/O Mgmt -->
  <line x1="440" y1="195" x2="440" y2="265" stroke="#333" stroke-width="1.5"/>
  <line x1="440" y1="265" x2="455" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="265" width="130" height="30" rx="5" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="285" text-anchor="middle" font-size="12" fill="#000">I/O Management</text>

  <!-- Device Drivers -->
  <line x1="300" y1="220" x2="300" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="195" y="315" width="210" height="40" rx="8" fill="#dda0dd" stroke="#333" stroke-width="2"/>
  <text x="300" y="340" text-anchor="middle" fill="#000">Device Drivers</text>

  <!-- Hardware -->
  <line x1="300" y1="355" x2="300" y2="375" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="195" y="380" width="210" height="40" rx="8" fill="#ffa07a" stroke="#333" stroke-width="2"/>
  <text x="300" y="405" text-anchor="middle" fill="#000">Hardware</text>
</svg>
