<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Cost-Complexity Pruning (Weakest-Link Pruning)</text>

  <!-- Phase 1: Grow full tree -->
  <rect x="20" y="45" width="200" height="195" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="120" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Phase 1</text>
  <text x="120" y="84" text-anchor="middle" font-size="11" fill="#c62828">Grow Full Tree T₀</text>
  <line x1="36" y1="92" x2="204" y2="92" stroke="#e53935" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="120" y="112" text-anchor="middle" font-size="10" fill="#333">No stopping criterion</text>
  <text x="120" y="128" text-anchor="middle" font-size="10" fill="#333">Split until min node</text>
  <text x="120" y="143" text-anchor="middle" font-size="10" fill="#333">size = 1 (overfit!)</text>
  <!-- overfit tree sketch -->
  <line x1="120" y1="163" x2="120" y2="180" stroke="#c62828" stroke-width="1.5"/>
  <line x1="120" y1="180" x2="90" y2="200" stroke="#c62828" stroke-width="1.2"/>
  <line x1="120" y1="180" x2="150" y2="200" stroke="#c62828" stroke-width="1.2"/>
  <line x1="90" y1="200" x2="72" y2="218" stroke="#c62828" stroke-width="1"/>
  <line x1="90" y1="200" x2="108" y2="218" stroke="#c62828" stroke-width="1"/>
  <line x1="150" y1="200" x2="132" y2="218" stroke="#c62828" stroke-width="1"/>
  <line x1="150" y1="200" x2="168" y2="218" stroke="#c62828" stroke-width="1"/>
  <circle cx="72" cy="221" r="5" fill="#e74c3c"/>
  <circle cx="108" cy="221" r="5" fill="#e74c3c"/>
  <circle cx="132" cy="221" r="5" fill="#e74c3c"/>
  <circle cx="168" cy="221" r="5" fill="#e74c3c"/>
  <text x="120" y="240" text-anchor="middle" font-size="9" fill="#999">High variance, low bias</text>

  <!-- Arrow 1→2 -->
  <line x1="222" y1="140" x2="242" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 2: Cost-Complexity -->
  <rect x="244" y="45" width="220" height="195" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="354" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Phase 2</text>
  <text x="354" y="84" text-anchor="middle" font-size="11" fill="#e65100">Define Cost Function</text>
  <line x1="260" y1="92" x2="448" y2="92" stroke="#f57c00" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="354" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">R_α(T) = R(T) + α|T|</text>
  <line x1="260" y1="122" x2="448" y2="122" stroke="#ddd" stroke-width="0.8"/>
  <text x="354" y="139" text-anchor="middle" font-size="10" fill="#555">R(T) = training error</text>
  <text x="354" y="155" text-anchor="middle" font-size="10" fill="#555">(RSS or misclass. rate)</text>
  <text x="354" y="173" text-anchor="middle" font-size="10" fill="#555">|T| = number of leaves</text>
  <text x="354" y="191" text-anchor="middle" font-size="10" fill="#555">α = complexity penalty</text>
  <text x="354" y="215" text-anchor="middle" font-size="9" fill="#999">α = 0 → full tree</text>
  <text x="354" y="230" text-anchor="middle" font-size="9" fill="#999">α → ∞ → root node only</text>

  <!-- Arrow 2→3 -->
  <line x1="466" y1="140" x2="486" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 3: Prune sequence -->
  <rect x="488" y="45" width="200" height="195" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="588" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Phase 3</text>
  <text x="588" y="84" text-anchor="middle" font-size="11" fill="#2e7d32">Prune Weakest Link</text>
  <line x1="504" y1="92" x2="672" y2="92" stroke="#4caf50" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="588" y="112" text-anchor="middle" font-size="10" fill="#333">For each subtree, find</text>
  <text x="588" y="127" text-anchor="middle" font-size="10" fill="#333">the internal node where</text>
  <text x="588" y="142" text-anchor="middle" font-size="10" fill="#333">collapsing to a leaf</text>
  <text x="588" y="157" text-anchor="middle" font-size="10" fill="#333">costs least accuracy</text>
  <text x="588" y="178" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">Remove that branch</text>
  <text x="588" y="193" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">→ get T₁</text>
  <text x="588" y="211" text-anchor="middle" font-size="10" fill="#555">Repeat: T₀ → T₁ → T₂</text>
  <text x="588" y="226" text-anchor="middle" font-size="9" fill="#777">until just root remains</text>

  <!-- Arrow 3→4 -->
  <line x1="690" y1="140" x2="710" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 4: CV to choose -->
  <rect x="712" y="45" width="172" height="195" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="798" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Phase 4</text>
  <text x="798" y="84" text-anchor="middle" font-size="11" fill="#1565c0">Select via CV</text>
  <line x1="728" y1="92" x2="868" y2="92" stroke="#1976d2" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="798" y="110" text-anchor="middle" font-size="10" fill="#333">Use k-fold CV to</text>
  <text x="798" y="125" text-anchor="middle" font-size="10" fill="#333">estimate test error</text>
  <text x="798" y="140" text-anchor="middle" font-size="10" fill="#333">for each α value</text>
  <text x="798" y="162" text-anchor="middle" font-size="10" fill="#555">1-SE rule:</text>
  <text x="798" y="177" text-anchor="middle" font-size="10" fill="#555">Smallest tree within</text>
  <text x="798" y="192" text-anchor="middle" font-size="10" fill="#555">1 SE of minimum</text>
  <text x="798" y="214" text-anchor="middle" font-size="9" font-style="italic" fill="#1976d2">Balances accuracy</text>
  <text x="798" y="229" text-anchor="middle" font-size="9" font-style="italic" fill="#1976d2">vs. simplicity</text>

  <!-- Bottom: CV error curve sketch -->
  <rect x="20" y="258" width="860" height="228" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Cross-Validation Error vs. Tree Complexity (cp)</text>

  <!-- Axis -->
  <line x1="80" y1="440" x2="860" y2="440" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="440" x2="80" y2="296" stroke="#555" stroke-width="1.5"/>
  <text x="470" y="462" text-anchor="middle" font-size="11" fill="#555">Complexity Parameter (α / cp)  →  simpler tree</text>
  <text x="38" y="380" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,38,380)">CV Error</text>

  <!-- Axis tick labels -->
  <text x="120" y="456" text-anchor="middle" font-size="9" fill="#777">0.001</text>
  <text x="260" y="456" text-anchor="middle" font-size="9" fill="#777">0.01</text>
  <text x="400" y="456" text-anchor="middle" font-size="9" fill="#777">0.02</text>
  <text x="540" y="456" text-anchor="middle" font-size="9" fill="#777">0.05</text>
  <text x="680" y="456" text-anchor="middle" font-size="9" fill="#777">0.1</text>
  <text x="820" y="456" text-anchor="middle" font-size="9" fill="#777">0.5</text>

  <!-- CV error curve (U-ish, falls then rises) -->
  <!-- Points for curve: overfitting region, sweet spot, underfitting region -->
  <polyline points="120,410 160,380 200,355 260,330 320,322 380,320 400,320 440,325 480,336 540,360 600,385 660,408 720,425 780,435 840,440"
            fill="none" stroke="#2980b9" stroke-width="2.5"/>

  <!-- Error bars (dashed) -->
  <line x1="380" y1="312" x2="380" y2="330" stroke="#2980b9" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="400" y1="312" x2="400" y2="330" stroke="#2980b9" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Minimum marker -->
  <circle cx="400" cy="320" r="6" fill="#e74c3c" stroke="#fff" stroke-width="1.5"/>
  <text x="400" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">min CV error</text>
  <text x="400" y="300" text-anchor="middle" font-size="9" fill="#c62828">cp = 0.02</text>

  <!-- 1-SE rule line -->
  <line x1="80" y1="333" x2="860" y2="333" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="865" y="337" font-size="9" fill="#27ae60">+1 SE</text>

  <!-- 1-SE selected tree -->
  <circle cx="480" cy="336" r="6" fill="#27ae60" stroke="#fff" stroke-width="1.5"/>
  <line x1="480" y1="344" x2="480" y2="440" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="480" y="296" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">1-SE rule choice</text>
  <text x="480" y="284" text-anchor="middle" font-size="9" fill="#27ae60">cp = 0.035</text>
  <text x="480" y="474" text-anchor="middle" font-size="10" fill="#27ae60">Simplest tree within 1 SE of minimum (recommended)</text>

  <!-- Zone labels -->
  <text x="180" y="475" text-anchor="middle" font-size="9" fill="#e74c3c">← Overfitting</text>
  <text x="720" y="475" text-anchor="middle" font-size="9" fill="#f39c12">Underfitting →</text>
</svg>
