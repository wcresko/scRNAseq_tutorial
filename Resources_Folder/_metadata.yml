# Per-folder metadata: render every page in Resources_Folder/ with a left
# TOC, page navigation (prev/next buttons at the bottom), and the workshop
# CSS — giving the appendices a "book" feel without making the whole
# project a Quarto book.

format:
  html:
    toc: true
    toc-location: left
    toc-depth: 3
    page-layout: article
    code-copy: true
    code-overflow: wrap
    embed-resources: true
    css: ../styles.css

execute:
  echo: true
  warning: false
  message: false

# Sidebar / next-prev navigation across the appendices.
sidebar:
  style: docked
  search: true
  contents:
    - section: "Computational foundations"
      contents:
        - text: "A · Computing fundamentals"
          file: Appendix_A_Computing_Fundamentals.qmd
        - text: "B · Unix & the command line"
          file: Appendix_B_Unix_Command_Line.qmd
        - text: "C · grep, regex & shell scripting"
          file: Appendix_C_GREP_Regex_Shell.qmd
        - text: "D · R programming"
          file: Appendix_D_R_Programming.qmd
        - text: "E · Git & GitHub"
          file: Appendix_E_Git_GitHub.qmd
        - text: "F · HPC with Talapas"
          file: Appendix_F_HPC_Talapas.qmd
    - section: "Workshop reference"
      contents:
        - text: "Glossary"
          file: Glossary.qmd
        - text: "VS Code & Talapas"
          file: VSCode_Talapas.qmd
