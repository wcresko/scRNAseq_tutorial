# Exercise_Folder/_quarto-solutions.yml
#
# Activated by `quarto render --profile solutions`. Differs from the
# default profile in three ways:
#   1. eval: true  — chunks actually run, so outputs and figures appear
#   2. output-dir is _solutions/ next to the student docs, so the two
#      builds don't collide
#   3. a banner in the title makes it obvious you're looking at the
#      instructor version
#
# Run requirements: the workshop dataset must be present at ../data/ and
# all packages from Software.qmd must be installed in the active R
# environment. See render_all.sh.

project:
  output-dir: ../docs/Exercise_Folder/_solutions

execute:
  eval: true
  echo: true
  warning: true
  message: true
  cache: true

format:
  html:
    title-block-banner: "#7a2017"
    title-block-banner-color: white

# Inject a "SOLUTIONS — instructor copy" subtitle into every rendered
# page, so an instructor sharing the wrong link can spot the mistake.
brand:
  fontsize: 1em
