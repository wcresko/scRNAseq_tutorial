# Exercise_Folder/_quarto.yml
#
# This config is used ONLY when rendering the tutorials directly (e.g. as
# part of the "solutions" build profile, see render_all.sh). The root
# _quarto.yml does NOT render Exercise_Folder/*.qmd — it just copies them
# verbatim so students can download them.
#
# Two render profiles:
#   - default     → eval: false   → student-facing HTML, code visible, NOT executed
#   - solutions   → eval: true    → instructor solutions; chunks run, outputs shown
#
# Usage:
#   cd Exercise_Folder
#   quarto render                          # student version
#   quarto render --profile solutions      # instructor solutions
#
# Outputs land in Exercise_Folder/_solutions/ for the solutions profile,
# leaving the student renders in their normal location.

project:
  type: default
  output-dir: ../docs/Exercise_Folder

format:
  html:
    toc: true
    toc-depth: 3
    code-fold: false
    code-overflow: wrap
    highlight-style: github
    embed-resources: true

execute:
  eval: false
  echo: true
  warning: false
  message: false

editor: visual
