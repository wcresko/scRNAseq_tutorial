<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="serif">
  <!-- Power relationship section -->
  <text x="30" y="60" font-size="22">Power</text>
  <text x="30" y="85" font-size="22">relationship</text>

  <!-- Power equation -->
  <text x="220" y="75" font-size="24" font-style="italic">y<tspan font-size="16" dy="4">i</tspan><tspan dy="-4"> = </tspan>&beta;<tspan font-size="16" dy="4">0</tspan><tspan dy="-4"> + </tspan>ax<tspan font-size="16" dy="4">i</tspan><tspan font-size="16" dy="-12">&beta;</tspan><tspan font-size="12" dy="-8">1</tspan><tspan dy="20"> + </tspan>&epsilon;<tspan font-size="16" dy="4">i</tspan></text>

  <!-- Power curves (right side) -->
  <g transform="translate(580,0)">
    <line x1="0" y1="200" x2="0" y2="0" stroke="black" stroke-width="1.5"/>
    <line x1="0" y1="200" x2="250" y2="200" stroke="black" stroke-width="1.5"/>

    <!-- beta > 1 curve (accelerating) -->
    <path d="M 10,190 C 30,185 80,170 130,120 C 180,60 220,20 240,10" fill="none" stroke="black" stroke-width="2"/>
    <text x="210" y="15" font-size="16" font-style="italic">&beta; &gt; 1</text>

    <!-- 0 < beta < 1 curve (decelerating) -->
    <path d="M 10,190 C 30,130 60,90 100,65 C 140,45 180,35 240,25" fill="none" stroke="black" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="155" y="35" font-size="16" font-style="italic">0 &lt; &beta; &lt; 1</text>

    <!-- beta < 0 curve (decreasing) -->
    <path d="M 10,30 C 30,60 60,100 100,140 C 140,165 180,180 240,190" fill="none" stroke="black" stroke-width="2" stroke-dasharray="12,4"/>
    <text x="200" y="190" font-size="16" font-style="italic">&beta; &lt; 0</text>
  </g>

  <!-- Polynomial relationship section -->
  <text x="30" y="310" font-size="22">Polynomial</text>
  <text x="30" y="335" font-size="22">relationship</text>

  <!-- Polynomial equation -->
  <text x="220" y="325" font-size="24" font-style="italic">y<tspan font-size="16" dy="4">i</tspan><tspan dy="-4"> = </tspan>&beta;<tspan font-size="16" dy="4">0</tspan><tspan dy="-4"> + </tspan>&beta;<tspan font-size="16" dy="4">1</tspan><tspan dy="-4">x<tspan font-size="16" dy="4">i</tspan></tspan><tspan dy="-4"> + </tspan>&beta;<tspan font-size="16" dy="4">2</tspan><tspan dy="-4">x<tspan font-size="16" dy="4">i</tspan><tspan font-size="14" dy="-10">2</tspan></tspan><tspan dy="10"> + </tspan>&epsilon;<tspan font-size="16" dy="4">i</tspan></text>

  <!-- Polynomial curves (right side) -->
  <g transform="translate(580,250)">
    <line x1="0" y1="200" x2="0" y2="0" stroke="black" stroke-width="1.5"/>
    <line x1="0" y1="200" x2="250" y2="200" stroke="black" stroke-width="1.5"/>

    <!-- Quadratic (U-shape) -->
    <path d="M 10,50 C 40,100 80,160 125,190 C 170,160 210,100 240,50" fill="none" stroke="black" stroke-width="2"/>
    <text x="60" y="25" font-size="14" font-style="italic">y = &beta;<tspan font-size="10" dy="3">0</tspan><tspan dy="-3"> + &beta;</tspan><tspan font-size="10" dy="3">1</tspan><tspan dy="-3">x - &beta;</tspan><tspan font-size="10" dy="3">2</tspan><tspan dy="-3">x</tspan><tspan font-size="10" dy="-6">2</tspan></text>

    <!-- Cubic (S-shape) -->
    <path d="M 10,160 C 40,180 70,190 100,170 C 130,140 160,80 190,50 C 210,30 230,20 240,15" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="40" y="155" font-size="14" font-style="italic">y = &beta;<tspan font-size="10" dy="3">0</tspan><tspan dy="-3"> + &beta;</tspan><tspan font-size="10" dy="3">1</tspan><tspan dy="-3">x + &beta;</tspan><tspan font-size="10" dy="3">2</tspan><tspan dy="-3">x</tspan><tspan font-size="10" dy="-6">2</tspan><tspan dy="6"> - &beta;</tspan><tspan font-size="10" dy="3">3</tspan><tspan dy="-3">x</tspan><tspan font-size="10" dy="-6">3</tspan></text>
  </g>

  <!-- Polynomials in R section -->
  <text x="30" y="530" font-size="20" font-weight="bold" font-family="sans-serif">Polynomials in R:</text>
  <text x="30" y="560" font-size="18" font-family="monospace">&gt; lm(dv ~ iv + I(iv^2), dataset)</text>
  <text x="30" y="588" font-size="18" font-family="monospace">&gt; lm(dv ~ poly(iv, 2), dataset)</text>
</svg>
