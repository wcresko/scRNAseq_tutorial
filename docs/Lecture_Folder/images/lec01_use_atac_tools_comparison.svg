<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif">
  <style>
    .section { font-size: 13px; font-weight: 700; fill: #b06612; }
    .lbl  { font-size: 11px; fill: #222; }
    .colh { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .py  { font-size: 11px; font-weight: 700; fill: #4b8bbe; text-anchor: middle; }
    .r   { font-size: 11px; font-weight: 700; fill: #1a5490; text-anchor: middle; }
    .alt { font-size: 11px; fill: #555; text-anchor: middle; }
    .cell { font-size: 11px; fill: #222; text-anchor: middle; }
    .check { font-size: 13px; fill: #222; text-anchor: middle; }
    .cross { font-size: 13px; fill: #c0392b; text-anchor: middle; }
  </style>

  <!-- Header column titles -->
  <g transform="translate(0,30)">
    <text class="colh" x="360" y="0">Muon</text>
    <text class="py"   x="360" y="18">(Python)</text>
    <text class="colh" x="510" y="0">snapATAC 2.0</text>
    <text class="py"   x="510" y="18">(Python)</text>
    <text class="colh" x="660" y="0">pyCisTopic</text>
    <text class="py"   x="660" y="18">(Python)</text>
    <text class="colh" x="810" y="0">Signac</text>
    <text class="r"    x="810" y="18">(R)</text>
    <text class="colh" x="960" y="0">ArchR</text>
    <text class="r"    x="960" y="18">(R)</text>
    <text class="colh" x="1110" y="0">Alternatives</text>
  </g>

  <!-- Row separators -->
  <g stroke="#e0b070" stroke-width="1" fill="none">
    <line x1="10" y1="60"  x2="1190" y2="60"/>
    <line x1="10" y1="125" x2="1190" y2="125"/>
    <line x1="10" y1="210" x2="1190" y2="210"/>
    <line x1="10" y1="305" x2="1190" y2="305"/>
    <line x1="10" y1="395" x2="1190" y2="395"/>
    <line x1="10" y1="465" x2="1190" y2="465"/>
    <line x1="10" y1="555" x2="1190" y2="555"/>
    <line x1="10" y1="645" x2="1190" y2="645"/>
    <line x1="10" y1="785" x2="1190" y2="785"/>
    <line x1="10" y1="890" x2="1190" y2="890"/>
  </g>

  <!-- LEFT LABELS (sections) -->
  <!-- Data reading -->
  <g transform="translate(20,70)">
    <text class="section">Data reading</text>
    <text class="lbl" x="0" y="18">Start from fragment files</text>
    <text class="lbl" x="0" y="48">Start from count matrices</text>
  </g>
  <!-- Quality control -->
  <g transform="translate(20,140)">
    <text class="section">Quality control</text>
    <text class="lbl" x="0" y="22">QC metrics</text>
    <text class="lbl" x="0" y="52">Doublet removal</text>
  </g>
  <!-- Feature definition -->
  <g transform="translate(20,225)">
    <text class="section">Feature definition</text>
    <text class="lbl" x="0" y="22">Feature type</text>
    <text class="lbl" x="0" y="42">Cluster-based peak calling</text>
    <text class="lbl" x="0" y="62">Binarization</text>
  </g>
  <!-- Dim reduction -->
  <g transform="translate(20,320)">
    <text class="section">Dimensionality reduction</text>
    <text class="lbl" x="0" y="22">Method</text>
    <text class="lbl" x="0" y="52">Visualization</text>
  </g>
  <!-- Annotation -->
  <g transform="translate(20,405)">
    <text class="section">Annotation</text>
    <text class="lbl" x="0" y="22">Clustering</text>
    <text class="lbl" x="0" y="52">Gene activity imputation</text>
  </g>
  <!-- Differential -->
  <g transform="translate(20,475)">
    <text class="section">Differential testing</text>
    <text class="lbl" x="0" y="22">Differentially accessible regions</text>
  </g>
  <!-- Data integration -->
  <g transform="translate(20,570)">
    <text class="section">Data integration</text>
    <text class="lbl" x="0" y="22">Batch correction</text>
    <text class="lbl" x="0" y="52">Integration with scRNA-seq</text>
  </g>
  <!-- Visualization -->
  <g transform="translate(20,660)">
    <text class="section">Visualization</text>
    <text class="lbl" x="0" y="22">Gene activity imputation</text>
    <text class="lbl" x="0" y="42">Track plotting</text>
    <text class="lbl" x="0" y="62">Interactive genome browser</text>
  </g>
  <!-- Interpretation -->
  <g transform="translate(20,800)">
    <text class="section">Interpretation</text>
    <text class="lbl" x="0" y="22">Motif enrichment</text>
    <text class="lbl" x="0" y="42">chromVAR motif deviations</text>
    <text class="lbl" x="0" y="62">Footprinting</text>
    <text class="lbl" x="0" y="82">Co-accessibility</text>
  </g>

  <!-- CELL CONTENTS (simplified: mostly ✓/✗) -->
  <!-- Muon col x=360 -->
  <g>
    <text class="check" x="360" y="88">✓</text>
    <text class="alt"   x="360" y="104" style="font-size:9px">(But only for QC)</text>
    <text class="cross" x="360" y="118">✗</text>

    <text class="cell"  x="360" y="160">Nucleosome signal, TSS enrichment</text>
    <text class="cross" x="360" y="190">✗</text>

    <text class="cell" x="360" y="247">Peaks</text>
    <text class="cross" x="360" y="270">✗</text>
    <text class="cross" x="360" y="295">✗</text>

    <text class="cell" x="360" y="340">Latent Semantic Indexing (LSI)</text>
    <text class="cell" x="360" y="372">UMAP, TSNE</text>

    <text class="cell"  x="360" y="425">Leiden</text>
    <text class="cell"  x="360" y="450" style="font-size:10px">Tscore (signal) to Logistic regr. or Wilcoxon test</text>

    <text class="cell"  x="360" y="510">Logistic regression</text>

    <text class="cross" x="360" y="590">✗</text>
    <text class="cross" x="360" y="620">✗</text>

    <text class="cross" x="360" y="680">✗</text>
    <text class="cross" x="360" y="702">✗</text>
    <text class="cross" x="360" y="722">✗</text>

    <text class="cross" x="360" y="820">✗</text>
    <text class="cross" x="360" y="840">✗</text>
    <text class="cross" x="360" y="860">✗</text>
    <text class="cross" x="360" y="880">✗</text>
  </g>

  <!-- snapATAC2 col -->
  <g>
    <text class="check" x="510" y="88">✓</text>
    <text class="cell"  x="510" y="118">(Not default)</text>

    <text class="cell"  x="510" y="155" style="font-size:10px">Nucleosome, fragment size, TSS</text>
    <text class="cell"  x="510" y="190" style="font-size:10px">Simulated wrapper</text>

    <text class="cell" x="510" y="247">500 bp bins</text>
    <text class="cell" x="510" y="270">(MACS2)</text>
    <text class="check" x="510" y="295">✓</text>

    <text class="cell" x="510" y="340">Spectral embedding of Jaccard distance</text>
    <text class="cell" x="510" y="372">UMAP, TSNE</text>

    <text class="cell" x="510" y="425">Leiden</text>
    <text class="cell" x="510" y="450" style="font-size:10px">Gene body and upstream of TSS (2000 bp)</text>

    <text class="cell" x="510" y="510">Logistic regression</text>

    <text class="cell"  x="510" y="590">MNN to Harmony</text>
    <text class="cell"  x="510" y="620">Harmony</text>

    <text class="cross" x="510" y="680">✗</text>
    <text class="cross" x="510" y="702">✗</text>
    <text class="cross" x="510" y="722">✗</text>

    <text class="cross" x="510" y="820">✗</text>
    <text class="cross" x="510" y="840">✗</text>
    <text class="cross" x="510" y="860">✗</text>
    <text class="cross" x="510" y="880">✗</text>
  </g>

  <!-- pyCisTopic col -->
  <g>
    <text class="check" x="660" y="88">✓</text>
    <text class="cell"  x="660" y="118">(Not default)</text>

    <text class="cell"  x="660" y="150" style="font-size:10px">Fragment size, TSS,</text>
    <text class="cell"  x="660" y="165" style="font-size:10px">FRiP, duplication, barcode rank</text>
    <text class="cell"  x="660" y="190" style="font-size:10px">Simulated wrapper</text>

    <text class="cell" x="660" y="247">Peaks</text>
    <text class="cell" x="660" y="270">(MACS2)</text>
    <text class="cross" x="660" y="295">✗</text>

    <text class="cell" x="660" y="335" style="font-size:10px">Latent Dirichlet Allocation (LDA)</text>
    <text class="cell" x="660" y="372">UMAP, TSNE</text>

    <text class="cell" x="660" y="425">Leiden</text>
    <text class="cell" x="660" y="445" style="font-size:10px">Gene body &amp; up/downstream of TSS</text>
    <text class="cell" x="660" y="462" style="font-size:10px">(decaying and avoiding gene boundaries)</text>

    <text class="cell" x="660" y="510">Wilcoxon test</text>

    <text class="cross" x="660" y="590">✗</text>
    <text class="cell"  x="660" y="620">Ingest, Harmony, BBKNN, scanorama, CCA</text>

    <text class="cell"  x="660" y="680">(Using MAGIC)</text>
    <text class="check" x="660" y="702">✓</text>
    <text class="cross" x="660" y="722">✗</text>

    <text class="cell"  x="660" y="820" style="font-size:10px">(Using scanTarget)</text>
    <text class="cross" x="660" y="840">✗</text>
    <text class="cross" x="660" y="860">✗</text>
    <text class="cross" x="660" y="880">✗</text>
  </g>

  <!-- Signac col -->
  <g>
    <text class="check" x="810" y="88">✓</text>
    <text class="cell"  x="810" y="118">(used for QC)</text>

    <text class="cell"  x="810" y="150" style="font-size:10px">Nucleosome signal,</text>
    <text class="cell"  x="810" y="165" style="font-size:10px">fragment size, TSS,</text>
    <text class="cell"  x="810" y="180" style="font-size:10px">FRiP, fraction of reads in blacklist</text>
    <text class="cross" x="810" y="190">✗</text>

    <text class="cell" x="810" y="247">Peaks</text>
    <text class="cell" x="810" y="270">(MACS2)</text>
    <text class="cell" x="810" y="295">(Not default)</text>

    <text class="cell" x="810" y="340">Iterative LSI</text>
    <text class="cell" x="810" y="372">UMAP, TSNE</text>

    <text class="cell" x="810" y="425">Louvain</text>
    <text class="cell" x="810" y="445" style="font-size:10px">Gene body &amp; up/downstream of TSS</text>
    <text class="cell" x="810" y="462" style="font-size:10px">(exponentially decaying and</text>

    <text class="cell"  x="810" y="510">Logistic regression</text>

    <text class="cell"  x="810" y="590">Reciprocal LSI or Harmony</text>
    <text class="cell"  x="810" y="620">Transfer anchors</text>

    <text class="cross" x="810" y="680">✗</text>
    <text class="check" x="810" y="702">✓</text>
    <text class="cross" x="810" y="722">✗</text>

    <text class="check" x="810" y="820">✓</text>
    <text class="check" x="810" y="840">✓</text>
    <text class="check" x="810" y="860">✓</text>
    <text class="cell"  x="810" y="880" style="font-size:10px">(Using Cicero)</text>
  </g>

  <!-- ArchR col -->
  <g>
    <text class="check" x="960" y="88">✓</text>
    <text class="cell"  x="960" y="118">(Not default)</text>

    <text class="cell"  x="960" y="150" style="font-size:10px">Nucleosome signal, fragment</text>
    <text class="cell"  x="960" y="165" style="font-size:10px">distribution, TSS enrichment,</text>
    <text class="cell"  x="960" y="180" style="font-size:10px">number of fragments</text>
    <text class="cell"  x="960" y="195" style="font-size:10px">(Simulated wrapper)</text>

    <text class="cell" x="960" y="247">500 bp bins</text>
    <text class="cell" x="960" y="270">(MACS2)</text>
    <text class="cross" x="960" y="295">✗</text>

    <text class="cell" x="960" y="340">Iterative LSI</text>
    <text class="cell" x="960" y="372">UMAP, TSNE</text>

    <text class="cell" x="960" y="425">Louvain</text>
    <text class="cell" x="960" y="445" style="font-size:10px">Gene body &amp; up/downstream of TSS</text>
    <text class="cell" x="960" y="462" style="font-size:10px">(exponentially decaying and</text>

    <text class="cell"  x="960" y="510">Wilcoxon test</text>

    <text class="cell"  x="960" y="590">Iterative LSI or Harmony</text>
    <text class="cell"  x="960" y="620">Transfer anchors</text>

    <text class="cell"  x="960" y="680">(Using MAGIC)</text>
    <text class="check" x="960" y="702">✓</text>
    <text class="cross" x="960" y="722">✗</text>

    <text class="check" x="960" y="820">✓</text>
    <text class="check" x="960" y="840">✓</text>
    <text class="check" x="960" y="860">✓</text>
    <text class="cell"  x="960" y="880" style="font-size:10px">(Using Monocle3)</text>
  </g>

  <!-- Alternatives column -->
  <g>
    <text class="cell" x="1110" y="160">Amulet, scDblFinder</text>
    <text class="cell" x="1110" y="340">PeakVI, PoissonVAE</text>
    <text class="cell" x="1110" y="595">PeakVI, PoissonVAE</text>
    <text class="cell" x="1110" y="620">sciGLUE</text>
  </g>
</svg>
