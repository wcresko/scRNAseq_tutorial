<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #333; }
    .axis-label { font-size: 14px; fill: #555; }
    .title-label { font-size: 15px; fill: #8B0000; font-weight: bold; }
    .note-label { font-size: 13px; fill: #8B0000; }
  </style>

  <!-- === TOP SECTION: Boxplot === -->
  <!-- Axis line -->
  <line x1="60" y1="200" x2="790" y2="200" stroke="#555" stroke-width="1.5"/>

  <!-- Axis tick marks and labels -->
  <g class="axis-label">
    <line x1="110" y1="195" x2="110" y2="205" stroke="#555" stroke-width="1"/>
    <text x="110" y="220" text-anchor="middle">-4&#963;</text>
    <line x1="195" y1="195" x2="195" y2="205" stroke="#555" stroke-width="1"/>
    <text x="195" y="220" text-anchor="middle">-3&#963;</text>
    <line x1="280" y1="195" x2="280" y2="205" stroke="#555" stroke-width="1"/>
    <text x="280" y="220" text-anchor="middle">-2&#963;</text>
    <line x1="365" y1="195" x2="365" y2="205" stroke="#555" stroke-width="1"/>
    <text x="365" y="220" text-anchor="middle">-1&#963;</text>
    <line x1="450" y1="195" x2="450" y2="205" stroke="#555" stroke-width="1"/>
    <text x="450" y="220" text-anchor="middle">0&#963;</text>
    <line x1="535" y1="195" x2="535" y2="205" stroke="#555" stroke-width="1"/>
    <text x="535" y="220" text-anchor="middle">1&#963;</text>
    <line x1="620" y1="195" x2="620" y2="205" stroke="#555" stroke-width="1"/>
    <text x="620" y="220" text-anchor="middle">2&#963;</text>
    <line x1="705" y1="195" x2="705" y2="205" stroke="#555" stroke-width="1"/>
    <text x="705" y="220" text-anchor="middle">3&#963;</text>
    <line x1="790" y1="195" x2="790" y2="205" stroke="#555" stroke-width="1"/>
    <text x="790" y="220" text-anchor="middle">4&#963;</text>
  </g>

  <!-- Boxplot body -->
  <rect x="393" y="100" width="114" height="80" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Median line -->
  <line x1="450" y1="100" x2="450" y2="180" stroke="#8B0000" stroke-width="3"/>
  <!-- Q1 and Q3 labels -->
  <text x="393" y="85" text-anchor="middle" class="title-label">Q1</text>
  <text x="507" y="85" text-anchor="middle" class="title-label">Q3</text>
  <!-- Median label -->
  <text x="450" y="195" text-anchor="middle" font-size="14" fill="#8B0000">Median</text>

  <!-- IQR bracket -->
  <line x1="393" y1="60" x2="507" y2="60" stroke="#333" stroke-width="1.5"/>
  <line x1="393" y1="55" x2="393" y2="65" stroke="#333" stroke-width="1.5"/>
  <line x1="507" y1="55" x2="507" y2="65" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="52" text-anchor="middle" font-size="14" fill="#333">IQR</text>

  <!-- Left whisker -->
  <line x1="165" y1="140" x2="393" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="165" y1="120" x2="165" y2="160" stroke="#333" stroke-width="1.5"/>
  <!-- Right whisker -->
  <line x1="507" y1="140" x2="735" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="735" y1="120" x2="735" y2="160" stroke="#333" stroke-width="1.5"/>

  <!-- Whisker labels -->
  <text x="165" y="85" text-anchor="middle" class="note-label">Q1 - 1.5 x IQR</text>
  <text x="735" y="85" text-anchor="middle" class="note-label">Q3 + 1.5 x IQR</text>

  <!-- Sigma reference values -->
  <text x="195" y="245" text-anchor="middle" class="axis-label">-2.698&#963;</text>
  <text x="365" y="245" text-anchor="middle" class="axis-label">-0.6745&#963;</text>
  <text x="535" y="245" text-anchor="middle" class="axis-label">0.6745&#963;</text>
  <text x="705" y="245" text-anchor="middle" class="axis-label">2.698&#963;</text>

  <!-- Dotted vertical reference lines -->
  <line x1="195" y1="200" x2="195" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="365" y1="200" x2="365" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="535" y1="200" x2="535" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="705" y1="200" x2="705" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === BOTTOM SECTION: Normal Distribution Curve === -->
  <!-- Bell curve -->
  <path d="M 60,520
           Q 110,518 160,515
           Q 195,510 230,495
           Q 270,470 310,430
           Q 340,395 370,350
           Q 400,310 425,285
           Q 445,272 450,270
           Q 455,272 475,285
           Q 500,310 530,350
           Q 560,395 590,430
           Q 630,470 670,495
           Q 705,510 740,515
           Q 790,518 840,520"
    fill="#B0C4DE" fill-opacity="0.5" stroke="#333" stroke-width="2"/>

  <!-- Darker middle section (IQR / 50%) -->
  <path d="M 365,520
           Q 380,470 400,420
           Q 420,360 435,320
           Q 445,290 450,270
           Q 455,290 465,320
           Q 480,360 500,420
           Q 520,470 535,520 Z"
    fill="#6495ED" fill-opacity="0.5" stroke="none"/>

  <!-- Percentage labels -->
  <text x="400" y="460" text-anchor="middle" font-size="15" fill="#8B0000">24.65%</text>
  <text x="450" y="420" text-anchor="middle" font-size="16" fill="#8B0000" font-weight="bold">50%</text>
  <text x="500" y="460" text-anchor="middle" font-size="15" fill="#8B0000">24.65%</text>

  <!-- Bottom axis -->
  <line x1="60" y1="520" x2="840" y2="520" stroke="#333" stroke-width="2"/>
  <g class="axis-label">
    <text x="110" y="540" text-anchor="middle">-4&#963;</text>
    <text x="195" y="540" text-anchor="middle">-3&#963;</text>
    <text x="280" y="540" text-anchor="middle">-2&#963;</text>
    <text x="365" y="540" text-anchor="middle">-1&#963;</text>
    <text x="450" y="540" text-anchor="middle">0&#963;</text>
    <text x="535" y="540" text-anchor="middle">1&#963;</text>
    <text x="620" y="540" text-anchor="middle">2&#963;</text>
    <text x="705" y="540" text-anchor="middle">3&#963;</text>
    <text x="790" y="540" text-anchor="middle">4&#963;</text>
  </g>
</svg>