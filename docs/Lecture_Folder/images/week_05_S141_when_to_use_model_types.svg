<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" font-family="sans-serif">
  <!-- Model I Box (blue border) -->
  <rect x="110" y="20" width="810" height="100" fill="white" stroke="#2980b9" stroke-width="3" rx="3"/>
  <text x="50" y="55" font-size="20" fill="#2980b9" font-weight="bold">Model I</text>

  <text x="130" y="50" font-size="20" font-weight="bold" text-decoration="underline">OLS:</text>
  <text x="130" y="78" font-size="18" font-weight="bold">When there is no (or very little error) in the x variable</text>
  <text x="130" y="105" font-size="16" fill="#555">e.g. time points, temperature series set by experimenter, etc.</text>

  <!-- Model II Box (green border) -->
  <rect x="110" y="150" width="810" height="310" fill="white" stroke="#27ae60" stroke-width="3" rx="3"/>
  <text x="40" y="300" font-size="20" fill="#27ae60" font-weight="bold">Model II</text>

  <!-- MA -->
  <text x="130" y="185" font-size="20" font-weight="bold" text-decoration="underline">Major Axis (MA):</text>
  <text x="130" y="213" font-size="18" font-weight="bold">When there is equal error in both y and x (same units or dimensionless)</text>
  <text x="130" y="240" font-size="16" fill="#555">e.g. X and Y are both ratios, and we are interested in estimating the slope</text>

  <!-- Ranged MA -->
  <text x="130" y="280" font-size="20" font-weight="bold" text-decoration="underline">Ranged Major Axis (ranged MA):</text>
  <text x="130" y="308" font-size="18" font-weight="bold">When there is error in both y and x (different units/scales), but no outliers</text>
  <text x="130" y="335" font-size="16" fill="#555">e.g. X and Y are height in tens of cm and tenths of grams</text>

  <!-- RMA -->
  <text x="130" y="375" font-size="20" fill="#27ae60" font-weight="bold" text-decoration="underline">Reduced Major Axis (RMA, or SMA):</text>
  <text x="130" y="403" font-size="18" font-weight="bold">When there is error in both y and x (different units/scales), and sig. correlation</text>
  <text x="130" y="430" font-size="16" fill="#555">e.g. X and Y are different scales, robust to outliers</text>

  <!-- Footer -->
  <text x="30" y="480" font-size="15">* Table 8.1 (pg. 175) in the Logan text</text>
  <text x="30" y="500" font-size="15">* See Legendre's Model II Regression Guide, 2013 (file: mod2user.pdf in Week 4 material on Canvas)</text>
</svg>
