<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 380" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .tool { font-size: 11px; fill: #222; text-anchor: middle; }
    .axis { stroke: #888; stroke-width: 1; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="510" y="28">Doublet detection: simulate, classify, flag</text>

  <!-- Panel 1: two real cells of different types -->
  <g transform="translate(40,60)">
    <text class="panel" x="110" y="0">1. Real cells (type A, B)</text>
    <rect x="0" y="15" width="220" height="180" fill="#fafafa" stroke="#ccc"/>

    <!-- type A barplot -->
    <g transform="translate(20,40)">
      <text class="lbl" x="45" y="-5">type A profile</text>
      <line class="axis" x1="0" y1="60" x2="90" y2="60"/>
      <rect x="5"  y="15" width="10" height="45" fill="#2c7fb8"/>
      <rect x="20" y="25" width="10" height="35" fill="#2c7fb8"/>
      <rect x="35" y="40" width="10" height="20" fill="#2c7fb8"/>
      <rect x="50" y="50" width="10" height="10" fill="#2c7fb8"/>
      <rect x="65" y="55" width="10" height="5"  fill="#2c7fb8"/>
    </g>

    <!-- type B barplot -->
    <g transform="translate(115,40)">
      <text class="lbl" x="45" y="-5">type B profile</text>
      <line class="axis" x1="0" y1="60" x2="90" y2="60"/>
      <rect x="5"  y="50" width="10" height="10" fill="#e66101"/>
      <rect x="20" y="45" width="10" height="15" fill="#e66101"/>
      <rect x="35" y="25" width="10" height="35" fill="#e66101"/>
      <rect x="50" y="15" width="10" height="45" fill="#e66101"/>
      <rect x="65" y="30" width="10" height="30" fill="#e66101"/>
    </g>
    <text class="lbl" x="110" y="220">different cell types</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 270 150 L 330 150" marker-end="url(#ahd)"/>
  <text class="lbl" x="300" y="140">sum</text>

  <!-- Panel 2: simulated doublet -->
  <g transform="translate(330,60)">
    <text class="panel" x="110" y="0">2. Simulated doublet = A+B</text>
    <rect x="0" y="15" width="220" height="180" fill="#fafafa" stroke="#ccc"/>
    <g transform="translate(50,40)">
      <text class="lbl" x="60" y="-5">simulated doublet</text>
      <line class="axis" x1="0" y1="60" x2="120" y2="60"/>
      <!-- stacked bars combining both -->
      <g>
        <rect x="5"  y="35" width="10" height="25" fill="#2c7fb8"/>
        <rect x="5"  y="30" width="10" height="5"  fill="#e66101"/>
        <rect x="25" y="30" width="10" height="30" fill="#2c7fb8"/>
        <rect x="25" y="22" width="10" height="8"  fill="#e66101"/>
        <rect x="45" y="35" width="10" height="25" fill="#2c7fb8"/>
        <rect x="45" y="17" width="10" height="18" fill="#e66101"/>
        <rect x="65" y="50" width="10" height="10" fill="#2c7fb8"/>
        <rect x="65" y="25" width="10" height="25" fill="#e66101"/>
        <rect x="85" y="55" width="10" height="5"  fill="#2c7fb8"/>
        <rect x="85" y="35" width="10" height="20" fill="#e66101"/>
        <rect x="105" y="50" width="10" height="10" fill="#2c7fb8"/>
        <rect x="105" y="35" width="10" height="15" fill="#e66101"/>
      </g>
    </g>
    <text class="lbl" x="110" y="220">expression of BOTH types in one "cell"</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 560 150 L 620 150" marker-end="url(#ahd)"/>
  <text class="lbl" x="590" y="140">train</text>

  <!-- Panel 3: classifier / UMAP flagging -->
  <g transform="translate(620,60)">
    <text class="panel" x="180" y="0">3. Classifier scores real cells</text>
    <rect x="0" y="15" width="360" height="180" fill="#fafafa" stroke="#ccc"/>

    <!-- UMAP-like blobs -->
    <g>
      <!-- cluster A singlets -->
      <g fill="#2c7fb8">
        <circle cx="70"  cy="80"  r="4"/><circle cx="80"  cy="85" r="4"/>
        <circle cx="95"  cy="75"  r="4"/><circle cx="90"  cy="95" r="4"/>
        <circle cx="75"  cy="100" r="4"/><circle cx="105" cy="90" r="4"/>
      </g>
      <!-- cluster B singlets -->
      <g fill="#e66101">
        <circle cx="250" cy="90"  r="4"/><circle cx="260" cy="100" r="4"/>
        <circle cx="270" cy="85"  r="4"/><circle cx="280" cy="110" r="4"/>
        <circle cx="285" cy="95"  r="4"/>
      </g>
      <!-- cluster C -->
      <g fill="#1b9e77">
        <circle cx="180" cy="155" r="4"/><circle cx="195" cy="165" r="4"/>
        <circle cx="170" cy="170" r="4"/><circle cx="205" cy="150" r="4"/>
      </g>
      <!-- doublets: flagged in black, living between clusters -->
      <g fill="#000">
        <circle cx="165" cy="90" r="6" stroke="#d73027" stroke-width="2" fill="#fff"/>
        <text x="165" y="77" font-size="10" fill="#d73027" text-anchor="middle">✕</text>
        <circle cx="145" cy="130" r="6" stroke="#d73027" stroke-width="2" fill="#fff"/>
        <text x="145" y="117" font-size="10" fill="#d73027" text-anchor="middle">✕</text>
        <circle cx="230" cy="125" r="6" stroke="#d73027" stroke-width="2" fill="#fff"/>
        <text x="230" y="112" font-size="10" fill="#d73027" text-anchor="middle">✕</text>
      </g>
    </g>
    <text class="lbl" x="180" y="220">high-scoring cells flagged (✕) &amp; removed</text>
  </g>

  <!-- Tools row -->
  <g transform="translate(60,300)">
    <rect x="0" y="0" width="900" height="60" rx="10" fill="#fff7d6" stroke="#d9b41a"/>
    <text class="panel" x="450" y="22">Doublet detection tools</text>
    <text class="tool" x="140" y="45" font-weight="700">scDblFinder</text>
    <text class="tool" x="230" y="45">(R, recommended default)</text>
    <text class="tool" x="430" y="45" font-weight="700">DoubletFinder</text>
    <text class="tool" x="540" y="45">(R, widely cited)</text>
    <text class="tool" x="680" y="45" font-weight="700">Scrublet</text>
    <text class="tool" x="760" y="45">(Python/scanpy)</text>
  </g>

  <defs>
    <marker id="ahd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
