<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="white"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#222">In UNIX everything is a file organized in a hierarchy</text>

  <!-- Define a folder icon as a reusable group -->
  <defs>
    <g id="folder">
      <rect x="0" y="8" width="80" height="50" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <rect x="0" y="0" width="30" height="14" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <path d="M30,0 L38,8 L80,8" fill="none" stroke="#a09888" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- Level 0: Root / -->
  <use href="#folder" x="360" y="70"/>
  <text x="400" y="110" text-anchor="middle" font-size="18" font-family="'Courier New', monospace" font-weight="bold" fill="#333">/</text>

  <!-- Lines from root to level 1 -->
  <line x1="400" y1="128" x2="400" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="145" x2="700" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="145" x2="100" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="145" x2="280" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="145" x2="460" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="145" x2="620" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 1: root, home, usr, bin ... -->
  <use href="#folder" x="60" y="195"/>
  <text x="100" y="237" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">root</text>

  <use href="#folder" x="240" y="195"/>
  <text x="280" y="237" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">home</text>

  <use href="#folder" x="420" y="195"/>
  <text x="460" y="237" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">usr</text>

  <use href="#folder" x="580" y="195"/>
  <text x="620" y="237" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="230" font-size="24" fill="#666">...</text>

  <!-- Lines from home to level 2 -->
  <line x1="280" y1="253" x2="280" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="270" x2="620" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="270" x2="100" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="270" x2="280" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Lines from usr to level 2 -->
  <line x1="460" y1="253" x2="460" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="270" x2="460" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="270" x2="620" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 2: cresko, catchen, lib, bin -->
  <use href="#folder" x="60" y="320"/>
  <text x="100" y="362" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">cresko</text>

  <use href="#folder" x="240" y="320"/>
  <text x="280" y="362" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">catchen</text>

  <use href="#folder" x="420" y="320"/>
  <text x="460" y="362" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">lib</text>

  <use href="#folder" x="580" y="320"/>
  <text x="620" y="362" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="355" font-size="24" fill="#666">...</text>

  <!-- Lines from catchen to level 3 -->
  <line x1="280" y1="378" x2="280" y2="395" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="395" x2="460" y2="395" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="395" x2="280" y2="445" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="395" x2="460" y2="445" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 3: working, research -->
  <use href="#folder" x="240" y="445"/>
  <text x="280" y="487" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">working</text>

  <use href="#folder" x="420" y="445"/>
  <text x="460" y="487" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">research</text>

  <text x="560" y="480" font-size="24" fill="#666">...</text>
</svg>