<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="700" height="350" fill="white"/>

  <!-- Command text at top -->
  <text x="80" y="80" font-size="30" font-family="'Courier New', monospace">
    <tspan fill="#333" font-weight="bold">$</tspan>
    <tspan fill="#c0392b"> wc -l *.pdb</tspan>
  </text>

  <!-- Command block (red/orange chevron) -->
  <polygon points="60,150 280,150 300,195 280,240 60,240" fill="#e74c3c" rx="5"/>
  <text x="170" y="202" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="white">wc -l *.pdb</text>

  <!-- OUT label -->
  <text x="320" y="202" text-anchor="middle" font-size="14" font-weight="bold" fill="#888">OUT</text>

  <!-- Arrow -->
  <polygon points="340,185 370,195 340,205" fill="#888"/>

  <!-- Output in Shell box (dark) -->
  <rect x="390" y="140" width="230" height="110" rx="8" fill="#2c3e50"/>
  <!-- Terminal icon -->
  <rect x="440" y="160" width="80" height="50" rx="4" fill="none" stroke="white" stroke-width="2"/>
  <text x="480" y="192" text-anchor="middle" font-size="22" font-family="'Courier New', monospace" fill="white">$</text>
  <!-- Label -->
  <text x="505" y="235" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Output in Shell</text>
</svg>