<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="serif">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#888" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Panel (a) - Homoscedastic (good) -->
  <g transform="translate(20,10)">
    <line x1="60" y1="280" x2="360" y2="280" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="160" font-size="16" transform="rotate(-90,20,160)">Residuals</text>
    <text x="200" y="310" font-size="16" text-anchor="middle">Predicted Y</text>
    <text x="200" y="325" font-size="18" text-anchor="middle">(a)</text>

    <!-- Labels -->
    <text x="45" y="70" font-size="14">+</text>
    <text x="45" y="155" font-size="14">0</text>
    <text x="45" y="240" font-size="14">-</text>
    <line x1="65" y1="155" x2="350" y2="155" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <!-- Double arrow -->
    <line x1="55" y1="60" x2="55" y2="250" stroke="black" stroke-width="1"/>
    <polygon points="55,55 50,65 60,65" fill="black"/>
    <polygon points="55,255 50,245 60,245" fill="black"/>

    <!-- Hatched rectangle (constant width) -->
    <rect x="80" y="80" width="260" height="155" fill="url(#hatch)" stroke="black" stroke-width="2"/>
  </g>

  <!-- Panel (b) - Funnel (heteroscedastic) -->
  <g transform="translate(410,10)">
    <line x1="60" y1="280" x2="360" y2="280" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="160" font-size="16" transform="rotate(-90,20,160)">Residuals</text>
    <text x="200" y="310" font-size="16" text-anchor="middle">Predicted Y</text>
    <text x="200" y="325" font-size="18" text-anchor="middle">(b)</text>

    <text x="45" y="70" font-size="14">+</text>
    <text x="45" y="155" font-size="14">0</text>
    <text x="45" y="240" font-size="14">-</text>
    <line x1="65" y1="155" x2="350" y2="155" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <line x1="55" y1="60" x2="55" y2="250" stroke="black" stroke-width="1"/>
    <polygon points="55,55 50,65 60,65" fill="black"/>
    <polygon points="55,255 50,245 60,245" fill="black"/>

    <!-- Funnel shape (triangle) -->
    <polygon points="80,155 340,50 340,260" fill="url(#hatch)" stroke="black" stroke-width="2"/>
  </g>

  <!-- Panel (c) - Increasing variance (linear bounds) -->
  <g transform="translate(20,370)">
    <line x1="60" y1="280" x2="360" y2="280" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="160" font-size="16" transform="rotate(-90,20,160)">Residuals</text>
    <text x="200" y="310" font-size="16" text-anchor="middle">Predicted Y</text>
    <text x="200" y="325" font-size="18" text-anchor="middle">(c)</text>

    <text x="45" y="70" font-size="14">+</text>
    <text x="45" y="155" font-size="14">0</text>
    <text x="45" y="240" font-size="14">-</text>
    <line x1="65" y1="155" x2="350" y2="155" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <line x1="55" y1="60" x2="55" y2="250" stroke="black" stroke-width="1"/>
    <polygon points="55,55 50,65 60,65" fill="black"/>
    <polygon points="55,255 50,245 60,245" fill="black"/>

    <!-- Parallelogram shape (linearly increasing variance with positive trend) -->
    <polygon points="80,210 80,260 340,40 340,100" fill="url(#hatch)" stroke="black" stroke-width="2"/>
  </g>

  <!-- Panel (d) - Curvilinear pattern -->
  <g transform="translate(410,370)">
    <line x1="60" y1="280" x2="360" y2="280" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="160" font-size="16" transform="rotate(-90,20,160)">Residuals</text>
    <text x="200" y="310" font-size="16" text-anchor="middle">Predicted Y</text>
    <text x="200" y="325" font-size="18" text-anchor="middle">(d)</text>

    <text x="45" y="70" font-size="14">+</text>
    <text x="45" y="155" font-size="14">0</text>
    <text x="45" y="240" font-size="14">-</text>
    <line x1="65" y1="155" x2="350" y2="155" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <line x1="55" y1="60" x2="55" y2="250" stroke="black" stroke-width="1"/>
    <polygon points="55,55 50,65 60,65" fill="black"/>
    <polygon points="55,255 50,245 60,245" fill="black"/>

    <!-- Curvilinear envelope (inverted U shape) -->
    <path d="M 80,155 C 120,155 160,100 210,80 C 260,65 300,80 340,120" fill="none" stroke="black" stroke-width="2"/>
    <path d="M 80,155 C 120,155 160,200 210,220 C 260,235 300,220 340,180" fill="none" stroke="black" stroke-width="2"/>
    <!-- Fill between curves -->
    <path d="M 80,155 C 120,155 160,100 210,80 C 260,65 300,80 340,120 L 340,180 C 300,220 260,235 210,220 C 160,200 120,155 80,155 Z" fill="url(#hatch)" stroke="none"/>
  </g>
</svg>
