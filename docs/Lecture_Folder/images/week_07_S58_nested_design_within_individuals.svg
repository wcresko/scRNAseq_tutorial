<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="20" y="35" font-size="22" fill="#333">It can be helpful to draw a sketch of the design</text>

  <!-- Individual bug labels (simplified as labeled boxes) -->
  <g transform="translate(60, 60)">
    <!-- Bug 1 -->
    <rect x="0" y="0" width="80" height="100" rx="5" fill="#e8e4d8" stroke="#999" stroke-width="1.5"/>
    <text x="40" y="55" text-anchor="middle" font-size="13" fill="#555">Bug 1</text>

    <!-- Bug 2 -->
    <rect x="120" y="0" width="80" height="100" rx="5" fill="#e8e4d8" stroke="#999" stroke-width="1.5"/>
    <text x="160" y="55" text-anchor="middle" font-size="13" fill="#555">Bug 2</text>

    <!-- Bug 3 -->
    <rect x="240" y="0" width="80" height="100" rx="5" fill="#e8e4d8" stroke="#999" stroke-width="1.5"/>
    <text x="280" y="55" text-anchor="middle" font-size="13" fill="#555">Bug 3</text>

    <!-- Bug 4 -->
    <rect x="360" y="0" width="80" height="100" rx="5" fill="#e8e4d8" stroke="#999" stroke-width="1.5"/>
    <text x="400" y="55" text-anchor="middle" font-size="13" fill="#555">Bug 4</text>

    <!-- Bug 5 -->
    <rect x="480" y="0" width="80" height="100" rx="5" fill="#e8e4d8" stroke="#999" stroke-width="1.5"/>
    <text x="520" y="55" text-anchor="middle" font-size="13" fill="#555">Bug 5</text>

    <!-- Ellipsis -->
    <text x="600" y="55" font-size="28" fill="#333">.....</text>
  </g>

  <!-- "individual bug" label -->
  <text x="720" y="120" font-size="20" fill="#333">individual bug</text>

  <!-- Tree structures under each bug -->
  <g transform="translate(60, 190)" stroke="#333" stroke-width="2" fill="none">
    <!-- Bug 1 tree -->
    <line x1="20" y1="0" x2="0" y2="50"/>
    <line x1="20" y1="0" x2="40" y2="50"/>

    <!-- Bug 1 second tree -->
    <line x1="80" y1="0" x2="60" y2="50"/>
    <line x1="80" y1="0" x2="100" y2="50"/>

    <!-- Bug 2 tree -->
    <line x1="140" y1="0" x2="120" y2="50"/>
    <line x1="140" y1="0" x2="160" y2="50"/>

    <!-- Bug 2 second tree -->
    <line x1="200" y1="0" x2="180" y2="50"/>
    <line x1="200" y1="0" x2="220" y2="50"/>

    <!-- Bug 3 tree -->
    <line x1="260" y1="0" x2="240" y2="50"/>
    <line x1="260" y1="0" x2="280" y2="50"/>

    <!-- Bug 3 second tree -->
    <line x1="320" y1="0" x2="300" y2="50"/>
    <line x1="320" y1="0" x2="340" y2="50"/>

    <!-- Bug 4 tree -->
    <line x1="380" y1="0" x2="360" y2="50"/>
    <line x1="380" y1="0" x2="400" y2="50"/>

    <!-- Bug 4 second tree -->
    <line x1="440" y1="0" x2="420" y2="50"/>
    <line x1="440" y1="0" x2="460" y2="50"/>

    <!-- Bug 5 tree -->
    <line x1="500" y1="0" x2="480" y2="50"/>
    <line x1="500" y1="0" x2="520" y2="50"/>

    <!-- Bug 5 second tree -->
    <line x1="560" y1="0" x2="540" y2="50"/>
    <line x1="560" y1="0" x2="580" y2="50"/>
  </g>

  <!-- Measurement numbers -->
  <g transform="translate(60, 260)" font-size="22" fill="#cc0000" font-weight="bold">
    <text x="-2" y="40" text-anchor="middle">1</text>
    <text x="40" y="40" text-anchor="middle">2</text>

    <text x="58" y="40" text-anchor="middle">1</text>
    <text x="100" y="40" text-anchor="middle">2</text>

    <text x="118" y="40" text-anchor="middle">1</text>
    <text x="160" y="40" text-anchor="middle">2</text>

    <text x="178" y="40" text-anchor="middle">1</text>
    <text x="220" y="40" text-anchor="middle">2</text>

    <text x="238" y="40" text-anchor="middle">1</text>
    <text x="280" y="40" text-anchor="middle">2</text>

    <text x="298" y="40" text-anchor="middle">1</text>
    <text x="340" y="40" text-anchor="middle">2</text>

    <text x="358" y="40" text-anchor="middle">1</text>
    <text x="400" y="40" text-anchor="middle">2</text>

    <text x="418" y="40" text-anchor="middle">1</text>
    <text x="460" y="40" text-anchor="middle">2</text>

    <text x="478" y="40" text-anchor="middle">1</text>
    <text x="520" y="40" text-anchor="middle">2</text>

    <text x="538" y="40" text-anchor="middle">1</text>
    <text x="580" y="40" text-anchor="middle">2</text>
  </g>

  <!-- Bottom label -->
  <text x="650" y="300" font-size="20" fill="#333">Measurements "within" individuals</text>

  <!-- Grouping brackets (lines connecting trees to bugs) -->
  <g stroke="#999" stroke-width="1" stroke-dasharray="4,3" fill="none">
    <!-- Bug 1 bracket -->
    <line x1="80" y1="165" x2="80" y2="185"/>
    <line x1="140" y1="165" x2="140" y2="185"/>

    <!-- Bug 2 bracket -->
    <line x1="200" y1="165" x2="200" y2="185"/>
    <line x1="260" y1="165" x2="260" y2="185"/>

    <!-- Bug 3 bracket -->
    <line x1="320" y1="165" x2="320" y2="185"/>
    <line x1="380" y1="165" x2="380" y2="185"/>

    <!-- Bug 4 bracket -->
    <line x1="440" y1="165" x2="440" y2="185"/>
    <line x1="500" y1="165" x2="500" y2="185"/>

    <!-- Bug 5 bracket -->
    <line x1="560" y1="165" x2="560" y2="185"/>
    <line x1="620" y1="165" x2="620" y2="185"/>
  </g>
</svg>