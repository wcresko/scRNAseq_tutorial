<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Arial, Helvetica, sans-serif">
  <!-- Label (b) -->
  <text x="130" y="30" font-size="22">(b)</text>

  <!-- Y-axis label -->
  <text x="25" y="190" text-anchor="middle" font-size="20" font-style="italic" transform="rotate(-90,25,190)">P(t)</text>

  <!-- Axes -->
  <line x1="60" y1="320" x2="660" y2="320" stroke="black" stroke-width="2"/>
  <line x1="60" y1="320" x2="60" y2="30" stroke="black" stroke-width="2"/>

  <!-- t distribution curve -->
  <path d="M 65,318 C 80,316 100,312 130,305 C 160,292 190,270 220,240 C 250,205 280,165 310,130 C 330,110 345,98 360,90 C 375,98 385,110 400,130 C 420,165 440,205 460,240 C 480,265 500,285 520,300 C 540,310 560,315 580,318"
        fill="none" stroke="black" stroke-width="3"/>

  <!-- Shaded alpha region (right tail) -->
  <path d="M 510,303 C 520,298 530,310 540,312 C 550,315 560,317 570,318 L 580,320 L 510,320 Z"
        fill="#CCCCCC" stroke="none"/>

  <!-- Redraw curve over shaded region -->
  <path d="M 500,305 C 510,308 520,312 535,315 C 550,317 565,318 580,318"
        fill="none" stroke="black" stroke-width="3"/>

  <!-- Vertical line at tc -->
  <line x1="510" y1="303" x2="510" y2="320" stroke="black" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="360" y="350" text-anchor="middle" font-size="18" font-style="italic">t</text>
  <text x="373" y="350" text-anchor="middle" font-size="18"> = 0</text>
  <text x="510" y="350" text-anchor="middle" font-size="18" font-style="italic">t</text>
  <text x="518" y="355" text-anchor="start" font-size="14">c</text>

  <!-- Tick marks -->
  <line x1="360" y1="320" x2="360" y2="328" stroke="black" stroke-width="1.5"/>
  <line x1="510" y1="320" x2="510" y2="328" stroke="black" stroke-width="1.5"/>

  <!-- Alpha label with arrow -->
  <text x="570" y="270" font-size="18" font-style="italic">&#x3B1;</text>
  <text x="583" y="270" font-size="18"> = 0.05</text>
  <!-- Arrow pointing to shaded region -->
  <line x1="560" y1="278" x2="530" y2="312" stroke="black" stroke-width="1.5"/>
  <polygon points="530,312 535,300 525,304" fill="black"/>
</svg>