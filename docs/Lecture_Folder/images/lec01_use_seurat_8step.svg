<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Helvetica, Arial, sans-serif">
  <style>
    .stepTitle { font-size: 13px; font-weight: 700; fill: #222; }
    .box { font-size: 11px; fill: #222; text-anchor: middle; }
    .small { font-size: 10px; fill: #444; text-anchor: middle; }
    .hdr { font-size: 11px; font-weight: 700; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Top-left: inputs -->
  <g transform="translate(20,15)">
    <rect width="110" height="28" rx="3" fill="#e6e6e6" stroke="#999"/>
    <text class="box" x="55" y="18">cell × gene</text>
    <text class="small" x="55" y="42">count matrix</text>
    <rect x="0" y="55" width="110" height="28" rx="3" fill="#e6e6e6" stroke="#999"/>
    <text class="box" x="55" y="73">Meta data</text>
  </g>
  <line x1="130" y1="40" x2="175" y2="60" stroke="#555" marker-end="url(#a)"/>
  <rect x="175" y="45" width="160" height="40" rx="4" fill="#fff2c4" stroke="#c5a300"/>
  <text class="box" x="255" y="70" font-weight="700">Create Seurat Object</text>

  <!-- 1. QC & Filter -->
  <g transform="translate(20,110)">
    <text class="stepTitle" x="0" y="0">1. QC &amp; Filter</text>
    <rect width="220" height="180" rx="6" fill="#f7e4e4" stroke="#a33"/>
    <polygon points="40,30 180,30 180,60 40,60" fill="#fff" stroke="#a33"/>
    <text class="small" x="110" y="48">Cell with too</text>
    <text class="small" x="110" y="60">few/much genes?</text>
    <polygon points="40,80 180,80 180,110 40,110" fill="#fff" stroke="#a33"/>
    <text class="small" x="110" y="98">Too much mitochondria?</text>
    <polygon points="40,130 180,130 180,160 40,160" fill="#fff" stroke="#a33"/>
    <text class="small" x="110" y="148">Genes in few cells?</text>
  </g>
  <g transform="translate(20,310)">
    <rect width="220" height="40" rx="4" fill="#b2dfdb" stroke="#00695c"/>
    <text class="box" x="110" y="18" font-weight="700">High-quality</text>
    <text class="box" x="110" y="32">Seurat Object</text>
  </g>

  <!-- 2. Normalization & Scaling -->
  <g transform="translate(260,110)">
    <text class="stepTitle" x="0" y="0">2. Normalization &amp; Scaling</text>
    <rect width="200" height="90" rx="4" fill="#fde0c2" stroke="#b56e00"/>
    <rect x="15" y="12" width="170" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="27">NormalizeData</text>
    <rect x="15" y="40" width="170" height="40" rx="2" fill="#fff"/>
    <text class="small" x="100" y="55">nGene/nUMI, percent mito</text>
    <text class="small" x="100" y="68">cell cycle</text>
    <rect x="15" y="85" width="170" height="22" rx="2" fill="#fff" transform="translate(0,-5)"/>
  </g>
  <g transform="translate(260,205)">
    <rect width="200" height="30" rx="4" fill="#fde0c2" stroke="#b56e00"/>
    <text class="box" x="100" y="19" font-weight="700">ScaleData</text>
  </g>

  <!-- 3. Feature Extraction -->
  <g transform="translate(260,255)">
    <text class="stepTitle" x="0" y="0">3. Feature Extraction</text>
    <rect width="200" height="34" rx="4" fill="#fff2c4" stroke="#c5a300"/>
    <text class="box" x="100" y="22" font-weight="700">Highly variable genes</text>
  </g>

  <!-- 4. Dimension Reduction -->
  <g transform="translate(260,310)">
    <text class="stepTitle" x="0" y="0">4. Dimension Reduction</text>
    <rect width="200" height="110" rx="6" fill="#d7cbea" stroke="#5e3c99"/>
    <rect x="50" y="10" width="100" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="25" font-weight="700">RunPCA</text>
    <text class="small" x="100" y="50">PC heatmap</text>
    <text class="small" x="100" y="64">Elbowplot</text>
    <text class="small" x="100" y="78">JackStrawPlot</text>
    <rect x="10" y="85" width="180" height="20" rx="2" fill="#fff"/>
    <text class="small" x="100" y="99">Determine number of PC to use</text>
  </g>

  <!-- 5. Cell Clustering -->
  <g transform="translate(490,110)">
    <text class="stepTitle" x="0" y="0">5. Cell Clustering</text>
    <rect width="200" height="135" rx="6" fill="#d7cbea" stroke="#5e3c99"/>
    <rect x="40" y="10" width="120" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="25" font-weight="700">FindClusters</text>
    <text class="small" x="100" y="50">Cluster tree</text>
    <rect x="10" y="60" width="180" height="24" rx="2" fill="#fff"/>
    <text class="small" x="100" y="75">Determine resolution to cluster cell</text>
    <rect x="40" y="95" width="120" height="24" rx="2" fill="#fff"/>
    <text class="box" x="100" y="110" font-weight="700">tSNE / UMAP plot</text>
  </g>

  <!-- 6. Marker Identification -->
  <g transform="translate(490,260)">
    <text class="stepTitle" x="0" y="0">6. Marker Identification</text>
    <rect width="200" height="110" rx="6" fill="#c6e1e8" stroke="#2c7fb8"/>
    <rect x="40" y="10" width="120" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="25" font-weight="700">FindMarkers</text>
    <text class="small" x="100" y="52">Differential expression</text>
    <text class="small" x="100" y="72">Gene set enrichment</text>
    <text class="small" x="100" y="85">analysis</text>
  </g>

  <!-- 7. Trajectory Inference -->
  <g transform="translate(720,110)">
    <text class="stepTitle" x="0" y="0">7. Trajectory Inference</text>
    <rect width="200" height="100" rx="6" fill="#d7cbea" stroke="#5e3c99"/>
    <rect x="40" y="15" width="120" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="30" font-weight="700">Monocle2</text>
    <rect x="40" y="55" width="120" height="22" rx="2" fill="#fff"/>
    <text class="box" x="100" y="70" font-weight="700">DDRtree</text>
  </g>

  <!-- 8. Cell type annotation -->
  <g transform="translate(720,260)">
    <text class="stepTitle" x="0" y="0">8. Cell type annotation</text>
    <rect width="200" height="110" rx="6" fill="#f7cac9" stroke="#c0392b"/>
    <text class="hdr" x="100" y="30">Cluster annotation</text>
    <g transform="translate(20,45)">
      <circle cx="25" cy="20" r="8" fill="#2980b9"/>
      <circle cx="60" cy="35" r="8" fill="#c0392b"/>
      <circle cx="95" cy="25" r="8" fill="#2ecc71"/>
      <circle cx="130" cy="40" r="8" fill="#f1c40f"/>
      <circle cx="40" cy="55" r="8" fill="#9b59b6"/>
      <circle cx="120" cy="60" r="8" fill="#16a085"/>
    </g>
  </g>

  <!-- Arrows linking steps (horizontal flow) -->
  <g stroke="#555" stroke-width="1.6" fill="none">
    <!-- step1 -> step2/3 -->
    <path d="M240,190 H260" marker-end="url(#a)"/>
    <!-- step2 -> step3 -->
    <path d="M360,235 V255" marker-end="url(#a)"/>
    <!-- step3 -> step4 -->
    <path d="M360,290 V310" marker-end="url(#a)"/>
    <!-- step4 -> step5 -->
    <path d="M460,360 H490 V245" marker-end="url(#a)"/>
    <!-- step5 -> step6 -->
    <path d="M590,245 V260" marker-end="url(#a)"/>
    <!-- step5 -> step7 -->
    <path d="M690,170 H720" marker-end="url(#a)"/>
    <!-- step6/7 -> step8 -->
    <path d="M690,315 H720" marker-end="url(#a)"/>
    <path d="M820,210 V260" marker-end="url(#a)"/>
  </g>
</svg>
