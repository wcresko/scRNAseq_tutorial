<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 19px; font-weight: 700; fill: #222; text-anchor: middle; }
    .stepNum { font-size: 13px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .stepName { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .fn { font-family: Menlo, Consolas, monospace; font-size: 11px; fill: #222; text-anchor: middle; }
    .note { font-size: 11px; fill: #555; text-anchor: middle; }
    .decision { font-size: 11px; fill: #222; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="600" y="28">The Seurat workflow — eight steps</text>

  <!-- Input artefact: count matrix + metadata -->
  <g transform="translate(40,70)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#e6d9ef" stroke="#6a51a3"/>
    <text class="fn" x="60" y="25">cell × gene matrix</text>
    <rect x="0" y="50" width="120" height="30" rx="4" fill="#cfe2f3" stroke="#2166ac"/>
    <text class="fn" x="60" y="70">meta.data</text>
  </g>
  <path class="arrow" d="M 160 100 L 200 100" marker-end="url(#ah8)"/>

  <!-- STEP 1: QC & Filter -->
  <g transform="translate(200,60)">
    <rect x="0" y="0" width="230" height="140" rx="10" fill="#fde0dd" stroke="#c51b7d" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#c51b7d"/>
    <text class="stepNum" x="22" y="26">1</text>
    <text class="stepName" x="130" y="26">QC &amp; Filter</text>
    <text class="fn" x="115" y="50">CreateSeuratObject()</text>
    <text class="fn" x="115" y="68">PercentageFeatureSet("^MT-")</text>
    <text class="fn" x="115" y="86">VlnPlot · FeatureScatter</text>
    <text class="fn" x="115" y="104">subset(seu, nFeature &gt;200 &amp;</text>
    <text class="fn" x="115" y="120">  nFeature &lt;2500 &amp; percent.mt &lt;5)</text>
    <text class="note" x="115" y="135">→ high-quality Seurat object</text>
  </g>
  <path class="arrow" d="M 430 130 L 470 130" marker-end="url(#ah8)"/>

  <!-- STEP 2: Normalization & Scaling -->
  <g transform="translate(470,60)">
    <rect x="0" y="0" width="230" height="140" rx="10" fill="#fff2cc" stroke="#d69a00" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#d69a00"/>
    <text class="stepNum" x="22" y="26">2</text>
    <text class="stepName" x="130" y="26">Normalization &amp; Scaling</text>
    <text class="fn" x="115" y="54">NormalizeData(method=</text>
    <text class="fn" x="115" y="70">"LogNormalize", scale.factor=1e4)</text>
    <text class="fn" x="115" y="94">ScaleData(features = all.genes,</text>
    <text class="fn" x="115" y="110">  vars.to.regress = c("percent.mt",</text>
    <text class="fn" x="115" y="126">  "nCount_RNA", "S.Score", ...))</text>
  </g>
  <path class="arrow" d="M 700 130 L 740 130" marker-end="url(#ah8)"/>

  <!-- STEP 3: Feature Extraction -->
  <g transform="translate(740,60)">
    <rect x="0" y="0" width="230" height="140" rx="10" fill="#e2f0d9" stroke="#548235" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#548235"/>
    <text class="stepNum" x="22" y="26">3</text>
    <text class="stepName" x="140" y="26">Feature Extraction</text>
    <text class="fn" x="115" y="55">FindVariableFeatures(</text>
    <text class="fn" x="115" y="71">  method = "vst", nfeatures = 2000)</text>
    <text class="fn" x="115" y="95">VariableFeaturePlot · LabelPoints</text>
    <text class="note" x="115" y="122">average expression × dispersion →</text>
    <text class="note" x="115" y="136">z-score within bins (HVGs)</text>
  </g>
  <path class="arrow" d="M 970 130 L 1010 130" marker-end="url(#ah8)"/>

  <!-- STEP 4: Dimension Reduction -->
  <g transform="translate(1010,60)">
    <rect x="0" y="0" width="170" height="140" rx="10" fill="#deebf7" stroke="#2166ac" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#2166ac"/>
    <text class="stepNum" x="22" y="26">4</text>
    <text class="stepName" x="100" y="26">Dim. Reduction</text>
    <text class="fn" x="85" y="50">RunPCA()</text>
    <text class="fn" x="85" y="68">DimHeatmap()</text>
    <text class="fn" x="85" y="86">ElbowPlot()</text>
    <text class="fn" x="85" y="104">JackStrawPlot()</text>
    <text class="note" x="85" y="128">→ choose N PCs</text>
  </g>

  <!-- Down arrow from step 4 -->
  <path class="arrow" d="M 1095 200 C 1095 240 1095 260 1095 300" marker-end="url(#ah8)"/>

  <!-- STEP 5: Cell Clustering -->
  <g transform="translate(900,300)">
    <rect x="0" y="0" width="280" height="160" rx="10" fill="#f0e5f5" stroke="#6a51a3" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#6a51a3"/>
    <text class="stepNum" x="22" y="26">5</text>
    <text class="stepName" x="155" y="26">Cell Clustering</text>
    <text class="fn" x="140" y="54">FindNeighbors(dims = 1:N)</text>
    <text class="fn" x="140" y="72">FindClusters(resolution = 0.5)</text>
    <text class="fn" x="140" y="92">clustree::clustree()  ← decide res</text>
    <text class="fn" x="140" y="112">RunUMAP() · RunTSNE()</text>
    <text class="fn" x="140" y="132">DimPlot(reduction = "umap")</text>
    <text class="note" x="140" y="150">→ 2-D visualization of cell groups</text>
  </g>
  <path class="arrow" d="M 900 380 L 850 380" marker-end="url(#ah8)"/>

  <!-- STEP 6: Marker Identification -->
  <g transform="translate(600,300)">
    <rect x="0" y="0" width="250" height="160" rx="10" fill="#fce4d6" stroke="#c55a11" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#c55a11"/>
    <text class="stepNum" x="22" y="26">6</text>
    <text class="stepName" x="140" y="26">Marker Identification</text>
    <text class="fn" x="125" y="54">FindMarkers(ident.1 = k)</text>
    <text class="fn" x="125" y="72">FindAllMarkers(only.pos = T)</text>
    <text class="fn" x="125" y="94">DoHeatmap · DotPlot ·</text>
    <text class="fn" x="125" y="110">  VlnPlot · FeaturePlot · RidgePlot</text>
    <text class="fn" x="125" y="132">fgsea · enrichR · clusterProfiler</text>
    <text class="note" x="125" y="150">→ markers + enrichment</text>
  </g>
  <path class="arrow" d="M 600 380 L 550 380" marker-end="url(#ah8)"/>

  <!-- STEP 7: Trajectory Inference -->
  <g transform="translate(310,480)">
    <rect x="0" y="0" width="240" height="140" rx="10" fill="#eaecee" stroke="#5a5a5a" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#5a5a5a"/>
    <text class="stepNum" x="22" y="26">7</text>
    <text class="stepName" x="140" y="26">Trajectory Inference</text>
    <text class="fn" x="120" y="54">Monocle2 / Monocle3</text>
    <text class="fn" x="120" y="72">Slingshot · PAGA · scVelo</text>
    <text class="note" x="120" y="96">differential-expression filter →</text>
    <text class="note" x="120" y="112">ICA / DDRTree → minimum</text>
    <text class="note" x="120" y="128">spanning tree → pseudotime</text>
  </g>

  <!-- Step 6 → step 7 arrow (optional branching) -->
  <path class="arrow" d="M 600 430 C 520 480 480 490 460 490" marker-end="url(#ah8)"/>
  <!-- Step 5 → step 7 also -->
  <path class="arrow" d="M 930 460 C 800 500 650 510 550 515" stroke-dasharray="4 3"/>

  <!-- STEP 8: Cell Type Annotation -->
  <g transform="translate(40,480)">
    <rect x="0" y="0" width="240" height="140" rx="10" fill="#d9ead3" stroke="#38761d" stroke-width="2"/>
    <circle cx="22" cy="22" r="13" fill="#38761d"/>
    <text class="stepNum" x="22" y="26">8</text>
    <text class="stepName" x="145" y="26">Cell Type Annotation</text>
    <text class="fn" x="120" y="55">Manual: RenameIdents()</text>
    <text class="fn" x="120" y="75">based on canonical markers</text>
    <text class="fn" x="120" y="100">Automatic: SingleR · Azimuth ·</text>
    <text class="fn" x="120" y="116">CellTypist · scType · ProjecTILs</text>
    <text class="note" x="120" y="134">→ biological identity per cluster</text>
  </g>
  <!-- Step 6 → step 8 arrow -->
  <path class="arrow" d="M 600 420 C 400 450 300 470 280 490" marker-end="url(#ah8)"/>

  <defs>
    <marker id="ah8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
