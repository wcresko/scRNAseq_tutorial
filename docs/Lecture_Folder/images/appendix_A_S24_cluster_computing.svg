<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Cluster Computing</text>

  <!-- Users -->
  <rect x="30" y="100" width="100" height="40" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="80" y="125" text-anchor="middle" fill="#000">Users</text>
  <line x1="130" y1="120" x2="170" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Master Node -->
  <rect x="175" y="95" width="150" height="50" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="250" y="118" text-anchor="middle" font-size="13" fill="#000">Master / Head Node</text>

  <!-- Lines to compute nodes -->
  <line x1="325" y1="105" x2="380" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="325" y1="115" x2="380" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="325" y1="125" x2="380" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="325" y1="135" x2="380" y2="185" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 1 -->
  <rect x="385" y="45" width="90" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="67" text-anchor="middle" font-size="12" fill="#000">Node 1</text>

  <!-- Node 2 -->
  <rect x="385" y="90" width="90" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="112" text-anchor="middle" font-size="12" fill="#000">Node 2</text>

  <!-- Node 3 -->
  <rect x="385" y="135" width="90" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="157" text-anchor="middle" font-size="12" fill="#000">Node 3</text>

  <!-- Node N -->
  <rect x="385" y="180" width="90" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="202" text-anchor="middle" font-size="12" fill="#000">Node N</text>

  <!-- Shared Storage -->
  <rect x="340" y="270" width="180" height="45" rx="8" fill="#dda0dd" stroke="#333" stroke-width="2"/>
  <text x="430" y="297" text-anchor="middle" fill="#000">Shared Storage</text>

  <!-- Dotted lines from nodes to storage -->
  <line x1="430" y1="80" x2="430" y2="270" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="430" y1="215" x2="430" y2="270" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>
</svg>
