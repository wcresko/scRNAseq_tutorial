<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 12px; fill: #333; }
    .small { font-size: 10px; fill: #666; }
    .axis-label { font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .highlight { font-size: 11px; font-weight: bold; }
    .example { font-size: 11px; fill: #555; }
  </style>
  
  <text x="450" y="28" text-anchor="middle" class="title">Odds Ratios: The Asymmetry Problem</text>
  
  <!-- OR Scale (asymmetric) -->
  <text x="60" y="80" text-anchor="end" class="axis-label">Odds</text>
  <text x="60" y="95" text-anchor="end" class="axis-label">Ratio</text>
  <line x1="80" y1="85" x2="850" y2="85" stroke="#2c3e50" stroke-width="2"/>
  <!-- Ticks -->
  <line x1="80" y1="80" x2="80" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="80" y="110" text-anchor="middle" class="label">0</text>
  <line x1="195" y1="80" x2="195" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="195" y="110" text-anchor="middle" class="label">0.25</text>
  <line x1="350" y1="80" x2="350" y2="90" stroke="#e74c3c" stroke-width="3"/>
  <text x="350" y="110" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">1.0</text>
  <text x="350" y="125" text-anchor="middle" class="small" fill="#e74c3c">no effect</text>
  <line x1="620" y1="80" x2="620" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="620" y="110" text-anchor="middle" class="label">4.0</text>
  <line x1="850" y1="80" x2="850" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="850" y="110" text-anchor="middle" class="label">&infin;</text>
  <!-- Markers -->
  <circle cx="195" cy="85" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="620" cy="85" r="8" fill="#e67e22" opacity="0.8"/>
  <text x="195" y="68" text-anchor="middle" class="highlight" fill="#3498db">OR = 0.25</text>
  <text x="620" y="68" text-anchor="middle" class="highlight" fill="#e67e22">OR = 4.0</text>
  <!-- Unequal distances -->
  <path d="M195,135 C195,155 350,155 350,135" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <text x="273" y="160" text-anchor="middle" class="small" fill="#3498db">155px</text>
  <path d="M350,135 C350,155 620,155 620,135" stroke="#e67e22" stroke-width="1.5" fill="none"/>
  <text x="485" y="160" text-anchor="middle" class="small" fill="#e67e22">270px</text>
  <text x="450" y="178" text-anchor="middle" class="highlight" fill="#c0392b">Same effect strength looks asymmetric!</text>
  
  <!-- Log OR Scale (symmetric) -->
  <text x="60" y="225" text-anchor="end" class="axis-label">Log</text>
  <text x="60" y="240" text-anchor="end" class="axis-label">Odds Ratio</text>
  <line x1="80" y1="230" x2="850" y2="230" stroke="#2c3e50" stroke-width="2"/>
  <line x1="80" y1="225" x2="80" y2="235" stroke="#2c3e50" stroke-width="2"/>
  <text x="80" y="255" text-anchor="middle" class="label">&minus;&infin;</text>
  <line x1="272" y1="225" x2="272" y2="235" stroke="#2c3e50" stroke-width="2"/>
  <text x="272" y="255" text-anchor="middle" class="label">&minus;1.39</text>
  <line x1="465" y1="225" x2="465" y2="235" stroke="#e74c3c" stroke-width="3"/>
  <text x="465" y="255" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">0</text>
  <text x="465" y="270" text-anchor="middle" class="small" fill="#e74c3c">no effect</text>
  <line x1="658" y1="225" x2="658" y2="235" stroke="#2c3e50" stroke-width="2"/>
  <text x="658" y="255" text-anchor="middle" class="label">+1.39</text>
  <line x1="850" y1="225" x2="850" y2="235" stroke="#2c3e50" stroke-width="2"/>
  <text x="850" y="255" text-anchor="middle" class="label">+&infin;</text>
  <!-- Markers -->
  <circle cx="272" cy="230" r="8" fill="#3498db" opacity="0.8"/>
  <circle cx="658" cy="230" r="8" fill="#e67e22" opacity="0.8"/>
  <text x="272" y="215" text-anchor="middle" class="highlight" fill="#3498db">log(0.25) = &minus;1.39</text>
  <text x="658" y="215" text-anchor="middle" class="highlight" fill="#e67e22">log(4) = +1.39</text>
  <!-- Symmetry -->
  <path d="M272,278 L465,293" stroke="#27ae60" stroke-width="2" fill="none"/>
  <path d="M658,278 L465,293" stroke="#27ae60" stroke-width="2" fill="none"/>
  <text x="465" y="312" text-anchor="middle" class="highlight" fill="#27ae60">Equal distances from zero = Equally strong effects</text>
  
  <!-- Bioengineering example -->
  <rect x="100" y="322" width="700" height="16" rx="3" fill="#f0f7f0" stroke="#27ae60" stroke-width="0.5"/>
  <text x="450" y="334" text-anchor="middle" class="example" fill="#27ae60">Example: Scaffold coating reduces failure odds by 4x (OR=0.25) vs. increases by 4x (OR=4)</text>
</svg>