<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; }
    .lbl { font-size: 13px; fill: #222; text-anchor: middle; }
    .qc  { font-size: 13px; fill: #fff; font-weight: 700; text-anchor: middle; }
    .mono { font-family: "Courier New", monospace; font-size: 9px; fill: #222; }
    .hdr { font-size: 12px; font-weight: 700; fill: #222; text-anchor: middle; }
    .emph { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Top-left: BCL files -->
  <g transform="translate(50,40)">
    <rect width="130" height="40" rx="20" class="box"/>
    <text class="lbl" x="65" y="25">BCL files</text>
  </g>
  <line x1="115" y1="80" x2="115" y2="110" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <g transform="translate(50,110)">
    <rect width="130" height="40" rx="20" class="box"/>
    <text class="lbl" x="65" y="25">Signal Processing</text>
  </g>
  <line x1="115" y1="150" x2="115" y2="180" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <g transform="translate(50,180)">
    <rect width="130" height="40" rx="20" class="box"/>
    <text class="lbl" x="65" y="25">Sequencing Reads</text>
  </g>
  <line x1="115" y1="220" x2="115" y2="260" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <!-- FASTQ file (styled as monospace block) -->
  <g transform="translate(40,260)">
    <rect width="150" height="150" class="box"/>
    <text class="mono" x="10" y="15">&gt;@read_1</text>
    <text class="mono" x="10" y="27">CGGTAGCCAGCTGCGTTCAGTA</text>
    <text class="mono" x="10" y="39">+</text>
    <text class="mono" x="10" y="51">+&amp;&amp;-&amp;%%'$$$#/33&amp;0$&amp;%$'**</text>
    <text class="mono" x="10" y="63">&gt;@read_2</text>
    <text class="mono" x="10" y="75">CGGTAGCCAGCTGCGTTCAGTA</text>
    <text class="mono" x="10" y="87">+</text>
    <text class="mono" x="10" y="99">+&amp;&amp;-&amp;%%'$$$#/33&amp;0$&amp;%$'**</text>
    <text class="mono" x="10" y="111">&gt;@read_3</text>
    <text class="mono" x="10" y="123">CGGTAGCCAGCTGCGTTCAGTA</text>
    <text class="mono" x="10" y="135">+</text>
    <text class="mono" x="10" y="147">+&amp;&amp;-&amp;%%'$$$#/33&amp;0$&amp;%$'**</text>
  </g>
  <text class="emph" x="115" y="435">FASTQ File</text>

  <!-- QC of FASTQ bubble -->
  <g transform="translate(220,270)">
    <rect width="110" height="36" rx="18" fill="#1b9cd3" stroke="#0b6aa0"/>
    <text class="qc" x="55" y="23">QC of FASTQ</text>
  </g>
  <!-- dashed line to fastq -->
  <line x1="225" y1="310" x2="190" y2="330" stroke="#333" stroke-dasharray="4,3"/>

  <!-- Alignment step -->
  <line x1="200" y1="335" x2="370" y2="335" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
  <g transform="translate(370,315)">
    <rect width="100" height="40" rx="20" class="box"/>
    <text class="lbl" x="50" y="25">Alignment</text>
  </g>

  <!-- Two branches -->
  <line x1="470" y1="325" x2="530" y2="290" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="345" x2="530" y2="380" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
  <g transform="translate(530,270)">
    <rect width="210" height="40" rx="6" fill="#fdd6d6" stroke="#a33"/>
    <text class="lbl" x="105" y="25">Spliced Alignment to genome</text>
  </g>
  <g transform="translate(530,360)">
    <rect width="210" height="40" rx="6" fill="#fdd6d6" stroke="#a33"/>
    <text class="lbl" x="105" y="17">Lightweight mapping</text>
    <text class="lbl" x="105" y="33">to (extended) txome</text>
  </g>

  <line x1="740" y1="290" x2="790" y2="325" stroke="#222" stroke-width="2"/>
  <line x1="740" y1="380" x2="790" y2="345" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <!-- Quantification group -->
  <g transform="translate(790,260)">
    <rect width="190" height="180" rx="10" fill="#e3f0cf" stroke="#5c8a2a"/>
    <text class="hdr" x="95" y="170">Quantification</text>
    <rect x="15" y="25" width="160" height="30" fill="#fff" stroke="#333"/>
    <text class="lbl" x="95" y="44">Count assignment</text>
    <rect x="15" y="70" width="160" height="30" fill="#fff" stroke="#333"/>
    <text class="lbl" x="95" y="89">UMI resolution</text>
    <rect x="15" y="115" width="160" height="30" fill="#fff" stroke="#333"/>
    <text class="lbl" x="95" y="134">CB correction</text>
    <!-- arrows up inside -->
    <line x1="95" y1="115" x2="95" y2="100" stroke="#333" marker-end="url(#a)"/>
    <line x1="95" y1="70"  x2="95" y2="55"  stroke="#333" marker-end="url(#a)"/>
  </g>

  <!-- Count matrix -->
  <g transform="translate(1000,40)">
    <text class="hdr" x="85" y="0">Count Matrix</text>
    <rect x="0" y="10" width="180" height="210" fill="#fff" stroke="#222"/>
    <!-- header cols -->
    <line x1="30" y1="10" x2="30" y2="220" stroke="#aaa"/>
    <line x1="70" y1="10" x2="70" y2="220" stroke="#aaa"/>
    <line x1="110" y1="10" x2="110" y2="220" stroke="#aaa"/>
    <line x1="150" y1="10" x2="150" y2="220" stroke="#aaa"/>
    <line x1="0" y1="35" x2="180" y2="35" stroke="#333"/>
    <text class="mono" x="40" y="30">Cell1</text>
    <text class="mono" x="80" y="30">Cell2</text>
    <text class="mono" x="120" y="30">..</text>
    <text class="mono" x="155" y="30">CellN</text>

    <text class="mono" x="2"   y="55" fill="#8e44ad">Gene1</text>
    <text class="mono" x="40"  y="55">3</text>
    <text class="mono" x="80"  y="55">2</text>
    <text class="mono" x="120" y="55">.</text>
    <text class="mono" x="155" y="55">13</text>

    <text class="mono" x="2"   y="75" fill="#e67e22">Gene2</text>
    <text class="mono" x="40"  y="75">2</text>
    <text class="mono" x="80"  y="75">3</text>
    <text class="mono" x="120" y="75">.</text>
    <text class="mono" x="155" y="75">1</text>

    <text class="mono" x="2"   y="95">Gene3</text>
    <text class="mono" x="40"  y="95">1</text>
    <text class="mono" x="80"  y="95">14</text>
    <text class="mono" x="120" y="95">.</text>
    <text class="mono" x="155" y="95">18</text>

    <text class="mono" x="2"  y="120">...</text>
    <text class="mono" x="2"  y="150">...</text>
    <text class="mono" x="2"  y="180">...</text>

    <text class="mono" x="2"   y="205">GeneM</text>
    <text class="mono" x="40"  y="205">25</text>
    <text class="mono" x="80"  y="205">0</text>
    <text class="mono" x="120" y="205">.</text>
    <text class="mono" x="155" y="205">0</text>
  </g>

  <!-- QC of count matrix bubble + dashed arrow -->
  <g transform="translate(780,80)">
    <rect width="170" height="40" rx="20" fill="#1b9cd3" stroke="#0b6aa0"/>
    <text class="qc" x="85" y="26">QC of Count Matrix</text>
  </g>
  <line x1="950" y1="100" x2="1000" y2="150" stroke="#333" stroke-dasharray="4,3"/>
  <line x1="880" y1="120" x2="880" y2="260" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
</svg>
