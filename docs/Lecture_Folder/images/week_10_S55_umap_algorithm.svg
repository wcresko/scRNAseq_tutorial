<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
  <defs>
    <style>
      .t { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #2c3e50; }
      .box { rx: 8; stroke-width: 2; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" class="t" font-size="18" text-anchor="middle" font-weight="bold">UMAP: Uniform Manifold Approximation and Projection</text>

  <!-- ===== STEP 1: Local neighborhoods ===== -->
  <rect x="15" y="45" width="280" height="210" fill="#eaf2f8" stroke="#2980b9" class="box"/>
  <text x="155" y="68" class="t" font-size="13" text-anchor="middle" font-weight="bold" fill="#2980b9">Step 1: Build Local Neighborhoods</text>

  <!-- Central point with k nearest neighbors connected -->
  <circle cx="130" cy="140" r="7" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Neighbor points -->
  <circle cx="100" cy="115" r="5" fill="#3498db"/>
  <circle cx="160" cy="120" r="5" fill="#3498db"/>
  <circle cx="115" cy="170" r="5" fill="#3498db"/>
  <circle cx="170" cy="155" r="5" fill="#3498db"/>
  <circle cx="85" cy="155" r="5" fill="#3498db"/>

  <!-- Edges with varying thickness (edge weight = fuzzy membership) -->
  <line x1="130" y1="140" x2="100" y2="115" stroke="#2980b9" stroke-width="3" opacity="0.8"/>
  <line x1="130" y1="140" x2="160" y2="120" stroke="#2980b9" stroke-width="2.5" opacity="0.7"/>
  <line x1="130" y1="140" x2="115" y2="170" stroke="#2980b9" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="140" x2="170" y2="155" stroke="#2980b9" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="140" x2="85" y2="155" stroke="#2980b9" stroke-width="1" opacity="0.3"/>

  <!-- Far point (not connected) -->
  <circle cx="230" cy="100" r="4" fill="#bdc3c7"/>
  <circle cx="245" cy="185" r="4" fill="#bdc3c7"/>

  <text x="155" y="210" class="t" font-size="10" text-anchor="middle">Find k nearest neighbors for each point</text>
  <text x="155" y="224" class="t" font-size="10" text-anchor="middle">Edge weight decays with distance from</text>
  <text x="155" y="238" class="t" font-size="10" text-anchor="middle">each point's nearest neighbor (local scale)</text>

  <!-- ===== Arrow 1 ===== -->
  <line x1="300" y1="150" x2="330" y2="150" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== STEP 2: Fuzzy graph ===== -->
  <rect x="335" y="45" width="250" height="210" fill="#fef9e7" stroke="#f39c12" class="box"/>
  <text x="460" y="68" class="t" font-size="13" text-anchor="middle" font-weight="bold" fill="#d68910">Step 2: Fuzzy Simplicial Set</text>

  <!-- Network graph -->
  <circle cx="390" cy="120" r="5" fill="#e74c3c"/>
  <circle cx="420" cy="100" r="5" fill="#3498db"/>
  <circle cx="450" cy="115" r="5" fill="#3498db"/>
  <circle cx="410" cy="145" r="5" fill="#3498db"/>
  <circle cx="440" cy="150" r="5" fill="#3498db"/>

  <circle cx="490" cy="155" r="5" fill="#9b59b6"/>
  <circle cx="510" cy="130" r="5" fill="#9b59b6"/>
  <circle cx="530" cy="160" r="5" fill="#9b59b6"/>
  <circle cx="520" cy="185" r="5" fill="#9b59b6"/>

  <!-- Within-cluster edges (strong) -->
  <line x1="390" y1="120" x2="420" y2="100" stroke="#f39c12" stroke-width="2.5" opacity="0.8"/>
  <line x1="390" y1="120" x2="410" y2="145" stroke="#f39c12" stroke-width="2.5" opacity="0.7"/>
  <line x1="420" y1="100" x2="450" y2="115" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
  <line x1="410" y1="145" x2="440" y2="150" stroke="#f39c12" stroke-width="2" opacity="0.6"/>
  <line x1="450" y1="115" x2="440" y2="150" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>

  <line x1="490" y1="155" x2="510" y2="130" stroke="#f39c12" stroke-width="2.5" opacity="0.8"/>
  <line x1="490" y1="155" x2="530" y2="160" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
  <line x1="510" y1="130" x2="530" y2="160" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>
  <line x1="530" y1="160" x2="520" y2="185" stroke="#f39c12" stroke-width="2" opacity="0.6"/>

  <!-- Between-cluster edge (weak) -->
  <line x1="440" y1="150" x2="490" y2="155" stroke="#f39c12" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,3"/>

  <text x="460" y="210" class="t" font-size="10" text-anchor="middle">Merge local graphs into a global</text>
  <text x="460" y="224" class="t" font-size="10" text-anchor="middle">weighted graph via fuzzy union:</text>
  <text x="460" y="240" class="t" font-size="10" text-anchor="middle" font-style="italic">w = a + b &#x2212; a&#x00B7;b</text>

  <!-- ===== Arrow 2 ===== -->
  <line x1="590" y1="150" x2="620" y2="150" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== STEP 3: Optimize embedding ===== -->
  <rect x="625" y="45" width="280" height="210" fill="#e8f8e8" stroke="#27ae60" class="box"/>
  <text x="765" y="68" class="t" font-size="13" text-anchor="middle" font-weight="bold" fill="#27ae60">Step 3: Optimize Low-D Layout</text>

  <!-- Two well-separated clusters in 2D -->
  <circle cx="680" cy="120" r="5" fill="#e74c3c"/>
  <circle cx="695" cy="108" r="5" fill="#3498db"/>
  <circle cx="710" cy="125" r="5" fill="#3498db"/>
  <circle cx="685" cy="138" r="5" fill="#3498db"/>
  <circle cx="700" cy="140" r="5" fill="#3498db"/>

  <circle cx="810" cy="155" r="5" fill="#9b59b6"/>
  <circle cx="830" cy="140" r="5" fill="#9b59b6"/>
  <circle cx="845" cy="165" r="5" fill="#9b59b6"/>
  <circle cx="835" cy="178" r="5" fill="#9b59b6"/>

  <text x="765" y="205" class="t" font-size="10" text-anchor="middle">Use cross-entropy to match</text>
  <text x="765" y="219" class="t" font-size="10" text-anchor="middle">low-D graph to high-D graph:</text>
  <text x="765" y="237" class="t" font-size="10" text-anchor="middle" font-style="italic">Attract connected points,</text>
  <text x="765" y="249" class="t" font-size="10" text-anchor="middle" font-style="italic">repel disconnected points</text>

  <!-- ===== BOTTOM: Key innovations ===== -->
  <rect x="15" y="275" width="440" height="230" fill="#f4ecf7" stroke="#8e44ad" class="box"/>
  <text x="235" y="300" class="t" font-size="15" text-anchor="middle" font-weight="bold" fill="#8e44ad">UMAP's Key Innovations</text>

  <text x="40" y="328" class="t" font-size="12" font-weight="bold" fill="#8e44ad">Local distance normalization</text>
  <text x="40" y="346" class="t" font-size="11">Each point defines its own local scale based on</text>
  <text x="40" y="361" class="t" font-size="11">its nearest neighbor distance. This ensures points</text>
  <text x="40" y="376" class="t" font-size="11">in sparse regions connect to neighbors, not just</text>
  <text x="40" y="391" class="t" font-size="11">points in dense regions.</text>

  <text x="40" y="418" class="t" font-size="12" font-weight="bold" fill="#8e44ad">Fuzzy union of local views</text>
  <text x="40" y="436" class="t" font-size="11">If point A considers B a neighbor OR B considers</text>
  <text x="40" y="451" class="t" font-size="11">A a neighbor, they are connected. This creates a</text>
  <text x="40" y="466" class="t" font-size="11">symmetric, globally connected graph.</text>

  <text x="40" y="491" class="t" font-size="12" font-weight="bold" fill="#8e44ad">Stochastic gradient descent</text>

  <!-- ===== RIGHT: Parameters ===== -->
  <rect x="475" y="275" width="430" height="230" fill="#f0f7ff" stroke="#2980b9" class="box"/>
  <text x="690" y="300" class="t" font-size="15" text-anchor="middle" font-weight="bold" fill="#2980b9">UMAP Algorithm Summary</text>

  <text x="500" y="328" class="t" font-size="12" font-weight="bold">1.</text>
  <text x="520" y="328" class="t" font-size="11">Compute k-nearest neighbor graph</text>
  <text x="520" y="343" class="t" font-size="11">(controlled by n_neighbors parameter)</text>

  <text x="500" y="368" class="t" font-size="12" font-weight="bold">2.</text>
  <text x="520" y="368" class="t" font-size="11">Convert distances to fuzzy memberships</text>
  <text x="520" y="383" class="t" font-size="11">using local distance normalization</text>

  <text x="500" y="408" class="t" font-size="12" font-weight="bold">3.</text>
  <text x="520" y="408" class="t" font-size="11">Merge local fuzzy sets into a global</text>
  <text x="520" y="423" class="t" font-size="11">weighted graph (fuzzy simplicial set)</text>

  <text x="500" y="448" class="t" font-size="12" font-weight="bold">4.</text>
  <text x="520" y="448" class="t" font-size="11">Initialize low-D layout (spectral or random)</text>

  <text x="500" y="473" class="t" font-size="12" font-weight="bold">5.</text>
  <text x="520" y="473" class="t" font-size="11">Optimize via stochastic gradient descent on</text>
  <text x="520" y="488" class="t" font-size="11">cross-entropy between high-D and low-D graphs</text>
</svg>
