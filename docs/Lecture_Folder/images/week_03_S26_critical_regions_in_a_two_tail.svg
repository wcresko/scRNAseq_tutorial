<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Arial, Helvetica, sans-serif">
  <!-- Label (a) -->
  <text x="100" y="30" font-size="22">(a)</text>

  <!-- Y-axis label -->
  <text x="25" y="200" text-anchor="middle" font-size="20" font-style="italic" transform="rotate(-90,25,200)">P(t)</text>

  <!-- Axes -->
  <line x1="60" y1="330" x2="660" y2="330" stroke="black" stroke-width="2"/>
  <line x1="60" y1="330" x2="60" y2="30" stroke="black" stroke-width="2"/>

  <!-- t distribution curve -->
  <path d="M 65,328 C 80,326 95,322 115,315 C 140,305 160,290 185,265 C 210,235 240,200 270,160 C 300,125 320,100 345,85 C 360,80 370,82 385,90 C 405,105 430,135 455,170 C 480,205 505,240 525,270 C 545,290 565,305 585,315 C 600,322 620,326 640,328"
        fill="none" stroke="black" stroke-width="3"/>

  <!-- Left tail shaded region -->
  <path d="M 65,328 L 65,326 C 75,325 85,323 95,320 C 105,317 115,315 120,314 L 120,330 Z"
        fill="#CCCCCC" stroke="none"/>

  <!-- Right tail shaded region -->
  <path d="M 585,315 C 595,320 605,323 615,326 C 625,327 635,328 640,328 L 640,330 L 585,330 Z"
        fill="#CCCCCC" stroke="none"/>

  <!-- Redraw curve endpoints over shaded regions -->
  <path d="M 65,328 C 75,326 85,323 100,319 C 110,316 118,314 120,314"
        fill="none" stroke="black" stroke-width="3"/>
  <path d="M 585,315 C 600,322 620,326 640,328"
        fill="none" stroke="black" stroke-width="3"/>

  <!-- Vertical lines at tc -->
  <line x1="120" y1="314" x2="120" y2="330" stroke="black" stroke-width="1.5"/>
  <line x1="585" y1="315" x2="585" y2="330" stroke="black" stroke-width="1.5"/>

  <!-- X-axis tick marks -->
  <line x1="120" y1="330" x2="120" y2="340" stroke="black" stroke-width="1.5"/>
  <line x1="352" y1="330" x2="352" y2="340" stroke="black" stroke-width="1.5"/>
  <line x1="585" y1="330" x2="585" y2="340" stroke="black" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="120" y="365" text-anchor="middle" font-size="17" font-style="italic">t</text>
  <text x="130" y="370" font-size="13">c</text>
  <text x="352" y="365" text-anchor="middle" font-size="17" font-style="italic">t</text>
  <text x="365" y="365" font-size="17"> = 0</text>
  <text x="585" y="365" text-anchor="middle" font-size="17" font-style="italic">t</text>
  <text x="595" y="370" font-size="13">c</text>

  <!-- Left alpha label with arrow -->
  <text x="90" y="250" font-size="17" font-style="italic">&#x3B1;</text>
  <text x="104" y="250" font-size="17"> = 0.025</text>
  <line x1="105" y1="258" x2="110" y2="320" stroke="black" stroke-width="1.5"/>
  <polygon points="110,320 114,308 106,310" fill="black"/>

  <!-- Right alpha label with arrow -->
  <text x="570" y="250" font-size="17" font-style="italic">&#x3B1;</text>
  <text x="584" y="250" font-size="17"> = 0.025</text>
  <line x1="600" y1="258" x2="595" y2="320" stroke="black" stroke-width="1.5"/>
  <polygon points="595,320 599,308 591,310" fill="black"/>
</svg>