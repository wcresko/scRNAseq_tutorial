<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <style>
    .header { font-weight: bold; font-size: 16px; fill: #333; }
    .cell { font-size: 15px; fill: #333; }
    .title { font-weight: bold; font-size: 18px; fill: #222; }
    .subtitle { font-size: 15px; fill: #555; }
    .label { font-size: 13px; fill: #555; }
    .formula { font-size: 16px; fill: #444; font-style: italic; }
    .model-label { font-size: 13px; fill: #666; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">ANOVA Table with Reduced vs Full Model Comparison</text>

  <!-- ANOVA Table -->
  <!-- Header row background -->
  <rect x="80" y="45" width="740" height="32" fill="#4a6fa5" rx="3"/>
  <!-- Header text -->
  <text x="160" y="67" text-anchor="middle" class="header" fill="white">Source</text>
  <text x="300" y="67" text-anchor="middle" class="header" fill="white">Df</text>
  <text x="410" y="67" text-anchor="middle" class="header" fill="white">Sum Sq</text>
  <text x="530" y="67" text-anchor="middle" class="header" fill="white">Mean Sq</text>
  <text x="650" y="67" text-anchor="middle" class="header" fill="white">F value</text>
  <text x="770" y="67" text-anchor="middle" class="header" fill="white">Pr(>F)</text>

  <!-- Row 1: Treatment -->
  <rect x="80" y="77" width="740" height="30" fill="#f0f4f8"/>
  <text x="160" y="97" text-anchor="middle" class="cell">Treatment</text>
  <text x="300" y="97" text-anchor="middle" class="cell">2</text>
  <text x="410" y="97" text-anchor="middle" class="cell">4040.9</text>
  <text x="530" y="97" text-anchor="middle" class="cell">2020.5</text>
  <text x="650" y="97" text-anchor="middle" class="cell">6.6736</text>
  <text x="770" y="97" text-anchor="middle" class="cell">0.003216 **</text>

  <!-- Row 2: Residuals -->
  <rect x="80" y="107" width="740" height="30" fill="#ffffff"/>
  <text x="160" y="127" text-anchor="middle" class="cell">Residuals</text>
  <text x="300" y="127" text-anchor="middle" class="cell">39</text>
  <text x="410" y="127" text-anchor="middle" class="cell">11807.4</text>
  <text x="530" y="127" text-anchor="middle" class="cell">302.8</text>

  <!-- Table border -->
  <rect x="80" y="45" width="740" height="92" fill="none" stroke="#4a6fa5" stroke-width="1.5" rx="3"/>
  <line x1="80" y1="77" x2="820" y2="77" stroke="#4a6fa5" stroke-width="1"/>
  <line x1="80" y1="107" x2="820" y2="107" stroke="#4a6fa5" stroke-width="0.5"/>

  <!-- Subtitle -->
  <text x="450" y="170" text-anchor="middle" class="subtitle">As before, ANOVA compares the fit of "reduced" and "full" models:</text>

  <!-- Reduced Model (left) -->
  <text x="250" y="200" text-anchor="middle" class="formula">stretching ~ 1</text>

  <!-- Full Model (right) -->
  <text x="650" y="200" text-anchor="middle" class="formula">stretching ~ treatment</text>

  <!-- Left plot area: Reduced Model -->
  <rect x="60" y="215" width="360" height="260" fill="#fafafa" stroke="#ccc" stroke-width="1" rx="4"/>

  <!-- Y axis label (left) -->
  <text x="45" y="350" text-anchor="middle" transform="rotate(-90 45 350)" class="label">Percent time stretching</text>

  <!-- Y axis ticks -->
  <text x="75" y="465" text-anchor="end" class="label">0</text>
  <text x="75" y="415" text-anchor="end" class="label">20</text>
  <text x="75" y="365" text-anchor="end" class="label">40</text>
  <text x="75" y="315" text-anchor="end" class="label">60</text>
  <text x="75" y="265" text-anchor="end" class="label">80</text>

  <!-- Grand mean line (reduced model) -->
  <line x1="85" y1="355" x2="410" y2="355" stroke="#666" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Isolated group dots (left plot) -->
  <circle cx="150" cy="330" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="160" cy="350" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="140" cy="390" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="155" cy="310" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="165" cy="370" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="145" cy="455" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="170" cy="340" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="135" cy="360" r="5" fill="#e74c3c" opacity="0.7"/>

  <!-- Companion (not injected) dots -->
  <circle cx="240" cy="290" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="250" cy="320" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="230" cy="350" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="255" cy="300" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="235" cy="380" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="245" cy="270" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="260" cy="340" r="5" fill="#3498db" opacity="0.7"/>

  <!-- Companion (injected) dots -->
  <circle cx="340" cy="280" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="350" cy="250" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="330" cy="310" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="355" cy="290" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="345" cy="230" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="335" cy="270" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="360" cy="300" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="325" cy="320" r="5" fill="#2ecc71" opacity="0.7"/>

  <!-- X axis labels (left) -->
  <text x="150" y="490" text-anchor="middle" class="label">Isolated</text>
  <text x="245" y="490" text-anchor="middle" class="label">Companion</text>
  <text x="245" y="503" text-anchor="middle" class="label">(not injected)</text>
  <text x="350" y="490" text-anchor="middle" class="label">Companion</text>
  <text x="350" y="503" text-anchor="middle" class="label">(injected)</text>

  <!-- Model label -->
  <text x="30" y="355" text-anchor="middle" transform="rotate(-90 30 355)" class="model-label">Reduced Model: One overall mean</text>

  <!-- Right plot area: Full Model -->
  <rect x="460" y="215" width="360" height="260" fill="#fafafa" stroke="#ccc" stroke-width="1" rx="4"/>

  <!-- Isolated group dots (right plot) - same positions offset -->
  <circle cx="550" cy="330" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="560" cy="350" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="540" cy="390" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="555" cy="310" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="565" cy="370" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="545" cy="455" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="570" cy="340" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="535" cy="360" r="5" fill="#e74c3c" opacity="0.7"/>

  <!-- Group mean line for Isolated -->
  <line x1="520" y1="363" x2="585" y2="363" stroke="#e74c3c" stroke-width="2"/>

  <!-- Companion (not injected) dots (right) -->
  <circle cx="640" cy="290" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="650" cy="320" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="630" cy="350" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="655" cy="300" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="635" cy="380" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="645" cy="270" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="660" cy="340" r="5" fill="#3498db" opacity="0.7"/>

  <!-- Group mean line for Companion (not injected) -->
  <line x1="618" y1="321" x2="672" y2="321" stroke="#3498db" stroke-width="2"/>

  <!-- Companion (injected) dots (right) -->
  <circle cx="740" cy="280" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="750" cy="250" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="730" cy="310" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="755" cy="290" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="745" cy="230" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="735" cy="270" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="760" cy="300" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="725" cy="320" r="5" fill="#2ecc71" opacity="0.7"/>

  <!-- Group mean line for Companion (injected) -->
  <line x1="715" y1="281" x2="770" y2="281" stroke="#2ecc71" stroke-width="2"/>

  <!-- X axis labels (right) -->
  <text x="555" y="490" text-anchor="middle" class="label">Isolated</text>
  <text x="645" y="490" text-anchor="middle" class="label">Companion</text>
  <text x="645" y="503" text-anchor="middle" class="label">(not injected)</text>
  <text x="745" y="490" text-anchor="middle" class="label">Companion</text>
  <text x="745" y="503" text-anchor="middle" class="label">(injected)</text>

  <!-- Model label -->
  <text x="840" y="355" text-anchor="middle" transform="rotate(90 840 355)" class="model-label">Full Model: Different Means</text>

  <!-- X axis overall label -->
  <text x="250" y="518" text-anchor="middle" class="label">Treatment</text>
  <text x="650" y="518" text-anchor="middle" class="label">Treatment</text>
</svg>