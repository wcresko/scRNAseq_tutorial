<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="20" y="40" font-size="28" font-weight="bold" fill="#222">Vectors</text>

  <!-- Outer box: Vectors -->
  <rect x="20" y="55" width="660" height="430" rx="12" ry="12" fill="none" stroke="#222" stroke-width="2.5"/>

  <!-- Atomic vectors box -->
  <rect x="40" y="75" width="420" height="390" rx="10" ry="10" fill="none" stroke="#222" stroke-width="2"/>
  <text x="60" y="110" font-size="22" font-weight="bold" fill="#222">Atomic vectors</text>

  <!-- Logical -->
  <text x="70" y="155" font-size="18" fill="#333">Logical</text>

  <!-- Numeric box -->
  <rect x="60" y="175" width="280" height="170" rx="8" ry="8" fill="none" stroke="#222" stroke-width="2"/>
  <text x="80" y="210" font-size="20" font-weight="bold" fill="#222">Numeric</text>

  <!-- Integer & Double box -->
  <rect x="80" y="225" width="230" height="100" rx="6" ry="6" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="100" y="260" font-size="17" fill="#333">Integer</text>
  <text x="100" y="300" font-size="17" fill="#333">Double</text>

  <!-- Character -->
  <text x="70" y="390" font-size="18" fill="#333">Character</text>

  <!-- List label -->
  <text x="520" y="280" font-size="22" fill="#333">List</text>
</svg>