<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .stage { font-size: 13px; fill: #222; font-weight: 700; text-anchor: middle; }
    .pnl  { font-size: 14px; fill: #1f4e79; font-weight: 700; text-anchor: middle; }
    .lbl  { font-size: 11px; fill: #222; text-anchor: middle; }
    .mono { font-family: "Courier New", monospace; font-size: 11px; fill: #222; }
    .blue { fill: #2c7fb8; }
    .pink { fill: #e6a6b7; }
    .gray { fill: #b4b4b4; }
    .muted { fill: #c9c9c9; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Row: 5 stages, mRNA with UMI tags + reads -->
  <!-- Stage 0: raw RNA -->
  <g transform="translate(40,30)">
    <text class="stage" x="60" y="0">RNA</text>
    <g transform="translate(0,20)">
      <!-- three wavy mRNA of three colors -->
      <path d="M10,10 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#2c7fb8" stroke-width="3"/>
      <path d="M10,30 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#e6a6b7" stroke-width="3"/>
      <path d="M10,50 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#b4b4b4" stroke-width="3"/>
    </g>
    <line x1="125" y1="55" x2="160" y2="55" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
    <text class="lbl" x="140" y="95">Adding UMIs</text>
  </g>

  <!-- Stage 1: with UMI tags -->
  <g transform="translate(180,30)">
    <text class="stage" x="60" y="0">UMI-tagged</text>
    <g transform="translate(0,20)">
      <!-- mRNA with tiny shapes at ends -->
      <path d="M10,10 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#2c7fb8" stroke-width="3"/>
      <circle cx="118" cy="10" r="4" fill="#222"/>
      <path d="M10,30 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#e6a6b7" stroke-width="3"/>
      <rect x="114" y="27" width="8" height="8" fill="#222"/>
      <path d="M10,50 q10,-8 20,0 q10,8 20,0 q10,-8 20,0 q10,8 20,0 q10,-8 20,0" fill="none" stroke="#b4b4b4" stroke-width="3"/>
      <polygon points="118,58 114,50 122,50" fill="#222"/>
    </g>
    <line x1="125" y1="55" x2="160" y2="55" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
    <text class="lbl" x="140" y="95">Amplification</text>
  </g>

  <!-- Stage 2: amplified -->
  <g transform="translate(320,30)">
    <text class="stage" x="60" y="0">Amplified</text>
    <g transform="translate(0,8)">
      <g transform="translate(0,0)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#2c7fb8" stroke-width="2"/>
        <circle cx="118" cy="10" r="3" fill="#222"/>
      </g>
      <g transform="translate(0,14)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#2c7fb8" stroke-width="2"/>
        <circle cx="118" cy="10" r="3" fill="#222"/>
      </g>
      <g transform="translate(0,28)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#2c7fb8" stroke-width="2"/>
        <circle cx="118" cy="10" r="3" fill="#222"/>
      </g>
      <g transform="translate(0,46)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#e6a6b7" stroke-width="2"/>
        <rect x="114" y="7" width="6" height="6" fill="#222"/>
      </g>
      <g transform="translate(0,60)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#e6a6b7" stroke-width="2"/>
        <rect x="114" y="7" width="6" height="6" fill="#222"/>
      </g>
      <g transform="translate(0,74)">
        <path d="M10,10 q10,-5 20,0 q10,5 20,0 q10,-5 20,0 q10,5 20,0 q10,-5 20,0" fill="none" stroke="#b4b4b4" stroke-width="2"/>
        <polygon points="118,12 115,5 121,5" fill="#222"/>
      </g>
    </g>
    <line x1="125" y1="55" x2="160" y2="55" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
    <text class="lbl" x="140" y="110">Sequencing</text>
  </g>

  <!-- Stage 3: sequenced reads (text) -->
  <g transform="translate(460,40)">
    <text class="stage" x="80" y="-10">Reads</text>
    <text class="mono blue"  x="0" y="10">AUCGGAUUCG</text><text class="mono" x="85" y="10">ACGU</text>
    <text class="mono blue"  x="0" y="25">AUCGGAUUCG</text><text class="mono" x="85" y="25">AUAGC</text>
    <text class="mono blue"  x="0" y="40">AUCGGAUUCG</text><text class="mono" x="85" y="40">ACGU</text>
    <text class="mono pink"  x="0" y="55">UACGGAGUCA</text><text class="mono" x="85" y="55">GCAU</text>
    <text class="mono pink"  x="0" y="70">UACGGAGUCA</text><text class="mono" x="85" y="70">GCAU</text>
    <text class="mono muted" x="0" y="85">GCAUUACGGU</text><text class="mono muted" x="85" y="85">CUGA</text>
    <line x1="135" y1="50" x2="175" y2="50" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
    <text class="lbl" x="155" y="105">Deduplication</text>
  </g>

  <!-- Stage 4: dedup -->
  <g transform="translate(640,40)">
    <text class="stage" x="70" y="-10">Deduplicated</text>
    <text class="mono blue"  x="0" y="10">AUCGGAUUCG</text><text class="mono" x="85" y="10">ACGU</text>
    <text class="mono blue"  x="0" y="25">AUCGGAUUCG</text><text class="mono" x="85" y="25">AUAGC</text>
    <text class="mono pink"  x="0" y="40">UACGGAGUCA</text><text class="mono" x="85" y="40">GCAU</text>
    <text class="mono muted" x="0" y="55">GCAUUACGGU</text><text class="mono muted" x="85" y="55">CUGA</text>
  </g>

  <!-- Bottom two panels -->
  <!-- Left: Nucleotide Substitution -->
  <g transform="translate(40,250)">
    <rect width="420" height="280" rx="10" fill="#eef3fa" stroke="#1f4e79"/>
    <text class="pnl" x="210" y="30">Nucleotide Substitution</text>

    <g transform="translate(20,60)">
      <path d="M0,20 q15,-10 30,0 q15,10 30,0 q15,-10 30,0 q15,10 30,0" fill="none" stroke="#2c7fb8" stroke-width="3"/>
      <circle cx="115" cy="20" r="5" fill="#222"/>
      <line x1="130" y1="20" x2="165" y2="20" stroke="#555" marker-end="url(#a)"/>
      <text class="lbl" x="147" y="10">Amplification</text>
      <g transform="translate(180,0)">
        <path d="M0,20 q15,-10 30,0 q15,10 30,0 q15,-10 30,0 q15,10 30,0" fill="none" stroke="#2c7fb8" stroke-width="3"/>
        <circle cx="115" cy="20" r="5" fill="#222"/>
      </g>
    </g>

    <g transform="translate(20,150)">
      <path d="M0,20 q15,-10 30,0 q15,10 30,0 q15,-10 30,0 q15,10 30,0" fill="none" stroke="#2c7fb8" stroke-width="3"/>
      <circle cx="115" cy="20" r="5" fill="#222"/>
      <line x1="130" y1="20" x2="165" y2="20" stroke="#555" marker-end="url(#a)"/>
      <text class="lbl" x="147" y="10">Sequencing</text>
      <text class="mono blue"  x="180" y="15">AUCGGAUUCG</text><text class="mono" x="265" y="15">ACGU</text>
      <text class="mono blue"  x="180" y="30">AUCGGAUUCG</text><text class="mono" x="265" y="30">ACG</text><text class="mono" style="fill:#c0392b" x="290" y="30">A</text>
    </g>
  </g>

  <!-- Right: Multimapping -->
  <g transform="translate(500,250)">
    <rect width="580" height="280" rx="10" fill="#eef3fa" stroke="#1f4e79"/>
    <text class="pnl" x="290" y="30">Multimapping</text>

    <text class="mono muted" x="30" y="70">GCAUUACGGU</text><text class="mono muted" x="115" y="70">CUGA</text>
    <text class="lbl" x="500" y="70">Reference genome</text>
    <line x1="230" y1="65" x2="410" y2="85" stroke="#555" stroke-dasharray="3,3"/>

    <line x1="30" y1="100" x2="550" y2="100" stroke="#222" stroke-width="2"/>
    <text class="mono" x="30" y="120">...AUCGGUAUCUAGGCAUACGGCAUACGGUCAUACGGUAUCG...</text>
    <text class="lbl" x="130" y="145" style="fill:#c0392b; font-weight:700">Gene A</text>
    <text class="lbl" x="370" y="145" style="fill:#c0392b; font-weight:700">Gene B</text>

    <g transform="translate(60,160)">
      <polygon points="0,0 90,0 60,30 30,30" fill="#2c7fb8" opacity="0.7"/>
      <text class="mono" style="fill:#fff" x="10" y="20">AUCGGAUUCGGCAU</text>
    </g>
    <g transform="translate(320,160)">
      <polygon points="0,0 90,0 60,30 30,30" fill="#e6a6b7" opacity="0.8"/>
      <text class="mono" x="6" y="20">UUACGGAGUCAGCAU</text>
    </g>
    <text class="mono blue"  x="120" y="220">AUCGGAUUCGGCAU</text>
    <text class="mono pink"  x="345" y="220">UUACGGAGUCAGCAU</text>
  </g>
</svg>
