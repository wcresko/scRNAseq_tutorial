<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Helvetica, Arial, sans-serif">
  <style>
    .hdr { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .arrowText { font-size: 20px; fill: #222; text-anchor: middle; }
    .lbl { font-size: 13px; fill: #222; }
  </style>

  <!-- Left panel -->
  <g transform="translate(20,20)">
    <rect width="430" height="460" rx="12" fill="#e7f0fb" stroke="#c7dbf0"/>
    <text class="hdr" x="260" y="35">Ambient mRNA</text>

    <!-- Droplet 1 (top-left): cell + bead + ambient grey mRNA -->
    <g transform="translate(70,85)">
      <ellipse cx="0" cy="0" rx="45" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="-5" cy="-5" r="22" fill="#3c6daa"/>
      <!-- red wavy mRNA inside nucleus -->
      <path d="M-20,-8 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-20,2 q5,-6 10,0 t10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <!-- bead dark blue -->
      <circle cx="20" cy="20" r="7" fill="#1b3a6b"/>
      <!-- ambient grey mRNA outside -->
      <path d="M-30,-40 q5,-4 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
    </g>
    <line x1="70" y1="45" x2="120" y2="65" stroke="#333"/>

    <!-- Droplet 2 (middle) -->
    <g transform="translate(190,170)">
      <ellipse cx="0" cy="0" rx="55" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="0" r="22" fill="#3c6daa"/>
      <path d="M-15,-5 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,5 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="-25" cy="18" r="7" fill="#1b3a6b"/>
      <path d="M-30,-35 q5,-4 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
    </g>

    <!-- Droplet 3 (upper-right): only bead + ambient -->
    <g transform="translate(320,160)">
      <ellipse cx="0" cy="0" rx="55" ry="50" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="20" cy="10" r="7" fill="#1b3a6b"/>
      <path d="M-25,-10 q5,-4 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
    </g>

    <!-- Doublet bottom-left -->
    <g transform="translate(70,270)">
      <ellipse cx="0" cy="0" rx="45" ry="80" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-30" r="22" fill="#3c6daa"/>
      <path d="M-15,-36 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,-26 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="0" cy="30" r="22" fill="#3c6daa"/>
      <path d="M-15,24 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,34 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="25" cy="10" r="7" fill="#1b3a6b"/>
    </g>
    <line x1="30" y1="355" x2="70" y2="320" stroke="#333"/>
    <text class="lbl" x="10" y="370">Doublet</text>

    <!-- Droplet bottom-right: labels anchor -->
    <g transform="translate(260,360)">
      <ellipse cx="0" cy="0" rx="55" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <circle cx="0" cy="-5" r="22" fill="#3c6daa"/>
      <path d="M-15,-11 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,-1 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="-27" cy="18" r="7" fill="#1b3a6b"/>
    </g>
    <line x1="170" y1="430" x2="245" y2="380" stroke="#333"/>
    <text class="lbl" x="120" y="440">Droplet</text>
    <line x1="170" y1="455" x2="235" y2="380" stroke="#333"/>
    <text class="lbl" x="90" y="460">Barcode bead</text>
    <line x1="370" y1="410" x2="300" y2="380" stroke="#333"/>
    <text class="lbl" x="370" y="415">Cell</text>
  </g>

  <!-- Arrow centre -->
  <g transform="translate(470,240)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#222" stroke-width="3" marker-end="url(#bigA)"/>
    <text class="arrowText" x="30" y="-30">Cell lysis</text>
    <text class="arrowText" x="30" y="50">Barcoded cDNA</text>
  </g>

  <!-- Right panel -->
  <g transform="translate(560,20)">
    <rect width="420" height="460" rx="12" fill="#e7f0fb" stroke="#c7dbf0"/>
    <text class="hdr" x="230" y="35">Contamination</text>

    <!-- Droplet upper-left: cell + multiple beads (contamination) -->
    <g transform="translate(85,90)">
      <ellipse cx="0" cy="0" rx="50" ry="50" fill="#d5e5f5" stroke="#b9ccdf"/>
      <path d="M-20,-10 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-20,0 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-20,10 q5,-6 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
      <circle cx="18" cy="-8" r="6" fill="#1b3a6b"/>
      <circle cx="22" cy="5"  r="6" fill="#1b3a6b"/>
      <circle cx="20" cy="18" r="6" fill="#1b3a6b"/>
    </g>
    <line x1="100" y1="40" x2="170" y2="70" stroke="#333"/>

    <!-- Droplet middle -->
    <g transform="translate(220,180)">
      <ellipse cx="0" cy="0" rx="55" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <path d="M-20,-10 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-20,0 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-20,10 q5,-6 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
      <circle cx="22" cy="-5" r="6" fill="#1b3a6b"/>
      <circle cx="26" cy="8"  r="6" fill="#1b3a6b"/>
    </g>

    <!-- Droplet top-right (free ambient mRNA) -->
    <g transform="translate(340,170)">
      <ellipse cx="0" cy="0" rx="55" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <path d="M-10,0 q5,-6 10,0 t10,0" fill="none" stroke="#777" stroke-width="2"/>
      <circle cx="18" cy="10" r="6" fill="#1b3a6b"/>
    </g>

    <!-- Bottom-left with ambient mRNA spreading -->
    <g transform="translate(95,290)">
      <ellipse cx="0" cy="0" rx="55" ry="58" fill="#d5e5f5" stroke="#b9ccdf"/>
      <g transform="translate(-15,-20)">
        <path d="M0,0 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
        <circle cx="28" cy="0" r="4" fill="#1b3a6b"/>
      </g>
      <g transform="translate(-15,0)">
        <path d="M0,0 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
        <circle cx="28" cy="0" r="4" fill="#1b3a6b"/>
      </g>
      <g transform="translate(-15,20)">
        <path d="M0,0 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
        <circle cx="28" cy="0" r="4" fill="#1b3a6b"/>
      </g>
    </g>

    <!-- Bottom-right with 1 mRNA -->
    <g transform="translate(280,380)">
      <ellipse cx="0" cy="0" rx="55" ry="52" fill="#d5e5f5" stroke="#b9ccdf"/>
      <path d="M-15,-5 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <path d="M-15,5 q5,-6 10,0 t10,0" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="20" cy="10" r="6" fill="#1b3a6b"/>
    </g>
  </g>

  <defs>
    <marker id="bigA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
</svg>
