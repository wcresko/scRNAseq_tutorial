<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Arial, sans-serif" font-size="14">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Computer Components</text>

  <!-- Input Devices -->
  <rect x="185" y="50" width="130" height="40" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="250" y="75" text-anchor="middle" fill="#000">Input Devices</text>

  <!-- Arrow down -->
  <line x1="250" y1="90" x2="250" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CPU -->
  <rect x="185" y="120" width="130" height="40" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="250" y="145" text-anchor="middle" fill="#000">CPU</text>

  <!-- Arrow CPU to Memory (right) -->
  <line x1="315" y1="140" x2="370" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow Memory to CPU (left) -->
  <line x1="370" y1="155" x2="315" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory -->
  <rect x="370" y="125" width="120" height="40" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="430" y="150" text-anchor="middle" fill="#000">Memory</text>

  <!-- Arrow Memory to Storage (down) -->
  <line x1="430" y1="165" x2="430" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow Storage to Memory (up) -->
  <line x1="415" y1="220" x2="415" y2="165" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Storage -->
  <rect x="370" y="220" width="120" height="40" rx="8" fill="#dda0dd" stroke="#333" stroke-width="2"/>
  <text x="430" y="245" text-anchor="middle" fill="#000">Storage</text>

  <!-- Arrow CPU down to Output -->
  <line x1="250" y1="160" x2="250" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output Devices -->
  <rect x="185" y="220" width="130" height="40" rx="8" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" fill="#000">Output Devices</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
