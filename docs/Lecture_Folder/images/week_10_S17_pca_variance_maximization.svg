<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <style>
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #2c3e50; text-anchor: middle; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; fill: #2c3e50; text-anchor: middle; font-weight: bold; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980b9"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="25" class="title" font-size="17">PCA Finds Axes That Maximize Variance (Minimize Squared Distances to Axis)</text>
  
  <!-- Panel 1: Bad axis -->
  <rect x="15" y="38" width="280" height="290" fill="#fff5f5" stroke="#e74c3c" stroke-width="1" rx="6" opacity="0.3"/>
  <text x="155" y="60" class="title" font-size="14" fill="#c0392b">Poor Axis Choice</text>
  
  <!-- Axes -->
  <line x1="45" y1="300" x2="275" y2="300" stroke="#ccc" stroke-width="1"/>
  <line x1="45" y1="300" x2="45" y2="70" stroke="#ccc" stroke-width="1"/>
  
  <!-- Bad axis (nearly horizontal) -->
  <line x1="35" y1="220" x2="270" y2="195" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arr)"/>
  
  <!-- Data cloud (elliptical, tilted ~45 degrees) -->
  <ellipse cx="155" cy="185" rx="90" ry="35" fill="#3498db" fill-opacity="0.08" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3" transform="rotate(-35,155,185)"/>
  
  <!-- Points -->
  <circle cx="90" cy="230" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="105" cy="215" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="115" cy="205" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="125" cy="210" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="135" cy="195" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="145" cy="185" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="155" cy="180" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="165" cy="175" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="180" cy="160" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="195" cy="155" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="210" cy="145" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="220" cy="140" r="4" fill="#3498db" opacity="0.7"/>
  
  <!-- Perpendicular lines to axis (residuals) - long -->
  <line x1="90" y1="230" x2="93" y2="215" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="145" y1="185" x2="148" y2="210" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="210" y1="145" x2="213" y2="205" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  
  <text x="155" y="280" class="label" fill="#c0392b">Large residuals</text>
  <text x="155" y="295" class="label" fill="#c0392b">Low variance captured</text>
  
  <!-- Panel 2: Good axis (PC1) -->
  <rect x="310" y="38" width="280" height="290" fill="#f0fff0" stroke="#27ae60" stroke-width="1" rx="6" opacity="0.3"/>
  <text x="450" y="60" class="title" font-size="14" fill="#27ae60">PC1: Best Axis</text>
  
  <line x1="340" y1="300" x2="570" y2="300" stroke="#ccc" stroke-width="1"/>
  <line x1="340" y1="300" x2="340" y2="70" stroke="#ccc" stroke-width="1"/>
  
  <!-- Good axis (along the tilt of the data) -->
  <line x1="330" y1="245" x2="565" y2="130" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arr2)"/>
  
  <!-- Data cloud -->
  <ellipse cx="450" cy="185" rx="90" ry="35" fill="#3498db" fill-opacity="0.08" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3" transform="rotate(-35,450,185)"/>
  
  <!-- Points -->
  <circle cx="385" cy="230" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="400" cy="215" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="410" cy="205" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="420" cy="210" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="430" cy="195" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="440" cy="185" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="450" cy="180" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="460" cy="175" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="475" cy="160" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="490" cy="155" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="505" cy="145" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="515" cy="140" r="4" fill="#3498db" opacity="0.7"/>
  
  <!-- Short perpendicular residuals -->
  <line x1="385" y1="230" x2="389" y2="225" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="440" y1="185" x2="442" y2="183" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="505" y1="145" x2="507" y2="143" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  
  <text x="450" y="280" class="label" fill="#27ae60">Small residuals</text>
  <text x="450" y="295" class="label" fill="#27ae60">Maximum variance captured</text>
  
  <!-- Panel 3: Equation -->
  <rect x="610" y="38" width="275" height="290" fill="#f8f8ff" stroke="#8e44ad" stroke-width="1" rx="6" opacity="0.3"/>
  <text x="747" y="60" class="title" font-size="14" fill="#8e44ad">The Math</text>
  
  <text x="747" y="90" class="label" font-weight="bold">PCA maximizes:</text>
  <text x="747" y="115" font-family="'Times New Roman', serif" font-size="15" fill="#2c3e50" text-anchor="middle" font-style="italic">Var(Xw) = w&#x1D40;&#x3A3;w</text>
  <text x="747" y="135" class="label">subject to ||w|| = 1</text>
  
  <line x1="630" y1="150" x2="860" y2="150" stroke="#ddd" stroke-width="1"/>
  
  <text x="747" y="172" class="label" font-weight="bold">Equivalently minimizes:</text>
  <text x="747" y="197" font-family="'Times New Roman', serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-style="italic">&#x3A3;||x&#x1D62; &#x2212; proj(x&#x1D62;)||&#x00B2;</text>
  <text x="747" y="220" class="label">Sum of squared distances</text>
  <text x="747" y="237" class="label">from points to the axis</text>
  
  <line x1="630" y1="252" x2="860" y2="252" stroke="#ddd" stroke-width="1"/>
  
  <text x="747" y="275" class="label" font-weight="bold">Solution: eigenvectors of &#x3A3;</text>
  <text x="747" y="295" class="label">w* = eigenvector with</text>
  <text x="747" y="312" class="label">largest eigenvalue</text>
</svg>
