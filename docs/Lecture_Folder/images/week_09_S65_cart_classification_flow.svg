<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">CART Classification: The Algorithm</text>

  <!-- Step 1 -->
  <rect x="12" y="38" width="164" height="220" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="94" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Step 1</text>
  <text x="94" y="78" text-anchor="middle" font-size="11" fill="#2e7d32">Start at Root</text>
  <line x1="30" y1="90" x2="158" y2="90" stroke="#4caf50" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="94" y="112" text-anchor="middle" font-size="10" fill="#333">All n observations</text>
  <text x="94" y="127" text-anchor="middle" font-size="10" fill="#333">enter a single node</text>
  <text x="94" y="150" text-anchor="middle" font-size="10" fill="#555">Majority class</text>
  <text x="94" y="165" text-anchor="middle" font-size="10" fill="#555">= initial prediction</text>
  <text x="94" y="192" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">e.g. 108 biocompat,</text>
  <text x="94" y="207" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">92 incompatible</text>
  <text x="94" y="228" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Gini = 0.499</text>
  <text x="94" y="246" text-anchor="middle" font-size="9" fill="#777">(worst impurity)</text>

  <!-- Arrow 1→2 -->
  <line x1="178" y1="148" x2="198" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="200" y="38" width="164" height="220" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="282" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Step 2</text>
  <text x="282" y="78" text-anchor="middle" font-size="11" fill="#1565c0">Find Best Split</text>
  <line x1="218" y1="90" x2="346" y2="90" stroke="#1976d2" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="282" y="108" text-anchor="middle" font-size="10" fill="#333">Try every feature</text>
  <text x="282" y="123" text-anchor="middle" font-size="10" fill="#333">+ every threshold</text>
  <text x="282" y="146" text-anchor="middle" font-size="10" fill="#555">Choose split that</text>
  <text x="282" y="161" text-anchor="middle" font-size="10" fill="#555">minimizes weighted</text>
  <text x="282" y="176" text-anchor="middle" font-size="10" fill="#555">Gini impurity</text>
  <text x="282" y="200" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">e.g. coating = RGD</text>
  <text x="282" y="215" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">drops Gini to 0.31</text>
  <text x="282" y="238" text-anchor="middle" font-size="9" fill="#777">Greedy: best local split</text>

  <!-- Arrow 2→3 -->
  <line x1="366" y1="148" x2="386" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <rect x="388" y="38" width="164" height="220" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="470" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Step 3</text>
  <text x="470" y="78" text-anchor="middle" font-size="11" fill="#e65100">Split the Node</text>
  <line x1="406" y1="90" x2="534" y2="90" stroke="#f57c00" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="470" y="108" text-anchor="middle" font-size="10" fill="#333">Partition observations</text>
  <text x="470" y="123" text-anchor="middle" font-size="10" fill="#333">into two child nodes</text>
  <text x="470" y="146" text-anchor="middle" font-size="10" fill="#555">Left = one class/group</text>
  <text x="470" y="161" text-anchor="middle" font-size="10" fill="#555">Right = other group</text>
  <text x="470" y="184" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">RGD coating → left</text>
  <text x="470" y="199" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">No RGD → right</text>
  <text x="470" y="222" text-anchor="middle" font-size="9" fill="#777">Each child now purer</text>
  <text x="470" y="237" text-anchor="middle" font-size="9" fill="#777">than parent node</text>

  <!-- Arrow 3→4 -->
  <line x1="554" y1="148" x2="574" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <rect x="576" y="38" width="164" height="220" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="658" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Step 4</text>
  <text x="658" y="78" text-anchor="middle" font-size="11" fill="#c62828">Recurse</text>
  <line x1="594" y1="90" x2="722" y2="90" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="658" y="108" text-anchor="middle" font-size="10" fill="#333">Repeat Steps 2–3</text>
  <text x="658" y="123" text-anchor="middle" font-size="10" fill="#333">on each child node</text>
  <text x="658" y="146" text-anchor="middle" font-size="10" fill="#555">Each new sub-group</text>
  <text x="658" y="161" text-anchor="middle" font-size="10" fill="#555">can be split further</text>
  <text x="658" y="184" text-anchor="middle" font-size="10" font-style="italic" fill="#c62828">Stiffness within</text>
  <text x="658" y="199" text-anchor="middle" font-size="10" font-style="italic" fill="#c62828">RGD group, etc.</text>
  <text x="658" y="222" text-anchor="middle" font-size="9" fill="#777">Build until stopping</text>
  <text x="658" y="237" text-anchor="middle" font-size="9" fill="#777">criterion is met</text>

  <!-- Arrow 4→5 -->
  <line x1="742" y1="148" x2="762" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <rect x="764" y="38" width="124" height="220" rx="10" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="826" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Step 5</text>
  <text x="826" y="78" text-anchor="middle" font-size="11" fill="#6a1b9a">Stop + Label</text>
  <line x1="782" y1="90" x2="870" y2="90" stroke="#6a1b9a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="826" y="108" text-anchor="middle" font-size="10" fill="#333">Stop when:</text>
  <text x="826" y="126" text-anchor="middle" font-size="10" fill="#555">Node is pure</text>
  <text x="826" y="141" text-anchor="middle" font-size="10" fill="#555">Min samples</text>
  <text x="826" y="156" text-anchor="middle" font-size="10" fill="#555">reached</text>
  <text x="826" y="171" text-anchor="middle" font-size="10" fill="#555">Max depth</text>
  <text x="826" y="186" text-anchor="middle" font-size="10" fill="#555">reached</text>
  <text x="826" y="209" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">Leaf = majority</text>
  <text x="826" y="224" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">class prediction</text>
  <text x="826" y="247" text-anchor="middle" font-size="9" fill="#777">Then prune back</text>
</svg>
