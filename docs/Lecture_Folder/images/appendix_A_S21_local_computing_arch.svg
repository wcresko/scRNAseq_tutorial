<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Local Computing Architecture</text>

  <!-- Applications -->
  <rect x="200" y="40" width="200" height="40" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" fill="#000">Applications</text>
  <line x1="300" y1="80" x2="300" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Operating System -->
  <rect x="175" y="110" width="250" height="40" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="#000">Operating System</text>
  <line x1="300" y1="150" x2="300" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Hardware Abstraction Layer -->
  <rect x="140" y="180" width="320" height="40" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" fill="#000">Hardware Abstraction Layer</text>

  <!-- Lines down to hardware components -->
  <line x1="140" y1="220" x2="80" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="220" x2="190" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="220" x2="300" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="220" x2="410" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="220" x2="520" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CPU -->
  <rect x="30" y="265" width="100" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="287" text-anchor="middle" fill="#000">CPU</text>

  <!-- Memory -->
  <rect x="140" y="265" width="100" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="287" text-anchor="middle" fill="#000">Memory</text>

  <!-- Storage -->
  <rect x="250" y="265" width="100" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="287" text-anchor="middle" fill="#000">Storage</text>

  <!-- GPU -->
  <rect x="360" y="265" width="100" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="287" text-anchor="middle" fill="#000">GPU</text>

  <!-- Network Card -->
  <rect x="470" y="265" width="110" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="287" text-anchor="middle" fill="#000">Network Card</text>

  <!-- Internet/LAN -->
  <line x1="525" y1="300" x2="525" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="470" y="325" width="110" height="30" rx="6" fill="#ffa07a" stroke="#333" stroke-width="1.5"/>
  <text x="525" y="345" text-anchor="middle" font-size="12" fill="#000">Internet / LAN</text>
</svg>
