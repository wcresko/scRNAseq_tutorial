<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="650" fill="white"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="32" font-weight="bold" fill="#222">Paths</text>

  <!-- Define folder icons -->
  <defs>
    <g id="folder-normal">
      <rect x="0" y="8" width="80" height="50" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <rect x="0" y="0" width="30" height="14" rx="3" fill="#c8c0b8" stroke="#a09888" stroke-width="1.5"/>
      <path d="M30,0 L38,8 L80,8" fill="none" stroke="#a09888" stroke-width="1.5"/>
    </g>
    <g id="folder-highlight">
      <rect x="0" y="8" width="80" height="50" rx="3" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
      <rect x="0" y="0" width="30" height="14" rx="3" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
      <path d="M30,0 L38,8 L80,8" fill="none" stroke="#922b21" stroke-width="2"/>
    </g>
  </defs>

  <!-- Level 0: Root / (highlighted) -->
  <use href="#folder-highlight" x="360" y="70"/>
  <text x="400" y="110" text-anchor="middle" font-size="18" font-family="'Courier New', monospace" font-weight="bold" fill="white">/</text>

  <!-- Lines from root to level 1 -->
  <line x1="400" y1="128" x2="400" y2="155" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="155" x2="700" y2="155" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="155" x2="100" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="155" x2="280" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="155" x2="460" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="155" x2="620" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 1: root, home (highlighted), usr, bin -->
  <use href="#folder-normal" x="60" y="200"/>
  <text x="100" y="242" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">root</text>

  <use href="#folder-highlight" x="240" y="200"/>
  <text x="280" y="242" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">home</text>

  <use href="#folder-normal" x="420" y="200"/>
  <text x="460" y="242" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">usr</text>

  <use href="#folder-normal" x="580" y="200"/>
  <text x="620" y="242" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="235" font-size="24" fill="#666">...</text>

  <!-- Lines from home/usr to level 2 -->
  <line x1="280" y1="258" x2="280" y2="280" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="280" x2="620" y2="280" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="280" x2="100" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="280" x2="280" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="258" x2="460" y2="280" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="280" x2="460" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620" y1="280" x2="620" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 2: cresko, catchen (highlighted), lib, bin -->
  <use href="#folder-normal" x="60" y="325"/>
  <text x="100" y="367" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">cresko</text>

  <use href="#folder-highlight" x="240" y="325"/>
  <text x="280" y="367" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">catchen</text>

  <use href="#folder-normal" x="420" y="325"/>
  <text x="460" y="367" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">lib</text>

  <use href="#folder-normal" x="580" y="325"/>
  <text x="620" y="367" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>

  <text x="720" y="360" font-size="24" fill="#666">...</text>

  <!-- Lines from catchen to level 3 -->
  <line x1="280" y1="383" x2="280" y2="405" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="405" x2="460" y2="405" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="405" x2="280" y2="450" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="405" x2="460" y2="450" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Level 3: working (highlighted), research -->
  <use href="#folder-highlight" x="240" y="450"/>
  <text x="280" y="492" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="white">working</text>

  <use href="#folder-normal" x="420" y="450"/>
  <text x="460" y="492" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" font-weight="bold" fill="#333">research</text>

  <text x="560" y="485" font-size="24" fill="#666">...</text>

  <!-- Path text at bottom -->
  <text x="400" y="580" text-anchor="middle" font-size="30" font-family="'Courier New', monospace" font-weight="bold" fill="#333">/home/catchen/working</text>
</svg>