<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="700" height="450" fill="white"/>

  <!-- Folder icon macro approach - draw folder shapes -->
  <!-- Root folder / -->
  <g transform="translate(310, 50)">
    <rect x="0" y="8" width="80" height="60" rx="4" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="0" width="35" height="15" rx="3" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="12" width="80" height="3" fill="#e6b830"/>
    <text x="40" y="50" text-anchor="middle" font-size="24" font-family="'Courier New', monospace" font-weight="bold" fill="#333">/</text>
  </g>

  <!-- Connecting lines (blue) -->
  <line x1="350" y1="118" x2="350" y2="160" stroke="#3498db" stroke-width="5"/>
  <line x1="100" y1="160" x2="600" y2="160" stroke="#3498db" stroke-width="5"/>
  <line x1="100" y1="160" x2="100" y2="200" stroke="#3498db" stroke-width="5"/>
  <line x1="267" y1="160" x2="267" y2="200" stroke="#3498db" stroke-width="5"/>
  <line x1="433" y1="160" x2="433" y2="200" stroke="#3498db" stroke-width="5"/>
  <line x1="600" y1="160" x2="600" y2="200" stroke="#3498db" stroke-width="5"/>

  <!-- bin folder -->
  <g transform="translate(60, 200)">
    <rect x="0" y="8" width="80" height="60" rx="4" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="0" width="35" height="15" rx="3" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="12" width="80" height="3" fill="#e6b830"/>
    <text x="40" y="50" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="#333">bin</text>
  </g>

  <!-- data folder -->
  <g transform="translate(227, 200)">
    <rect x="0" y="8" width="80" height="60" rx="4" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="0" width="35" height="15" rx="3" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="12" width="80" height="3" fill="#e6b830"/>
    <text x="40" y="50" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="#333">data</text>
  </g>

  <!-- Users folder -->
  <g transform="translate(393, 200)">
    <rect x="0" y="8" width="80" height="60" rx="4" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="0" width="35" height="15" rx="3" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="12" width="80" height="3" fill="#e6b830"/>
    <text x="40" y="50" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="#333">Users</text>
  </g>

  <!-- tmp folder -->
  <g transform="translate(560, 200)">
    <rect x="0" y="8" width="80" height="60" rx="4" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="0" width="35" height="15" rx="3" fill="#f0c040" stroke="#c8a020" stroke-width="2"/>
    <rect x="0" y="12" width="80" height="3" fill="#e6b830"/>
    <text x="40" y="50" text-anchor="middle" font-size="20" font-family="'Courier New', monospace" font-weight="bold" fill="#333">tmp</text>
  </g>
</svg>