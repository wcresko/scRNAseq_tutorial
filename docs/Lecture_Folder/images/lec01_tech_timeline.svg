<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #222; text-anchor: middle; }
    .year { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .name { font-size: 12px; fill: #333; text-anchor: middle; }
    .sub { font-size: 11px; fill: #555; text-anchor: middle; }
    .era { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; }
  </style>

  <text class="title" x="550" y="30">Evolution of single-cell transcriptomics</text>

  <!-- Main axis -->
  <line x1="60" y1="200" x2="1040" y2="200" stroke="#333" stroke-width="3"/>
  <polygon points="1040,200 1030,194 1030,206" fill="#333"/>

  <!-- Era bands -->
  <rect x="60"  y="215" width="200" height="22" fill="#2c7fb8"/>
  <text class="era" x="160" y="231">Plate-based (low TP)</text>
  <rect x="260" y="215" width="260" height="22" fill="#1b9e77"/>
  <text class="era" x="390" y="231">Droplet-based (high TP)</text>
  <rect x="520" y="215" width="240" height="22" fill="#e66101"/>
  <text class="era" x="640" y="231">Combinatorial + multi-modal</text>
  <rect x="760" y="215" width="280" height="22" fill="#756bb1"/>
  <text class="era" x="900" y="231">Spatial &amp; subcellular</text>

  <!-- Milestones (alternating above/below) -->
  <!-- 2009 Tang -->
  <line x1="100" y1="200" x2="100" y2="120" stroke="#555" stroke-width="1"/>
  <circle cx="100" cy="200" r="5" fill="#2c7fb8" stroke="#fff" stroke-width="2"/>
  <text class="year" x="100" y="108">2009</text>
  <text class="name" x="100" y="124">Tang et al.</text>
  <text class="sub"  x="100" y="138">first single-cell</text>
  <text class="sub"  x="100" y="150">transcriptome</text>

  <!-- 2012 Smart-seq -->
  <line x1="180" y1="200" x2="180" y2="280" stroke="#555" stroke-width="1"/>
  <circle cx="180" cy="200" r="5" fill="#2c7fb8" stroke="#fff" stroke-width="2"/>
  <text class="year" x="180" y="300">2012–13</text>
  <text class="name" x="180" y="315">Smart-seq / v2</text>
  <text class="sub"  x="180" y="329">full-length, plate</text>

  <!-- 2015 Drop-seq / inDrops -->
  <line x1="300" y1="200" x2="300" y2="120" stroke="#555" stroke-width="1"/>
  <circle cx="300" cy="200" r="5" fill="#1b9e77" stroke="#fff" stroke-width="2"/>
  <text class="year" x="300" y="108">2015</text>
  <text class="name" x="300" y="124">Drop-seq,</text>
  <text class="name" x="300" y="138">inDrops</text>
  <text class="sub"  x="300" y="152">10k+ cells/run</text>

  <!-- 2016 10x Chromium -->
  <line x1="400" y1="200" x2="400" y2="280" stroke="#555" stroke-width="1"/>
  <circle cx="400" cy="200" r="5" fill="#1b9e77" stroke="#fff" stroke-width="2"/>
  <text class="year" x="400" y="300">2016</text>
  <text class="name" x="400" y="315">10x Chromium</text>
  <text class="sub"  x="400" y="329">commercial droplet</text>

  <!-- 2017 snRNA-seq -->
  <line x1="490" y1="200" x2="490" y2="120" stroke="#555" stroke-width="1"/>
  <circle cx="490" cy="200" r="5" fill="#1b9e77" stroke="#fff" stroke-width="2"/>
  <text class="year" x="490" y="108">2017</text>
  <text class="name" x="490" y="124">snRNA-seq</text>
  <text class="sub"  x="490" y="138">frozen tissues,</text>
  <text class="sub"  x="490" y="150">nuclei</text>

  <!-- 2018 Split-seq / SPLiT-seq -->
  <line x1="580" y1="200" x2="580" y2="280" stroke="#555" stroke-width="1"/>
  <circle cx="580" cy="200" r="5" fill="#e66101" stroke="#fff" stroke-width="2"/>
  <text class="year" x="580" y="300">2018</text>
  <text class="name" x="580" y="315">SPLiT-seq / Parse</text>
  <text class="sub"  x="580" y="329">combinatorial BC</text>

  <!-- 2017-2019 CITE-seq / ATAC -->
  <line x1="680" y1="200" x2="680" y2="120" stroke="#555" stroke-width="1"/>
  <circle cx="680" cy="200" r="5" fill="#e66101" stroke="#fff" stroke-width="2"/>
  <text class="year" x="680" y="108">2017–19</text>
  <text class="name" x="680" y="124">CITE-seq,</text>
  <text class="name" x="680" y="138">scATAC-seq</text>
  <text class="sub"  x="680" y="152">protein / chromatin</text>

  <!-- 2019 Visium -->
  <line x1="790" y1="200" x2="790" y2="280" stroke="#555" stroke-width="1"/>
  <circle cx="790" cy="200" r="5" fill="#756bb1" stroke="#fff" stroke-width="2"/>
  <text class="year" x="790" y="300">2019</text>
  <text class="name" x="790" y="315">Visium (10x)</text>
  <text class="sub"  x="790" y="329">spot-level spatial</text>

  <!-- 2021 Stereo-seq / Slide-seqV2 -->
  <line x1="890" y1="200" x2="890" y2="120" stroke="#555" stroke-width="1"/>
  <circle cx="890" cy="200" r="5" fill="#756bb1" stroke="#fff" stroke-width="2"/>
  <text class="year" x="890" y="108">2021</text>
  <text class="name" x="890" y="124">Stereo-seq,</text>
  <text class="name" x="890" y="138">Slide-seqV2</text>
  <text class="sub"  x="890" y="152">subcellular spatial</text>

  <!-- 2022 Xenium / MERFISH platforms -->
  <line x1="990" y1="200" x2="990" y2="280" stroke="#555" stroke-width="1"/>
  <circle cx="990" cy="200" r="5" fill="#756bb1" stroke="#fff" stroke-width="2"/>
  <text class="year" x="990" y="300">2022+</text>
  <text class="name" x="990" y="315">Xenium, MERFISH</text>
  <text class="sub"  x="990" y="329">imaging-based</text>
</svg>
