<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 650" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#2c3e50">Bootstrap Aggregating (Bagging) &amp; Out-of-Bag (OOB) Estimation</text>

  <!-- Original dataset -->
  <rect x="340" y="45" width="240" height="75" rx="10" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
  <text x="460" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Original Training Data</text>
  <text x="460" y="88" text-anchor="middle" font-size="11" fill="#555">n = 200 observations, p = 10 features</text>
  <text x="460" y="105" text-anchor="middle" font-size="10" fill="#777">Full dataset used to create bootstrap samples</text>

  <!-- Arrows down to bootstrap samples -->
  <line x1="260" y1="120" x2="130" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="390" y1="120" x2="360" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="530" y1="120" x2="560" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="660" y1="120" x2="780" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Bootstrap Sample 1 -->
  <rect x="30" y="158" width="200" height="105" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="130" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Bootstrap Sample 1</text>
  <text x="130" y="196" text-anchor="middle" font-size="10" fill="#555">n = 200 (with replacement)</text>
  <text x="130" y="212" text-anchor="middle" font-size="10" fill="#333">~63% unique observations</text>
  <rect x="48" y="222" width="164" height="28" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="0.8"/>
  <text x="130" y="237" text-anchor="middle" font-size="9" fill="#1565c0">OOB₁: ~37% NOT sampled</text>
  <text x="130" y="250" text-anchor="middle" font-size="9" fill="#777">(~74 observations held out)</text>

  <!-- Bootstrap Sample 2 -->
  <rect x="260" y="158" width="200" height="105" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="360" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Bootstrap Sample 2</text>
  <text x="360" y="196" text-anchor="middle" font-size="10" fill="#555">n = 200 (with replacement)</text>
  <text x="360" y="212" text-anchor="middle" font-size="10" fill="#333">Different ~63% each time</text>
  <rect x="278" y="222" width="164" height="28" rx="5" fill="#c8e6c9" stroke="#4caf50" stroke-width="0.8"/>
  <text x="360" y="237" text-anchor="middle" font-size="9" fill="#2e7d32">OOB₂: different ~37%</text>
  <text x="360" y="250" text-anchor="middle" font-size="9" fill="#777">(different held-out set)</text>

  <!-- Bootstrap Sample 3 -->
  <rect x="490" y="158" width="200" height="105" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="590" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Bootstrap Sample 3</text>
  <text x="590" y="196" text-anchor="middle" font-size="10" fill="#555">n = 200 (with replacement)</text>
  <text x="590" y="212" text-anchor="middle" font-size="10" fill="#333">Another unique ~63%</text>
  <rect x="508" y="222" width="164" height="28" rx="5" fill="#ffe0b2" stroke="#f57c00" stroke-width="0.8"/>
  <text x="590" y="237" text-anchor="middle" font-size="9" fill="#e65100">OOB₃: yet another ~37%</text>
  <text x="590" y="250" text-anchor="middle" font-size="9" fill="#777">(unique held-out set)</text>

  <!-- Bootstrap Sample B -->
  <rect x="720" y="158" width="180" height="105" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="810" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">... Sample B</text>
  <text x="810" y="196" text-anchor="middle" font-size="10" fill="#555">(B = 500 typically)</text>
  <text x="810" y="212" text-anchor="middle" font-size="10" fill="#333">Each independent</text>
  <rect x="738" y="222" width="144" height="28" rx="5" fill="#e1bee7" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="810" y="237" text-anchor="middle" font-size="9" fill="#6a1b9a">OOB_B: its own ~37%</text>

  <!-- Arrow down: Random feature selection -->
  <line x1="130" y1="263" x2="130" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="263" x2="360" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="590" y1="263" x2="590" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="810" y1="263" x2="810" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Random feature selection boxes -->
  <rect x="30" y="293" width="200" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="130" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Random Feature Subset</text>
  <text x="130" y="330" text-anchor="middle" font-size="9" fill="#555">m = √p features at each split</text>

  <rect x="260" y="293" width="200" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="360" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Random Feature Subset</text>
  <text x="360" y="330" text-anchor="middle" font-size="9" fill="#555">Different m features chosen</text>

  <rect x="490" y="293" width="200" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="590" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Random Feature Subset</text>
  <text x="590" y="330" text-anchor="middle" font-size="9" fill="#555">Decorrelates the trees</text>

  <rect x="720" y="293" width="180" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="810" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Random Features</text>
  <text x="810" y="330" text-anchor="middle" font-size="9" fill="#555">m features per split</text>

  <!-- Arrows to trees -->
  <line x1="130" y1="343" x2="130" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="343" x2="360" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="590" y1="343" x2="590" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="810" y1="343" x2="810" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Individual trees -->
  <rect x="60" y="368" width="140" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="130" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Tree 1</text>
  <text x="130" y="410" text-anchor="middle" font-size="9" fill="#555">Fully grown (no pruning)</text>

  <rect x="290" y="368" width="140" height="60" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="360" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Tree 2</text>
  <text x="360" y="410" text-anchor="middle" font-size="9" fill="#555">Different structure</text>

  <rect x="520" y="368" width="140" height="60" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="590" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Tree 3</text>
  <text x="590" y="410" text-anchor="middle" font-size="9" fill="#555">Different structure</text>

  <rect x="740" y="368" width="140" height="60" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="810" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Tree B</text>
  <text x="810" y="410" text-anchor="middle" font-size="9" fill="#555">B = 500 trees</text>

  <!-- Arrows to aggregation -->
  <line x1="130" y1="428" x2="390" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="428" x2="420" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="590" y1="428" x2="500" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="810" y1="428" x2="530" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Aggregation box -->
  <rect x="340" y="472" width="240" height="55" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="460" y="497" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Aggregate Predictions</text>
  <text x="460" y="516" text-anchor="middle" font-size="10" fill="#ecf0f1">Classification: majority vote | Regression: average</text>

  <!-- OOB Estimation box -->
  <rect x="30" y="545" width="860" height="95" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="460" y="570" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Out-of-Bag (OOB) Error Estimation</text>
  <text x="460" y="592" text-anchor="middle" font-size="11" fill="#555">For each observation, ~1/3 of trees never used it in training → those trees provide unbiased predictions</text>
  <text x="460" y="610" text-anchor="middle" font-size="11" fill="#555">Average the OOB predictions across all B trees → OOB error ≈ test error (no separate test set needed!)</text>
  <text x="460" y="630" text-anchor="middle" font-size="11" font-weight="bold" fill="#f57f17">Each observation has its own "free" cross-validation estimate from the trees that didn't see it</text>
</svg>
