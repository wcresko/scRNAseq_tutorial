<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, sans-serif">
  <rect width="900" height="460" fill="#fafafa" rx="10"/>
  
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5c2a">Survival Analysis: Core Concepts</text>
  
  <!-- Three key functions -->
  <!-- Survival Function -->
  <rect x="20" y="50" width="280" height="170" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Survival Function S(t)</text>
  <text x="160" y="100" text-anchor="middle" font-size="12" fill="#333" font-style="italic">P(T &gt; t)</text>
  <line x1="35" y1="110" x2="285" y2="110" stroke="#ccc" stroke-width="1"/>
  <text x="40" y="132" font-size="10" fill="#555">• Probability of surviving past time t</text>
  <text x="40" y="150" font-size="10" fill="#555">• Starts at 1 (everyone alive)</text>
  <text x="40" y="168" font-size="10" fill="#555">• Monotonically decreasing</text>
  <text x="40" y="186" font-size="10" fill="#555">• Estimated by Kaplan-Meier</text>
  <text x="40" y="204" font-size="10" fill="#555">• Step function (drops at events)</text>
  
  <!-- Hazard Function -->
  <rect x="310" y="50" width="280" height="170" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Hazard Function h(t)</text>
  <text x="450" y="100" text-anchor="middle" font-size="12" fill="#333" font-style="italic">Instantaneous risk at time t</text>
  <line x1="325" y1="110" x2="575" y2="110" stroke="#ccc" stroke-width="1"/>
  <text x="330" y="132" font-size="10" fill="#555">• Rate of event given survival to t</text>
  <text x="330" y="150" font-size="10" fill="#555">• Can increase, decrease, or stay flat</text>
  <text x="330" y="168" font-size="10" fill="#555">• Not a probability (can exceed 1)</text>
  <text x="330" y="186" font-size="10" fill="#555">• Bathtub curve for device failure</text>
  <text x="330" y="204" font-size="10" fill="#555">• Used in Cox regression</text>
  
  <!-- Cumulative Hazard -->
  <rect x="600" y="50" width="280" height="170" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="740" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Cumulative Hazard H(t)</text>
  <text x="740" y="100" text-anchor="middle" font-size="12" fill="#333" font-style="italic">∫₀ᵗ h(u) du</text>
  <line x1="615" y1="110" x2="865" y2="110" stroke="#ccc" stroke-width="1"/>
  <text x="620" y="132" font-size="10" fill="#555">• Accumulated risk up to time t</text>
  <text x="620" y="150" font-size="10" fill="#555">• S(t) = exp(−H(t))</text>
  <text x="620" y="168" font-size="10" fill="#555">• Monotonically increasing</text>
  <text x="620" y="186" font-size="10" fill="#555">• Nelson-Aalen estimator</text>
  <text x="620" y="204" font-size="10" fill="#555">• Used for model diagnostics</text>
  
  <!-- Censoring types -->
  <rect x="20" y="240" width="420" height="200" rx="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="230" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Types of Censoring</text>
  
  <rect x="35" y="282" width="390" height="38" rx="4" fill="#e8f5e9"/>
  <text x="50" y="305" font-size="12" font-weight="bold" fill="#2e7d32">Right censoring</text>
  <text x="200" y="305" font-size="10" fill="#555">Event hasn't happened yet when study ends</text>
  
  <rect x="35" y="326" width="390" height="38" rx="4" fill="#e3f2fd"/>
  <text x="50" y="349" font-size="12" font-weight="bold" fill="#1565c0">Left censoring</text>
  <text x="195" y="349" font-size="10" fill="#555">Event occurred before observation began</text>
  
  <rect x="35" y="370" width="390" height="38" rx="4" fill="#fff3e0"/>
  <text x="50" y="393" font-size="12" font-weight="bold" fill="#e65100">Interval censoring</text>
  <text x="215" y="393" font-size="10" fill="#555">Event occurred between two time points</text>
  
  <text x="230" y="428" text-anchor="middle" font-size="10" fill="#888">Most bioengineering data has right censoring</text>
  
  <!-- Analysis methods -->
  <rect x="460" y="240" width="420" height="200" rx="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="670" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Analysis Methods</text>
  
  <rect x="475" y="282" width="390" height="45" rx="4" fill="#e8f5e9"/>
  <text x="490" y="302" font-size="12" font-weight="bold" fill="#2e7d32">Kaplan-Meier</text>
  <text x="490" y="318" font-size="10" fill="#555">Non-parametric; estimates S(t); no covariates</text>
  
  <rect x="475" y="333" width="390" height="45" rx="4" fill="#e3f2fd"/>
  <text x="490" y="353" font-size="12" font-weight="bold" fill="#1565c0">Log-Rank Test</text>
  <text x="490" y="369" font-size="10" fill="#555">Compares survival curves between groups</text>
  
  <rect x="475" y="384" width="390" height="45" rx="4" fill="#fce4ec"/>
  <text x="490" y="404" font-size="12" font-weight="bold" fill="#c62828">Cox Regression</text>
  <text x="490" y="420" font-size="10" fill="#555">Semi-parametric; multiple covariates; hazard ratios</text>
</svg>
