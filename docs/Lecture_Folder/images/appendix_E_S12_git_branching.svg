<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Arial, sans-serif" font-size="12">
  <text x="350" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Git Branching and Merging</text>

  <!-- Main branch line -->
  <line x1="50" y1="80" x2="650" y2="80" stroke="#2d6a4f" stroke-width="3"/>
  <text x="30" y="84" text-anchor="end" font-weight="bold" fill="#2d6a4f" font-size="13">main</text>

  <!-- Main branch commits -->
  <circle cx="100" cy="80" r="10" fill="#2d6a4f" stroke="#1a4731" stroke-width="2"/>
  <text x="100" y="65" text-anchor="middle" font-size="10" fill="#333">Initial commit</text>

  <circle cx="200" cy="80" r="10" fill="#2d6a4f" stroke="#1a4731" stroke-width="2"/>
  <text x="200" y="65" text-anchor="middle" font-size="10" fill="#333">Add README</text>

  <circle cx="450" cy="80" r="10" fill="#2d6a4f" stroke="#1a4731" stroke-width="2"/>
  <text x="450" y="65" text-anchor="middle" font-size="10" fill="#333">Update docs</text>

  <!-- Merge commit -->
  <circle cx="550" cy="80" r="12" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="550" y="65" text-anchor="middle" font-size="10" fill="#333">Merge</text>

  <circle cx="650" cy="80" r="10" fill="#2d6a4f" stroke="#1a4731" stroke-width="2"/>
  <text x="650" y="65" text-anchor="middle" font-size="10" fill="#333">Continue work</text>

  <!-- Feature branch -->
  <line x1="200" y1="80" x2="300" y2="160" stroke="#87ceeb" stroke-width="3"/>
  <line x1="300" y1="160" x2="420" y2="160" stroke="#87ceeb" stroke-width="3"/>
  <line x1="420" y1="160" x2="550" y2="80" stroke="#87ceeb" stroke-width="3"/>
  <text x="270" y="195" text-anchor="middle" font-weight="bold" fill="#4682b4" font-size="13">feature</text>

  <!-- Feature branch commits -->
  <circle cx="300" cy="160" r="10" fill="#87ceeb" stroke="#4682b4" stroke-width="2"/>
  <text x="300" y="180" text-anchor="middle" font-size="10" fill="#333">New feature</text>

  <circle cx="420" cy="160" r="10" fill="#87ceeb" stroke="#4682b4" stroke-width="2"/>
  <text x="420" y="180" text-anchor="middle" font-size="10" fill="#333">Fix bug</text>
</svg>
