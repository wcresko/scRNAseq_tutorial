<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .path { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .box { font-size: 12px; fill: #fff; text-anchor: middle; }
    .boxDark { font-size: 12px; fill: #222; text-anchor: middle; }
    .lbl { font-size: 12px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="480" y="28">Cell type annotation: manual and automatic paths</text>

  <!-- starting node: unannotated clusters -->
  <g transform="translate(380,60)">
    <rect x="0" y="0" width="200" height="55" rx="10" fill="#444"/>
    <text class="box" x="100" y="25">Clustered cells</text>
    <text class="box" x="100" y="42">(unannotated)</text>
  </g>

  <!-- split to left and right -->
  <path class="arrow" d="M 420 115 L 220 160" marker-end="url(#ah3)"/>
  <path class="arrow" d="M 540 115 L 740 160" marker-end="url(#ah3)"/>

  <!-- Left: manual path -->
  <g transform="translate(60,160)">
    <text class="path" x="160" y="0" fill="#2c7fb8">Manual (marker-based)</text>

    <rect x="20" y="20" width="280" height="40" rx="8" fill="#2c7fb8"/>
    <text class="box" x="160" y="45">1. find cluster markers (FindAllMarkers)</text>

    <rect x="20" y="80" width="280" height="40" rx="8" fill="#2c7fb8"/>
    <text class="box" x="160" y="105">2. compare to canonical marker tables</text>

    <rect x="20" y="140" width="280" height="40" rx="8" fill="#2c7fb8"/>
    <text class="box" x="160" y="165">3. expert judgment &amp; literature</text>

    <text class="lbl" x="160" y="200">CellMarker · PanglaoDB · tissue-specific refs</text>

    <path class="arrow" d="M 20 40 C -10 40 -10 100 20 100"/>
    <path class="arrow" d="M 20 100 C -10 100 -10 160 20 160"/>
  </g>

  <!-- Right: automatic path -->
  <g transform="translate(580,160)">
    <text class="path" x="160" y="0" fill="#e66101">Automatic (reference-based)</text>

    <rect x="20" y="20" width="280" height="40" rx="8" fill="#e66101"/>
    <text class="box" x="160" y="45">1. choose annotated reference atlas</text>

    <rect x="20" y="80" width="280" height="40" rx="8" fill="#e66101"/>
    <text class="box" x="160" y="105">2. transfer labels (per-cell)</text>

    <rect x="20" y="140" width="280" height="40" rx="8" fill="#e66101"/>
    <text class="box" x="160" y="165">3. review confidence scores</text>

    <text class="lbl" x="160" y="200">SingleR · Azimuth · CellTypist · scType · ProjecTILs</text>
  </g>

  <!-- bottom: converge on annotated clusters -->
  <path class="arrow" d="M 220 360 C 300 400 400 405 470 395" marker-end="url(#ah3)"/>
  <path class="arrow" d="M 740 360 C 660 400 560 405 490 395" marker-end="url(#ah3)"/>

  <g transform="translate(340,380)">
    <rect x="0" y="0" width="280" height="45" rx="10" fill="#1b9e77"/>
    <text class="box" x="140" y="22">Annotated cell types</text>
    <text class="box" x="140" y="38">(use both — they cross-check)</text>
  </g>

  <defs>
    <marker id="ah3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
