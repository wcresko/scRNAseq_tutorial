<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Git Workflow</text>

  <!-- Working Directory -->
  <rect x="30" y="45" width="145" height="45" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="102" y="72" text-anchor="middle" fill="#000">Working Directory</text>

  <!-- git add -->
  <line x1="175" y1="67" x2="225" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="58" text-anchor="middle" font-size="11" fill="#555" font-style="italic">git add</text>

  <!-- Staging Area -->
  <rect x="230" y="45" width="130" height="45" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="295" y="72" text-anchor="middle" fill="#000">Staging Area</text>

  <!-- git commit -->
  <line x1="360" y1="67" x2="410" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="385" y="58" text-anchor="middle" font-size="11" fill="#555" font-style="italic">git commit</text>

  <!-- Local Repository -->
  <rect x="415" y="45" width="145" height="45" rx="8" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="487" y="72" text-anchor="middle" fill="#000">Local Repository</text>

  <!-- git push -->
  <line x1="560" y1="67" x2="610" y2="67" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="58" text-anchor="middle" font-size="11" fill="#555" font-style="italic">git push</text>

  <!-- Remote Repository -->
  <rect x="615" y="45" width="155" height="45" rx="8" fill="#ffa07a" stroke="#333" stroke-width="2"/>
  <text x="692" y="72" text-anchor="middle" fill="#000">Remote Repository</text>

  <!-- git pull (return arrow underneath) -->
  <path d="M 692 90 L 692 130 L 102 130 L 102 90" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="400" y="148" text-anchor="middle" font-size="11" fill="#555" font-style="italic">git pull</text>
</svg>
