<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; }
  </style>

  <!-- Left target: Precise but not accurate -->
  <g transform="translate(175, 220)">
    <!-- Target rings -->
    <circle cx="0" cy="0" r="120" fill="#e8e8e8" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="0" r="85" fill="#d0d0d0" stroke="#888" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="50" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="#fff" stroke="#888" stroke-width="1.5"/>

    <!-- Cluster of dots (precise but not accurate - off center, tightly grouped) -->
    <circle cx="-75" cy="-55" r="7" fill="#cc3333"/>
    <circle cx="-68" cy="-42" r="7" fill="#cc3333"/>
    <circle cx="-82" cy="-48" r="7" fill="#cc3333"/>
    <circle cx="-72" cy="-65" r="7" fill="#cc3333"/>
    <circle cx="-62" cy="-52" r="7" fill="#cc3333"/>
    <circle cx="-78" cy="-58" r="7" fill="#cc3333"/>
    <circle cx="-70" cy="-50" r="7" fill="#cc3333"/>

    <!-- Box around cluster -->
    <rect x="-95" y="-78" width="48" height="48" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Right target: Accurate but not precise -->
  <g transform="translate(525, 220)">
    <!-- Target rings -->
    <circle cx="0" cy="0" r="120" fill="#e8e8e8" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="0" r="85" fill="#d0d0d0" stroke="#888" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="50" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="#fff" stroke="#888" stroke-width="1.5"/>

    <!-- Scattered dots (accurate on average but not precise - spread around center) -->
    <circle cx="25" cy="-35" r="7" fill="#3355cc"/>
    <circle cx="-30" cy="20" r="7" fill="#3355cc"/>
    <circle cx="15" cy="40" r="7" fill="#3355cc"/>
    <circle cx="-20" cy="-25" r="7" fill="#3355cc"/>
    <circle cx="35" cy="10" r="7" fill="#3355cc"/>
    <circle cx="-10" cy="-40" r="7" fill="#3355cc"/>
    <circle cx="5" cy="25" r="7" fill="#3355cc"/>

    <!-- Box around scatter -->
    <rect x="-45" y="-55" width="95" height="110" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Labels -->
  <!-- Precision label (left) -->
  <text x="175" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Precision</text>
  <text x="175" y="52" text-anchor="middle" font-size="13" fill="#555">High Avg. % Difference</text>
  <text x="175" y="70" text-anchor="middle" font-size="13" fill="#555">Low Std. Dev. of Avg. % Difference</text>

  <!-- Arrow pointing to cluster -->
  <line x1="175" y1="78" x2="110" y2="150" stroke="#333" stroke-width="1.5"/>
  <polygon points="108,147 115,155 105,153" fill="#333"/>

  <!-- Accuracy label (right) -->
  <text x="525" y="420" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Accuracy</text>
  <text x="525" y="442" text-anchor="middle" font-size="13" fill="#555">Low Avg. % Difference</text>
  <text x="525" y="460" text-anchor="middle" font-size="13" fill="#555">High Std. Dev. of % Difference</text>

  <!-- Arrow pointing to scatter -->
  <line x1="525" y1="410" x2="525" y2="365" stroke="#333" stroke-width="1.5"/>
  <polygon points="525,362 520,370 530,370" fill="#333"/>
</svg>