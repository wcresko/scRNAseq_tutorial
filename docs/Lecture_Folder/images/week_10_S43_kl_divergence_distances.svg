<svg viewBox="0 0 950 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="475" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">KL Divergence: From High-D Distances to Probability Distributions</text>
  
  <!-- Panel A: 2D scatter with distance lines -->
  <rect x="20" y="45" width="420" height="400" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="230" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">A. Pairwise Distances in High-D Space</text>
  
  <!-- Axes -->
  <line x1="70" y1="400" x2="410" y2="400" stroke="#95a5a6" stroke-width="1"/>
  <line x1="70" y1="400" x2="70" y2="90" stroke="#95a5a6" stroke-width="1"/>
  <text x="240" y="430" text-anchor="middle" font-size="11" fill="#7f8c8d">Dimension 1</text>
  <text x="45" y="250" text-anchor="middle" font-size="11" fill="#7f8c8d" transform="rotate(-90,45,250)">Dimension 2</text>
  
  <!-- Group A (blue) - cluster around (150, 160) -->
  <circle cx="130" cy="150" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="155" cy="135" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="140" cy="175" r="7" fill="#3498db" opacity="0.85"/>
  <circle cx="165" cy="165" r="7" fill="#3498db" opacity="0.85"/>
  
  <!-- Group B (red) - cluster around (310, 150) -->
  <circle cx="300" cy="140" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="325" cy="130" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="310" cy="165" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="335" cy="155" r="7" fill="#e74c3c" opacity="0.85"/>
  
  <!-- Group C (green) - cluster around (220, 320) -->
  <circle cx="205" cy="310" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="225" cy="295" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="215" cy="335" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="240" cy="320" r="7" fill="#27ae60" opacity="0.85"/>
  
  <!-- Focal point (point i) highlighted -->
  <circle cx="155" cy="135" r="11" fill="none" stroke="#f39c12" stroke-width="2.5"/>
  <text x="170" y="120" font-size="12" font-weight="bold" fill="#f39c12">x&#x1D62;</text>
  
  <!-- Distance lines from focal point to all others -->
  <!-- To own group (short, blue dashed) -->
  <line x1="155" y1="135" x2="130" y2="150" stroke="#3498db" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="155" y1="135" x2="140" y2="175" stroke="#3498db" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="155" y1="135" x2="165" y2="165" stroke="#3498db" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  
  <!-- To Group B (medium, gray) -->
  <line x1="155" y1="135" x2="300" y2="140" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="325" y2="130" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="310" y2="165" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="335" y2="155" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  
  <!-- To Group C (long, gray) -->
  <line x1="155" y1="135" x2="205" y2="310" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="225" y2="295" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="215" y2="335" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="135" x2="240" y2="320" stroke="#95a5a6" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Annotations -->
  <text x="115" y="105" font-size="10" fill="#3498db" font-weight="bold">Short d &#x2192; high p</text>
  <text x="240" y="110" font-size="10" fill="#95a5a6">Medium d &#x2192; low p</text>
  <text x="105" y="260" font-size="10" fill="#95a5a6">Long d &#x2192; &#x2248; 0 p</text>
  
  <!-- Legend -->
  <circle cx="90" cy="385" r="5" fill="#3498db"/><text x="100" y="389" font-size="10" fill="#555">Group A</text>
  <circle cx="160" cy="385" r="5" fill="#e74c3c"/><text x="170" y="389" font-size="10" fill="#555">Group B</text>
  <circle cx="230" cy="385" r="5" fill="#27ae60"/><text x="240" y="389" font-size="10" fill="#555">Group C</text>
  
  <!-- Arrow connecting panels -->
  <line x1="445" y1="240" x2="475" y2="240" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Panel B: Distance → Probability matrix -->
  <rect x="480" y="45" width="455" height="400" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="707" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">B. Pairwise Similarity Matrix (from x&#x1D62;)</text>
  
  <!-- Probability explanation -->
  <text x="500" y="95" font-size="11" fill="#555">Distances converted to conditional probabilities via Gaussian kernel:</text>
  <text x="600" y="120" font-size="13" fill="#2c3e50" font-style="italic" text-anchor="middle">p(j|i) &#x221D; exp(-||x&#x1D62; - x&#x1D63;||&#x00B2; / 2&#x03C3;&#x1D62;&#x00B2;)</text>
  
  <!-- Similarity matrix visualization -->
  <!-- Column headers -->
  <text x="570" y="155" font-size="10" fill="#3498db" font-weight="bold" text-anchor="middle">A1</text>
  <text x="600" y="155" font-size="10" fill="#3498db" font-weight="bold" text-anchor="middle">A2</text>
  <text x="630" y="155" font-size="10" fill="#3498db" font-weight="bold" text-anchor="middle">A3</text>
  <text x="660" y="155" font-size="10" fill="#3498db" font-weight="bold" text-anchor="middle">A4</text>
  <text x="700" y="155" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">B1</text>
  <text x="730" y="155" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">B2</text>
  <text x="760" y="155" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">B3</text>
  <text x="790" y="155" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">B4</text>
  <text x="830" y="155" font-size="10" fill="#27ae60" font-weight="bold" text-anchor="middle">C1</text>
  <text x="860" y="155" font-size="10" fill="#27ae60" font-weight="bold" text-anchor="middle">C2</text>
  <text x="890" y="155" font-size="10" fill="#27ae60" font-weight="bold" text-anchor="middle">C3</text>
  <text x="920" y="155" font-size="10" fill="#27ae60" font-weight="bold" text-anchor="middle">C4</text>
  
  <!-- Row label for focal point -->
  <text x="545" y="178" font-size="11" fill="#f39c12" font-weight="bold" text-anchor="end">p(j|i) =</text>
  
  <!-- Probability values - high for same group, medium for B, low for C -->
  <!-- Group A cells (high probability - dark blue) -->
  <rect x="555" y="163" width="28" height="22" fill="#3498db" opacity="0.8" rx="2"/>
  <text x="569" y="178" font-size="9" fill="white" text-anchor="middle">.21</text>
  <rect x="585" y="163" width="28" height="22" fill="#f39c12" opacity="0.3" rx="2"/>
  <text x="599" y="178" font-size="9" fill="#333" text-anchor="middle">x&#x1D62;</text>
  <rect x="615" y="163" width="28" height="22" fill="#3498db" opacity="0.7" rx="2"/>
  <text x="629" y="178" font-size="9" fill="white" text-anchor="middle">.18</text>
  <rect x="645" y="163" width="28" height="22" fill="#3498db" opacity="0.75" rx="2"/>
  <text x="659" y="178" font-size="9" fill="white" text-anchor="middle">.19</text>
  
  <!-- Group B cells (medium probability - lighter) -->
  <rect x="685" y="163" width="28" height="22" fill="#e74c3c" opacity="0.3" rx="2"/>
  <text x="699" y="178" font-size="9" fill="#333" text-anchor="middle">.06</text>
  <rect x="715" y="163" width="28" height="22" fill="#e74c3c" opacity="0.25" rx="2"/>
  <text x="729" y="178" font-size="9" fill="#333" text-anchor="middle">.05</text>
  <rect x="745" y="163" width="28" height="22" fill="#e74c3c" opacity="0.3" rx="2"/>
  <text x="759" y="178" font-size="9" fill="#333" text-anchor="middle">.06</text>
  <rect x="775" y="163" width="28" height="22" fill="#e74c3c" opacity="0.28" rx="2"/>
  <text x="789" y="178" font-size="9" fill="#333" text-anchor="middle">.05</text>
  
  <!-- Group C cells (low probability - very light) -->
  <rect x="815" y="163" width="28" height="22" fill="#27ae60" opacity="0.15" rx="2"/>
  <text x="829" y="178" font-size="9" fill="#333" text-anchor="middle">.03</text>
  <rect x="845" y="163" width="28" height="22" fill="#27ae60" opacity="0.15" rx="2"/>
  <text x="859" y="178" font-size="9" fill="#333" text-anchor="middle">.04</text>
  <rect x="875" y="163" width="28" height="22" fill="#27ae60" opacity="0.12" rx="2"/>
  <text x="889" y="178" font-size="9" fill="#333" text-anchor="middle">.02</text>
  <rect x="905" y="163" width="28" height="22" fill="#27ae60" opacity="0.15" rx="2"/>
  <text x="919" y="178" font-size="9" fill="#333" text-anchor="middle">.03</text>
  
  <!-- Bar chart of probabilities -->
  <text x="707" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Probability Distribution from x&#x1D62;</text>
  
  <!-- Bar chart axes -->
  <line x1="520" y1="400" x2="910" y2="400" stroke="#95a5a6" stroke-width="1"/>
  <line x1="520" y1="400" x2="520" y2="230" stroke="#95a5a6" stroke-width="1"/>
  <text x="510" y="240" font-size="9" fill="#7f8c8d" text-anchor="end">p(j|i)</text>
  
  <!-- Blue bars (high) -->
  <rect x="540" y="255" width="22" height="145" fill="#3498db" opacity="0.8" rx="1"/>
  <rect x="565" y="270" width="22" height="130" fill="#3498db" opacity="0.8" rx="1"/>
  <rect x="590" y="260" width="22" height="140" fill="#3498db" opacity="0.8" rx="1"/>
  
  <!-- Red bars (medium) -->
  <rect x="630" y="340" width="22" height="60" fill="#e74c3c" opacity="0.8" rx="1"/>
  <rect x="655" y="348" width="22" height="52" fill="#e74c3c" opacity="0.8" rx="1"/>
  <rect x="680" y="340" width="22" height="60" fill="#e74c3c" opacity="0.8" rx="1"/>
  <rect x="705" y="348" width="22" height="52" fill="#e74c3c" opacity="0.8" rx="1"/>
  
  <!-- Green bars (low) -->
  <rect x="745" y="372" width="22" height="28" fill="#27ae60" opacity="0.8" rx="1"/>
  <rect x="770" y="365" width="22" height="35" fill="#27ae60" opacity="0.8" rx="1"/>
  <rect x="795" y="378" width="22" height="22" fill="#27ae60" opacity="0.8" rx="1"/>
  <rect x="820" y="372" width="22" height="28" fill="#27ae60" opacity="0.8" rx="1"/>
  
  <!-- Bar labels -->
  <text x="575" y="418" font-size="9" fill="#3498db" text-anchor="middle" font-weight="bold">Group A</text>
  <text x="667" y="418" font-size="9" fill="#e74c3c" text-anchor="middle" font-weight="bold">Group B</text>
  <text x="782" y="418" font-size="9" fill="#27ae60" text-anchor="middle" font-weight="bold">Group C</text>
  
  <!-- Key insight box -->
  <rect x="500" y="430" width="430" height="20" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="0.5"/>
  <text x="715" y="444" text-anchor="middle" font-size="10" fill="#856404">Nearby points get high probability; distant points get near-zero probability</text>
</svg>
