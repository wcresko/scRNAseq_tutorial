<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 370" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="275" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Cloud Computing Architecture</text>

  <!-- Users -->
  <rect x="20" y="150" width="90" height="40" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="65" y="175" text-anchor="middle" fill="#000">Users</text>

  <!-- Internet arrow (dashed) -->
  <line x1="110" y1="170" x2="155" y2="170" stroke="#333" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="133" y="160" text-anchor="middle" font-size="10" fill="#666">Internet</text>

  <!-- Region -->
  <rect x="160" y="45" width="370" height="310" rx="12" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="345" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Region 1</text>

  <!-- AZ1 -->
  <rect x="180" y="85" width="160" height="250" rx="8" fill="#f0f8ff" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="108" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">Availability Zone 1</text>

  <rect x="200" y="120" width="120" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="142" text-anchor="middle" fill="#000">Compute</text>

  <rect x="200" y="170" width="120" height="35" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="192" text-anchor="middle" fill="#000">Storage</text>

  <rect x="200" y="220" width="120" height="35" rx="6" fill="#ffa07a" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="242" text-anchor="middle" fill="#000">Networking</text>

  <!-- AZ2 -->
  <rect x="360" y="85" width="160" height="250" rx="8" fill="#fff8f0" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">Availability Zone 2</text>

  <rect x="380" y="120" width="120" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="142" text-anchor="middle" fill="#000">Compute</text>

  <rect x="380" y="170" width="120" height="35" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" fill="#000">Storage</text>

  <rect x="380" y="220" width="120" height="35" rx="6" fill="#ffa07a" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="242" text-anchor="middle" fill="#000">Networking</text>
</svg>
