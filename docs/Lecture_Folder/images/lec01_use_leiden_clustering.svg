<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" font-family="Helvetica, Arial, sans-serif">
  <style>
    .panel { font-size: 16px; font-weight: 700; fill: #222; text-anchor: middle; }
    .step  { font-size: 13px; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Panel 1: KNN graph (all mixed colors) -->
  <g transform="translate(50,50)">
    <text class="panel" x="110" y="-10">KNN graph</text>
    <g stroke="#888">
      <line x1="40" y1="60" x2="80" y2="50"/>
      <line x1="80" y1="50" x2="120" y2="40"/>
      <line x1="120" y1="40" x2="150" y2="70"/>
      <line x1="80" y1="50" x2="60" y2="90"/>
      <line x1="60" y1="90" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="150" y2="70"/>
      <line x1="100" y1="100" x2="140" y2="130"/>
      <line x1="140" y1="130" x2="180" y2="100"/>
      <line x1="180" y1="100" x2="160" y2="140"/>
      <line x1="150" y1="70" x2="190" y2="60"/>
      <line x1="40" y1="60" x2="60" y2="90"/>
      <line x1="40" y1="130" x2="80" y2="150"/>
      <line x1="80" y1="150" x2="120" y2="160"/>
      <line x1="120" y1="160" x2="160" y2="140"/>
      <line x1="80" y1="150" x2="60" y2="90"/>
      <line x1="40" y1="130" x2="100" y2="100"/>
    </g>
    <g>
      <circle cx="40"  cy="60"  r="10" fill="#fff" stroke="#555"/>
      <circle cx="80"  cy="50"  r="10" fill="#c0392b"/>
      <circle cx="120" cy="40"  r="10" fill="#2c3e50"/>
      <circle cx="150" cy="70"  r="10" fill="#2c7fb8"/>
      <circle cx="190" cy="60"  r="10" fill="#2c7fb8"/>
      <circle cx="60"  cy="90"  r="10" fill="#fff" stroke="#555"/>
      <circle cx="100" cy="100" r="10" fill="#c0392b"/>
      <circle cx="140" cy="130" r="10" fill="#2c7fb8"/>
      <circle cx="180" cy="100" r="10" fill="#2c7fb8"/>
      <circle cx="160" cy="140" r="10" fill="#aec6df"/>
      <circle cx="40"  cy="130" r="10" fill="#c0392b"/>
      <circle cx="80"  cy="150" r="10" fill="#c0392b"/>
      <circle cx="120" cy="160" r="10" fill="#c0392b"/>
    </g>
  </g>
  <g transform="translate(270,160)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="step" x="20" y="-10">Find</text>
    <text class="step" x="20" y="22">communities</text>
  </g>

  <!-- Panel 2: Initial partition (same graph colored by community) -->
  <g transform="translate(330,50)">
    <text class="panel" x="110" y="-10">Initial partition</text>
    <g stroke="#888">
      <line x1="40" y1="60" x2="80" y2="50"/>
      <line x1="80" y1="50" x2="120" y2="40"/>
      <line x1="120" y1="40" x2="150" y2="70"/>
      <line x1="80" y1="50" x2="60" y2="90"/>
      <line x1="60" y1="90" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="150" y2="70"/>
      <line x1="100" y1="100" x2="140" y2="130"/>
      <line x1="140" y1="130" x2="180" y2="100"/>
      <line x1="180" y1="100" x2="160" y2="140"/>
      <line x1="150" y1="70" x2="190" y2="60"/>
      <line x1="40" y1="60" x2="60" y2="90"/>
      <line x1="40" y1="130" x2="80" y2="150"/>
      <line x1="80" y1="150" x2="120" y2="160"/>
      <line x1="120" y1="160" x2="160" y2="140"/>
      <line x1="80" y1="150" x2="60" y2="90"/>
    </g>
    <g>
      <circle cx="40"  cy="60"  r="10" fill="#2c7fb8"/>
      <circle cx="80"  cy="50"  r="10" fill="#2c7fb8"/>
      <circle cx="120" cy="40"  r="10" fill="#2c7fb8"/>
      <circle cx="150" cy="70"  r="10" fill="#2c7fb8"/>
      <circle cx="190" cy="60"  r="10" fill="#2c7fb8"/>
      <circle cx="60"  cy="90"  r="10" fill="#2c7fb8"/>
      <circle cx="100" cy="100" r="10" fill="#2c7fb8"/>
      <circle cx="140" cy="130" r="10" fill="#2c7fb8"/>
      <circle cx="180" cy="100" r="10" fill="#aec6df"/>
      <circle cx="160" cy="140" r="10" fill="#aec6df"/>
      <circle cx="40"  cy="130" r="10" fill="#c0392b"/>
      <circle cx="80"  cy="150" r="10" fill="#c0392b"/>
      <circle cx="120" cy="160" r="10" fill="#c0392b"/>
    </g>
  </g>
  <g transform="translate(560,160)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="step" x="20" y="-10">Refine</text>
  </g>

  <!-- Panel 3: Refined with shaded groups -->
  <g transform="translate(620,50)">
    <ellipse cx="110" cy="80"  rx="95" ry="55" fill="#6bb3e6" opacity="0.35"/>
    <ellipse cx="100" cy="150" rx="75" ry="35" fill="#eaa7a7" opacity="0.6"/>
    <g stroke="#888">
      <line x1="40" y1="60" x2="80" y2="50"/>
      <line x1="80" y1="50" x2="120" y2="40"/>
      <line x1="120" y1="40" x2="150" y2="70"/>
      <line x1="80" y1="50" x2="60" y2="90"/>
      <line x1="60" y1="90" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="150" y2="70"/>
      <line x1="100" y1="100" x2="140" y2="130"/>
      <line x1="140" y1="130" x2="180" y2="100"/>
      <line x1="180" y1="100" x2="160" y2="140"/>
      <line x1="150" y1="70" x2="190" y2="60"/>
      <line x1="40" y1="60" x2="60" y2="90"/>
      <line x1="40" y1="130" x2="80" y2="150"/>
      <line x1="80" y1="150" x2="120" y2="160"/>
      <line x1="120" y1="160" x2="160" y2="140"/>
      <line x1="80" y1="150" x2="60" y2="90"/>
    </g>
    <g>
      <circle cx="40"  cy="60"  r="10" fill="#2c7fb8"/>
      <circle cx="80"  cy="50"  r="10" fill="#2c7fb8"/>
      <circle cx="120" cy="40"  r="10" fill="#2c7fb8"/>
      <circle cx="150" cy="70"  r="10" fill="#2c7fb8"/>
      <circle cx="190" cy="60"  r="10" fill="#2c7fb8"/>
      <circle cx="60"  cy="90"  r="10" fill="#2c7fb8"/>
      <circle cx="100" cy="100" r="10" fill="#2c7fb8"/>
      <circle cx="140" cy="130" r="10" fill="#2c7fb8"/>
      <circle cx="180" cy="100" r="10" fill="#aec6df"/>
      <circle cx="160" cy="140" r="10" fill="#aec6df"/>
      <circle cx="40"  cy="130" r="10" fill="#c0392b"/>
      <circle cx="80"  cy="150" r="10" fill="#c0392b"/>
      <circle cx="120" cy="160" r="10" fill="#c0392b"/>
    </g>
  </g>
  <g transform="translate(850,160)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="step" x="20" y="-10">Aggregate</text>
    <text class="step" x="20" y="22">network</text>
  </g>

  <!-- Panel 4: aggregated -->
  <g transform="translate(910,50)">
    <line x1="70" y1="70" x2="170" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="170" y1="100" x2="210" y2="50" stroke="#333" stroke-width="2"/>
    <line x1="170" y1="100" x2="210" y2="170" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="70" x2="65" y2="160" stroke="#333" stroke-width="2"/>
    <line x1="170" y1="100" x2="65" y2="160" stroke="#333" stroke-width="2"/>
    <circle cx="170" cy="100" r="40" fill="#2c7fb8"/>
    <circle cx="65"  cy="160" r="30" fill="#c0392b"/>
    <circle cx="210" cy="50"  r="16" fill="#aec6df"/>
    <circle cx="210" cy="170" r="14" fill="#2c3e50"/>
    <circle cx="70"  cy="70"  r="12" fill="#aec6df"/>
  </g>
  <g transform="translate(1150,160)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
    <text class="step" x="20" y="-10">Refine</text>
  </g>

  <!-- Panel 5: final partition -->
  <g transform="translate(1210,50)">
    <text class="panel" x="90" y="-10">Final partition</text>
    <ellipse cx="120" cy="90" rx="90" ry="60" fill="#6bb3e6" opacity="0.35"/>
    <ellipse cx="50" cy="150" rx="45" ry="30" fill="#eaa7a7" opacity="0.6"/>
    <line x1="70" y1="70" x2="170" y2="100" stroke="#222" stroke-width="2"/>
    <line x1="170" y1="100" x2="200" y2="55" stroke="#222" stroke-width="2"/>
    <line x1="170" y1="100" x2="200" y2="160" stroke="#222" stroke-width="2"/>
    <line x1="50" y1="150" x2="170" y2="100" stroke="#222" stroke-width="2"/>
    <circle cx="170" cy="100" r="40" fill="#2c7fb8"/>
    <circle cx="50"  cy="150" r="24" fill="#c0392b"/>
    <circle cx="200" cy="55"  r="14" fill="#aec6df"/>
    <circle cx="200" cy="160" r="12" fill="#2c3e50"/>
    <circle cx="70"  cy="70"  r="10" fill="#aec6df"/>
  </g>
</svg>
