<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .pt   { font-size: 18px; font-weight: 700; fill: #222; }
    .bul  { font-size: 13px; fill: #222; }
    .sub  { font-size: 12px; fill: #444; }
    .ex   { font-size: 12px; fill: #222; font-style: italic; }
    .mono { font-family: "Courier New", monospace; font-size: 12px; fill: #222; }
  </style>

  <!-- Panel 1: Global models -->
  <g transform="translate(30,30)">
    <rect width="410" height="560" rx="10" fill="#fff" stroke="#2c7fb8" stroke-width="2"/>
    <text class="pt" x="20" y="30">Global models</text>
    <text class="bul" x="20" y="60">• Fit regression model with batch effect covariate</text>
    <text class="bul" x="20" y="110">Residuals (often using linear regression):</text>
    <text class="mono" x="30" y="140">n̂_gc = f_D(B_c, …)</text>
    <text class="mono" x="30" y="175">r_gc = n_gc − n̂_gc = n_gc − (β₀ + β₁ B_c)</text>
    <text class="sub" x="30" y="195">in linear model case</text>
    <text class="sub" x="260" y="220">Example:</text>
    <text class="ex"  x="260" y="240">sc.tl.regress_out()</text>
    <text class="bul" x="20" y="290">Correct for fitted batch effect:</text>
    <text class="mono" x="30" y="325">n_gcb = α_g + Xβ_g + γ_gb + δ_gb ε_gcb</text>
    <!-- labels for components -->
    <line x1="70"  y1="360" x2="70"  y2="340" stroke="#333"/>
    <text class="sub" x="65"  y="380" text-anchor="middle">bio design</text>
    <text class="sub" x="65"  y="395" text-anchor="middle">matrix</text>
    <line x1="160" y1="360" x2="160" y2="340" stroke="#333"/>
    <text class="sub" x="160" y="380" text-anchor="middle">additive batch</text>
    <text class="sub" x="160" y="395" text-anchor="middle">effect</text>
    <line x1="260" y1="360" x2="260" y2="340" stroke="#333"/>
    <text class="sub" x="260" y="380" text-anchor="middle">multiplicative</text>
    <text class="sub" x="260" y="395" text-anchor="middle">batch effect</text>
    <text class="sub" x="20" y="490">Example:</text>
    <text class="ex"  x="20" y="510" font-weight="700">ComBat - scanpy.pp.combat()</text>
  </g>

  <!-- Panel 2: Linear embedding models -->
  <g transform="translate(460,30)">
    <rect width="410" height="560" rx="10" fill="#fff" stroke="#e6387a" stroke-width="2"/>
    <text class="pt" x="20" y="30">Linear embedding models</text>
    <text class="bul" x="20" y="60">• Project cells into low dimensional embedding</text>
    <text class="bul" x="20" y="80">• find most similar cells in other batch e.g., using</text>
    <text class="bul" x="32" y="98">mutual nearest neighbours (MNNs)</text>
    <text class="bul" x="20" y="118">• Use MNNs as anchors to calculate a correction</text>
    <text class="bul" x="32" y="136">vector</text>

    <!-- small axes w/ clusters labelled Batch1, Batch2 -->
    <g transform="translate(40,200)">
      <line x1="0" y1="120" x2="0" y2="0" stroke="#222" stroke-width="1.5"/>
      <line x1="0" y1="120" x2="120" y2="120" stroke="#222" stroke-width="1.5"/>
      <text class="sub" x="-14" y="10">z</text>
      <text class="sub" x="50" y="135">x</text>
      <text class="sub" x="60" y="5">Batch 2</text>
      <g fill="#c0392b"><circle cx="30" cy="30" r="4"/><circle cx="40" cy="40" r="4"/><circle cx="50" cy="30" r="4"/></g>
      <g fill="#f1c40f"><circle cx="90" cy="20" r="4"/><circle cx="100" cy="30" r="4"/><circle cx="110" cy="25" r="4"/></g>
    </g>
    <g transform="translate(220,220)">
      <line x1="0" y1="120" x2="0" y2="0" stroke="#222" stroke-width="1.5"/>
      <line x1="0" y1="120" x2="120" y2="120" stroke="#222" stroke-width="1.5"/>
      <text class="sub" x="-14" y="10">z</text>
      <text class="sub" x="50" y="135">x'</text>
      <text class="sub" x="60" y="5">Batch 1</text>
      <g fill="#9b59b6"><circle cx="30" cy="35" r="4"/><circle cx="40" cy="45" r="4"/></g>
      <g fill="#e67e22"><circle cx="90" cy="20" r="4"/><circle cx="100" cy="30" r="4"/></g>
    </g>
    <g transform="translate(130,400)">
      <line x1="0" y1="120" x2="0" y2="0" stroke="#222" stroke-width="1.5"/>
      <line x1="0" y1="120" x2="130" y2="120" stroke="#222" stroke-width="1.5"/>
      <text class="sub" x="-14" y="10">z</text>
      <text class="sub" x="60" y="135">x</text>
      <g fill="#c0392b"><circle cx="30" cy="30" r="4"/><circle cx="40" cy="40" r="4"/></g>
      <g fill="#9b59b6"><circle cx="40" cy="30" r="4"/><circle cx="50" cy="40" r="4"/></g>
      <g fill="#f1c40f"><circle cx="95" cy="25" r="4"/></g>
      <g fill="#e67e22"><circle cx="105" cy="30" r="4"/></g>
      <!-- MNN pairings -->
      <line x1="35" y1="35" x2="45" y2="35" stroke="#333" stroke-dasharray="2,2"/>
      <text class="sub" x="30" y="70">MNN pairings</text>
    </g>

    <text class="sub" x="20" y="535">Examples:</text>
    <text class="ex"  x="20" y="552">MNN, FastMNN, Seurat v3, Scanorama</text>
  </g>

  <!-- Panel 3: Graph-based & Deep learning -->
  <g transform="translate(890,30)">
    <rect width="400" height="560" rx="10" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <text class="pt" x="20" y="30">Graph-based methods &amp;</text>
    <text class="pt" x="20" y="52">Deep learning</text>
    <text class="bul" x="20" y="80">Enforce graph connections between different</text>
    <text class="bul" x="20" y="96">batches</text>

    <!-- 3-cluster graph -->
    <g transform="translate(30,110)">
      <g fill="#27ae60"><circle cx="50"  cy="50" r="10"/><circle cx="70" cy="30" r="10"/><circle cx="90" cy="65" r="10"/><circle cx="60" cy="80" r="10"/><circle cx="95" cy="40" r="10"/></g>
      <g fill="#9b59b6"><circle cx="190" cy="50" r="10"/><circle cx="210" cy="35" r="10"/><circle cx="230" cy="70" r="10"/><circle cx="220" cy="55" r="10"/><circle cx="200" cy="80" r="10"/></g>
      <g fill="#2980b9"><circle cx="310" cy="75" r="10"/><circle cx="325" cy="55" r="10"/><circle cx="345" cy="80" r="10"/><circle cx="355" cy="60" r="10"/></g>
      <text class="sub" x="60"  y="15">Batch1</text>
      <text class="sub" x="195" y="15">Batch2</text>
      <text class="sub" x="315" y="30">Batch3</text>
      <!-- connections -->
      <line x1="90"  y1="65" x2="190" y2="50" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="95"  y1="40" x2="210" y2="35" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="220" y1="55" x2="310" y2="75" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="230" y1="70" x2="325" y2="55" stroke="#c0392b" stroke-width="1.5"/>
    </g>
    <text class="sub" x="20" y="245">Examples:</text>
    <text class="ex"  x="20" y="262">BBKNN, Conos</text>

    <text class="bul" x="20" y="300">Add condition node into auto-encoder</text>
    <text class="bul" x="20" y="318">architecture</text>

    <!-- auto-encoder diagram -->
    <g transform="translate(20,340)">
      <text class="sub" x="0" y="10">input x</text>
      <text class="sub" x="160" y="10">bottleneck</text>
      <text class="sub" x="180" y="24">layer</text>
      <text class="sub" x="330" y="10">output</text>
      <g fill="#9b59b6">
        <circle cx="20" cy="40"  r="8"/><circle cx="20" cy="60"  r="8"/><circle cx="20" cy="80"  r="8"/><circle cx="20" cy="100" r="8"/><circle cx="20" cy="120" r="8"/><circle cx="20" cy="140" r="8"/>
      </g>
      <g fill="#16a085">
        <circle cx="90" cy="60" r="8"/><circle cx="90" cy="80" r="8"/><circle cx="90" cy="100" r="8"/><circle cx="90" cy="120" r="8"/>
      </g>
      <g fill="#16a085">
        <circle cx="180" cy="80" r="8"/><circle cx="180" cy="100" r="8"/>
      </g>
      <circle cx="180" cy="130" r="8" fill="#f1c40f"/>
      <g fill="#16a085">
        <circle cx="270" cy="60" r="8"/><circle cx="270" cy="80" r="8"/><circle cx="270" cy="100" r="8"/><circle cx="270" cy="120" r="8"/>
      </g>
      <g fill="#2980b9">
        <circle cx="340" cy="40"  r="8"/><circle cx="340" cy="60"  r="8"/><circle cx="340" cy="80"  r="8"/><circle cx="340" cy="100" r="8"/><circle cx="340" cy="120" r="8"/><circle cx="340" cy="140" r="8"/>
      </g>
      <text class="sub" x="40"  y="175">encoder</text>
      <text class="sub" x="275" y="175">decoder</text>
    </g>
    <text class="sub" x="20" y="535">Examples:</text>
    <text class="ex"  x="20" y="552">scVI, trVAE, SAUCIE</text>
  </g>
</svg>
