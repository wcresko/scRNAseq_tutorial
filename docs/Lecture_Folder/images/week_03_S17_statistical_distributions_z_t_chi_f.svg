<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="Arial, Helvetica, sans-serif">
  <!-- Panel 1: z distribution (top-left) -->
  <g transform="translate(0,0)">
    <text x="220" y="25" text-anchor="middle" font-size="24" font-style="italic" font-weight="bold">z</text>
    <text x="25" y="180" text-anchor="middle" font-size="16" font-style="italic" transform="rotate(-90,25,180)">P(y)</text>
    <text x="220" y="340" text-anchor="middle" font-size="16" font-style="italic">y</text>
    <!-- Axes -->
    <line x1="60" y1="310" x2="380" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="35" stroke="black" stroke-width="1.5"/>
    <!-- Bell curve -->
    <path d="M 65,308 C 75,306 90,300 105,290 C 120,275 135,250 150,215 C 165,175 180,130 195,95 C 205,75 210,65 220,60 C 230,65 235,75 245,95 C 260,130 275,175 290,215 C 305,250 320,275 335,290 C 350,300 365,306 375,308"
          fill="none" stroke="black" stroke-width="2.5"/>
  </g>

  <!-- Panel 2: chi-squared distribution (top-right) -->
  <g transform="translate(400,0)">
    <text x="220" y="25" text-anchor="middle" font-size="22" font-style="italic" font-weight="bold">&#x3C7;</text>
    <text x="233" y="20" text-anchor="middle" font-size="14" font-weight="bold">2</text>
    <text x="25" y="180" text-anchor="middle" font-size="16" font-style="italic" transform="rotate(-90,25,180)">P(y)</text>
    <text x="220" y="340" text-anchor="middle" font-size="16" font-style="italic">y</text>
    <!-- Axes -->
    <line x1="60" y1="310" x2="380" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="35" stroke="black" stroke-width="1.5"/>
    <!-- Curve a (df=2, sharp peak near 0) -->
    <path d="M 65,80 C 75,110 90,170 110,230 C 130,270 160,295 200,305 C 240,309 280,310 320,310"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="95" y="75" font-size="16" fill="red" font-style="italic">a</text>
    <!-- Curve b (df=5, moderate peak) -->
    <path d="M 65,280 C 80,250 100,190 120,150 C 140,130 160,140 180,170 C 200,210 230,260 270,290 C 310,305 340,310 370,310"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="135" y="128" font-size="16" font-style="italic">b</text>
    <!-- Curve c (df=10, broader peak) -->
    <path d="M 65,308 C 80,305 100,295 130,270 C 160,235 190,190 220,165 C 250,155 270,170 290,200 C 310,240 340,280 370,300"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="310" y="185" font-size="16" font-style="italic">c</text>
  </g>

  <!-- Panel 3: t distribution (bottom-left) -->
  <g transform="translate(0,350)">
    <text x="220" y="25" text-anchor="middle" font-size="24" font-style="italic" font-weight="bold">t</text>
    <text x="25" y="180" text-anchor="middle" font-size="16" font-style="italic" transform="rotate(-90,25,180)">P(y)</text>
    <text x="220" y="340" text-anchor="middle" font-size="16" font-style="italic">y</text>
    <!-- Axes -->
    <line x1="60" y1="310" x2="380" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="35" stroke="black" stroke-width="1.5"/>
    <!-- Curve a (df=2, heavy tails, lower peak) -->
    <path d="M 65,295 C 80,290 100,280 120,265 C 140,240 160,200 180,155 C 195,125 205,108 220,100 C 235,108 245,125 260,155 C 280,200 300,240 320,265 C 340,280 360,290 375,295"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="95" y="265" font-size="16" font-style="italic">a</text>
    <!-- Curve b (df=5, medium) -->
    <path d="M 75,303 C 90,300 110,292 130,275 C 150,250 170,210 190,155 C 200,125 210,95 220,82 C 230,95 240,125 250,155 C 270,210 290,250 310,275 C 330,292 350,300 365,303"
          fill="none" stroke="red" stroke-width="2"/>
    <text x="120" y="258" font-size="16" fill="red" font-style="italic">b</text>
    <!-- Curve c (df=30, close to normal, tallest) -->
    <path d="M 85,308 C 100,305 120,297 140,280 C 160,255 175,215 195,155 C 205,115 212,80 220,68 C 228,80 235,115 245,155 C 265,215 280,255 300,280 C 320,297 340,305 355,308"
          fill="none" stroke="blue" stroke-width="2"/>
    <text x="222" y="63" font-size="16" fill="blue" font-style="italic">c</text>
  </g>

  <!-- Panel 4: F distribution (bottom-right) -->
  <g transform="translate(400,350)">
    <text x="220" y="25" text-anchor="middle" font-size="24" font-style="italic" font-weight="bold">F</text>
    <text x="25" y="180" text-anchor="middle" font-size="16" font-style="italic" transform="rotate(-90,25,180)">P(y)</text>
    <text x="220" y="340" text-anchor="middle" font-size="16" font-style="italic">y</text>
    <!-- Axes -->
    <line x1="60" y1="310" x2="380" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="35" stroke="black" stroke-width="1.5"/>
    <!-- Curve a (df1=2,df2=5, sharp decay from y-axis) -->
    <path d="M 65,110 C 75,165 90,230 110,270 C 130,295 160,305 200,308 C 240,310 280,310 320,310"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="85" y="100" font-size="16" font-style="italic">a</text>
    <!-- Curve b (df1=5,df2=10) -->
    <path d="M 65,250 C 75,210 90,155 105,130 C 120,120 135,140 155,180 C 180,230 220,275 270,298 C 310,308 340,310 370,310"
          fill="none" stroke="black" stroke-width="2"/>
    <text x="115" y="115" font-size="16" font-style="italic">b</text>
    <!-- Curve c (df1=10,df2=20) -->
    <path d="M 65,290 C 80,260 95,205 110,165 C 125,140 140,130 160,140 C 180,165 210,220 250,270 C 290,300 330,310 370,310"
          fill="none" stroke="red" stroke-width="2"/>
    <text x="140" y="125" font-size="16" fill="red" font-style="italic">c</text>
    <!-- Curve d (df1=50,df2=100, sharp peak) -->
    <path d="M 65,308 C 80,300 90,280 100,240 C 110,190 115,140 125,105 C 135,90 140,95 150,120 C 165,165 185,230 215,275 C 250,300 290,310 340,310"
          fill="none" stroke="darkgreen" stroke-width="2"/>
    <text x="120" y="82" font-size="16" fill="darkgreen" font-style="italic">d</text>
  </g>
</svg>