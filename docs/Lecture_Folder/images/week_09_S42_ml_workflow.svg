<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a4a8a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">General Steps for Machine Learning</text>

  <!-- Row 1: Data Collection -> Data Preprocessing -> Feature Engineering -->
  <rect x="30" y="60" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="110" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Data Collection</text>
  <text x="110" y="106" text-anchor="middle" font-size="10" fill="#e8e8ff">Gather relevant</text>
  <text x="110" y="119" text-anchor="middle" font-size="10" fill="#e8e8ff">datasets</text>

  <line x1="190" y1="97" x2="240" y2="97" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="250" y="60" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="330" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Data</text>
  <text x="330" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Preprocessing</text>
  <text x="330" y="119" text-anchor="middle" font-size="10" fill="#e8e8ff">Clean, transform,</text>
  <text x="330" y="132" text-anchor="middle" font-size="10" fill="#e8e8ff">and prepare data</text>

  <line x1="410" y1="97" x2="460" y2="97" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="470" y="60" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="550" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Feature</text>
  <text x="550" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Engineering</text>
  <text x="550" y="119" text-anchor="middle" font-size="10" fill="#e8e8ff">Select and create</text>
  <text x="550" y="132" text-anchor="middle" font-size="10" fill="#e8e8ff">relevant features</text>

  <!-- Arrow down from Feature Engineering -->
  <line x1="550" y1="135" x2="550" y2="175" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Model Training <- Model Selection <- Data Splitting -->
  <rect x="470" y="185" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="550" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Data Splitting</text>
  <text x="550" y="231" text-anchor="middle" font-size="10" fill="#e8e8ff">Train/validation/</text>
  <text x="550" y="244" text-anchor="middle" font-size="10" fill="#e8e8ff">test sets</text>

  <line x1="470" y1="222" x2="420" y2="222" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="250" y="185" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="330" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Model Selection</text>
  <text x="330" y="231" text-anchor="middle" font-size="10" fill="#e8e8ff">Choose appropriate</text>
  <text x="330" y="244" text-anchor="middle" font-size="10" fill="#e8e8ff">algorithm</text>

  <line x1="250" y1="222" x2="200" y2="222" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="30" y="185" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="110" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Model Training</text>
  <text x="110" y="231" text-anchor="middle" font-size="10" fill="#e8e8ff">Train model on</text>
  <text x="110" y="244" text-anchor="middle" font-size="10" fill="#e8e8ff">training data</text>

  <!-- Arrow down from Model Training -->
  <line x1="110" y1="260" x2="110" y2="300" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Model Evaluation -> Hyperparameter Tuning -> Final Testing -> Deployment -->
  <rect x="30" y="310" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="110" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Model Evaluation</text>
  <text x="110" y="353" text-anchor="middle" font-size="10" fill="#e8e8ff">Assess performance</text>
  <text x="110" y="366" text-anchor="middle" font-size="10" fill="#e8e8ff">and accuracy</text>

  <line x1="190" y1="347" x2="240" y2="347" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="250" y="310" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="330" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Hyperparameter</text>
  <text x="330" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Tuning</text>
  <text x="330" y="369" text-anchor="middle" font-size="10" fill="#e8e8ff">Optimize model</text>
  <text x="330" y="382" text-anchor="middle" font-size="10" fill="#e8e8ff">parameters</text>

  <line x1="410" y1="347" x2="460" y2="347" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="470" y="310" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="550" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Final Testing</text>
  <text x="550" y="356" text-anchor="middle" font-size="10" fill="#e8e8ff">Test on unseen</text>
  <text x="550" y="369" text-anchor="middle" font-size="10" fill="#e8e8ff">test data</text>

  <line x1="630" y1="347" x2="680" y2="347" stroke="#4a4a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="690" y="310" width="160" height="75" rx="12" fill="#6c5ce7"/>
  <text x="770" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Deployment</text>
  <text x="770" y="356" text-anchor="middle" font-size="10" fill="#e8e8ff">Deploy model to</text>
  <text x="770" y="369" text-anchor="middle" font-size="10" fill="#e8e8ff">production</text>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#888">SVG recreation of ML workflow diagram</text>
</svg>
