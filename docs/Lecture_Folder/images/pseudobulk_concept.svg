<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .txt { font-size: 12px; fill: #333; }
    .cellHdr { font-size: 11px; font-weight: 600; fill: #222; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="500" y="28">Pseudobulk: aggregate cells → sample-level counts → bulk DE framework</text>

  <!-- Panel 1: annotated cells by cluster × sample -->
  <g transform="translate(30,60)">
    <text class="panel" x="140" y="0">1. Single cells labeled by</text>
    <text class="panel" x="140" y="18">(cluster, sample)</text>
    <rect x="0" y="30" width="280" height="290" fill="#fafafa" stroke="#ccc"/>

    <!-- Cluster A -->
    <g>
      <!-- sample S1 -->
      <circle cx="50"  cy="80" r="5" fill="#2c7fb8"/>
      <circle cx="60"  cy="90" r="5" fill="#2c7fb8"/>
      <circle cx="65"  cy="75" r="5" fill="#2c7fb8"/>
      <circle cx="72"  cy="100" r="5" fill="#2c7fb8"/>
      <!-- sample S2 -->
      <circle cx="90"  cy="80" r="5" fill="#2c7fb8" stroke="#000" stroke-width="1.2"/>
      <circle cx="100" cy="90" r="5" fill="#2c7fb8" stroke="#000" stroke-width="1.2"/>
      <circle cx="85"  cy="102" r="5" fill="#2c7fb8" stroke="#000" stroke-width="1.2"/>
    </g>
    <!-- Cluster B -->
    <g>
      <circle cx="170" cy="170" r="5" fill="#e66101"/>
      <circle cx="180" cy="180" r="5" fill="#e66101"/>
      <circle cx="175" cy="160" r="5" fill="#e66101"/>
      <circle cx="190" cy="170" r="5" fill="#e66101"/>
      <circle cx="205" cy="165" r="5" fill="#e66101" stroke="#000" stroke-width="1.2"/>
      <circle cx="215" cy="175" r="5" fill="#e66101" stroke="#000" stroke-width="1.2"/>
      <circle cx="225" cy="160" r="5" fill="#e66101" stroke="#000" stroke-width="1.2"/>
    </g>
    <!-- Cluster C -->
    <g>
      <circle cx="60"  cy="240" r="5" fill="#1b9e77"/>
      <circle cx="70"  cy="250" r="5" fill="#1b9e77"/>
      <circle cx="80"  cy="245" r="5" fill="#1b9e77"/>
      <circle cx="110" cy="250" r="5" fill="#1b9e77" stroke="#000" stroke-width="1.2"/>
      <circle cx="120" cy="240" r="5" fill="#1b9e77" stroke="#000" stroke-width="1.2"/>
    </g>

    <text class="lbl" x="140" y="340">color = cluster · outline = sample S2</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 320 210 L 380 210" marker-end="url(#ahp)"/>
  <text class="lbl" x="350" y="200">sum</text>

  <!-- Panel 2: pseudobulk matrix -->
  <g transform="translate(395,60)">
    <text class="panel" x="140" y="0">2. Per (cluster, sample)</text>
    <text class="panel" x="140" y="18">sum of counts</text>

    <g transform="translate(0,40)">
      <!-- header row -->
      <text class="cellHdr" x="75"  y="15">S1·A</text>
      <text class="cellHdr" x="125" y="15">S2·A</text>
      <text class="cellHdr" x="175" y="15">S1·B</text>
      <text class="cellHdr" x="225" y="15">S2·B</text>
      <text class="cellHdr" x="275" y="15">S1·C</text>

      <!-- rows: genes -->
      <g font-family="Menlo,Consolas,monospace" font-size="11" fill="#222">
        <text x="0" y="40">Gene1</text><rect x="55" y="27" width="35" height="16" fill="#c6dbef"/><text x="72" y="40" text-anchor="middle">142</text>
        <rect x="100" y="27" width="35" height="16" fill="#c6dbef"/><text x="117" y="40" text-anchor="middle">168</text>
        <rect x="150" y="27" width="35" height="16" fill="#ffd4a6"/><text x="167" y="40" text-anchor="middle">62</text>
        <rect x="200" y="27" width="35" height="16" fill="#ffd4a6"/><text x="217" y="40" text-anchor="middle">78</text>
        <rect x="250" y="27" width="35" height="16" fill="#b6e3c4"/><text x="267" y="40" text-anchor="middle">221</text>

        <text x="0" y="65">Gene2</text><rect x="55" y="52" width="35" height="16" fill="#c6dbef"/><text x="72" y="65" text-anchor="middle">33</text>
        <rect x="100" y="52" width="35" height="16" fill="#c6dbef"/><text x="117" y="65" text-anchor="middle">41</text>
        <rect x="150" y="52" width="35" height="16" fill="#ffd4a6"/><text x="167" y="65" text-anchor="middle">205</text>
        <rect x="200" y="52" width="35" height="16" fill="#ffd4a6"/><text x="217" y="65" text-anchor="middle">238</text>
        <rect x="250" y="52" width="35" height="16" fill="#b6e3c4"/><text x="267" y="65" text-anchor="middle">18</text>

        <text x="0" y="90">Gene3</text><rect x="55" y="77" width="35" height="16" fill="#c6dbef"/><text x="72" y="90" text-anchor="middle">87</text>
        <rect x="100" y="77" width="35" height="16" fill="#c6dbef"/><text x="117" y="90" text-anchor="middle">92</text>
        <rect x="150" y="77" width="35" height="16" fill="#ffd4a6"/><text x="167" y="90" text-anchor="middle">14</text>
        <rect x="200" y="77" width="35" height="16" fill="#ffd4a6"/><text x="217" y="90" text-anchor="middle">19</text>
        <rect x="250" y="77" width="35" height="16" fill="#b6e3c4"/><text x="267" y="90" text-anchor="middle">107</text>

        <text x="0" y="115">…</text>
      </g>
    </g>
    <text class="lbl" x="140" y="175">looks like a bulk RNA-seq count matrix</text>
  </g>

  <!-- Arrow down -->
  <path class="arrow" d="M 520 290 L 520 335" marker-end="url(#ahp)"/>

  <!-- Panel 3: DE -->
  <g transform="translate(395,340)">
    <text class="panel" x="140" y="0">3. Fit DE per cluster</text>
    <g transform="translate(20,20)">
      <rect x="0"  y="0" width="240" height="75" rx="10" fill="#eef3fa" stroke="#2c7fb8"/>
      <text class="txt" x="10" y="20" font-weight="700">DESeq2 / edgeR / limma-voom</text>
      <text class="txt" x="10" y="40">design = ~ condition (+ covariates)</text>
      <text class="txt" x="10" y="58">shrinkage, proper replication,</text>
      <text class="txt" x="10" y="73">well-calibrated p-values</text>
    </g>
  </g>

  <!-- Right panel: why pseudobulk matters -->
  <g transform="translate(720,60)">
    <rect x="0" y="0" width="260" height="370" rx="10" fill="#fff7d6" stroke="#d9b41a"/>
    <text class="panel" x="130" y="25">Why pseudobulk?</text>

    <text class="txt" x="15" y="55" font-weight="700">Per-cell DE pitfall</text>
    <text class="txt" x="15" y="75">cells from one subject are not</text>
    <text class="txt" x="15" y="91">independent → p-values too small</text>

    <text class="txt" x="15" y="120" font-weight="700">Pseudobulk fixes this</text>
    <text class="txt" x="15" y="140">samples ARE independent; bulk</text>
    <text class="txt" x="15" y="156">methods are well-calibrated</text>

    <text class="txt" x="15" y="185" font-weight="700">When to use it</text>
    <text class="txt" x="15" y="205">· comparing conditions across</text>
    <text class="txt" x="15" y="221">  biological replicates</text>
    <text class="txt" x="15" y="241">· ≥ 3 samples per group, ideally more</text>

    <text class="txt" x="15" y="270" font-weight="700">When NOT</text>
    <text class="txt" x="15" y="290">· finding cluster markers</text>
    <text class="txt" x="15" y="306">  (use within-cell methods)</text>
    <text class="txt" x="15" y="326">· only 1–2 samples total</text>
    <text class="txt" x="15" y="346">  (no replication available)</text>
  </g>

  <defs>
    <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
