<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #1f4e79; }
    .subtitle { font-size: 12px; fill: #333; }
    .colTitle { font-size: 15px; font-weight: 700; fill: #1f4e79; }
    .step { font-size: 11px; fill: #222; text-anchor: middle; }
    .emph { fill: #c0392b; font-weight: 700; }
    .matrix { font-size: 11px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .fastq { font-size: 10px; fill: #222; text-anchor: middle; }
  </style>

  <text class="title" x="20" y="28">Data Processing</text>
  <text class="subtitle" x="20" y="48">RNA-seq data processing pipelines include raw data preprocessing (QC), read alignment, gene/transcript</text>
  <text class="subtitle" x="20" y="62">expression quantification; and — for scRNA-seq — cell clustering and cell annotation.</text>

  <!-- Column 1: 10X -->
  <g transform="translate(40,90)">
    <text class="colTitle" x="0" y="0">▸ 10X</text>
    <g transform="translate(0,15)">
      <rect x="0"   y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <rect x="70"  y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <rect x="140" y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <text class="fastq" x="30"  y="14">I1</text><text class="fastq" x="30"  y="26">fastq.gz</text>
      <text class="fastq" x="100" y="14">R1</text><text class="fastq" x="100" y="26">fastq.gz</text>
      <text class="fastq" x="170" y="14">R2</text><text class="fastq" x="170" y="26">fastq.gz</text>
    </g>
    <line x1="100" y1="52" x2="100" y2="78" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="5" y="82" width="190" height="260" rx="6" fill="none" stroke="#1b5e91" stroke-dasharray="4,3"/>
    <text class="emph" x="100" y="100" text-anchor="middle">Cell Ranger count</text>

    <g transform="translate(20,115)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Extract barcode, UMI, RNA read</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,152)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Correct barcode sequences</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,189)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Align reads by <tspan class="emph">STAR</tspan></text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,226)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Tag reads with genes, transcript</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,263)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Correct UMI sequences</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,300)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Count UMIs by cell &amp; gene</text>
    </g>

    <text class="step" x="100" y="358">Count cell associated barcodes</text>
    <line x1="100" y1="368" x2="100" y2="398" stroke="#333" marker-end="url(#arrow)"/>
    <rect x="65" y="400" width="70" height="50" fill="#4a7fb8" stroke="#1b5e91"/>
    <text class="matrix" x="100" y="420">cell × gene</text>
    <text class="matrix" x="100" y="435">count matrix</text>
  </g>

  <!-- Column 2: Drop-seq & inDrop -->
  <g transform="translate(360,90)">
    <text class="colTitle" x="0" y="0">▸ Drop-seq &amp; inDrop</text>
    <g transform="translate(30,15)">
      <rect x="0"  y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <rect x="70" y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <text class="fastq" x="30"  y="14">R1</text><text class="fastq" x="30"  y="26">fastq.gz</text>
      <text class="fastq" x="100" y="14">R2</text><text class="fastq" x="100" y="26">fastq.gz</text>
    </g>
    <line x1="100" y1="52" x2="100" y2="78" stroke="#333" marker-end="url(#arrow)"/>

    <rect x="5" y="82" width="190" height="220" rx="6" fill="none" stroke="#1b5e91" stroke-dasharray="4,3"/>
    <text class="emph" x="100" y="100" text-anchor="middle">dropEst</text>

    <g transform="translate(20,115)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">droptag</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,152)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Extract barcode, UMI, RNA read</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,189)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">Align reads by <tspan class="emph">STAR</tspan></text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,226)">
      <rect width="160" height="24" rx="3" fill="#fcecec" stroke="#a33"/>
      <text class="step" x="80" y="16">Bam files</text>
      <line x1="80" y1="24" x2="80" y2="38" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,263)">
      <rect width="160" height="24" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="16">dropEst</text>
    </g>

    <text class="step" x="100" y="323">dropReport</text>
    <line x1="100" y1="333" x2="100" y2="398" stroke="#333" marker-end="url(#arrow)"/>
    <rect x="65" y="400" width="70" height="50" fill="#4a7fb8" stroke="#1b5e91"/>
    <text class="matrix" x="100" y="420">cell × gene</text>
    <text class="matrix" x="100" y="435">count matrix</text>
  </g>

  <!-- Column 3: Bulk / SMART -->
  <g transform="translate(680,90)">
    <text class="colTitle" x="0" y="0">▸ Bulk / SMART-based</text>
    <g transform="translate(30,15)">
      <rect x="0"  y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <rect x="70" y="0" width="60" height="32" rx="4" fill="#e4c7e0" stroke="#7a3670"/>
      <text class="fastq" x="30"  y="14">R1</text><text class="fastq" x="30"  y="26">fastq.gz</text>
      <text class="fastq" x="100" y="14">R2</text><text class="fastq" x="100" y="26">fastq.gz</text>
    </g>
    <line x1="100" y1="52" x2="100" y2="78" stroke="#333" marker-end="url(#arrow)"/>

    <rect x="5" y="82" width="190" height="260" rx="6" fill="none" stroke="#1b5e91" stroke-dasharray="4,3"/>
    <text class="emph" x="100" y="100" text-anchor="middle">STAR+RSEM</text>
    <text class="step" x="165" y="100">Reads QC</text>

    <g transform="translate(20,115)">
      <rect width="160" height="22" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="15">fastp</text>
      <line x1="80" y1="22" x2="80" y2="34" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,148)">
      <rect width="160" height="22" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="15">Clean .fastq.gz</text>
      <line x1="80" y1="22" x2="80" y2="34" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,181)">
      <rect width="160" height="22" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="15">Hisat2</text>
      <line x1="80" y1="22" x2="80" y2="34" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,214)">
      <rect width="160" height="22" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="15">RseQC</text>
      <text class="step" x="165" y="14" fill="#c0392b">Strand-specific</text>
      <line x1="80" y1="22" x2="80" y2="34" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,247)">
      <rect width="160" height="22" rx="3" fill="#fcecec" stroke="#a33"/>
      <text class="step" x="80" y="15">Bam files</text>
      <line x1="80" y1="22" x2="80" y2="34" stroke="#333" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(20,280)">
      <rect width="160" height="22" rx="3" fill="#e7edf5" stroke="#1b5e91"/>
      <text class="step" x="80" y="15">RSEM</text>
    </g>

    <line x1="70"  y1="342" x2="70"  y2="398" stroke="#333" marker-end="url(#arrow)"/>
    <line x1="130" y1="342" x2="130" y2="398" stroke="#333" marker-end="url(#arrow)"/>
    <rect x="35" y="400" width="70" height="50" fill="#4a7fb8" stroke="#1b5e91"/>
    <text class="matrix" x="70" y="420">cell × gene</text>
    <text class="matrix" x="70" y="435">count matrix</text>
    <rect x="115" y="400" width="70" height="50" fill="#4a7fb8" stroke="#1b5e91"/>
    <text class="matrix" x="150" y="420">cell × trans</text>
    <text class="matrix" x="150" y="435">count matrix</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
