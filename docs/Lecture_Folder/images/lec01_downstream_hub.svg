<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .nodeTitle { font-size: 13px; font-weight: 600; fill: #fff; text-anchor: middle; }
    .nodeSub { font-size: 11px; fill: #fff; text-anchor: middle; }
    .center { font-size: 14px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .centerSub { font-size: 11px; fill: #fff; text-anchor: middle; }
    .arrow { stroke: #888; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="480" y="30">Downstream analyses after clustering &amp; annotation</text>

  <!-- central hub: annotated UMAP -->
  <g transform="translate(380,210)">
    <circle cx="100" cy="60" r="90" fill="#444"/>
    <text class="center" x="100" y="52">Annotated</text>
    <text class="center" x="100" y="70">cells + UMAP</text>
    <text class="centerSub" x="100" y="90">(Seurat object /</text>
    <text class="centerSub" x="100" y="104">AnnData)</text>
  </g>

  <!-- 6 satellite nodes around the hub -->
  <!-- DE conditions (top-left) -->
  <g transform="translate(100,90)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#2c7fb8"/>
    <text class="nodeTitle" x="100" y="22">DE between conditions</text>
    <text class="nodeSub" x="100" y="40">pseudobulk + DESeq2 · MAST</text>
    <text class="nodeSub" x="100" y="55">FindMarkers · rank_genes_groups</text>
  </g>
  <path class="arrow" d="M 300 130 L 460 230"/>

  <!-- Enrichment (top-right) -->
  <g transform="translate(660,90)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#e66101"/>
    <text class="nodeTitle" x="110" y="22">Pathway / enrichment</text>
    <text class="nodeSub" x="110" y="40">fgsea · clusterProfiler · enrichR</text>
    <text class="nodeSub" x="110" y="55">decoupleR · GSVA · AUCell</text>
  </g>
  <path class="arrow" d="M 660 130 L 520 230"/>

  <!-- WGCNA (right) -->
  <g transform="translate(730,230)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#1b9e77"/>
    <text class="nodeTitle" x="100" y="22">Co-expression modules</text>
    <text class="nodeSub" x="100" y="40">hdWGCNA (single-cell)</text>
    <text class="nodeSub" x="100" y="55">WGCNA on pseudobulk</text>
  </g>
  <path class="arrow" d="M 730 260 L 580 280"/>

  <!-- Trajectory (bottom-right) -->
  <g transform="translate(660,380)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#756bb1"/>
    <text class="nodeTitle" x="110" y="22">Trajectory / pseudotime</text>
    <text class="nodeSub" x="110" y="40">Monocle3 · Slingshot</text>
    <text class="nodeSub" x="110" y="55">PAGA · scVelo (RNA velocity)</text>
  </g>
  <path class="arrow" d="M 660 400 L 540 340"/>

  <!-- Cell-cell communication (bottom-left) -->
  <g transform="translate(100,380)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#d95f02"/>
    <text class="nodeTitle" x="110" y="22">Cell–cell communication</text>
    <text class="nodeSub" x="110" y="40">CellChat · LIANA</text>
    <text class="nodeSub" x="110" y="55">NicheNet · CellPhoneDB</text>
  </g>
  <path class="arrow" d="M 320 400 L 450 340"/>

  <!-- Pseudobulk (left) -->
  <g transform="translate(30,230)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#ca0020"/>
    <text class="nodeTitle" x="100" y="22">Pseudobulk analysis</text>
    <text class="nodeSub" x="100" y="40">aggregate → DESeq2/edgeR</text>
    <text class="nodeSub" x="100" y="55">sample-level replication</text>
  </g>
  <path class="arrow" d="M 230 260 L 380 280"/>
</svg>
