<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" font-family="Helvetica, Arial, sans-serif">
  <style>
    .lbl { font-size: 12px; fill: #222; text-anchor: middle; }
    .title { font-size: 13px; font-weight: 700; fill: #1f4e79; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Tube 1: 10x Barcoded Gel Beads -->
  <g transform="translate(40,60)">
    <path d="M10,0 H70 V130 Q40,150 10,130 Z" fill="#fff" stroke="#333"/>
    <!-- colored dots -->
    <circle cx="25" cy="30" r="3" fill="#e74c3c"/>
    <circle cx="45" cy="40" r="3" fill="#2ecc71"/>
    <circle cx="30" cy="55" r="3" fill="#f1c40f"/>
    <circle cx="50" cy="70" r="3" fill="#3498db"/>
    <circle cx="25" cy="85" r="3" fill="#9b59b6"/>
    <circle cx="45" cy="100" r="3" fill="#e67e22"/>
    <circle cx="30" cy="115" r="3" fill="#1abc9c"/>
    <text class="lbl" x="40" y="180">10x</text>
    <text class="lbl" x="40" y="198">Barcoded</text>
    <text class="lbl" x="40" y="214">Gel Beads</text>
  </g>
  <line x1="130" y1="120" x2="175" y2="120" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Microfluidic chip -->
  <g transform="translate(185,60)">
    <rect x="0" y="60" width="120" height="70" fill="#eaeef3" stroke="#333"/>
    <!-- comb lines (cells) -->
    <line x1="10" y1="60" x2="10" y2="130" stroke="#333"/>
    <line x1="25" y1="60" x2="25" y2="130" stroke="#333"/>
    <line x1="40" y1="60" x2="40" y2="130" stroke="#333"/>
    <line x1="55" y1="60" x2="55" y2="130" stroke="#333"/>
    <!-- dots flowing -->
    <circle cx="70" cy="75" r="3" fill="#e74c3c"/>
    <circle cx="80" cy="95" r="3" fill="#2ecc71"/>
    <circle cx="90" cy="100" r="3" fill="#3498db"/>
    <circle cx="100" cy="115" r="3" fill="#f1c40f"/>
    <!-- oil channel -->
    <line x1="120" y1="60" x2="120" y2="130" stroke="#9bc0eb" stroke-width="4"/>
    <text class="lbl" x="60" y="230">Cells or nuclei</text>
    <text class="lbl" x="60" y="246">+ enzyme</text>
    <text class="lbl" x="140" y="230">Oil</text>
  </g>

  <!-- Merge into GEMs circle -->
  <g transform="translate(320,100)">
    <circle cx="0" cy="30" r="35" fill="#f5f9ff" stroke="#1b5e91"/>
    <circle cx="-10" cy="25" r="3" fill="#e74c3c"/>
    <circle cx="8"   cy="20" r="3" fill="#2ecc71"/>
    <circle cx="15"  cy="40" r="3" fill="#3498db"/>
    <circle cx="-5"  cy="45" r="3" fill="#f1c40f"/>
    <circle cx="10"  cy="10" r="3" fill="#9b59b6"/>
    <circle cx="-15" cy="8"  r="3" fill="#e67e22"/>
    <text class="lbl" x="0" y="85">Single Cell</text>
    <text class="lbl" x="0" y="101">GEMs</text>
  </g>
  <line x1="360" y1="130" x2="410" y2="130" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <text class="lbl" x="385" y="118">Collect</text>

  <!-- Tube: Single Cell GEMs -->
  <g transform="translate(420,60)">
    <!-- small collection tube -->
    <path d="M20,0 H60 V50 Q40,60 20,50 Z" fill="#fff" stroke="#333"/>
    <circle cx="30" cy="20" r="2" fill="#e74c3c"/>
    <circle cx="45" cy="25" r="2" fill="#2ecc71"/>
    <circle cx="30" cy="38" r="2" fill="#3498db"/>
    <circle cx="45" cy="42" r="2" fill="#f1c40f"/>
    <!-- flask below -->
    <path d="M10,70 L30,70 L25,95 Q25,130 60,130 Q75,130 75,95 L70,70 Z" fill="#fff" stroke="#333"/>
    <circle cx="35" cy="105" r="3" fill="#e74c3c"/>
    <circle cx="55" cy="110" r="3" fill="#2ecc71"/>
    <circle cx="40" cy="118" r="3" fill="#3498db"/>
    <circle cx="60" cy="122" r="3" fill="#f1c40f"/>
    <circle cx="30" cy="115" r="3" fill="#9b59b6"/>
    <text class="lbl" x="50" y="170">Single Cell</text>
    <text class="lbl" x="50" y="186">GEMs</text>
  </g>
  <line x1="510" y1="120" x2="560" y2="120" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <text class="lbl" x="535" y="108">Barcode</text>

  <!-- Tube barcoded DNA fragments -->
  <g transform="translate(570,60)">
    <path d="M20,0 H60 V50 Q40,60 20,50 Z" fill="#fff" stroke="#333"/>
    <path d="M30,10 l5,5 l-3,5 l5,5" stroke="#e74c3c" stroke-width="1.5" fill="none"/>
    <path d="M45,15 l5,-3 l-3,6" stroke="#3498db" stroke-width="1.5" fill="none"/>
    <!-- flask with colored dashes -->
    <path d="M10,70 L30,70 L25,95 Q25,130 60,130 Q75,130 75,95 L70,70 Z" fill="#fff" stroke="#333"/>
    <line x1="30" y1="110" x2="38" y2="110" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="45" y1="104" x2="53" y2="104" stroke="#3498db" stroke-width="2.5"/>
    <line x1="35" y1="120" x2="43" y2="120" stroke="#f1c40f" stroke-width="2.5"/>
    <line x1="50" y1="120" x2="58" y2="120" stroke="#2ecc71" stroke-width="2.5"/>
    <line x1="38" y1="95"  x2="46" y2="95"  stroke="#9b59b6" stroke-width="2.5"/>
    <text class="lbl" x="50" y="170">10x barcoded</text>
    <text class="lbl" x="50" y="186">DNA fragments</text>
  </g>
  <line x1="660" y1="120" x2="720" y2="120" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <text class="lbl" x="690" y="108">Pool, remove oil</text>

  <!-- Flask with pool -->
  <g transform="translate(740,60)">
    <path d="M10,30 L30,30 L25,55 Q25,130 100,130 Q135,130 135,55 L125,30 Z" fill="#fff" stroke="#333"/>
    <line x1="35" y1="100" x2="45" y2="100" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="55" y1="105" x2="65" y2="105" stroke="#3498db" stroke-width="2.5"/>
    <line x1="75" y1="98"  x2="85" y2="98"  stroke="#f1c40f" stroke-width="2.5"/>
    <line x1="95" y1="108" x2="105" y2="108" stroke="#2ecc71" stroke-width="2.5"/>
    <line x1="60" y1="118" x2="70" y2="118" stroke="#9b59b6" stroke-width="2.5"/>
    <line x1="90" y1="120" x2="100" y2="120" stroke="#e67e22" stroke-width="2.5"/>
    <text class="lbl" x="72" y="170">10x barcoded</text>
    <text class="lbl" x="72" y="186">DNA fragments</text>
  </g>
  <line x1="900" y1="120" x2="970" y2="120" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Final library tube -->
  <g transform="translate(985,60)">
    <path d="M40,0 H90 V140 Q65,155 40,140 Z" fill="#fff" stroke="#333"/>
    <!-- colored dashes -->
    <line x1="50" y1="30"  x2="60" y2="30"  stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="65" y1="45"  x2="75" y2="45"  stroke="#3498db" stroke-width="2.5"/>
    <line x1="50" y1="60"  x2="60" y2="60"  stroke="#f1c40f" stroke-width="2.5"/>
    <line x1="65" y1="75"  x2="75" y2="75"  stroke="#2ecc71" stroke-width="2.5"/>
    <line x1="50" y1="90"  x2="60" y2="90"  stroke="#9b59b6" stroke-width="2.5"/>
    <line x1="65" y1="105" x2="75" y2="105" stroke="#e67e22" stroke-width="2.5"/>
    <line x1="55" y1="120" x2="65" y2="120" stroke="#1abc9c" stroke-width="2.5"/>
    <text class="lbl" x="65" y="180">Sequencing-ready</text>
    <text class="lbl" x="65" y="196">libraries</text>
  </g>
</svg>
