    <line x1="227" y1="270" x2="227" y2="275" stroke="#000" stroke-width="1"/>
    <text x="227" y="288" class="tick-label">12</text>
    <line x1="260" y1="270" x2="260" y2="275" stroke="#000" stroke-width="1"/>
    <text x="260" y="288" class="tick-label">14</text>
    <line x1="293" y1="270" x2="293" y2="275" stroke="#000" stroke-width="1"/>
    <text x="293" y="288" class="tick-label">16</text>
    <line x1="327" y1="270" x2="327" y2="275" stroke="#000" stroke-width="1"/>
    <text x="327" y="288" class="tick-label">18</text>
    <!-- y-axis ticks: 4,6,8,10,12 -->
    <line x1="50" y1="222" x2="55" y2="222" stroke="#000" stroke-width="1"/>
    <text x="48" y="226" class="tick-label-y">4</text>
    <line x1="50" y1="183" x2="55" y2="183" stroke="#000" stroke-width="1"/>
    <text x="48" y="187" class="tick-label-y">6</text>
    <line x1="50" y1="145" x2="55" y2="145" stroke="#000" stroke-width="1"/>
    <text x="48" y="149" class="tick-label-y">8</text>
    <line x1="50" y1="106" x2="55" y2="106" stroke="#000" stroke-width="1"/>
