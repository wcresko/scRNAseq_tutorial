    <text x="22" y="155" class="axis-label" transform="rotate(-90, 22, 155)">y<tspan baseline-shift="sub" font-size="12">1</tspan></text>
    <!-- Regression line: y=3+0.5x, x=2->y=4, x=19->y=12.5 -->
    <line x1="60" y1="222" x2="348" y2="50" class="reg-line"/>
    <!-- Dataset I points: (10,8.04),(8,6.95),(13,7.58),(9,8.81),(11,8.33),(14,9.96),(6,7.24),(4,4.26),(12,10.84),(7,4.82),(5,5.68) -->
    <circle cx="193" cy="137" r="6" class="dot"/>  <!-- 10,8.04 -->
    <circle cx="160" cy="159" r="6" class="dot"/>  <!-- 8,6.95 -->
    <circle cx="243" cy="146" r="6" class="dot"/>  <!-- 13,7.58 -->
    <circle cx="177" cy="122" r="6" class="dot"/>  <!-- 9,8.81 -->
    <circle cx="210" cy="131" r="6" class="dot"/>  <!-- 11,8.33 -->
    <circle cx="260" cy="100" r="6" class="dot"/>  <!-- 14,9.96 -->
    <circle cx="127" cy="164" r="6" class="dot"/>  <!-- 6,7.24 -->
    <circle cx="93" cy="227" r="6" class="dot"/>   <!-- 4,4.26 -->
    <circle cx="227" cy="83" r="6" class="dot"/>   <!-- 12,10.84 -->
    <circle cx="143" cy="211" r="6" class="dot"/>  <!-- 7,4.82 -->
    <circle cx="110" cy="194" r="6" class="dot"/>  <!-- 5,5.68 -->
  </g>

