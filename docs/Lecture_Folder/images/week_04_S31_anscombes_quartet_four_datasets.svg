<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Arial, Helvetica, sans-serif">
  <style>
    .axis-label { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .tick-label { font-size: 11px; text-anchor: middle; }
    .tick-label-y { font-size: 11px; text-anchor: end; }
    .dot { fill: #E8860C; stroke: #C06000; stroke-width: 0.5; }
    .reg-line { stroke: #3366CC; stroke-width: 1.5; fill: none; }
    .axis-line { stroke: #000; stroke-width: 1.5; fill: none; }
  </style>

  <defs>
    <!-- Common axis template: x from 2-18, y from 2-14 -->
    <!-- Plot area: 300x250, origin at (60,30), x-axis at y=280, y-axis at x=60 -->
  </defs>

  <!-- Helper: each panel maps data x=[2,20] to px=[60,360], data y=[2,14] to py=[260,30] -->
  <!-- px = 60 + (x-2)*16.67,  py = 260 - (y-2)*19.17 -->
  <!-- Regression line: y = 3.00 + 0.50*x => at x=2: y=4, at x=18: y=12 -->
  <!-- line px: x=2 -> 60, x=18 -> 326.7; py: y=4 -> 221.7, y=12 -> 68.3 -->

  <!-- Panel I (top-left) -->
  <g transform="translate(20, 10)">
    <rect x="55" y="25" width="310" height="245" fill="none" stroke="#000" stroke-width="1.5"/>
    <!-- x-axis ticks: 4,6,8,10,12,14,16,18 -->
    <line x1="93" y1="270" x2="93" y2="275" stroke="#000" stroke-width="1"/>
    <text x="93" y="288" class="tick-label">4</text>
    <line x1="127" y1="270" x2="127" y2="275" stroke="#000" stroke-width="1"/>
    <text x="127" y="288" class="tick-label">6</text>
