    <circle cx="227" cy="115" r="6" class="dot"/>  <!-- 12,9.13 -->
    <circle cx="143" cy="160" r="6" class="dot"/>  <!-- 7,7.26 -->
    <circle cx="110" cy="207" r="6" class="dot"/>  <!-- 5,4.74 -->
