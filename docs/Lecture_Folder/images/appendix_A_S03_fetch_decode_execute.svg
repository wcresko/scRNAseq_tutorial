<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Fetch-Decode-Execute Cycle</text>

  <!-- Fetch -->
  <rect x="30" y="50" width="130" height="45" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="95" y="78" text-anchor="middle" fill="#000">Fetch Instruction</text>

  <!-- Arrow -->
  <line x1="160" y1="72" x2="195" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decode -->
  <rect x="200" y="50" width="140" height="45" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="270" y="78" text-anchor="middle" fill="#000">Decode Instruction</text>

  <!-- Arrow -->
  <line x1="340" y1="72" x2="375" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Execute -->
  <rect x="380" y="50" width="140" height="45" rx="8" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" fill="#000">Execute Instruction</text>

  <!-- Arrow -->
  <line x1="520" y1="72" x2="555" y2="72" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Store -->
  <rect x="560" y="50" width="120" height="45" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="620" y="78" text-anchor="middle" fill="#000">Store Results</text>

  <!-- Return arrow (curved path underneath) -->
  <path d="M 620 95 L 620 130 L 95 130 L 95 95" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
</svg>
