<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2c3e50"/>
    </marker>
    <marker id="arr2" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#27ae60"/>
    </marker>
    <marker id="arr3" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#8e44ad"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">The Logic of Bayesian Inference</text>

  <!-- ══ Prior box ══ -->
  <rect x="30" y="50" width="200" height="130" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="130" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Prior  P(θ)</text>
  <line x1="46" y1="82" x2="214" y2="82" stroke="#1976d2" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="130" y="100" text-anchor="middle" font-size="11" fill="#333">What we believe about</text>
  <text x="130" y="116" text-anchor="middle" font-size="11" fill="#333">the parameter</text>
  <text x="130" y="132" text-anchor="middle" font-size="11" fill="#333">before seeing data</text>
  <text x="130" y="154" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">e.g. β ~ Normal(0, 5)</text>
  <text x="130" y="168" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">θ ~ Beta(2, 2)</text>

  <!-- ══ Data / Likelihood box ══ -->
  <rect x="350" y="50" width="200" height="130" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="450" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Likelihood  P(data | θ)</text>
  <line x1="366" y1="82" x2="534" y2="82" stroke="#f57c00" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#333">How probable is this</text>
  <text x="450" y="116" text-anchor="middle" font-size="11" fill="#333">data if θ is true?</text>
  <text x="450" y="132" text-anchor="middle" font-size="11" fill="#333">Comes from your</text>
  <text x="450" y="148" text-anchor="middle" font-size="11" fill="#333">statistical model</text>
  <text x="450" y="168" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">e.g. y ~ Binomial(n, θ)</text>

  <!-- ══ Posterior box ══ -->
  <rect x="670" y="50" width="200" height="130" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="770" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Posterior  P(θ | data)</text>
  <line x1="686" y1="82" x2="854" y2="82" stroke="#4caf50" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="770" y="100" text-anchor="middle" font-size="11" fill="#333">Updated belief about</text>
  <text x="770" y="116" text-anchor="middle" font-size="11" fill="#333">θ after seeing data</text>
  <text x="770" y="132" text-anchor="middle" font-size="11" fill="#333">Compromise between</text>
  <text x="770" y="148" text-anchor="middle" font-size="11" fill="#333">prior and data</text>
  <text x="770" y="168" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">e.g. θ | data ~ Beta(9, 5)</text>

  <!-- Arrow Prior → Posterior (top) -->
  <line x1="232" y1="115" x2="348" y2="115" stroke="#2c3e50" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="552" y1="115" x2="668" y2="115" stroke="#2c3e50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bayes theorem box (centre) -->
  <rect x="280" y="228" width="340" height="90" rx="10" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Bayes' Theorem</text>
  <text x="450" y="276" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">P(θ | data) ∝ P(data | θ) × P(θ)</text>
  <text x="450" y="304" text-anchor="middle" font-size="11" fill="#555">Posterior ∝ Likelihood × Prior</text>

  <!-- Arrows down to Bayes box -->
  <line x1="130" y1="182" x2="380" y2="228" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <line x1="450" y1="182" x2="450" y2="226" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <line x1="770" y1="182" x2="520" y2="228" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>

  <!-- Updating arrow: posterior becomes new prior -->
  <path d="M 770 182 Q 880 330 770 378" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
  <text x="890" y="270" text-anchor="middle" font-size="10" fill="#27ae60" transform="rotate(90,890,270)">New data arrives</text>

  <!-- "Posterior becomes prior" annotation -->
  <rect x="600" y="360" width="280" height="54" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Sequential Updating</text>
  <text x="740" y="400" text-anchor="middle" font-size="10" fill="#333">Today's posterior becomes</text>
  <text x="740" y="414" text-anchor="middle" font-size="10" fill="#333">tomorrow's prior</text>

  <!-- Three outputs from posterior -->
  <rect x="30" y="360" width="520" height="100" rx="8" fill="#fafafa" stroke="#dee2e6" stroke-width="1"/>
  <text x="290" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">What we can do with the posterior</text>

  <!-- Three output boxes -->
  <rect x="42" y="392" width="152" height="56" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="118" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Point Estimate</text>
  <text x="118" y="428" text-anchor="middle" font-size="10" fill="#333">Posterior mean,</text>
  <text x="118" y="442" text-anchor="middle" font-size="10" fill="#333">median, or mode</text>

  <rect x="204" y="392" width="152" height="56" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="280" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Credible Interval</text>
  <text x="280" y="428" text-anchor="middle" font-size="10" fill="#333">95% of probability</text>
  <text x="280" y="442" text-anchor="middle" font-size="10" fill="#333">mass lies within</text>

  <rect x="366" y="392" width="172" height="56" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="452" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Probability Statements</text>
  <text x="452" y="428" text-anchor="middle" font-size="10" fill="#333">P(θ &gt; 0) = 0.97</text>
  <text x="452" y="442" text-anchor="middle" font-size="10" fill="#333">Direct interpretation</text>
</svg>
