<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'Courier New', monospace; font-size: 16px; fill: #222; }
    .label { font-size: 18px; font-weight: bold; }
    circle { stroke: #333; stroke-width: 2; }
    .filled { fill: #c0c0c0; }
    .empty { fill: #fff; }
  </style>
  <defs>
    <clipPath id="clipX1"><circle cx="60" cy="50" r="35"/></clipPath>
    <clipPath id="clipY1"><circle cx="90" cy="50" r="35"/></clipPath>
  </defs>

  <!-- Row 1 -->
  <!-- y & !x: right circle only minus intersection -->
  <g transform="translate(20, 20)">
    <circle cx="60" cy="50" r="35" class="empty"/>
    <circle cx="90" cy="50" r="35" class="filled"/>
    <circle cx="60" cy="50" r="35" class="empty"/>
    <!-- Re-cover the intersection -->
    <clipPath id="c1"><circle cx="60" cy="50" r="35"/></clipPath>
    <circle cx="90" cy="50" r="35" fill="#fff" clip-path="url(#c1)"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">y &amp; !x</text>
  </g>

  <!-- x: left circle -->
  <g transform="translate(270, 20)">
    <circle cx="60" cy="50" r="35" class="filled"/>
    <circle cx="90" cy="50" r="35" class="empty"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">x</text>
  </g>

  <!-- x | y: both circles -->
  <g transform="translate(520, 20)">
    <circle cx="60" cy="50" r="35" class="filled"/>
    <circle cx="90" cy="50" r="35" class="filled"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">x | y</text>
  </g>

  <!-- Row 2 -->
  <!-- x & y: intersection only -->
  <g transform="translate(20, 180)">
    <circle cx="60" cy="50" r="35" class="empty"/>
    <circle cx="90" cy="50" r="35" class="empty"/>
    <!-- Draw intersection -->
    <defs>
      <clipPath id="c2a"><circle cx="60" cy="230" r="35"/></clipPath>
    </defs>
    <path d="M75,19 A35,35 0 0,0 75,81 A35,35 0 0,0 75,19" fill="#c0c0c0" stroke="none"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">x &amp; y</text>
  </g>

  <!-- xor(x,y): both minus intersection -->
  <g transform="translate(270, 180)">
    <circle cx="60" cy="50" r="35" class="filled"/>
    <circle cx="90" cy="50" r="35" class="filled"/>
    <!-- White out intersection -->
    <path d="M75,19 A35,35 0 0,0 75,81 A35,35 0 0,0 75,19" fill="#fff" stroke="none"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">xor(x, y)</text>
  </g>

  <!-- Row 3 -->
  <!-- x & !y: left circle minus intersection -->
  <g transform="translate(20, 340)">
    <circle cx="60" cy="50" r="35" class="filled"/>
    <circle cx="90" cy="50" r="35" class="empty"/>
    <!-- White out the intersection part of left circle -->
    <path d="M75,19 A35,35 0 0,0 75,81 A35,35 0 0,0 75,19" fill="#fff" stroke="none"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">x &amp; !y</text>
  </g>

  <!-- y: right circle -->
  <g transform="translate(270, 340)">
    <circle cx="60" cy="50" r="35" class="empty"/>
    <circle cx="90" cy="50" r="35" class="filled"/>
    <circle cx="60" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="50" r="35" fill="none" stroke="#333" stroke-width="2"/>
    <text x="120" y="55" class="label">y</text>
  </g>
</svg>