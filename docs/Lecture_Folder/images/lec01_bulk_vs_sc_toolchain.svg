<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .root { font-size: 13px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .branch { font-size: 13px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .node { font-size: 12px; fill: #222; text-anchor: middle; }
    .nodeHdr { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="550" y="30">One data input, two complementary analysis chains</text>

  <!-- Root: data input -->
  <g transform="translate(430,60)">
    <rect x="0" y="0" width="240" height="60" rx="10" fill="#b35a6d"/>
    <text class="root" x="120" y="28">Data input</text>
    <text class="root" x="120" y="46" font-size="11" font-weight="400">(expression profile + metadata)</text>
  </g>

  <!-- Branch labels -->
  <text class="label" x="220" y="155" fill="#2c7fb8">Bulk RNA-seq path</text>
  <text class="label" x="880" y="155" fill="#e66101">scRNA-seq path</text>

  <!-- Branching arrows -->
  <path class="arrow" d="M 500 120 C 420 140 320 140 240 170" marker-end="url(#aht)"/>
  <path class="arrow" d="M 600 120 C 680 140 780 140 860 170" marker-end="url(#aht)"/>

  <!-- ===== Left branch: Bulk ===== -->
  <!-- Two parallel analysis boxes: DE and WGCNA -->
  <g transform="translate(60,175)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#2c7fb8"/>
    <text class="branch" x="80" y="25">Differential Gene</text>
    <text class="branch" x="80" y="42">Expression Analysis</text>
  </g>
  <g transform="translate(240,175)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#2c7fb8"/>
    <text class="branch" x="80" y="25">Weighted Gene</text>
    <text class="branch" x="80" y="42">Co-expression (WGCNA)</text>
  </g>

  <!-- Converge on marker genes -->
  <path class="arrow" d="M 140 230 C 150 260 220 260 230 285" marker-end="url(#aht)"/>
  <path class="arrow" d="M 320 230 C 310 260 240 260 230 285" marker-end="url(#aht)"/>

  <g transform="translate(50,285)">
    <rect x="0" y="0" width="360" height="50" rx="8" fill="#1b9e77"/>
    <text class="branch" x="180" y="22">Find marker genes related to</text>
    <text class="branch" x="180" y="39">biological conditions</text>
  </g>

  <!-- Two downstream outputs -->
  <path class="arrow" d="M 140 335 L 140 375" marker-end="url(#aht)"/>
  <path class="arrow" d="M 320 335 L 320 375" marker-end="url(#aht)"/>

  <g transform="translate(60,375)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#b6a6db"/>
    <text class="nodeHdr" x="80" y="25">Functional</text>
    <text class="nodeHdr" x="80" y="42">enrichment analysis</text>
  </g>
  <g transform="translate(240,375)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#b6a6db"/>
    <text class="nodeHdr" x="80" y="25">Co-expression</text>
    <text class="nodeHdr" x="80" y="42">networks</text>
  </g>

  <!-- Bulk tool hints -->
  <text class="node" x="140" y="450" fill="#555">DESeq2 · edgeR · limma</text>
  <text class="node" x="320" y="450" fill="#555">WGCNA · hdWGCNA</text>
  <text class="node" x="230" y="470" fill="#555">clusterProfiler · fgsea · enrichR · decoupleR</text>

  <!-- ===== Right branch: scRNA-seq ===== -->
  <g transform="translate(780,175)">
    <rect x="0" y="0" width="200" height="55" rx="8" fill="#e66101"/>
    <text class="branch" x="100" y="25">Cell clustering &amp;</text>
    <text class="branch" x="100" y="42">cell type annotation</text>
  </g>
  <path class="arrow" d="M 880 230 L 880 285" marker-end="url(#aht)"/>

  <g transform="translate(760,285)">
    <rect x="0" y="0" width="240" height="50" rx="8" fill="#1b9e77"/>
    <text class="branch" x="120" y="22">Find marker genes related to</text>
    <text class="branch" x="120" y="39">each cluster</text>
  </g>
  <path class="arrow" d="M 880 335 L 880 375" marker-end="url(#aht)"/>

  <g transform="translate(780,375)">
    <rect x="0" y="0" width="200" height="55" rx="8" fill="#b6a6db"/>
    <text class="nodeHdr" x="100" y="25">Functional</text>
    <text class="nodeHdr" x="100" y="42">enrichment analysis</text>
  </g>

  <!-- sc tool hints -->
  <text class="node" x="880" y="450" fill="#555">Seurat · scanpy · SingleR · Azimuth</text>
  <text class="node" x="880" y="470" fill="#555">FindAllMarkers / rank_genes_groups</text>
  <text class="node" x="880" y="490" fill="#555">clusterProfiler · AUCell · decoupleR</text>

  <defs>
    <marker id="aht" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
