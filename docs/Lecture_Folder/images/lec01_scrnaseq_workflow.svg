<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #222; text-anchor: middle; }
    .stage { font-size: 14px; font-weight: 600; fill: #fff; text-anchor: middle; }
    .tool  { font-size: 11px; fill: #333; text-anchor: middle; }
    .lane  { font-size: 13px; font-weight: 600; fill: #555; text-anchor: start; }
  </style>

  <text class="title" x="550" y="32">scRNA-seq Analysis Workflow</text>

  <!-- Lane labels -->
  <text class="lane" x="20"  y="90">Wet lab</text>
  <text class="lane" x="20"  y="230">Preprocessing</text>
  <text class="lane" x="20"  y="370">Core analysis</text>
  <text class="lane" x="20"  y="510">Downstream</text>

  <!-- Row 1: Wet lab -->
  <g>
    <rect x="140" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="220" y="95">Sample &amp; dissociation</text>
  </g>
  <g>
    <rect x="340" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="420" y="88">Library prep</text>
    <text class="stage" x="420" y="105" font-size="11" font-weight="400">(barcodes + UMIs)</text>
  </g>
  <g>
    <rect x="540" y="65" width="160" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="620" y="95">Sequencing</text>
  </g>
  <g>
    <rect x="740" y="65" width="200" height="50" rx="8" fill="#2c7fb8"/>
    <text class="stage" x="840" y="95">Count matrix (cells × genes)</text>
  </g>

  <text class="tool" x="420" y="135">Smart-seq2/3 · 10x · Parse · inDrops</text>
  <text class="tool" x="840" y="135">Cell Ranger · STARsolo · alevin-fry · kb-python</text>

  <!-- Row 2: Preprocessing -->
  <g>
    <rect x="140" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="220" y="230">QC &amp; filtering</text>
  </g>
  <g>
    <rect x="340" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="420" y="230">Doublet removal</text>
  </g>
  <g>
    <rect x="540" y="200" width="160" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="620" y="230">Normalization</text>
  </g>
  <g>
    <rect x="740" y="200" width="200" height="50" rx="8" fill="#1b9e77"/>
    <text class="stage" x="840" y="230">Feature selection (HVGs)</text>
  </g>

  <text class="tool" x="220" y="268">nFeature · nCount · % mito</text>
  <text class="tool" x="420" y="268">scDblFinder · DoubletFinder · Scrublet</text>
  <text class="tool" x="620" y="268">LogNormalize · SCTransform · scran</text>
  <text class="tool" x="840" y="268">FindVariableFeatures · highly_variable_genes</text>

  <!-- Row 3: Core analysis -->
  <g>
    <rect x="140" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="220" y="365">PCA</text>
  </g>
  <g>
    <rect x="340" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="420" y="358">Integration</text>
    <text class="stage" x="420" y="375" font-size="11" font-weight="400">/ batch correction</text>
  </g>
  <g>
    <rect x="540" y="335" width="160" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="620" y="358">Neighbors +</text>
    <text class="stage" x="620" y="375" font-size="11" font-weight="400">clustering</text>
  </g>
  <g>
    <rect x="740" y="335" width="200" height="50" rx="8" fill="#e66101"/>
    <text class="stage" x="840" y="365">UMAP / t-SNE embedding</text>
  </g>

  <text class="tool" x="220" y="403">RunPCA · sc.tl.pca</text>
  <text class="tool" x="420" y="403">Harmony · CCA/RPCA · scVI · BBKNN</text>
  <text class="tool" x="620" y="403">SNN · Leiden · Louvain</text>
  <text class="tool" x="840" y="403">RunUMAP · sc.tl.umap</text>

  <!-- Row 4: Downstream -->
  <g>
    <rect x="140" y="470" width="160" height="50" rx="8" fill="#756bb1"/>
    <text class="stage" x="220" y="500">Marker genes</text>
  </g>
  <g>
    <rect x="340" y="470" width="160" height="50" rx="8" fill="#756bb1"/>
    <text class="stage" x="420" y="493">Cell type</text>
    <text class="stage" x="420" y="510" font-size="11" font-weight="400">annotation</text>
  </g>
  <g>
    <rect x="540" y="470" width="160" height="50" rx="8" fill="#756bb1"/>
    <text class="stage" x="620" y="493">DE between</text>
    <text class="stage" x="620" y="510" font-size="11" font-weight="400">conditions</text>
  </g>
  <g>
    <rect x="740" y="470" width="200" height="50" rx="8" fill="#756bb1"/>
    <text class="stage" x="840" y="493">Enrichment / WGCNA /</text>
    <text class="stage" x="840" y="510" font-size="11" font-weight="400">trajectory / pseudobulk</text>
  </g>

  <text class="tool" x="220" y="538">FindAllMarkers · rank_genes_groups</text>
  <text class="tool" x="420" y="538">manual · SingleR · Azimuth · CellTypist</text>
  <text class="tool" x="620" y="538">pseudobulk + DESeq2 · MAST</text>
  <text class="tool" x="840" y="538">fgsea · clusterProfiler · hdWGCNA · Monocle3</text>

  <!-- Connecting arrows (row-to-row, on the right edge) -->
  <path d="M 1020 90 C 1070 90 1070 225 1020 225" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M 1020 225 C 1070 225 1070 360 1020 360" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M 1020 360 C 1070 360 1070 495 1020 495" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
</svg>
