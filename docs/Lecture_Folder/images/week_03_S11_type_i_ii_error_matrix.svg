<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Arial, Helvetica, sans-serif">
  <!-- Title -->
  <text x="470" y="35" text-anchor="middle" font-size="20" font-weight="bold">STATISTICAL CONCLUSION</text>
  <text x="330" y="65" text-anchor="middle" font-size="18">Reject H</text>
  <text x="367" y="70" text-anchor="middle" font-size="13">0</text>
  <text x="600" y="65" text-anchor="middle" font-size="18">Retain H</text>
  <text x="635" y="70" text-anchor="middle" font-size="13">0</text>

  <!-- Row labels -->
  <text x="60" y="180" text-anchor="middle" font-size="16" font-weight="bold">POPULATION</text>
  <text x="60" y="200" text-anchor="middle" font-size="16" font-weight="bold">SITUATION</text>
  <text x="160" y="170" text-anchor="middle" font-size="17">Effect</text>
  <text x="160" y="310" text-anchor="middle" font-size="17">No effect</text>

  <!-- Grid of 3D-style boxes -->
  <!-- Top-left: Correct decision -->
  <g transform="translate(210, 90)">
    <rect x="0" y="0" width="220" height="120" fill="#f5f5f5" stroke="black" stroke-width="1.5"/>
    <polygon points="220,0 250,20 250,140 220,120" fill="#e0e0e0" stroke="black" stroke-width="1"/>
    <polygon points="0,0 30,20 250,20 220,0" fill="#d8d8d8" stroke="black" stroke-width="1"/>
    <text x="110" y="55" text-anchor="middle" font-size="15" font-weight="bold">Correct decision</text>
    <text x="110" y="80" text-anchor="middle" font-size="14">Effect detected</text>
  </g>

  <!-- Top-right: Type II error -->
  <g transform="translate(480, 90)">
    <rect x="0" y="0" width="220" height="120" fill="#f5f5f5" stroke="black" stroke-width="1.5"/>
    <polygon points="220,0 250,20 250,140 220,120" fill="#e0e0e0" stroke="black" stroke-width="1"/>
    <polygon points="0,0 30,20 250,20 220,0" fill="#d8d8d8" stroke="black" stroke-width="1"/>
    <text x="110" y="50" text-anchor="middle" font-size="15" font-weight="bold">Type II error</text>
    <text x="110" y="75" text-anchor="middle" font-size="14">Effect not detected</text>
  </g>

  <!-- Bottom-left: Type I error -->
  <g transform="translate(210, 240)">
    <rect x="0" y="0" width="220" height="120" fill="#f5f5f5" stroke="black" stroke-width="1.5"/>
    <polygon points="220,0 250,20 250,140 220,120" fill="#e0e0e0" stroke="black" stroke-width="1"/>
    <polygon points="0,0 30,20 250,20 220,0" fill="#d8d8d8" stroke="black" stroke-width="1"/>
    <text x="110" y="45" text-anchor="middle" font-size="15" font-weight="bold">Type I error</text>
    <text x="110" y="70" text-anchor="middle" font-size="14">Effect detected;</text>
    <text x="110" y="90" text-anchor="middle" font-size="14">none exists</text>
  </g>

  <!-- Bottom-right: Correct decision -->
  <g transform="translate(480, 240)">
    <rect x="0" y="0" width="220" height="120" fill="#f5f5f5" stroke="black" stroke-width="1.5"/>
    <polygon points="220,0 250,20 250,140 220,120" fill="#e0e0e0" stroke="black" stroke-width="1"/>
    <polygon points="0,0 30,20 250,20 220,0" fill="#d8d8d8" stroke="black" stroke-width="1"/>
    <text x="110" y="40" text-anchor="middle" font-size="15" font-weight="bold">Correct decision</text>
    <text x="110" y="65" text-anchor="middle" font-size="14">No effect detected;</text>
    <text x="110" y="85" text-anchor="middle" font-size="14">none exists</text>
  </g>
</svg>