<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="serif">
  <!-- Panel (a) - Y vs X, good fit -->
  <g transform="translate(20,10)">
    <text x="70" y="30" font-size="20" font-weight="bold">(a)</text>
    <line x1="60" y1="310" x2="360" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="30" y="175" font-size="22" font-style="italic" transform="rotate(-90,30,175)">Y</text>
    <text x="210" y="340" font-size="22" font-style="italic">X</text>

    <!-- Regression line -->
    <line x1="75" y1="280" x2="340" y2="55" stroke="black" stroke-width="2"/>

    <!-- Data points (scattered evenly around line) -->
    <circle cx="90" cy="275" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="100" cy="250" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="120" cy="230" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="130" cy="255" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="150" cy="205" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="160" cy="180" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="180" cy="190" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="200" cy="155" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="210" cy="170" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="230" cy="140" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="250" cy="120" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="260" cy="100" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="270" cy="130" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="290" cy="90" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="300" cy="75" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="310" cy="60" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="320" cy="80" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Panel (b) - Residual plot, good -->
  <g transform="translate(410,10)">
    <text x="70" y="30" font-size="20" font-weight="bold">(b)</text>
    <line x1="60" y1="310" x2="360" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="175" font-size="18" transform="rotate(-90,20,175)">Residual</text>
    <text x="180" y="340" font-size="18">Predicted Y</text>

    <!-- +ve, 0, -ve labels -->
    <text x="35" y="80" font-size="16">+ve</text>
    <text x="45" y="175" font-size="16">0</text>
    <text x="35" y="270" font-size="16">-ve</text>

    <!-- Zero line -->
    <line x1="65" y1="170" x2="350" y2="170" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <!-- Scattered residuals (random) -->
    <circle cx="90" cy="140" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="110" cy="200" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="120" cy="120" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="140" cy="185" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="160" cy="160" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="170" cy="230" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="190" cy="150" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="200" cy="190" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="220" cy="130" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="240" cy="210" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="260" cy="155" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="280" cy="175" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="290" cy="240" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="310" cy="145" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="320" cy="200" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="340" cy="110" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Panel (c) - Y vs X, heteroscedastic -->
  <g transform="translate(20,370)">
    <text x="70" y="30" font-size="20" font-weight="bold">(c)</text>
    <line x1="60" y1="310" x2="360" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="30" y="175" font-size="22" font-style="italic" transform="rotate(-90,30,175)">Y</text>
    <text x="210" y="340" font-size="22" font-style="italic">X</text>

    <!-- Regression line -->
    <line x1="75" y1="285" x2="340" y2="60" stroke="black" stroke-width="2"/>

    <!-- Data points (spread increases with X) -->
    <circle cx="85" cy="280" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="95" cy="270" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="110" cy="260" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="130" cy="230" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="140" cy="250" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="160" cy="175" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="180" cy="210" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="200" cy="130" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="210" cy="195" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="230" cy="90" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="240" cy="180" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="260" cy="60" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="270" cy="170" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="290" cy="45" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="300" cy="140" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="310" cy="50" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="330" cy="100" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Panel (d) - Residual plot, funnel shape -->
  <g transform="translate(410,370)">
    <text x="70" y="30" font-size="20" font-weight="bold">(d)</text>
    <line x1="60" y1="310" x2="360" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
    <text x="20" y="175" font-size="18" transform="rotate(-90,20,175)">Residual</text>
    <text x="180" y="340" font-size="18">Predicted Y</text>

    <text x="35" y="80" font-size="16">+ve</text>
    <text x="45" y="175" font-size="16">0</text>
    <text x="35" y="270" font-size="16">-ve</text>

    <line x1="65" y1="170" x2="350" y2="170" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

    <!-- Funnel-shaped residuals -->
    <circle cx="90" cy="165" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="100" cy="175" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="120" cy="155" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="140" cy="185" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="150" cy="145" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="170" cy="200" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="190" cy="130" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="200" cy="210" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="220" cy="110" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="240" cy="230" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="250" cy="100" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="270" cy="250" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="280" cy="80" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="300" cy="60" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="310" cy="260" r="5" fill="none" stroke="black" stroke-width="1.5"/>
    <circle cx="330" cy="280" r="5" fill="none" stroke="black" stroke-width="1.5"/>
