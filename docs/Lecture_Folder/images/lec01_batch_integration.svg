<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 15px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 12px; fill: #555; text-anchor: middle; }
    .leglbl { font-size: 12px; fill: #333; }
  </style>

  <text class="title" x="450" y="30">Batch correction / integration</text>

  <!-- Left: before -->
  <g transform="translate(60,70)">
    <text class="panel" x="170" y="0">Before integration</text>
    <rect x="0" y="15" width="340" height="300" fill="#fafafa" stroke="#ccc"/>
    <text class="lbl" x="170" y="335">colored by batch → clusters split by sample</text>

    <!-- Cluster A - batch 1 -->
    <g fill="#2c7fb8">
      <circle cx="70"  cy="80"  r="4"/><circle cx="80"  cy="90"  r="4"/>
      <circle cx="90"  cy="75"  r="4"/><circle cx="100" cy="95"  r="4"/>
      <circle cx="85"  cy="105" r="4"/><circle cx="110" cy="80"  r="4"/>
      <circle cx="75"  cy="100" r="4"/><circle cx="95"  cy="110" r="4"/>
      <circle cx="105" cy="70"  r="4"/>
    </g>
    <!-- Cluster A - batch 2 (offset) -->
    <g fill="#e66101">
      <circle cx="170" cy="80"  r="4"/><circle cx="180" cy="90"  r="4"/>
      <circle cx="190" cy="75"  r="4"/><circle cx="200" cy="95"  r="4"/>
      <circle cx="185" cy="105" r="4"/><circle cx="210" cy="80"  r="4"/>
      <circle cx="175" cy="100" r="4"/><circle cx="195" cy="110" r="4"/>
    </g>
    <!-- Cluster B - batch 1 -->
    <g fill="#2c7fb8">
      <circle cx="80"  cy="200" r="4"/><circle cx="90"  cy="210" r="4"/>
      <circle cx="100" cy="195" r="4"/><circle cx="110" cy="215" r="4"/>
      <circle cx="95"  cy="225" r="4"/><circle cx="75"  cy="220" r="4"/>
    </g>
    <!-- Cluster B - batch 2 -->
    <g fill="#e66101">
      <circle cx="180" cy="200" r="4"/><circle cx="190" cy="210" r="4"/>
      <circle cx="200" cy="195" r="4"/><circle cx="210" cy="215" r="4"/>
      <circle cx="195" cy="225" r="4"/><circle cx="175" cy="220" r="4"/>
    </g>
    <!-- Cluster C - batch 1 -->
    <g fill="#2c7fb8">
      <circle cx="230" cy="260" r="4"/><circle cx="245" cy="275" r="4"/>
      <circle cx="255" cy="265" r="4"/><circle cx="240" cy="280" r="4"/>
    </g>
    <!-- Cluster C - batch 2 -->
    <g fill="#e66101">
      <circle cx="290" cy="260" r="4"/><circle cx="305" cy="275" r="4"/>
      <circle cx="315" cy="265" r="4"/><circle cx="300" cy="280" r="4"/>
    </g>
  </g>

  <!-- Arrow -->
  <path d="M 415 220 L 495 220" stroke="#555" stroke-width="2" fill="none" marker-end="url(#ah2)"/>
  <text class="lbl" x="455" y="210">integrate</text>

  <!-- Right: after -->
  <g transform="translate(510,70)">
    <text class="panel" x="170" y="0">After integration</text>
    <rect x="0" y="15" width="340" height="300" fill="#fafafa" stroke="#ccc"/>
    <text class="lbl" x="170" y="335">batches mix within biological clusters</text>

    <!-- Cluster A mixed -->
    <g>
      <circle cx="95"  cy="80"  r="4" fill="#2c7fb8"/>
      <circle cx="105" cy="85"  r="4" fill="#e66101"/>
      <circle cx="115" cy="75"  r="4" fill="#2c7fb8"/>
      <circle cx="100" cy="95"  r="4" fill="#e66101"/>
      <circle cx="120" cy="90"  r="4" fill="#2c7fb8"/>
      <circle cx="90"  cy="105" r="4" fill="#e66101"/>
      <circle cx="110" cy="110" r="4" fill="#2c7fb8"/>
      <circle cx="125" cy="100" r="4" fill="#e66101"/>
      <circle cx="100" cy="75"  r="4" fill="#e66101"/>
    </g>
    <!-- Cluster B mixed -->
    <g>
      <circle cx="195" cy="195" r="4" fill="#2c7fb8"/>
      <circle cx="205" cy="205" r="4" fill="#e66101"/>
      <circle cx="215" cy="200" r="4" fill="#2c7fb8"/>
      <circle cx="200" cy="215" r="4" fill="#e66101"/>
      <circle cx="220" cy="220" r="4" fill="#2c7fb8"/>
      <circle cx="190" cy="210" r="4" fill="#e66101"/>
    </g>
    <!-- Cluster C mixed -->
    <g>
      <circle cx="95"  cy="240" r="4" fill="#2c7fb8"/>
      <circle cx="105" cy="255" r="4" fill="#e66101"/>
      <circle cx="85"  cy="260" r="4" fill="#2c7fb8"/>
      <circle cx="115" cy="250" r="4" fill="#e66101"/>
      <circle cx="100" cy="270" r="4" fill="#2c7fb8"/>
      <circle cx="120" cy="265" r="4" fill="#e66101"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(60,395)">
    <circle cx="0" cy="0" r="5" fill="#2c7fb8"/>
    <text class="leglbl" x="10" y="4">batch 1</text>
    <circle cx="90" cy="0" r="5" fill="#e66101"/>
    <text class="leglbl" x="100" y="4">batch 2</text>
    <text class="leglbl" x="210" y="4">Methods: Harmony, Seurat CCA/RPCA, scVI, BBKNN, MNN</text>
  </g>

  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
