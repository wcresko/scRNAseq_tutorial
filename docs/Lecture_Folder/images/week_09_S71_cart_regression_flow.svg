<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">CART Regression: The Algorithm</text>

  <!-- Step 1 -->
  <rect x="12" y="38" width="164" height="230" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="94" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Step 1</text>
  <text x="94" y="78" text-anchor="middle" font-size="11" fill="#2e7d32">Root Node</text>
  <line x1="28" y1="88" x2="160" y2="88" stroke="#4caf50" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="94" y="108" text-anchor="middle" font-size="10" fill="#333">All n observations</text>
  <text x="94" y="124" text-anchor="middle" font-size="10" fill="#333">in one node</text>
  <text x="94" y="146" text-anchor="middle" font-size="10" fill="#555">Predict = mean(y)</text>
  <text x="94" y="162" text-anchor="middle" font-size="10" fill="#555">of all observations</text>
  <text x="94" y="184" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">ȳ = 4.2 (mean</text>
  <text x="94" y="199" text-anchor="middle" font-size="10" font-style="italic" fill="#4caf50">cell growth index)</text>
  <text x="94" y="222" text-anchor="middle" font-size="10" font-style="italic" fill="#888">RSS = Σ(yᵢ − ȳ)²</text>
  <text x="94" y="238" text-anchor="middle" font-size="9" fill="#777">(high at root)</text>
  <text x="94" y="256" text-anchor="middle" font-size="9" fill="#777">n = 150 scaffolds</text>

  <!-- Arrow 1→2 -->
  <line x1="178" y1="153" x2="198" y2="153" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="200" y="38" width="164" height="230" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="282" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Step 2</text>
  <text x="282" y="78" text-anchor="middle" font-size="11" fill="#1565c0">Find Best Split</text>
  <line x1="216" y1="88" x2="348" y2="88" stroke="#1976d2" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="282" y="108" text-anchor="middle" font-size="10" fill="#333">For each feature + each</text>
  <text x="282" y="123" text-anchor="middle" font-size="10" fill="#333">candidate threshold:</text>
  <text x="282" y="143" text-anchor="middle" font-size="10" fill="#555">Compute weighted RSS</text>
  <text x="282" y="158" text-anchor="middle" font-size="10" fill="#555">of two child nodes</text>
  <text x="282" y="180" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">Best split =</text>
  <text x="282" y="195" text-anchor="middle" font-size="10" font-style="italic" fill="#1976d2">crosslink ≥ 0.55</text>
  <text x="282" y="218" text-anchor="middle" font-size="10" fill="#888">RSS: 98.3 → 42.1</text>
  <text x="282" y="234" text-anchor="middle" font-size="9" fill="#777">Reduction = 56.2</text>
  <text x="282" y="252" text-anchor="middle" font-size="9" fill="#777">(biggest improvement)</text>

  <!-- Arrow 2→3 -->
  <line x1="366" y1="153" x2="386" y2="153" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="388" y="38" width="164" height="230" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="470" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Step 3</text>
  <text x="470" y="78" text-anchor="middle" font-size="11" fill="#e65100">Split Node</text>
  <line x1="404" y1="88" x2="536" y2="88" stroke="#f57c00" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="470" y="108" text-anchor="middle" font-size="10" fill="#333">Partition observations</text>
  <text x="470" y="123" text-anchor="middle" font-size="10" fill="#333">into two child nodes</text>
  <text x="470" y="146" text-anchor="middle" font-size="10" fill="#555">Left child: predict</text>
  <text x="470" y="161" text-anchor="middle" font-size="10" fill="#555">mean(y) of left group</text>
  <text x="470" y="176" text-anchor="middle" font-size="10" fill="#555">Right child: predict</text>
  <text x="470" y="191" text-anchor="middle" font-size="10" fill="#555">mean(y) of right group</text>
  <text x="470" y="213" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">Left ȳ = 3.1</text>
  <text x="470" y="228" text-anchor="middle" font-size="10" font-style="italic" fill="#e65100">Right ȳ = 5.7</text>
  <text x="470" y="252" text-anchor="middle" font-size="9" fill="#777">Step function begins</text>

  <!-- Arrow 3→4 -->
  <line x1="554" y1="153" x2="574" y2="153" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="576" y="38" width="148" height="230" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="650" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Step 4</text>
  <text x="650" y="78" text-anchor="middle" font-size="11" fill="#c62828">Recurse</text>
  <line x1="592" y1="88" x2="708" y2="88" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="650" y="108" text-anchor="middle" font-size="10" fill="#333">Repeat on each</text>
  <text x="650" y="123" text-anchor="middle" font-size="10" fill="#333">child node</text>
  <text x="650" y="146" text-anchor="middle" font-size="10" fill="#555">Sub-split on</text>
  <text x="650" y="161" text-anchor="middle" font-size="10" fill="#555">porosity, fiber</text>
  <text x="650" y="176" text-anchor="middle" font-size="10" fill="#555">diameter, etc.</text>
  <text x="650" y="198" text-anchor="middle" font-size="9" fill="#888">Each leaf refines</text>
  <text x="650" y="213" text-anchor="middle" font-size="9" fill="#888">the step function</text>
  <text x="650" y="230" text-anchor="middle" font-size="9" fill="#888">prediction</text>
  <text x="650" y="252" text-anchor="middle" font-size="9" fill="#777">Until stop criterion</text>

  <!-- Arrow 4→5 -->
  <line x1="726" y1="153" x2="746" y2="153" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="748" y="38" width="140" height="230" rx="10" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="818" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Step 5</text>
  <text x="818" y="78" text-anchor="middle" font-size="11" fill="#6a1b9a">Leaf = Constant</text>
  <line x1="764" y1="88" x2="872" y2="88" stroke="#6a1b9a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="818" y="108" text-anchor="middle" font-size="10" fill="#333">Stop splitting when:</text>
  <text x="818" y="130" text-anchor="middle" font-size="10" fill="#555">Min node size</text>
  <text x="818" y="145" text-anchor="middle" font-size="10" fill="#555">reached (e.g. 5)</text>
  <text x="818" y="168" text-anchor="middle" font-size="10" fill="#555">Max depth reached</text>
  <text x="818" y="190" text-anchor="middle" font-size="10" fill="#555">CP threshold met</text>
  <text x="818" y="213" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">Leaf predicts</text>
  <text x="818" y="228" text-anchor="middle" font-size="10" font-style="italic" fill="#6a1b9a">mean(y) in region</text>
  <text x="818" y="252" text-anchor="middle" font-size="9" fill="#777">Then prune</text>
</svg>
