<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Talapas Architecture</text>

  <!-- Your Computer -->
  <rect x="230" y="40" width="140" height="38" rx="8" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <text x="300" y="64" text-anchor="middle" fill="#000">Your Computer</text>
  <line x1="300" y1="78" x2="300" y2="98" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SSH -->
  <rect x="265" y="100" width="70" height="28" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="119" text-anchor="middle" font-size="12" fill="#000">SSH</text>

  <!-- Login nodes -->
  <line x1="230" y1="128" x2="115" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="128" x2="225" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="128" x2="375" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="128" x2="485" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="75" y="165" width="80" height="30" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="115" y="184" text-anchor="middle" font-size="11" fill="#000">login1</text>

  <rect x="185" y="165" width="80" height="30" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="225" y="184" text-anchor="middle" font-size="11" fill="#000">login2</text>

  <rect x="335" y="165" width="80" height="30" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="375" y="184" text-anchor="middle" font-size="11" fill="#000">login3</text>

  <rect x="445" y="165" width="80" height="30" rx="6" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <text x="485" y="184" text-anchor="middle" font-size="11" fill="#000">login4</text>

  <!-- All to SLURM -->
  <line x1="115" y1="195" x2="270" y2="235" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="225" y1="195" x2="280" y2="235" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="195" x2="320" y2="235" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="195" x2="330" y2="235" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SLURM Scheduler -->
  <rect x="225" y="235" width="150" height="38" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="300" y="259" text-anchor="middle" font-weight="bold" fill="#000">SLURM Scheduler</text>

  <!-- sbatch / srun -->
  <line x1="250" y1="273" x2="200" y2="293" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="273" x2="400" y2="293" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="165" y="293" width="70" height="25" rx="12" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="310" text-anchor="middle" font-size="11" fill="#000">sbatch</text>
  <rect x="365" y="293" width="70" height="25" rx="12" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#000">srun</text>

  <!-- Compute nodes -->
  <line x1="200" y1="318" x2="115" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="318" x2="300" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="318" x2="485" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="318" x2="115" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="65" y="345" width="100" height="30" rx="6" fill="#98fb98" stroke="#333" stroke-width="1.5"/>
  <text x="115" y="364" text-anchor="middle" font-size="11" fill="#000">CPU Nodes</text>

  <rect x="250" y="345" width="100" height="30" rx="6" fill="#ffa07a" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="364" text-anchor="middle" font-size="11" fill="#000">GPU Nodes</text>

  <rect x="435" y="345" width="100" height="30" rx="6" fill="#dda0dd" stroke="#333" stroke-width="1.5"/>
  <text x="485" y="364" text-anchor="middle" font-size="11" fill="#000">Fat Nodes</text>

  <!-- Storage -->
  <line x1="115" y1="375" x2="270" y2="400" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="300" y1="375" x2="300" y2="400" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="485" y1="375" x2="330" y2="400" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <rect x="240" y="400" width="120" height="30" rx="8" fill="#c8e6c9" stroke="#333" stroke-width="2"/>
  <text x="300" y="419" text-anchor="middle" fill="#000">Storage</text>
</svg>
