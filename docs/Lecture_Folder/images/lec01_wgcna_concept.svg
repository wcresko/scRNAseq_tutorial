<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 17px; font-weight: 700; fill: #222; text-anchor: middle; }
    .panel { font-size: 13px; font-weight: 600; fill: #333; text-anchor: middle; }
    .lbl { font-size: 11px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <text class="title" x="480" y="28">Co-expression modules (WGCNA / hdWGCNA)</text>

  <!-- Panel 1: correlation/TOM heatmap -->
  <g transform="translate(40,60)">
    <text class="panel" x="100" y="0">Gene-gene similarity</text>
    <rect x="0" y="15" width="200" height="200" fill="#fafafa" stroke="#ccc"/>
    <!-- blocky heatmap -->
    <g>
      <rect x="5"   y="20"  width="60" height="60" fill="#b2182b" opacity="0.8"/>
      <rect x="5"   y="80"  width="60" height="60" fill="#f4a582" opacity="0.7"/>
      <rect x="5"   y="140" width="60" height="60" fill="#f7f7f7"/>
      <rect x="65"  y="20"  width="60" height="60" fill="#f4a582" opacity="0.7"/>
      <rect x="65"  y="80"  width="60" height="60" fill="#1b7837" opacity="0.8"/>
      <rect x="65"  y="140" width="60" height="60" fill="#d9f0d3"/>
      <rect x="125" y="20"  width="70" height="60" fill="#f7f7f7"/>
      <rect x="125" y="80"  width="70" height="60" fill="#d9f0d3"/>
      <rect x="125" y="140" width="70" height="60" fill="#2166ac" opacity="0.8"/>
    </g>
    <text class="lbl" x="100" y="230">topological overlap matrix</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 250 160 L 305 160" marker-end="url(#ahw)"/>
  <text class="lbl" x="277" y="150">cluster</text>

  <!-- Panel 2: dendrogram with modules -->
  <g transform="translate(315,60)">
    <text class="panel" x="120" y="0">Modules (color = module)</text>
    <rect x="0" y="15" width="240" height="200" fill="#fafafa" stroke="#ccc"/>
    <!-- dendrogram lines (schematic) -->
    <g stroke="#222" stroke-width="1.2" fill="none">
      <path d="M 20 130 L 20 60 L 50 60 L 50 130"/>
      <path d="M 35 60 L 35 40 L 100 40 L 100 90"/>
      <path d="M 80 130 L 80 90 L 120 90"/>
      <path d="M 140 130 L 140 80 L 180 80 L 180 130"/>
      <path d="M 160 80 L 160 40 L 210 40 L 210 120"/>
      <path d="M 100 40 L 160 40"/>
    </g>
    <!-- module color bars -->
    <rect x="10"  y="140" width="40" height="14" fill="#b2182b"/>
    <rect x="55"  y="140" width="50" height="14" fill="#1b7837"/>
    <rect x="110" y="140" width="40" height="14" fill="#762a83"/>
    <rect x="155" y="140" width="70" height="14" fill="#2166ac"/>
    <text class="lbl" x="120" y="180">each module ≈ a co-expressed</text>
    <text class="lbl" x="120" y="195">gene program</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 570 160 L 620 160" marker-end="url(#ahw)"/>

  <!-- Panel 3: module eigengene & trait correlation -->
  <g transform="translate(625,60)">
    <text class="panel" x="145" y="0">Module summary &amp; trait link</text>
    <rect x="0" y="15" width="290" height="200" fill="#fafafa" stroke="#ccc"/>

    <!-- Module eigengene bars -->
    <text class="lbl" x="145" y="42">module eigengene across samples</text>
    <g transform="translate(35,50)">
      <line x1="0" y1="60" x2="230" y2="60" stroke="#888"/>
      <rect x="0"   y="30" width="18" height="30" fill="#b2182b"/>
      <rect x="25"  y="15" width="18" height="45" fill="#b2182b"/>
      <rect x="50"  y="40" width="18" height="20" fill="#b2182b"/>
      <rect x="80"  y="55" width="18" height="5"  fill="#b2182b"/>
      <rect x="105" y="65" width="18" height="15" fill="#b2182b" opacity="0.5"/>
      <rect x="130" y="62" width="18" height="8"  fill="#b2182b" opacity="0.5"/>
      <rect x="160" y="70" width="18" height="15" fill="#b2182b" opacity="0.5"/>
      <rect x="190" y="68" width="18" height="12" fill="#b2182b" opacity="0.5"/>
    </g>
    <text class="lbl" x="80"  y="175">treated</text>
    <text class="lbl" x="235" y="175">control</text>
    <text class="lbl" x="145" y="200" font-weight="700">module ↔ trait: r = 0.82</text>
  </g>

  <defs>
    <marker id="ahw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
