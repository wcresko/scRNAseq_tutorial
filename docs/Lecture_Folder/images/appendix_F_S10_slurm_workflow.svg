<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 130" font-family="Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="375" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">SLURM Job Workflow</text>

  <!-- Submit Job -->
  <rect x="20" y="45" width="110" height="42" rx="8" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="75" y="71" text-anchor="middle" fill="#000">Submit Job</text>

  <!-- sbatch -->
  <line x1="130" y1="66" x2="165" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="145" y="53" width="65" height="26" rx="13" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="177" y="71" text-anchor="middle" font-size="11" fill="#000">sbatch</text>

  <!-- SLURM Queue -->
  <line x1="210" y1="66" x2="235" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="45" width="120" height="42" rx="8" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="300" y="71" text-anchor="middle" fill="#000">SLURM Queue</text>

  <!-- Waits -->
  <line x1="360" y1="66" x2="385" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="370" y="53" width="60" height="26" rx="13" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="71" text-anchor="middle" font-size="11" fill="#000">Waits</text>

  <!-- Job Runs -->
  <line x1="430" y1="66" x2="455" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="460" y="40" width="140" height="52" rx="8" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="530" y="62" text-anchor="middle" font-size="12" fill="#000">Job Runs on</text>
  <text x="530" y="78" text-anchor="middle" font-size="12" fill="#000">Compute Node</text>

  <!-- Completes -->
  <line x1="600" y1="66" x2="625" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="607" y="53" width="80" height="26" rx="13" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="647" y="71" text-anchor="middle" font-size="11" fill="#000">Completes</text>

  <!-- Output Files -->
  <line x1="687" y1="66" x2="710" y2="66" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="615" y="45" width="110" height="42" rx="8" fill="#ffa07a" stroke="#333" stroke-width="2"/>
  <text x="670" y="71" text-anchor="middle" fill="#000">Output Files</text>
</svg>
