<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" font-family="Arial, Helvetica, sans-serif">
  <!-- Panel A: Small variance, clear separation -->
  <g transform="translate(0,0)">
    <text x="40" y="30" font-size="24" font-weight="bold">A</text>
    <!-- Axes -->
    <line x1="50" y1="310" x2="460" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="50" y1="310" x2="50" y2="30" stroke="black" stroke-width="1.5"/>

    <!-- Red distribution (left, mean=2, sd=1 equivalent) centered at x=150 -->
    <path d="M 60,310 C 60,308 75,305 90,295 C 105,275 115,230 125,170 C 135,110 140,75 150,55 C 160,75 165,110 175,170 C 185,230 195,275 210,295 C 225,305 240,308 240,310"
          fill="none" stroke="#CC0000" stroke-width="3"/>

    <!-- Blue distribution (right, mean=6, sd=1 equivalent) centered at x=330 -->
    <path d="M 240,310 C 240,308 255,305 270,295 C 285,275 295,230 305,170 C 315,110 320,75 330,55 C 340,75 345,110 355,170 C 365,230 375,275 390,295 C 405,305 420,308 420,310"
          fill="none" stroke="#0000CC" stroke-width="3"/>

    <!-- Vertical mean lines -->
    <line x1="150" y1="310" x2="150" y2="50" stroke="black" stroke-width="2"/>
    <line x1="330" y1="310" x2="330" y2="50" stroke="black" stroke-width="2"/>
  </g>

  <!-- Panel B: Large variance, overlapping -->
  <g transform="translate(0,350)">
    <text x="40" y="30" font-size="24" font-weight="bold">B</text>
    <!-- Axes -->
    <line x1="50" y1="310" x2="460" y2="310" stroke="black" stroke-width="1.5"/>
    <line x1="50" y1="310" x2="50" y2="30" stroke="black" stroke-width="1.5"/>

    <!-- Red distribution (wider, mean=2, sd=2 equiv) centered at x=150 -->
    <path d="M 30,310 C 30,308 45,305 60,298 C 80,285 95,265 110,235 C 125,205 135,170 145,140 C 150,125 155,140 165,170 C 175,205 190,235 210,265 C 230,285 250,298 270,305 C 290,308 310,310 310,310"
          fill="none" stroke="#CC0000" stroke-width="3"/>

    <!-- Blue distribution (wider, mean=6, sd=2 equiv) centered at x=330 -->
    <path d="M 190,310 C 190,308 210,305 230,298 C 250,285 265,265 280,235 C 295,205 305,170 315,140 C 325,125 330,120 335,140 C 345,170 355,205 370,235 C 385,265 400,285 420,298 C 440,305 455,308 460,310"
          fill="none" stroke="#0000CC" stroke-width="3"/>

    <!-- Vertical mean lines -->
    <line x1="150" y1="310" x2="150" y2="50" stroke="black" stroke-width="2"/>
    <line x1="330" y1="310" x2="330" y2="50" stroke="black" stroke-width="2"/>
  </g>
</svg>