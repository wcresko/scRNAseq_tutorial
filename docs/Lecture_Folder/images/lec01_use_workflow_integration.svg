<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .n { font-size: 14px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .n2 { font-size: 14px; font-weight: 700; fill: #222; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c8082"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b5babc"/>
    </marker>
  </defs>

  <!-- Sequence reads -->
  <g transform="translate(330,20)">
    <rect width="240" height="50" rx="25" fill="#3b4041"/>
    <text class="n" x="120" y="30">Sequence reads</text>
  </g>
  <path d="M450,70 V100" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>

  <!-- Generate count matrix -->
  <g transform="translate(330,110)">
    <rect width="240" height="50" rx="25" fill="#7a1541"/>
    <text class="n" x="120" y="30">Generate count matrix</text>
  </g>
  <path d="M450,160 V190" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>

  <!-- QC -->
  <g transform="translate(310,200)">
    <rect width="280" height="60" rx="30" fill="#1767cc"/>
    <text class="n" x="140" y="33">QC: Filter cells using</text>
    <text class="n" x="140" y="50">quality metrics</text>
  </g>
  <!-- QC down to clustering -->
  <path d="M450,260 V300" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>
  <!-- QC to Integration (right) -->
  <path d="M590,230 H700 V290" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>

  <!-- Integration -->
  <g transform="translate(640,290)">
    <rect width="170" height="50" rx="25" fill="#067045"/>
    <text class="n" x="85" y="30">Integration</text>
  </g>
  <!-- Integration back to clustering -->
  <path d="M640,315 H590" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>

  <!-- Clustering -->
  <g transform="translate(310,300)">
    <rect width="280" height="50" rx="25" fill="#067045"/>
    <text class="n" x="140" y="30">Clustering of filtered counts</text>
  </g>

  <!-- Loop arrows between clustering and marker identification -->
  <path d="M300,335 Q250,380 310,395" stroke="#b5babc" stroke-width="4" fill="none" marker-end="url(#a2)"/>
  <path d="M310,395 Q260,375 300,340" stroke="#b5babc" stroke-width="4" fill="none" marker-end="url(#a2)"/>
  <path d="M600,335 Q650,380 590,395" stroke="#b5babc" stroke-width="4" fill="none" marker-end="url(#a2)"/>
  <path d="M590,395 Q640,375 600,340" stroke="#b5babc" stroke-width="4" fill="none" marker-end="url(#a2)"/>

  <!-- Marker identification -->
  <g transform="translate(330,395)">
    <rect width="240" height="50" rx="25" fill="#067045"/>
    <text class="n" x="120" y="30">Marker identification</text>
  </g>

  <!-- Three branches -->
  <path d="M380,445 L180,500" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>
  <path d="M450,445 V495" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>
  <path d="M520,445 L720,500" stroke="#b5babc" stroke-width="4" marker-end="url(#a2)"/>

  <g transform="translate(50,495)">
    <rect width="230" height="50" rx="25" fill="#067045"/>
    <text class="n" x="115" y="30">Trajectory analysis</text>
  </g>
  <g transform="translate(320,495)">
    <rect width="260" height="50" rx="25" fill="#067045"/>
    <text class="n" x="130" y="22">DE of cell types or genes</text>
    <text class="n" x="130" y="40">between sample groups</text>
  </g>
  <g transform="translate(620,495)">
    <rect width="230" height="50" rx="25" fill="#067045"/>
    <text class="n" x="115" y="30">Custom analyses</text>
  </g>
</svg>
