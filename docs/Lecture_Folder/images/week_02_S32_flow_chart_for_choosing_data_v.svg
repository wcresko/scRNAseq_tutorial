<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .heading { font-size: 16px; font-weight: bold; fill: #333; }
    .question { font-size: 14px; fill: #333; }
    .chart-type { font-size: 15px; font-weight: bold; fill: #333; }
    .geom { font-size: 12px; fill: #555; font-family: 'Courier New', monospace; }
    .choice { font-size: 14px; font-weight: bold; fill: #B8860B; }
    .category { font-size: 13px; fill: #2E8B57; }
    .box { fill: #F0F0F0; stroke: #999; stroke-width: 1.5; rx: 6; }
    .highlight-box { fill: #E8F5E9; stroke: #999; stroke-width: 1.5; rx: 4; }
    .choice-box { fill: #FFF8DC; stroke: #B8860B; stroke-width: 1.5; rx: 4; }
  </style>

  <!-- Top: How Many Variables? -->
  <rect x="420" y="15" width="260" height="40" class="box"/>
  <text x="550" y="42" text-anchor="middle" class="heading">How Many Variables?</text>

  <!-- One / Two choices -->
  <rect x="475" y="75" width="50" height="28" class="choice-box"/>
  <text x="500" y="95" text-anchor="middle" class="choice">One</text>
  <rect x="575" y="75" width="50" height="28" class="choice-box"/>
  <text x="600" y="95" text-anchor="middle" class="choice">Two</text>

  <!-- Arrows from top -->
  <line x1="500" y1="55" x2="500" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="55" x2="600" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Left branch: One variable -->
  <rect x="310" y="125" width="200" height="40" class="box"/>
  <text x="410" y="145" text-anchor="middle" class="question">Categorical or</text>
  <text x="410" y="160" text-anchor="middle" class="question">Quantitative?</text>
  <line x1="500" y1="103" x2="410" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right branch: Two variables -->
  <rect x="680" y="125" width="200" height="40" class="box"/>
  <text x="780" y="145" text-anchor="middle" class="question">Categorical or</text>
  <text x="780" y="160" text-anchor="middle" class="question">Quantitative?</text>
  <line x1="600" y1="103" x2="780" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- One > Categorical -->
  <text x="200" y="210" text-anchor="middle" class="category">Categorical</text>
  <line x1="350" y1="165" x2="200" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="225" width="120" height="32" class="highlight-box"/>
  <text x="200" y="246" text-anchor="middle" class="chart-type">Bar Chart</text>
  <text x="200" y="275" text-anchor="middle" class="geom">geom_bar</text>

  <!-- One > Quantitative -->
  <text x="430" y="210" text-anchor="middle" class="category">Quantitative</text>
  <line x1="430" y1="165" x2="430" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="225" width="120" height="32" class="highlight-box"/>
  <text x="430" y="246" text-anchor="middle" class="chart-type">Histogram</text>
  <text x="430" y="275" text-anchor="middle" class="geom">geom_histogram</text>
  <text x="430" y="292" text-anchor="middle" class="geom">geom_dotplot</text>
  <text x="430" y="309" text-anchor="middle" class="geom">geom_area</text>
  <text x="430" y="326" text-anchor="middle" class="geom">geom_freqpoly</text>
  <text x="430" y="343" text-anchor="middle" class="geom">geom_qq</text>

  <!-- Two > Both Categorical -->
  <text x="640" y="210" text-anchor="middle" class="category">Both Categorical</text>
  <line x1="720" y1="165" x2="640" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="555" y="225" width="170" height="32" class="highlight-box"/>
  <text x="640" y="246" text-anchor="middle" class="chart-type">Grouped Bar Chart</text>
  <text x="640" y="275" text-anchor="middle" class="geom">geom_bar</text>
  <text x="640" y="292" text-anchor="middle" class="geom">geom_count</text>
  <text x="640" y="309" text-anchor="middle" class="geom">geom_jitter</text>

  <!-- Two > One of each -->
  <text x="830" y="210" text-anchor="middle" class="category">One of each</text>
  <line x1="810" y1="165" x2="830" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="770" y="225" width="120" height="32" class="highlight-box"/>
  <text x="830" y="246" text-anchor="middle" class="chart-type">Box Plot</text>
  <text x="830" y="275" text-anchor="middle" class="geom">geom_boxplot</text>
  <text x="830" y="292" text-anchor="middle" class="geom">geom_dotplot</text>
  <text x="830" y="309" text-anchor="middle" class="geom">geom_violin</text>

  <!-- Two > Both Quantitative -->
  <text x="1010" y="210" text-anchor="middle" class="category">Both Quantitative</text>
  <line x1="860" y1="165" x2="1010" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="945" y="225" width="130" height="32" class="highlight-box"/>
  <text x="1010" y="246" text-anchor="middle" class="chart-type">Scatterplot</text>
  <text x="1010" y="275" text-anchor="middle" class="geom">geom_point</text>
  <text x="1010" y="292" text-anchor="middle" class="geom">geom_smooth</text>
  <text x="1010" y="309" text-anchor="middle" class="geom">geom_violin</text>

  <!-- Divider line -->
  <line x1="30" y1="380" x2="1070" y2="380" stroke="#999" stroke-width="1.5"/>

  <!-- Bottom section: Additional categories -->
  <!-- Three variables -->
  <rect x="40" y="410" width="170" height="32" class="highlight-box"/>
  <text x="125" y="431" text-anchor="middle" class="chart-type">Three variables</text>
  <text x="125" y="460" text-anchor="middle" class="geom">geom_contour</text>
  <text x="125" y="477" text-anchor="middle" class="geom">geom_contour_filled</text>
  <text x="125" y="494" text-anchor="middle" class="geom">geom_raster</text>
  <text x="125" y="511" text-anchor="middle" class="geom">geom_tile</text>

  <!-- Adding Lines -->
  <rect x="290" y="410" width="170" height="32" class="highlight-box"/>
  <text x="375" y="431" text-anchor="middle" class="chart-type">Adding Lines</text>
  <text x="375" y="460" text-anchor="middle" class="geom">geom_abline(aes(intercept, slope))</text>
  <text x="375" y="477" text-anchor="middle" class="geom">geom_hline(aes(yintercept = value))</text>
  <text x="375" y="494" text-anchor="middle" class="geom">geom_vline(aes(xintercept = value))</text>

  <!-- Visualizing Error -->
  <rect x="620" y="410" width="170" height="32" class="highlight-box"/>
  <text x="705" y="431" text-anchor="middle" class="chart-type">Visualizing Error</text>
  <text x="705" y="460" text-anchor="middle" class="geom">geom_crossbar</text>
  <text x="705" y="477" text-anchor="middle" class="geom">geom_errorbar</text>
  <text x="705" y="494" text-anchor="middle" class="geom">geom_linerange</text>
  <text x="705" y="511" text-anchor="middle" class="geom">geom_pointrange</text>

  <!-- Faceting -->
  <rect x="900" y="410" width="130" height="32" class="highlight-box"/>
  <text x="965" y="431" text-anchor="middle" class="chart-type">Faceting</text>
  <text x="965" y="460" text-anchor="middle" class="geom">facet_grid</text>
  <text x="965" y="477" text-anchor="middle" class="geom">facet_wrap</text>
</svg>