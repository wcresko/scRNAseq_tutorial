<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="850" height="380">
  <defs>
    <style>
      .text-main { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .text-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="425" y="25" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">K-Nearest Neighbors (KNN) Classification</text>
  
  <!-- Panel 1: K=3 -->
  <rect x="20" y="40" width="260" height="260" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="150" y="62" class="text-label">K = 3</text>
  
  <!-- Class A points (blue circles) -->
  <circle cx="60" cy="120" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="90" cy="90" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="75" cy="150" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="120" cy="100" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="55" cy="180" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  
  <!-- Class B points (red triangles) -->
  <polygon points="190,110 198,126 182,126" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="210,160 218,176 202,176" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="230,130 238,146 222,146" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="250,180 258,196 242,196" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="200,210 208,226 192,226" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="240,230 248,246 232,246" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  
  <!-- Query point -->
  <circle cx="150" cy="155" r="10" fill="none" stroke="#f39c12" stroke-width="3"/>
  <text x="150" y="159" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#f39c12" text-anchor="middle" font-weight="bold">?</text>
  
  <!-- K=3 circle -->
  <circle cx="150" cy="155" r="55" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  
  <!-- Dashed lines to 3 nearest -->
  <line x1="150" y1="155" x2="100" y2="140" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="155" x2="120" y2="100" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="155" x2="190" y2="118" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Result -->
  <text x="150" y="290" class="text-label" fill="#3498db">Prediction: Class A (2 vs 1)</text>
  
  <!-- Panel 2: K=7 -->
  <rect x="300" y="40" width="260" height="260" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="430" y="62" class="text-label">K = 7</text>
  
  <!-- Same points, shifted -->
  <circle cx="340" cy="120" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="370" cy="90" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="355" cy="150" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="335" cy="180" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="380" cy="140" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  
  <polygon points="470,110 478,126 462,126" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="490,160 498,176 482,176" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="510,130 518,146 502,146" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="530,180 538,196 522,196" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="480,210 488,226 472,226" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <polygon points="520,230 528,246 512,246" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  
  <circle cx="430" cy="155" r="10" fill="none" stroke="#f39c12" stroke-width="3"/>
  <text x="430" y="159" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#f39c12" text-anchor="middle" font-weight="bold">?</text>
  
  <!-- K=7 circle (larger) -->
  <circle cx="430" cy="155" r="95" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  
  <!-- Result -->
  <text x="430" y="290" class="text-label" fill="#e74c3c">Prediction: Class B (4 vs 3)</text>
  
  <!-- Panel 3: Key concepts -->
  <rect x="580" y="40" width="255" height="260" fill="#f0f7ff" stroke="#3498db" stroke-width="1" rx="6"/>
  <text x="707" y="65" class="text-label">Key Concepts</text>
  
  <text x="600" y="90" class="text-main" font-weight="bold">Algorithm:</text>
  <text x="600" y="108" class="text-main">1. Calculate distance to all</text>
  <text x="612" y="123" class="text-main">training points</text>
  <text x="600" y="141" class="text-main">2. Find K nearest neighbors</text>
  <text x="600" y="159" class="text-main">3. Majority vote = prediction</text>
  
  <line x1="595" y1="170" x2="815" y2="170" stroke="#ddd" stroke-width="1"/>
  
  <text x="600" y="190" class="text-main" font-weight="bold">Choosing K:</text>
  <text x="600" y="208" class="text-main">&#x2022; Small K: flexible, noisy</text>
  <text x="600" y="226" class="text-main">&#x2022; Large K: smooth, may miss</text>
  <text x="612" y="241" class="text-main">local patterns</text>
  <text x="600" y="259" class="text-main">&#x2022; Use cross-validation</text>
  <text x="600" y="277" class="text-main">&#x2022; Odd K avoids ties</text>
  
  <!-- Legend -->
  <rect x="20" y="315" width="540" height="50" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="4"/>
  <circle cx="50" cy="340" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="68" y="344" class="text-main">Class A (e.g., Drug)</text>
  <polygon points="185,332 193,348 177,348" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="205" y="344" class="text-main">Class B (e.g., Placebo)</text>
  <circle cx="360" cy="340" r="8" fill="none" stroke="#f39c12" stroke-width="3"/>
  <text x="375" y="344" class="text-main">? = New observation to classify</text>
</svg>
