<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 12px; fill: #333; }
    .small { font-size: 10px; fill: #666; }
    .axis-label { font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .highlight { font-size: 11px; font-weight: bold; }
  </style>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Three Scales for the Same Information</text>
  
  <!-- Probability Scale (0 to 1) -->
  <text x="60" y="75" text-anchor="end" class="axis-label">Probability</text>
  <text x="60" y="90" text-anchor="end" class="small">(0 to 1)</text>
  <line x1="80" y1="80" x2="850" y2="80" stroke="#2c3e50" stroke-width="2"/>
  <line x1="80" y1="75" x2="80" y2="85" stroke="#2c3e50" stroke-width="2"/>
  <text x="80" y="105" text-anchor="middle" class="label">0</text>
  <line x1="273" y1="75" x2="273" y2="85" stroke="#2c3e50" stroke-width="2"/>
  <text x="273" y="105" text-anchor="middle" class="label">0.25</text>
  <line x1="465" y1="75" x2="465" y2="85" stroke="#e74c3c" stroke-width="3"/>
  <text x="465" y="105" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">0.50</text>
  <line x1="658" y1="75" x2="658" y2="85" stroke="#2c3e50" stroke-width="2"/>
  <text x="658" y="105" text-anchor="middle" class="label">0.75</text>
  <line x1="850" y1="75" x2="850" y2="85" stroke="#2c3e50" stroke-width="2"/>
  <text x="850" y="105" text-anchor="middle" class="label">1</text>
  <!-- Markers -->
  <circle cx="273" cy="80" r="6" fill="#3498db" opacity="0.8"/>
  <circle cx="658" cy="80" r="6" fill="#e67e22" opacity="0.8"/>
  <text x="273" y="65" text-anchor="middle" class="highlight" fill="#3498db">p = 0.25</text>
  <text x="658" y="65" text-anchor="middle" class="highlight" fill="#e67e22">p = 0.75</text>
  <!-- Annotation: compressed right side -->
  <text x="760" y="118" class="small" fill="#999">compressed →</text>

  <!-- Odds Scale (0 to infinity, asymmetric) -->
  <text x="60" y="185" text-anchor="end" class="axis-label">Odds</text>
  <text x="60" y="200" text-anchor="end" class="small">(0 to ∞)</text>
  <line x1="80" y1="190" x2="850" y2="190" stroke="#2c3e50" stroke-width="2"/>
  <line x1="80" y1="185" x2="80" y2="195" stroke="#2c3e50" stroke-width="2"/>
  <text x="80" y="215" text-anchor="middle" class="label">0</text>
  <line x1="235" y1="185" x2="235" y2="195" stroke="#2c3e50" stroke-width="2"/>
  <text x="235" y="215" text-anchor="middle" class="label">0.33</text>
  <line x1="390" y1="185" x2="390" y2="195" stroke="#e74c3c" stroke-width="3"/>
  <text x="390" y="215" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">1</text>
  <line x1="700" y1="185" x2="700" y2="195" stroke="#2c3e50" stroke-width="2"/>
  <text x="700" y="215" text-anchor="middle" class="label">3</text>
  <line x1="850" y1="185" x2="850" y2="195" stroke="#2c3e50" stroke-width="2"/>
  <text x="850" y="215" text-anchor="middle" class="label">∞</text>
  <!-- Markers -->
  <circle cx="235" cy="190" r="6" fill="#3498db" opacity="0.8"/>
  <circle cx="700" cy="190" r="6" fill="#e67e22" opacity="0.8"/>
  <text x="235" y="175" text-anchor="middle" class="highlight" fill="#3498db">1:3</text>
  <text x="700" y="175" text-anchor="middle" class="highlight" fill="#e67e22">3:1</text>
  <!-- Annotation: asymmetric -->
  <path d="M235,230 L390,240" stroke="#3498db" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <path d="M700,230 L390,240" stroke="#e67e22" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="270" y="248" class="small" fill="#3498db">155px</text>
  <text x="590" y="248" class="small" fill="#e67e22">310px — same effect looks bigger!</text>

  <!-- Log Odds Scale (-inf to +inf, SYMMETRIC) -->
  <text x="60" y="305" text-anchor="end" class="axis-label">Log Odds</text>
  <text x="60" y="320" text-anchor="end" class="small">(−∞ to +∞)</text>
  <line x1="80" y1="310" x2="850" y2="310" stroke="#2c3e50" stroke-width="2"/>
  <line x1="80" y1="305" x2="80" y2="315" stroke="#2c3e50" stroke-width="2"/>
  <text x="80" y="335" text-anchor="middle" class="label">−∞</text>
  <line x1="272" y1="305" x2="272" y2="315" stroke="#2c3e50" stroke-width="2"/>
  <text x="272" y="335" text-anchor="middle" class="label">−1.10</text>
  <line x1="465" y1="305" x2="465" y2="315" stroke="#e74c3c" stroke-width="3"/>
  <text x="465" y="335" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">0</text>
  <line x1="658" y1="305" x2="658" y2="315" stroke="#2c3e50" stroke-width="2"/>
  <text x="658" y="335" text-anchor="middle" class="label">+1.10</text>
  <line x1="850" y1="305" x2="850" y2="315" stroke="#2c3e50" stroke-width="2"/>
  <text x="850" y="335" text-anchor="middle" class="label">+∞</text>
  <!-- Markers -->
  <circle cx="272" cy="310" r="6" fill="#3498db" opacity="0.8"/>
  <circle cx="658" cy="310" r="6" fill="#e67e22" opacity="0.8"/>
  <text x="272" y="295" text-anchor="middle" class="highlight" fill="#3498db">−1.10</text>
  <text x="658" y="295" text-anchor="middle" class="highlight" fill="#e67e22">+1.10</text>
  <!-- Symmetry annotation -->
  <path d="M272,350 L465,365" stroke="#27ae60" stroke-width="2" fill="none"/>
  <path d="M658,350 L465,365" stroke="#27ae60" stroke-width="2" fill="none"/>
  <text x="465" y="385" text-anchor="middle" class="highlight" fill="#27ae60">Equal distances = Equal effect strength!</text>
  <text x="465" y="400" text-anchor="middle" class="small" fill="#27ae60">This is why logistic regression uses log odds</text>
</svg>