<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #1f4e79; }
    .hub { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .node { font-size: 12px; font-weight: 700; fill: #222; text-anchor: middle; }
    .edge { font-size: 11px; fill: #444; text-anchor: middle; font-style: italic; }
    .cap { font-size: 11px; fill: #555; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b5e91"/>
    </marker>
  </defs>

  <text class="title" x="20" y="28">Tools</text>

  <!-- Central hub: Data input -->
  <rect x="380" y="60" width="240" height="54" rx="6" fill="#e7d2d2" stroke="#7a3670"/>
  <text class="hub" x="500" y="82">Data input</text>
  <text class="cap" x="500" y="98">(expression profile, meta information)</text>

  <!-- Edges from data input -->
  <line x1="460" y1="114" x2="200" y2="170" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="114" x2="500" y2="170" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="540" y1="114" x2="800" y2="170" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <text class="edge" x="290" y="150">Bulk RNA-seq data</text>
  <text class="edge" x="720" y="150">scRNA-seq data</text>

  <!-- Row 2: three method boxes -->
  <g>
    <rect x="80" y="170" width="220" height="54" rx="6" fill="#fff59d" stroke="#c5a300"/>
    <text class="node" x="190" y="194">Differential Gene</text>
    <text class="node" x="190" y="212">Expression Analysis</text>

    <rect x="380" y="170" width="240" height="54" rx="6" fill="#fff59d" stroke="#c5a300"/>
    <text class="node" x="500" y="194">Weighted Gene Co-expression</text>
    <text class="node" x="500" y="212">Network Analysis</text>

    <rect x="700" y="170" width="220" height="54" rx="6" fill="#fff59d" stroke="#c5a300"/>
    <text class="node" x="810" y="194">Cell clustering &amp;</text>
    <text class="node" x="810" y="212">Cell type annotation</text>
  </g>

  <!-- Down arrows -->
  <line x1="190" y1="224" x2="190" y2="265" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="224" x2="500" y2="265" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="810" y1="224" x2="810" y2="265" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Row 3: find markers -->
  <g>
    <rect x="80" y="270" width="520" height="44" rx="6" fill="#d7e5c2" stroke="#5c8a2a"/>
    <text class="node" x="340" y="296">Find marker genes related to biological conditions</text>

    <rect x="700" y="270" width="220" height="44" rx="6" fill="#d7e5c2" stroke="#5c8a2a"/>
    <text class="node" x="810" y="296">Find marker genes per cluster</text>
  </g>

  <line x1="190" y1="314" x2="190" y2="355" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="314" x2="500" y2="355" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="810" y1="314" x2="810" y2="355" stroke="#1b5e91" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Row 4: outputs -->
  <g>
    <rect x="80" y="360" width="220" height="44" rx="6" fill="#c4deea" stroke="#2c7fb8"/>
    <text class="node" x="190" y="386">Gene Functional</text>
    <text class="node" x="190" y="400">enrichment analysis</text>

    <rect x="380" y="360" width="240" height="44" rx="6" fill="#c4deea" stroke="#2c7fb8"/>
    <text class="node" x="500" y="386">Co-expression networks</text>

    <rect x="700" y="360" width="220" height="44" rx="6" fill="#c4deea" stroke="#2c7fb8"/>
    <text class="node" x="810" y="386">Functional enrichment</text>
    <text class="node" x="810" y="400">analysis</text>
  </g>

  <!-- Illustrative icon rows (simplified) -->
  <!-- Heatmap-ish box at bottom-left -->
  <g transform="translate(90,425)">
    <rect width="20" height="10" fill="#c0392b"/><rect x="22" width="20" height="10" fill="#f39c12"/>
    <rect y="12" width="20" height="10" fill="#c0392b"/><rect x="22" y="12" width="20" height="10" fill="#2980b9"/>
    <rect y="24" width="20" height="10" fill="#f39c12"/><rect x="22" y="24" width="20" height="10" fill="#c0392b"/>
    <rect y="36" width="20" height="10" fill="#2980b9"/><rect x="22" y="36" width="20" height="10" fill="#f39c12"/>
    <line x1="60" y1="5"  x2="120" y2="5"  stroke="#555" stroke-width="6"/>
    <line x1="60" y1="15" x2="105" y2="15" stroke="#555" stroke-width="6"/>
    <line x1="60" y1="25" x2="95"  y2="25" stroke="#555" stroke-width="6"/>
    <line x1="60" y1="35" x2="75"  y2="35" stroke="#555" stroke-width="6"/>
    <text class="cap" x="90" y="60">pathway enrichment</text>
  </g>

  <!-- Network icon center -->
  <g transform="translate(420,430)">
    <circle cx="20"  cy="15" r="10" fill="#2ecc71"/>
    <circle cx="70"  cy="5"  r="10" fill="#e67e22"/>
    <circle cx="120" cy="20" r="10" fill="#9b59b6"/>
    <circle cx="50"  cy="50" r="10" fill="#2980b9"/>
    <circle cx="110" cy="55" r="10" fill="#f1c40f"/>
    <line x1="20"  y1="15" x2="70"  y2="5"  stroke="#555"/>
    <line x1="70"  y1="5"  x2="120" y2="20" stroke="#555"/>
    <line x1="20"  y1="15" x2="50"  y2="50" stroke="#555"/>
    <line x1="50"  y1="50" x2="110" y2="55" stroke="#555"/>
    <line x1="70"  y1="5"  x2="50"  y2="50" stroke="#555"/>
    <line x1="120" y1="20" x2="110" y2="55" stroke="#555"/>
    <text class="cap" x="70" y="85">module / co-expression</text>
  </g>

  <!-- UMAP-ish scatter right -->
  <g transform="translate(730,425)">
    <circle cx="20"  cy="20" r="4" fill="#2980b9"/>
    <circle cx="30"  cy="30" r="4" fill="#2980b9"/>
    <circle cx="40"  cy="22" r="4" fill="#2980b9"/>
    <circle cx="70"  cy="15" r="4" fill="#c0392b"/>
    <circle cx="80"  cy="28" r="4" fill="#c0392b"/>
    <circle cx="90"  cy="18" r="4" fill="#c0392b"/>
    <circle cx="120" cy="40" r="4" fill="#2ecc71"/>
    <circle cx="130" cy="50" r="4" fill="#2ecc71"/>
    <circle cx="140" cy="42" r="4" fill="#2ecc71"/>
    <circle cx="60"  cy="55" r="4" fill="#f1c40f"/>
    <circle cx="70"  cy="60" r="4" fill="#f1c40f"/>
    <text class="cap" x="90" y="85">annotated cell types</text>
  </g>
</svg>
