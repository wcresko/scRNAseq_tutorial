<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #222; text-anchor: middle; }
    .lbl { font-size: 12px; fill: #333; text-anchor: middle; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 12px; fill: #222; }
  </style>

  <text class="title" x="450" y="30">Droplet-based scRNA-seq: cell barcodes + UMIs</text>

  <!-- Droplet with cell + bead -->
  <g transform="translate(70,70)">
    <circle cx="90" cy="110" r="80" fill="#dbeaf2" stroke="#2c7fb8" stroke-width="2"/>
    <!-- cell -->
    <circle cx="70" cy="100" r="22" fill="#e66101" opacity="0.9"/>
    <text class="lbl" x="70" y="104" fill="#fff" font-weight="700">cell</text>
    <!-- bead with oligos -->
    <circle cx="120" cy="130" r="18" fill="#444"/>
    <text class="lbl" x="120" y="134" fill="#fff" font-weight="700">bead</text>
    <!-- oligo threads -->
    <path d="M 135 120 C 160 110 165 95 155 85" stroke="#555" stroke-width="1.5" fill="none"/>
    <path d="M 138 135 C 162 130 172 115 165 100" stroke="#555" stroke-width="1.5" fill="none"/>
    <path d="M 134 145 C 158 150 170 140 172 120" stroke="#555" stroke-width="1.5" fill="none"/>
    <text class="lbl" x="90" y="215">one cell + one barcoded bead</text>
    <text class="lbl" x="90" y="232">per droplet</text>
  </g>

  <!-- arrow -->
  <path d="M 225 180 L 285 180" stroke="#555" stroke-width="2" fill="none" marker-end="url(#ah)"/>
  <text class="lbl" x="255" y="170">RT</text>

  <!-- Barcoded cDNA schematic -->
  <g transform="translate(295,130)">
    <text class="lbl" x="150" y="-10">Resulting cDNA molecule</text>
    <!-- PCR handle -->
    <rect x="0"   y="0" width="45"  height="30" fill="#bbb"/>
    <text class="mono" x="22" y="20" text-anchor="middle">PCR</text>
    <!-- Cell BC -->
    <rect x="45"  y="0" width="80"  height="30" fill="#2c7fb8"/>
    <text class="mono" x="85" y="20" text-anchor="middle" fill="#fff">Cell barcode</text>
    <!-- UMI -->
    <rect x="125" y="0" width="60"  height="30" fill="#1b9e77"/>
    <text class="mono" x="155" y="20" text-anchor="middle" fill="#fff">UMI</text>
    <!-- polyT / cDNA -->
    <rect x="185" y="0" width="40"  height="30" fill="#e66101"/>
    <text class="mono" x="205" y="20" text-anchor="middle" fill="#fff">polyT</text>
    <rect x="225" y="0" width="85" height="30" fill="#756bb1"/>
    <text class="mono" x="267" y="20" text-anchor="middle" fill="#fff">cDNA (transcript)</text>
    <text class="lbl" x="85"  y="52">identifies cell</text>
    <text class="lbl" x="155" y="52">identifies molecule</text>
    <text class="lbl" x="267" y="52">measured gene</text>
  </g>

  <!-- arrow -->
  <path d="M 295 240 L 295 280" stroke="#555" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- Sequencing + demultiplex -->
  <g transform="translate(60,280)">
    <rect x="240" y="0" width="260" height="55" rx="8" fill="#eee" stroke="#888"/>
    <text class="lbl" x="370" y="20" font-weight="700">Sequence pooled library</text>
    <text class="lbl" x="370" y="40">demultiplex by cell barcode → cells × genes matrix</text>
  </g>

  <!-- Right note: UMI collapses PCR duplicates -->
  <g transform="translate(630,90)">
    <rect x="0" y="0" width="240" height="210" rx="10" fill="#fff7d6" stroke="#d9b41a"/>
    <text class="lbl" x="120" y="25" font-weight="700">Why UMIs?</text>
    <text class="lbl" x="120" y="55">Each mRNA gets a unique</text>
    <text class="lbl" x="120" y="72">random tag before PCR.</text>
    <text class="lbl" x="120" y="100">Reads sharing cell BC + UMI</text>
    <text class="lbl" x="120" y="117">+ gene = same original molecule</text>
    <text class="lbl" x="120" y="134">→ collapse PCR duplicates.</text>
    <text class="lbl" x="120" y="165" font-weight="700">Result: counts reflect</text>
    <text class="lbl" x="120" y="182">molecule number, not</text>
    <text class="lbl" x="120" y="199">amplification bias.</text>
  </g>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
