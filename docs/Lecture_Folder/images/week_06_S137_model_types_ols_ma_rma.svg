<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #222; }
    .model-header { font-size: 17px; font-weight: bold; fill: #333; }
    .item { font-size: 15px; fill: #444; }
    .num-blue { font-size: 15px; font-weight: bold; fill: #2166ac; }
    .num-green { font-size: 15px; font-weight: bold; fill: #4a8c3f; }
    .num-red { font-size: 15px; font-weight: bold; fill: #c0392b; }
    .axis-label { font-size: 14px; font-weight: bold; fill: #333; }
    .caption { font-size: 13px; fill: #555; }
    .fig-label { font-size: 13px; font-weight: bold; fill: #333; background: #e8e8e8; }
  </style>

  <!-- Left side: Text descriptions -->
  <!-- Model I -->
  <text x="30" y="40" class="model-header">Model I</text>
  <text x="30" y="65" class="item">- Ordinary Least Squares (OLS) </text>
  <text x="345" y="65" class="num-blue">[1]</text>

  <!-- Model II -->
  <text x="30" y="110" class="model-header">Model II</text>
  <text x="30" y="135" class="item">- Major Axis (MA) </text>
  <text x="248" y="135" class="num-green">[2]</text>
  <text x="30" y="160" class="item">- Ranged Major Axis (Ranged MA) </text>
  <text x="345" y="160" class="num-green">[2]</text>
  <text x="30" y="185" class="item">- Reduced Major Axis (RMA) </text>
  <text x="315" y="185" class="num-red">[3]</text>

  <!-- Right side: Diagram -->
  <!-- Axes -->
  <line x1="520" y1="380" x2="520" y2="50" stroke="#333" stroke-width="2"/>
  <line x1="520" y1="380" x2="870" y2="380" stroke="#333" stroke-width="2"/>
  <text x="510" y="45" class="axis-label">Y</text>
  <text x="875" y="385" class="axis-label">X</text>

  <!-- Regression line -->
  <line x1="550" y1="350" x2="840" y2="100" stroke="#333" stroke-width="2"/>

  <!-- Data point (upper right) -->
  <rect x="785" y="135" width="8" height="8" fill="#333"/>

  <!-- Data point (lower left) -->
  <rect x="665" y="265" width="8" height="8" fill="#333"/>

  <!-- OLS: vertical distance [1] -->
  <line x1="669" y1="270" x2="669" y2="225" stroke="#2166ac" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="660" y1="225" x2="678" y2="225" stroke="#2166ac" stroke-width="1.5"/>
  <!-- Arrow head -->
  <polygon points="669,230 664,240 674,240" fill="#2166ac"/>

  <!-- Label [1] -->
  <rect x="655" y="278" width="28" height="22" fill="white" stroke="#2166ac" stroke-width="2" rx="3"/>
  <text x="669" y="294" text-anchor="middle" class="num-blue" font-size="14">1</text>

  <!-- MA: horizontal distance [2] -->
  <line x1="670" y1="268" x2="710" y2="268" stroke="#4a8c3f" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow -->
  <polygon points="705,268 695,263 695,273" fill="#4a8c3f"/>

  <!-- Label [2] -->
  <rect x="710" y="280" width="28" height="22" fill="white" stroke="#4a8c3f" stroke-width="2" rx="3"/>
  <text x="724" y="296" text-anchor="middle" class="num-green" font-size="14">2</text>

  <!-- RMA: shaded triangle area [3] -->
  <polygon points="669,270 789,139 789,270" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1"/>

  <!-- Label [3] -->
  <rect x="775" y="155" width="28" height="22" fill="white" stroke="#c0392b" stroke-width="2" rx="3"/>
  <text x="789" y="171" text-anchor="middle" class="num-red" font-size="14">3</text>

  <!-- Figure caption box -->
  <rect x="530" y="400" width="330" height="60" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="4"/>
  <text x="545" y="420" class="fig-label">Figure 5.12</text>
  <text x="631" y="420" class="caption"> Distances or areas minimized by OLS (1), MA</text>
  <text x="545" y="438" class="caption">(2) and RMA (shaded area 3) linear regressions of Y on X.</text>
</svg>