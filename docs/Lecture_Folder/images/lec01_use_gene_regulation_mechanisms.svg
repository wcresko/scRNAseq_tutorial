<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Helvetica, Arial, sans-serif">
  <style>
    .lbl  { font-size: 13px; fill: #222; }
    .num  { font-size: 14px; font-weight: 700; fill: #222; text-anchor: middle; }
    .emph { font-size: 14px; font-weight: 700; fill: #2c7fb8; text-anchor: middle; }
    .small{ font-size: 11px; fill: #555; }
  </style>

  <!-- Left: nucleus oval with zoom indicator -->
  <g transform="translate(30,50)">
    <ellipse cx="100" cy="120" rx="95" ry="110" fill="#f2f2f2" stroke="#aaa"/>
    <text class="small" x="75" y="30">Nucleus</text>
    <!-- small chromatin squiggle inside -->
    <circle cx="100" cy="120" r="40" fill="#d9d9d9"/>
    <circle cx="100" cy="120" r="12" fill="none" stroke="#222"/>
    <line x1="112" y1="128" x2="280" y2="100" stroke="#333"/>
    <line x1="112" y1="120" x2="280" y2="90" stroke="#333"/>
  </g>

  <!-- Chromatin scaffold + nucleosomes row -->
  <g transform="translate(250,60)">
    <text class="emph" x="40" y="0">Chromatin</text>

    <!-- coiled chromatin (left, spring) -->
    <g stroke="#2c7fb8" stroke-width="3" fill="none">
      <path d="M20,40 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0"/>
      <path d="M20,55 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0"/>
      <path d="M20,70 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0 q10,-15 20,0 q10,15 20,0"/>
    </g>
    <text class="num" x="40" y="110">1</text><text class="lbl" x="60" y="110">Chromatin scaffolding</text>

    <!-- histones / nucleosomes -->
    <g transform="translate(200,20)">
      <g fill="#2c7fb8">
        <circle cx="0"   cy="30" r="16"/>
        <circle cx="40"  cy="30" r="16"/>
        <circle cx="80"  cy="30" r="16"/>
        <circle cx="120" cy="30" r="16"/>
        <circle cx="160" cy="30" r="16"/>
        <circle cx="200" cy="30" r="16"/>
        <circle cx="240" cy="30" r="16"/>
        <circle cx="280" cy="30" r="16"/>
      </g>
      <path d="M-10,30 q0,-24 18,0 q0,24 22,0 q0,-24 22,0 q0,24 22,0 q0,-24 22,0 q0,24 22,0 q0,-24 22,0 q0,24 22,0 q0,-24 22,0 q0,24 22,0" fill="none" stroke="#1f4e79" stroke-width="2"/>
      <text class="lbl" x="0"   y="70">Histones</text>
      <text class="lbl" x="120" y="70">DNA</text>
      <text class="small" x="160" y="90">Nucleosome</text>
    </g>
    <!-- Remodeling complex (on the right) -->
    <g transform="translate(520,20)">
      <path d="M-10,10 q15,-15 30,0 q15,15 30,-10 q15,25 30,-5 q-10,25 -40,15 q-30,10 -50,0 z" fill="#e67e22" stroke="#a04a12"/>
      <text class="emph" x="20" y="70">Remodeling</text>
      <text class="emph" x="20" y="88">complex</text>
    </g>
    <text class="num" x="500" y="130">2</text><text class="lbl" x="520" y="130">Chromatin remodeling</text>
  </g>

  <!-- Middle row with beads and transcription complex -->
  <g transform="translate(150,300)">
    <!-- string of nucleosomes (histones with tails) -->
    <g transform="translate(400,0)">
      <g fill="#2c7fb8">
        <circle cx="0"   cy="30" r="14"/>
        <circle cx="40"  cy="30" r="14"/>
        <circle cx="80"  cy="30" r="14"/>
        <circle cx="120" cy="30" r="14"/>
        <circle cx="160" cy="30" r="14"/>
        <circle cx="200" cy="30" r="14"/>
        <circle cx="240" cy="30" r="14"/>
        <circle cx="280" cy="30" r="14"/>
      </g>
      <!-- histone modification marks (yellow dots) -->
      <g fill="#f1c40f">
        <circle cx="0"   cy="14" r="3"/>
        <circle cx="80"  cy="14" r="3"/>
        <circle cx="160" cy="14" r="3"/>
        <circle cx="240" cy="14" r="3"/>
      </g>
      <path d="M-10,30 q0,-22 18,0 q0,22 22,0 q0,-22 22,0 q0,22 22,0 q0,-22 22,0 q0,22 22,0 q0,-22 22,0 q0,22 22,0 q0,-22 22,0 q0,22 22,0" fill="none" stroke="#1f4e79" stroke-width="2"/>
      <text class="num" x="100" y="85">3</text><text class="lbl" x="120" y="85">Histone modification</text>
    </g>

    <!-- left lower: transcription complex + promoter/enhancer -->
    <g transform="translate(-80,20)">
      <!-- curved DNA -->
      <path d="M20,140 q120,-140 280,-10" fill="none" stroke="#1f4e79" stroke-width="3"/>
      <!-- nucleosomes on DNA -->
      <g fill="#2c7fb8"><circle cx="50" cy="100" r="12"/><circle cx="100" cy="70" r="12"/><circle cx="155" cy="50" r="12"/></g>
      <!-- methylation marks on left end -->
      <g fill="#c0392b">
        <circle cx="10" cy="150" r="4"/>
        <circle cx="20" cy="170" r="4"/>
        <circle cx="30" cy="155" r="4"/>
        <circle cx="15" cy="185" r="4"/>
        <circle cx="35" cy="175" r="4"/>
      </g>
      <text class="num" x="5" y="225">5</text><text class="lbl" x="25" y="225">DNA methylation</text>

      <!-- transcription factor (purple blob) -->
      <g transform="translate(120,130)">
        <path d="M0,0 q30,-30 60,0 q30,30 0,40 q-40,30 -70,10 q-30,-25 10,-50 z" fill="#8e44ad" stroke="#5e2d78"/>
        <text class="lbl" x="-25" y="-30">Binding</text>
        <text class="lbl" x="-15" y="-18">motif</text>
        <rect x="0" y="-6" width="55" height="8" fill="#f1c40f" stroke="#333"/>
        <text class="small" x="5" y="0" fill="#333">ATA</text>
        <text class="lbl" x="30" y="90" text-anchor="middle">RNA Polymerase</text>
      </g>
      <!-- Promoter / Enhancer capsules -->
      <ellipse cx="130" cy="165" rx="40" ry="15" fill="#fff" stroke="#333"/>
      <text class="small" x="110" y="169">Promoter</text>
      <ellipse cx="190" cy="200" rx="40" ry="15" fill="#fff" stroke="#333"/>
      <text class="small" x="170" y="204">Enhancer</text>
      <text class="num" x="75" y="95">4</text>
      <text class="lbl" x="100" y="80">Transcription</text>
      <text class="lbl" x="100" y="95">factor binding</text>

      <!-- transcription initiation complex -->
      <g transform="translate(40,190)">
        <ellipse cx="0" cy="0" rx="40" ry="20" fill="#9bc0eb" stroke="#2c7fb8"/>
        <ellipse cx="40" cy="0" rx="30" ry="15" fill="#16a085" opacity="0.8"/>
        <text class="lbl" x="-60" y="-30">Transcription</text>
        <text class="lbl" x="-60" y="-16">initiation complex</text>
      </g>

      <!-- RNA label -->
      <line x1="220" y1="140" x2="260" y2="90" stroke="#c0392b"/>
      <text class="lbl" x="245" y="88" fill="#c0392b">RNA</text>
    </g>
  </g>
</svg>
