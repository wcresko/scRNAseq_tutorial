<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="350" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Talapas Storage Structure</text>

  <!-- Root / -->
  <rect x="30" y="80" width="60" height="35" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="60" y="102" text-anchor="middle" font-weight="bold" fill="#000">/</text>

  <!-- Lines from root -->
  <line x1="90" y1="90" x2="140" y2="55" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="90" y1="97" x2="140" y2="97" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="90" y1="105" x2="140" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- /home -->
  <rect x="145" y="35" width="80" height="35" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="185" y="57" text-anchor="middle" fill="#000">/home</text>

  <!-- /projects -->
  <rect x="145" y="80" width="90" height="35" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="190" y="102" text-anchor="middle" fill="#000">/projects</text>

  <!-- /tmp -->
  <rect x="145" y="140" width="70" height="35" rx="6" fill="#ffa07a" stroke="#333" stroke-width="2"/>
  <text x="180" y="162" text-anchor="middle" fill="#000">/tmp</text>

  <!-- /home/duckid -->
  <line x1="225" y1="52" x2="290" y2="52" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="295" y="35" width="130" height="35" rx="6" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <text x="360" y="57" text-anchor="middle" fill="#000">/home/duckid</text>

  <!-- /projects/PIRG -->
  <line x1="235" y1="97" x2="290" y2="97" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="295" y="80" width="140" height="35" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="365" y="102" text-anchor="middle" fill="#000">/projects/PIRG</text>

  <!-- /projects/PIRG/duckid -->
  <line x1="435" y1="90" x2="490" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="495" y="55" width="180" height="35" rx="6" fill="#98fb98" stroke="#333" stroke-width="2"/>
  <text x="585" y="77" text-anchor="middle" fill="#000">/projects/PIRG/duckid</text>

  <!-- /projects/PIRG/shared -->
  <line x1="435" y1="105" x2="490" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="495" y="110" width="180" height="35" rx="6" fill="#f9d71c" stroke="#333" stroke-width="2"/>
  <text x="585" y="132" text-anchor="middle" fill="#000">/projects/PIRG/shared</text>
</svg>
