<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
  <defs>
    <style>
      .t { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #2c3e50; }
      .box { rx: 8; stroke-width: 2; }
      .arr { fill: none; stroke: #7f8c8d; stroke-width: 2; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
    <marker id="ah-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" class="t" font-size="18" text-anchor="middle" font-weight="bold">From SNE to t-SNE: How Neighborhood Graphs Become Embeddings</text>

  <!-- ===== STEP 1: High-dimensional space ===== -->
  <rect x="15" y="45" width="280" height="200" fill="#eaf2f8" stroke="#2980b9" class="box"/>
  <text x="155" y="68" class="t" font-size="14" text-anchor="middle" font-weight="bold" fill="#2980b9">Step 1: High-Dimensional Space</text>

  <!-- Central point -->
  <circle cx="155" cy="145" r="7" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="168" y="142" class="t" font-size="10" fill="#e74c3c" font-weight="bold">x&#x1D62;</text>

  <!-- Neighbor points with Gaussian falloff -->
  <circle cx="120" cy="115" r="5" fill="#3498db" opacity="0.9"/>
  <circle cx="180" cy="120" r="5" fill="#3498db" opacity="0.85"/>
  <circle cx="140" cy="170" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="195" cy="155" r="5" fill="#3498db" opacity="0.5"/>
  <circle cx="100" cy="160" r="5" fill="#3498db" opacity="0.4"/>
  <circle cx="80" cy="100" r="4" fill="#3498db" opacity="0.2"/>
  <circle cx="220" cy="180" r="4" fill="#3498db" opacity="0.15"/>
  <circle cx="230" cy="105" r="4" fill="#3498db" opacity="0.1"/>

  <!-- Gaussian envelope -->
  <ellipse cx="155" cy="145" rx="70" ry="50" fill="none" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="235" y="105" class="t" font-size="9" fill="#e74c3c">Gaussian</text>
  <text x="235" y="116" class="t" font-size="9" fill="#e74c3c">kernel</text>

  <!-- Probability annotation -->
  <text x="155" y="215" class="t" font-size="10" text-anchor="middle">Probability p&#x2C7C;|&#x1D62; &#x221D; exp(&#x2212;||x&#x1D62; &#x2212; x&#x2C7C;||&#x00B2; / 2&#x03C3;&#x1D62;&#x00B2;)</text>
  <text x="155" y="232" class="t" font-size="9" text-anchor="middle" fill="#666">Closer neighbors &#x2192; higher probability</text>

  <!-- ===== Arrow 1 ===== -->
  <line x1="300" y1="145" x2="330" y2="145" class="arr" marker-end="url(#ah)"/>

  <!-- ===== STEP 2: Probability distributions ===== -->
  <rect x="335" y="45" width="250" height="200" fill="#fef9e7" stroke="#f39c12" class="box"/>
  <text x="460" y="68" class="t" font-size="14" text-anchor="middle" font-weight="bold" fill="#d68910">Step 2: Convert to Probabilities</text>

  <!-- High-D probability curve (Gaussian) -->
  <text x="460" y="92" class="t" font-size="11" text-anchor="middle" font-weight="bold">High-D: Gaussian</text>
  <path d="M 370 165 Q 390 160 410 140 Q 430 100 460 95 Q 490 100 510 140 Q 530 160 550 165" fill="none" stroke="#2980b9" stroke-width="2.5"/>
  <text x="460" y="183" class="t" font-size="10" text-anchor="middle" fill="#2980b9">p&#x2C7C;|&#x1D62;</text>

  <!-- Annotation -->
  <text x="460" y="205" class="t" font-size="10" text-anchor="middle">For each point x&#x1D62;, compute the</text>
  <text x="460" y="218" class="t" font-size="10" text-anchor="middle">probability that x&#x2C7C; is its neighbor</text>
  <text x="460" y="235" class="t" font-size="10" text-anchor="middle" fill="#888">&#x03C3;&#x1D62; set by perplexity parameter</text>

  <!-- ===== Arrow 2 ===== -->
  <line x1="590" y1="145" x2="620" y2="145" class="arr" marker-end="url(#ah)"/>

  <!-- ===== STEP 3: Low-D embedding ===== -->
  <rect x="625" y="45" width="280" height="200" fill="#e8f8e8" stroke="#27ae60" class="box"/>
  <text x="765" y="68" class="t" font-size="14" text-anchor="middle" font-weight="bold" fill="#27ae60">Step 3: Low-D Embedding</text>

  <!-- Embedded points (well-separated clusters) -->
  <circle cx="700" cy="120" r="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <circle cx="680" cy="105" r="4" fill="#3498db"/>
  <circle cx="715" cy="110" r="4" fill="#3498db"/>
  <circle cx="690" cy="135" r="4" fill="#3498db"/>

  <circle cx="820" cy="170" r="4" fill="#9b59b6"/>
  <circle cx="840" cy="155" r="4" fill="#9b59b6"/>
  <circle cx="830" cy="185" r="4" fill="#9b59b6"/>

  <!-- Low-D probability annotation -->
  <text x="765" y="215" class="t" font-size="10" text-anchor="middle">Compute q&#x2C7C;|&#x1D62; in embedding space</text>
  <text x="765" y="232" class="t" font-size="10" text-anchor="middle" fill="#888">Minimize KL(P || Q) via gradient descent</text>

  <!-- ===== BOTTOM: SNE vs t-SNE difference ===== -->
  <rect x="15" y="270" width="440" height="235" fill="#fdf2f2" stroke="#e74c3c" class="box"/>
  <text x="235" y="295" class="t" font-size="15" text-anchor="middle" font-weight="bold" fill="#c0392b">The Key Insight: Why the "t" Matters</text>

  <!-- SNE side -->
  <text x="130" y="320" class="t" font-size="12" text-anchor="middle" font-weight="bold">Original SNE</text>
  <text x="130" y="338" class="t" font-size="11" text-anchor="middle">Low-D also uses Gaussian:</text>

  <!-- Gaussian curve (narrow, tall) -->
  <path d="M 60 440 Q 80 435 100 410 Q 115 370 130 360 Q 145 370 160 410 Q 180 435 200 440" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="130" y="455" class="t" font-size="10" text-anchor="middle" fill="#3498db">Gaussian in low-D</text>

  <!-- Problem annotation -->
  <rect x="35" y="462" width="190" height="35" fill="#fce4e4" stroke="#e74c3c" stroke-width="1" rx="4"/>
  <text x="130" y="478" class="t" font-size="10" text-anchor="middle" fill="#c0392b" font-weight="bold">Problem: "crowding"</text>
  <text x="130" y="491" class="t" font-size="9" text-anchor="middle" fill="#c0392b">Distant points collapse together</text>

  <!-- Arrow between -->
  <line x1="240" y1="400" x2="280" y2="400" stroke="#27ae60" stroke-width="3" marker-end="url(#ah-grn)"/>
  <text x="260" y="390" class="t" font-size="10" text-anchor="middle" fill="#27ae60" font-weight="bold">Fix</text>

  <!-- t-SNE side -->
  <text x="370" y="320" class="t" font-size="12" text-anchor="middle" font-weight="bold" fill="#27ae60">t-SNE</text>
  <text x="370" y="338" class="t" font-size="11" text-anchor="middle">Low-D uses Student's t (df=1):</text>

  <!-- t-distribution curve (wider, heavier tails) -->
  <path d="M 280 440 Q 300 438 320 428 Q 340 405 355 385 Q 365 370 370 365 Q 375 370 385 385 Q 400 405 420 428 Q 440 438 460 440" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <!-- Show the heavy tail explicitly -->
  <line x1="290" y1="440" x2="280" y2="440" stroke="#27ae60" stroke-width="2"/>
  <line x1="450" y1="440" x2="460" y2="440" stroke="#27ae60" stroke-width="2"/>
  <text x="370" y="455" class="t" font-size="10" text-anchor="middle" fill="#27ae60">t-distribution in low-D</text>

  <!-- Solution annotation -->
  <rect x="275" y="462" width="190" height="35" fill="#e8f8e8" stroke="#27ae60" stroke-width="1" rx="4"/>
  <text x="370" y="478" class="t" font-size="10" text-anchor="middle" fill="#1a7a3a" font-weight="bold">Solution: heavy tails</text>
  <text x="370" y="491" class="t" font-size="9" text-anchor="middle" fill="#1a7a3a">Distant pairs pushed further apart</text>

  <!-- ===== RIGHT PANEL: Summary ===== -->
  <rect x="475" y="270" width="430" height="235" fill="#f4f6f9" stroke="#8e44ad" class="box"/>
  <text x="690" y="295" class="t" font-size="15" text-anchor="middle" font-weight="bold" fill="#8e44ad">t-SNE Algorithm Summary</text>

  <text x="500" y="322" class="t" font-size="12" font-weight="bold">1.</text>
  <text x="520" y="322" class="t" font-size="11">For each point x&#x1D62;, compute pairwise</text>
  <text x="520" y="337" class="t" font-size="11">affinities p&#x1D62;&#x2C7C; using Gaussian kernel</text>

  <text x="500" y="362" class="t" font-size="12" font-weight="bold">2.</text>
  <text x="520" y="362" class="t" font-size="11">Initialize random low-D points y&#x1D62;</text>

  <text x="500" y="387" class="t" font-size="12" font-weight="bold">3.</text>
  <text x="520" y="387" class="t" font-size="11">Compute low-D affinities q&#x1D62;&#x2C7C; using</text>
  <text x="520" y="402" class="t" font-size="11">Student's t-distribution (df = 1)</text>

  <text x="500" y="427" class="t" font-size="12" font-weight="bold">4.</text>
  <text x="520" y="427" class="t" font-size="11">Minimize KL divergence between</text>
  <text x="520" y="442" class="t" font-size="11">P and Q via gradient descent</text>

  <text x="500" y="467" class="t" font-size="12" font-weight="bold">5.</text>
  <text x="520" y="467" class="t" font-size="11">Iterate until embedding stabilizes</text>

  <rect x="490" y="480" width="400" height="18" fill="#f0ecf5" rx="3"/>
  <text x="690" y="494" class="t" font-size="10" text-anchor="middle" fill="#8e44ad">Perplexity controls &#x03C3;&#x1D62; &#x2192; effective neighborhood size</text>
</svg>
