<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ax { font-size: 13px; fill: #222; }
    .lbl { font-size: 12px; fill: #222; text-anchor: middle; }
    .big { font-size: 48px; fill: #c0392b; font-weight: 700; text-anchor: middle; }
    .ct { font-size: 12px; fill: #222; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Two intestines (stylised) stacked -->
  <g transform="translate(40,30)">
    <path d="M20,10 q10,-6 20,0 t20,0 t20,0 l0,30 q-10,6 -20,0 t-20,0 t-20,0 z" fill="#3c6daa" stroke="#2c4e76"/>
    <path d="M20,50 q10,-6 20,0 t20,0 t20,0 l0,30 q-10,6 -20,0 t-20,0 t-20,0 z" fill="#3c6daa" stroke="#2c4e76"/>
    <text class="lbl" x="50" y="105">Healthy</text>
  </g>
  <g transform="translate(40,330)">
    <path d="M20,10 q10,-6 20,0 t20,0 t20,0 l0,30 q-10,6 -20,0 t-20,0 t-20,0 z" fill="#c0392b" stroke="#7a2017"/>
    <path d="M20,50 q10,-6 20,0 t20,0 t20,0 l0,30 q-10,6 -20,0 t-20,0 t-20,0 z" fill="#c0392b" stroke="#7a2017"/>
    <text class="lbl" x="50" y="105">Inflamed</text>
  </g>

  <!-- Arrows to machine -->
  <line x1="110" y1="60" x2="160" y2="150" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
  <line x1="110" y1="360" x2="160" y2="270" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <!-- Sequencer + tube + chip -->
  <g transform="translate(170,180)">
    <rect x="0" y="0" width="70" height="50" rx="4" fill="#d9d9d9" stroke="#333"/>
    <rect x="10" y="10" width="50" height="18" fill="#333"/>
    <text class="lbl" x="35" y="46" style="font-size:9px">scRNA-seq</text>
  </g>
  <line x1="245" y1="205" x2="280" y2="205" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <g transform="translate(285,180)">
    <!-- Eppendorf tube -->
    <path d="M10,5 H40 V40 Q25,55 10,40 Z" fill="#fff" stroke="#333"/>
    <circle cx="18" cy="20" r="2" fill="#2980b9"/>
    <circle cx="28" cy="25" r="2" fill="#c0392b"/>
    <circle cx="22" cy="35" r="2" fill="#f1c40f"/>
  </g>
  <line x1="335" y1="205" x2="370" y2="205" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <!-- Chromium chip -->
  <g transform="translate(375,170)">
    <rect x="0" y="0" width="90" height="70" fill="#dce8f5" stroke="#333"/>
    <line x1="10" y1="0" x2="10" y2="70" stroke="#333"/>
    <line x1="25" y1="0" x2="25" y2="70" stroke="#333"/>
    <circle cx="40" cy="20" r="4" fill="#c0392b"/>
    <circle cx="55" cy="30" r="4" fill="#2980b9"/>
    <circle cx="45" cy="50" r="4" fill="#e8a4b0"/>
    <circle cx="65" cy="55" r="4" fill="#2c3e50"/>
    <line x1="80" y1="0" x2="80" y2="70" stroke="#9bc0eb" stroke-width="4"/>
  </g>
  <line x1="470" y1="205" x2="510" y2="120" stroke="#222" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="205" x2="510" y2="300" stroke="#222" stroke-width="2" marker-end="url(#a)"/>

  <!-- Top UMAP panel (healthy) -->
  <g transform="translate(520,40)">
    <line x1="0" y1="150" x2="200" y2="150" stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="0" y1="150" x2="0" y2="0"  stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <text class="ax" x="-30" y="70" transform="rotate(-90 -30 70)">UMAP2</text>
    <text class="ax" x="100" y="170" text-anchor="middle">UMAP1</text>
    <!-- Clusters -->
    <g fill="#c0392b"><circle cx="40" cy="80" r="4"/><circle cx="50" cy="90" r="4"/><circle cx="60" cy="85" r="4"/><circle cx="45" cy="100" r="4"/><circle cx="55" cy="75" r="4"/><circle cx="35" cy="95" r="4"/></g>
    <g fill="#e6a6b7"><circle cx="80" cy="110" r="4"/><circle cx="90" cy="120" r="4"/><circle cx="95" cy="105" r="4"/><circle cx="85" cy="125" r="4"/><circle cx="75" cy="115" r="4"/><circle cx="100" cy="118" r="4"/><circle cx="88" cy="100" r="4"/><circle cx="92" cy="130" r="4"/></g>
    <g fill="#aec6df"><circle cx="140" cy="40" r="4"/><circle cx="150" cy="45" r="4"/><circle cx="160" cy="35" r="4"/><circle cx="155" cy="55" r="4"/><circle cx="145" cy="50" r="4"/></g>
    <g fill="#2c3e50"><circle cx="160" cy="60" r="4"/><circle cx="170" cy="50" r="4"/><circle cx="175" cy="65" r="4"/><circle cx="165" cy="75" r="4"/></g>
    <!-- Bar chart -->
    <g transform="translate(215,60)">
      <rect x="0"  y="50" width="14" height="40" fill="#c0392b"/>
      <rect x="18" y="30" width="14" height="60" fill="#e6a6b7"/>
      <rect x="36" y="40" width="14" height="50" fill="#aec6df"/>
      <rect x="54" y="20" width="14" height="70" fill="#2c3e50"/>
      <line x1="-4" y1="90" x2="72" y2="90" stroke="#222"/>
    </g>
  </g>

  <!-- Bottom UMAP panel (inflamed) -->
  <g transform="translate(520,280)">
    <line x1="0" y1="150" x2="200" y2="150" stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="0" y1="150" x2="0" y2="0"  stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <text class="ax" x="-30" y="70" transform="rotate(-90 -30 70)">UMAP2</text>
    <text class="ax" x="100" y="170" text-anchor="middle">UMAP1</text>
    <g fill="#c0392b"><circle cx="40" cy="80" r="4"/><circle cx="50" cy="90" r="4"/><circle cx="60" cy="85" r="4"/><circle cx="45" cy="100" r="4"/><circle cx="55" cy="75" r="4"/><circle cx="35" cy="95" r="4"/><circle cx="65" cy="95" r="4"/><circle cx="70" cy="75" r="4"/><circle cx="55" cy="105" r="4"/><circle cx="40" cy="110" r="4"/><circle cx="30" cy="80" r="4"/></g>
    <g fill="#e6a6b7"><circle cx="90" cy="120" r="4"/><circle cx="95" cy="105" r="4"/><circle cx="85" cy="125" r="4"/><circle cx="100" cy="118" r="4"/></g>
    <g fill="#aec6df"><circle cx="140" cy="40" r="4"/><circle cx="150" cy="45" r="4"/><circle cx="160" cy="35" r="4"/></g>
    <g fill="#2c3e50"><circle cx="160" cy="60" r="4"/></g>
    <!-- Bar chart -->
    <g transform="translate(215,60)">
      <rect x="0"  y="10" width="14" height="80" fill="#c0392b"/>
      <rect x="18" y="55" width="14" height="35" fill="#e6a6b7"/>
      <rect x="36" y="60" width="14" height="30" fill="#aec6df"/>
      <rect x="54" y="70" width="14" height="20" fill="#2c3e50"/>
      <line x1="-4" y1="90" x2="72" y2="90" stroke="#222"/>
    </g>
  </g>

  <!-- Double headed arrow with ? between two panels -->
  <g transform="translate(780,230)">
    <line x1="0" y1="-20" x2="0" y2="60" stroke="#222" stroke-width="2" stroke-dasharray="5,4"/>
    <polygon points="0,-26 -4,-18 4,-18" fill="#222"/>
    <polygon points="0,66 -4,58 4,58" fill="#222"/>
    <text class="big" x="25" y="30">?</text>
  </g>

  <!-- Right: Log2FC bar plot -->
  <g transform="translate(850,60)">
    <line x1="0" y1="220" x2="0" y2="20" stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="-10" y1="120" x2="200" y2="120" stroke="#222" stroke-width="1.5" marker-end="url(#a)"/>
    <!-- Bars -->
    <rect x="10"  y="120" width="30" height="70" fill="#c0392b"/>
    <rect x="50"  y="120" width="30" height="55" fill="#e6a6b7"/>
    <rect x="90"  y="110" width="30" height="10" fill="#aec6df"/>
    <rect x="130" y="40"  width="30" height="80" fill="#2c3e50"/>
    <text class="ax" x="25" y="210" text-anchor="middle">A</text>
    <text class="ax" x="65" y="210" text-anchor="middle">B</text>
    <text class="ax" x="105" y="210" text-anchor="middle">C</text>
    <text class="ax" x="145" y="210" text-anchor="middle">D</text>
    <text class="ax" x="100" y="240" text-anchor="middle">Cell type</text>
    <text class="ax" x="-75" y="80" transform="rotate(-90 -75 80)">log2 fold change</text>

    <!-- Legend -->
    <g transform="translate(210,10)">
      <rect x="0"  y="0" width="14" height="12" fill="#c0392b"/><text class="ct" x="20" y="11">cell type A</text>
      <rect x="0" y="18" width="14" height="12" fill="#e6a6b7"/><text class="ct" x="20" y="29">cell type B</text>
      <rect x="0" y="36" width="14" height="12" fill="#aec6df"/><text class="ct" x="20" y="47">cell type C</text>
      <rect x="0" y="54" width="14" height="12" fill="#2c3e50"/><text class="ct" x="20" y="65">cell type D</text>
    </g>
  </g>
</svg>
