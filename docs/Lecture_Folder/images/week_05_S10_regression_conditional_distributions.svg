<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="serif">
  <!-- Y axis -->
  <line x1="400" y1="520" x2="400" y2="30" stroke="black" stroke-width="2"/>
  <text x="390" y="25" font-size="24" font-style="italic">Y</text>

  <!-- X axis -->
  <line x1="50" y1="520" x2="750" y2="520" stroke="black" stroke-width="2"/>
  <text x="740" y="545" font-size="24" font-style="italic">X</text>

  <!-- x1 and x2 labels -->
  <text x="230" y="555" font-size="22" font-style="italic">x<tspan font-size="15" dy="4">1</tspan></text>
  <text x="500" y="555" font-size="22" font-style="italic">x<tspan font-size="15" dy="4">2</tspan></text>

  <!-- Regression line (going from lower-left to upper-right) -->
  <line x1="80" y1="510" x2="730" y2="80" stroke="black" stroke-width="3"/>

  <!-- Confidence band lines -->
  <line x1="50" y1="480" x2="700" y2="50" stroke="black" stroke-width="1.5"/>
  <line x1="110" y1="540" x2="760" y2="110" stroke="black" stroke-width="1.5"/>

  <!-- Normal distribution at x1 (rotated 90 degrees, centered on regression line) -->
  <!-- At x1=250, regression line y ~ 370 -->
  <path d="M 250,370 C 250,370 220,370 210,340 C 200,310 200,290 220,260 C 230,240 240,230 250,220 C 260,230 270,240 280,260 C 300,290 300,310 290,340 C 280,370 250,370 250,370" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="250" cy="370" r="5" fill="black"/>
  <text x="260" y="385" font-size="20" font-style="italic">&mu;<tspan font-size="14" dy="4">y<tspan font-size="11" dy="2">1</tspan></tspan></text>

  <!-- Normal distribution at x2 (rotated 90 degrees) -->
  <!-- At x2=520, regression line y ~ 210 -->
  <path d="M 520,210 C 520,210 490,210 480,180 C 470,150 470,130 490,100 C 500,80 510,70 520,60 C 530,70 540,80 550,100 C 570,130 570,150 560,180 C 550,210 520,210 520,210" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="520" cy="210" r="5" fill="black"/>
  <text x="530" y="225" font-size="20" font-style="italic">&mu;<tspan font-size="14" dy="4">y<tspan font-size="11" dy="2">2</tspan></tspan></text>

  <!-- Equation label -->
  <text x="80" y="120" font-size="22" font-style="italic">&mu;<tspan font-size="14" dy="4">y<tspan font-size="11" dy="2">i</tspan></tspan><tspan dy="-6" font-style="normal"> = </tspan><tspan font-style="italic">&beta;</tspan><tspan font-size="14" dy="4">0</tspan><tspan dy="-4" font-style="normal"> + </tspan><tspan font-style="italic">&beta;</tspan><tspan font-size="14" dy="4">1</tspan><tspan dy="-4" font-style="italic">x</tspan><tspan font-size="14" dy="4">i</tspan></text>
</svg>
