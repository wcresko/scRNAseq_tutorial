<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Arial, Helvetica, sans-serif">
  <style>
    .axis-label { font-size: 14px; text-anchor: middle; }
    .tick-label { font-size: 12px; text-anchor: middle; }
    .tick-label-y { font-size: 12px; text-anchor: end; }
    .panel-label { font-size: 14px; text-anchor: middle; }
    .annotation { font-size: 12px; font-style: italic; }
    .line-dashed { stroke: #000; stroke-width: 1.5; stroke-dasharray: 8,4; fill: none; }
    .axis-line { stroke: #000; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Panel (a): Same intercept (beta0=2), different slopes -->
  <g transform="translate(20, 20)">
    <!-- Axes -->
    <line x1="60" y1="30" x2="60" y2="310" class="axis-line"/>
    <line x1="60" y1="310" x2="280" y2="310" class="axis-line"/>
    <!-- Y-axis ticks: 0,1,2,3,4 -->
    <line x1="55" y1="310" x2="60" y2="310" stroke="#000" stroke-width="1"/>
    <text x="50" y="314" class="tick-label-y">0</text>
    <line x1="55" y1="240" x2="60" y2="240" stroke="#000" stroke-width="1"/>
    <text x="50" y="244" class="tick-label-y">1</text>
    <line x1="55" y1="170" x2="60" y2="170" stroke="#000" stroke-width="1"/>
    <text x="50" y="174" class="tick-label-y">2</text>
    <line x1="55" y1="100" x2="60" y2="100" stroke="#000" stroke-width="1"/>
    <text x="50" y="104" class="tick-label-y">3</text>
    <line x1="55" y1="30" x2="60" y2="30" stroke="#000" stroke-width="1"/>
    <text x="50" y="34" class="tick-label-y">4</text>
    <!-- Y-axis label -->
    <text x="18" y="170" class="axis-label" transform="rotate(-90, 18, 170)">Dependent (Y)</text>
    <!-- X-axis label -->
    <text x="170" y="345" class="axis-label">Independent (X)</text>
    <!-- Panel label -->
    <text x="170" y="375" class="panel-label">(a)</text>
    <!-- Horizontal dashed line at y=2 (beta0=2) -->
    <line x1="60" y1="170" x2="270" y2="170" class="line-dashed"/>
    <!-- Positive slope line from (0,2) going up -->
    <line x1="60" y1="170" x2="270" y2="40" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
    <!-- Negative slope line from (0,2) going down -->
    <line x1="60" y1="170" x2="270" y2="300" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
    <!-- Annotations -->
    <text x="200" y="55" class="annotation" fill="#000">&#x3B2;&#x2081;&gt;0</text>
    <text x="145" y="155" class="annotation" fill="#000">Slope (&#x3B2;&#x2081;) = 0</text>
    <text x="200" y="290" class="annotation" fill="#000">&#x3B2;&#x2081;&lt;0</text>
    <text x="70" y="298" class="annotation" fill="#000">Y-intercept(&#x3B2;&#x2080;) = 2 for all</text>
  </g>

  <!-- Panel (b): Different intercepts (0,1,2), same positive slope -->
  <g transform="translate(330, 20)">
    <line x1="60" y1="30" x2="60" y2="310" class="axis-line"/>
    <line x1="60" y1="310" x2="280" y2="310" class="axis-line"/>
    <line x1="55" y1="310" x2="60" y2="310" stroke="#000" stroke-width="1"/>
    <text x="50" y="314" class="tick-label-y">0</text>
    <line x1="55" y1="240" x2="60" y2="240" stroke="#000" stroke-width="1"/>
    <text x="50" y="244" class="tick-label-y">1</text>
    <line x1="55" y1="170" x2="60" y2="170" stroke="#000" stroke-width="1"/>
    <text x="50" y="174" class="tick-label-y">2</text>
    <line x1="55" y1="100" x2="60" y2="100" stroke="#000" stroke-width="1"/>
    <text x="50" y="104" class="tick-label-y">3</text>
    <line x1="55" y1="30" x2="60" y2="30" stroke="#000" stroke-width="1"/>
    <text x="50" y="34" class="tick-label-y">4</text>
    <text x="18" y="170" class="axis-label" transform="rotate(-90, 18, 170)">Dependent (Y)</text>
    <text x="170" y="345" class="axis-label">Independent (X)</text>
    <text x="170" y="375" class="panel-label">(b)</text>
    <!-- Three parallel lines with same slope, different intercepts -->
    <!-- beta0=0, slope positive: from (0,0) -->
    <line x1="60" y1="310" x2="270" y2="170" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
    <!-- beta0=1: from (0,1) -->
    <line x1="60" y1="240" x2="270" y2="100" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
    <!-- beta0=2: from (0,2) -->
    <line x1="60" y1="170" x2="270" y2="30" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
    <!-- Labels -->
    <text x="220" y="55" class="annotation">&#x3B2;&#x2080; = 2, &#x3B2;&#x2081;&gt;0</text>
    <text x="220" y="118" class="annotation">&#x3B2;&#x2080; = 1, &#x3B2;&#x2081;&gt;0</text>
    <text x="220" y="185" class="annotation">&#x3B2;&#x2080; = 0, &#x3B2;&#x2081;&gt;0</text>
  </g>

  <!-- Panel (c): Different intercepts, zero slope (horizontal lines) -->
  <g transform="translate(640, 20)">
    <line x1="60" y1="30" x2="60" y2="310" class="axis-line"/>
    <line x1="60" y1="310" x2="280" y2="310" class="axis-line"/>
    <line x1="55" y1="310" x2="60" y2="310" stroke="#000" stroke-width="1"/>
    <text x="50" y="314" class="tick-label-y">0</text>
    <line x1="55" y1="240" x2="60" y2="240" stroke="#000" stroke-width="1"/>
    <text x="50" y="244" class="tick-label-y">1</text>
    <line x1="55" y1="170" x2="60" y2="170" stroke="#000" stroke-width="1"/>
    <text x="50" y="174" class="tick-label-y">2</text>
    <line x1="55" y1="100" x2="60" y2="100" stroke="#000" stroke-width="1"/>
    <text x="50" y="104" class="tick-label-y">3</text>
    <text x="18" y="170" class="axis-label" transform="rotate(-90, 18, 170)">Dependent (Y)</text>
    <text x="170" y="345" class="axis-label">Independent (X)</text>
    <text x="170" y="375" class="panel-label">(c)</text>
    <!-- Three horizontal dashed lines -->
    <line x1="60" y1="310" x2="270" y2="310" class="line-dashed"/>
    <line x1="60" y1="240" x2="270" y2="240" class="line-dashed"/>
    <line x1="60" y1="170" x2="270" y2="170" class="line-dashed"/>
    <!-- Labels -->
    <text x="215" y="306" class="annotation">&#x3B2;&#x2080; = 0, &#x3B2;&#x2081; = 0</text>
    <text x="215" y="236" class="annotation">&#x3B2;&#x2080; = 1, &#x3B2;&#x2081; = 0</text>
    <text x="215" y="166" class="annotation">&#x3B2;&#x2080; = 2, &#x3B2;&#x2081; = 0</text>
  </g>
</svg>