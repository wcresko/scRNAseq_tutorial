<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #222; text-anchor: middle; }
    .sub { font-size: 13px; fill: #444; text-anchor: middle; }
    .caption { font-size: 12px; fill: #555; text-anchor: middle; }
    .axis { stroke: #888; stroke-width: 1; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
  </style>

  <!-- Column headers -->
  <text class="title" x="240" y="32">Bulk RNA-seq</text>
  <text class="title" x="720" y="32">Single-cell RNA-seq</text>

  <!-- === LEFT: BULK === -->
  <!-- Tissue blob -->
  <g id="bulk-tissue" transform="translate(60,70)">
    <ellipse cx="100" cy="110" rx="95" ry="80" fill="#f6e8c3" stroke="#a6611a" stroke-width="1.5"/>
    <!-- cells (4 types) -->
    <g>
      <circle cx="60"  cy="70"  r="8" fill="#2c7fb8"/>
      <circle cx="90"  cy="55"  r="8" fill="#2c7fb8"/>
      <circle cx="130" cy="75"  r="8" fill="#e66101"/>
      <circle cx="70"  cy="105" r="8" fill="#1b9e77"/>
      <circle cx="110" cy="110" r="8" fill="#e66101"/>
      <circle cx="150" cy="115" r="8" fill="#756bb1"/>
      <circle cx="50"  cy="140" r="8" fill="#1b9e77"/>
      <circle cx="95"  cy="150" r="8" fill="#2c7fb8"/>
      <circle cx="135" cy="160" r="8" fill="#756bb1"/>
      <circle cx="75"  cy="175" r="8" fill="#e66101"/>
      <circle cx="115" cy="180" r="8" fill="#1b9e77"/>
      <circle cx="155" cy="85"  r="8" fill="#756bb1"/>
    </g>
    <text class="sub" x="100" y="215">Heterogeneous tissue</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 265 180 L 335 180" marker-end="url(#arrowhead)"/>
  <text class="caption" x="300" y="170">lyse &amp; pool mRNA</text>

  <!-- Bulk average expression: single bar chart -->
  <g id="bulk-bars" transform="translate(345,90)">
    <line class="axis" x1="0" y1="140" x2="130" y2="140"/>
    <line class="axis" x1="0" y1="30"  x2="0"   y2="140"/>
    <rect x="10"  y="70"  width="15" height="70" fill="#2c7fb8"/>
    <rect x="35"  y="55"  width="15" height="85" fill="#e66101"/>
    <rect x="60"  y="90"  width="15" height="50" fill="#1b9e77"/>
    <rect x="85"  y="75"  width="15" height="65" fill="#756bb1"/>
    <rect x="110" y="100" width="15" height="40" fill="#888"/>
    <text class="caption" x="65" y="165">one average profile</text>
    <text class="caption" x="65" y="182">per sample</text>
  </g>

  <!-- === RIGHT: scRNA-seq === -->
  <g id="sc-tissue" transform="translate(530,70)">
    <ellipse cx="100" cy="110" rx="95" ry="80" fill="#f6e8c3" stroke="#a6611a" stroke-width="1.5"/>
    <g>
      <circle cx="60"  cy="70"  r="8" fill="#2c7fb8"/>
      <circle cx="90"  cy="55"  r="8" fill="#2c7fb8"/>
      <circle cx="130" cy="75"  r="8" fill="#e66101"/>
      <circle cx="70"  cy="105" r="8" fill="#1b9e77"/>
      <circle cx="110" cy="110" r="8" fill="#e66101"/>
      <circle cx="150" cy="115" r="8" fill="#756bb1"/>
      <circle cx="50"  cy="140" r="8" fill="#1b9e77"/>
      <circle cx="95"  cy="150" r="8" fill="#2c7fb8"/>
      <circle cx="135" cy="160" r="8" fill="#756bb1"/>
      <circle cx="75"  cy="175" r="8" fill="#e66101"/>
      <circle cx="115" cy="180" r="8" fill="#1b9e77"/>
      <circle cx="155" cy="85"  r="8" fill="#756bb1"/>
    </g>
    <text class="sub" x="100" y="215">Same tissue, dissociated</text>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 735 180 L 795 180" marker-end="url(#arrowhead)"/>
  <text class="caption" x="765" y="170">per-cell barcodes</text>

  <!-- Per-cell profiles: 4 tiny bar charts colored by type -->
  <g id="sc-bars" transform="translate(800,80)">
    <g transform="translate(0,0)"  stroke="#2c7fb8" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="15"/>
      <line x1="8" y1="30" x2="8" y2="5"/>
      <line x1="16" y1="30" x2="16" y2="20"/>
      <line x1="24" y1="30" x2="24" y2="12"/>
    </g>
    <g transform="translate(50,0)"  stroke="#e66101" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="18"/>
      <line x1="8" y1="30" x2="8" y2="22"/>
      <line x1="16" y1="30" x2="16" y2="3"/>
      <line x1="24" y1="30" x2="24" y2="10"/>
    </g>
    <g transform="translate(0,60)" stroke="#1b9e77" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="22"/>
      <line x1="8" y1="30" x2="8" y2="15"/>
      <line x1="16" y1="30" x2="16" y2="25"/>
      <line x1="24" y1="30" x2="24" y2="8"/>
    </g>
    <g transform="translate(50,60)" stroke="#756bb1" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="7"/>
      <line x1="8" y1="30" x2="8" y2="20"/>
      <line x1="16" y1="30" x2="16" y2="14"/>
      <line x1="24" y1="30" x2="24" y2="25"/>
    </g>
    <g transform="translate(0,120)" stroke="#2c7fb8" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="18"/>
      <line x1="8" y1="30" x2="8" y2="8"/>
      <line x1="16" y1="30" x2="16" y2="22"/>
      <line x1="24" y1="30" x2="24" y2="15"/>
    </g>
    <g transform="translate(50,120)" stroke="#e66101" stroke-width="8">
      <line x1="0" y1="30" x2="0" y2="10"/>
      <line x1="8" y1="30" x2="8" y2="25"/>
      <line x1="16" y1="30" x2="16" y2="8"/>
      <line x1="24" y1="30" x2="24" y2="18"/>
    </g>
    <text class="caption" x="40" y="180">one profile per cell</text>
    <text class="caption" x="40" y="197">(1000s–millions)</text>
  </g>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
</svg>
