project:
  type: website
  output-dir: docs
  # Top-level pages and all Resources_Folder pages (appendices, Glossary,
  # VS Code reference) are rendered. Exercise_Folder .qmd files are NOT
  # rendered — they are copied verbatim (see `resources:` below) so
  # students can download the raw source.
  render:
    - "*.qmd"
    - "Resources_Folder/*.qmd"
  resources:
    - "Exercise_Folder/*.qmd"
    - "Exercise_Folder/*.tsv"
    - "Exercise_Folder/*.csv"
    - "Exercise_Folder/*.txt"
    - "Lecture_Folder/*.tsv"
    - "Lecture_Folder/*.csv"
    - "Lecture_Folder/*.txt"

website:
  title: "Single Cell RNA-seq Workshop"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - about.qmd
      - Syllabus.qmd
      - Schedule.qmd
      - Lectures.qmd
      - Exercises.qmd
      - Software.qmd
      - Resources.qmd
      - Additional_Readings.qmd

format:
  html:
    theme: cerulean
    css: styles.css
    toc: true
    embed-resources: true

editor: visual
