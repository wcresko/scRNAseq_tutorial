project:
  type: website
  output-dir: docs
  # Top-level pages and all Resources_Folder pages (appendices, Glossary,
  # VS Code reference) are rendered. Exercise_Folder .qmd files are NOT
  # rendered — they are copied verbatim (see `resources:` below) so
  # students can download the raw source.
  render:
    - "*.qmd"
    - "Resources_Folder/*.qmd"
  resources:
    - "Exercise_Folder/*.qmd"
    - "Exercise_Folder/*.tsv"
    - "Exercise_Folder/*.csv"
    - "Exercise_Folder/*.txt"
    - "Lecture_Folder/*.tsv"
    - "Lecture_Folder/*.csv"
    - "Lecture_Folder/*.txt"

website:
  title: "Single Cell RNA-seq Workshop"
  search:
    location: navbar
    type: overlay
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - about.qmd
      - Syllabus.qmd
      - Schedule.qmd
      - href: Setup.qmd
        text: Setup
      - Software.qmd
      - Lectures.qmd
      - Exercises.qmd
      - Resources.qmd
      - Additional_Readings.qmd
      - href: FAQ.qmd
        text: FAQ
    right:
      - icon: github
        href: https://github.com/wcresko/scRNAseq_tutorial
        aria-label: GitHub
  page-footer:
    left: "© Single Cell RNA-seq Workshop --- [Code of Conduct](Code_of_Conduct.qmd) · [Accessibility](Accessibility.qmd)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cerulean
      dark: darkly
    css: styles.css
    toc: true
    toc-location: left
    toc-depth: 3
    embed-resources: true
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    anchor-sections: true

editor: visual
